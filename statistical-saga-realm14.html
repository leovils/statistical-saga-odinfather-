<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Statistical Saga of Odinfather — Realm 14: Non-Parametric Tests</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{--bg-dark:#0d1117;--bg-card:#161b22;--bg-panel:#1c2333;--odin-blue:#58a6ff;--thor-red:#f85149;--corvo-purple:#bc8cff;--gold:#f0c040;--silver:#8b949e;--text:#e6edf3;--text-dim:#8b949e;--success:#3fb950;--border:#30363d}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-dark);color:var(--text);font-family:'Patrick Hand',cursive;font-size:18px;min-height:100vh;overflow-x:hidden}
#game-container{max-width:800px;margin:0 auto;padding:20px;min-height:100vh}
.title-screen{text-align:center;padding:60px 20px;animation:fadeIn 1s ease}
.title-screen h1{font-family:'Bangers',cursive;font-size:2.8em;color:var(--gold);text-shadow:2px 2px 8px rgba(240,192,64,.3);line-height:1.1;margin-bottom:8px}
.title-screen h2{font-family:'Permanent Marker',cursive;font-size:1.5em;color:var(--odin-blue);margin-bottom:30px}
.title-screen .subtitle{color:var(--text-dim);font-size:1.1em;margin-bottom:40px}
.reino-badge{display:inline-block;background:linear-gradient(135deg,var(--odin-blue),var(--corvo-purple));padding:6px 20px;border-radius:20px;font-family:'Bangers',cursive;font-size:1em;color:#fff;margin-bottom:16px}
.difficulty-select{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.diff-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Bangers',cursive;font-size:1.2em;padding:16px 32px;border-radius:12px;cursor:pointer;transition:all .3s;min-width:180px}
.diff-btn:hover{border-color:var(--odin-blue);transform:translateY(-2px)}
.diff-btn .diff-label{font-size:1.3em}.diff-btn .diff-desc{font-family:'Patrick Hand',cursive;font-size:.65em;color:var(--text-dim);margin-top:4px}
.scene{animation:slideIn .5s ease;padding:10px 0}
.dialogue-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;position:relative}
.dialogue-box.odin{border-left:4px solid var(--odin-blue)}.dialogue-box.thor{border-left:4px solid var(--thor-red)}.dialogue-box.corvo{border-left:4px solid var(--corvo-purple)}.dialogue-box.narrator{border-left:4px solid var(--gold)}
.char-name{font-family:'Bangers',cursive;font-size:1.1em;margin-bottom:6px}
.char-name.odin{color:var(--odin-blue)}.char-name.thor{color:var(--thor-red)}.char-name.corvo{color:var(--corvo-purple)}.char-name.narrator{color:var(--gold)}
.dialogue-text{line-height:1.5;font-size:1.05em}.dialogue-text em{color:var(--gold);font-style:normal;font-weight:bold}
.challenge-box{background:var(--bg-panel);border:2px solid var(--gold);border-radius:12px;padding:24px;margin:20px 0;animation:pulse-border 2s ease infinite}
@keyframes pulse-border{0%,100%{border-color:var(--gold);box-shadow:0 0 8px rgba(240,192,64,.15)}50%{border-color:#f0c040cc;box-shadow:0 0 16px rgba(240,192,64,.3)}}
.challenge-title{font-family:'Bangers',cursive;font-size:1.4em;color:var(--gold);margin-bottom:12px;text-align:center}
.challenge-question{margin-bottom:16px;line-height:1.5}
.data-display{background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin:12px 0;font-family:'Courier New',monospace;font-size:1em;color:var(--odin-blue);text-align:center;letter-spacing:1px;line-height:1.6}
.options-grid{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.option-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Patrick Hand',cursive;font-size:1.05em;padding:14px 18px;border-radius:10px;cursor:pointer;text-align:left;transition:all .25s;line-height:1.4}
.option-btn:hover:not(.disabled){border-color:var(--odin-blue);background:#1a2233}
.option-btn.correct{border-color:var(--success);background:#0d2818;color:var(--success)}
.option-btn.wrong{border-color:var(--thor-red);background:#2d1116;color:var(--thor-red)}
.option-btn.disabled{cursor:default;opacity:.7}
.feedback-box{border-radius:10px;padding:16px 20px;margin:16px 0;animation:fadeIn .4s ease;line-height:1.5}
.feedback-box.correct{background:#0d2818;border:1px solid var(--success);color:var(--success)}
.feedback-box.wrong{background:#2d1116;border:1px solid var(--thor-red);color:var(--thor-red)}
.xp-badge{display:inline-block;background:var(--gold);color:var(--bg-dark);font-family:'Bangers',cursive;padding:2px 10px;border-radius:6px;font-size:.9em;margin-left:6px}
.xp-bar-container{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.xp-label{font-family:'Bangers',cursive;color:var(--gold);font-size:1em;white-space:nowrap}
.xp-bar-bg{flex:1;height:14px;background:var(--bg-dark);border-radius:7px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--odin-blue),var(--gold));border-radius:7px;transition:width .6s ease}
.xp-count{font-family:'Bangers',cursive;color:var(--text);font-size:1em;min-width:60px;text-align:right}
.continue-btn{display:block;margin:20px auto 0;background:transparent;border:2px solid var(--odin-blue);color:var(--odin-blue);font-family:'Bangers',cursive;font-size:1.15em;padding:12px 36px;border-radius:10px;cursor:pointer;transition:all .25s}
.continue-btn:hover{background:var(--odin-blue);color:var(--bg-dark)}
.result-screen{text-align:center;padding:40px 20px;animation:fadeIn .8s ease}
.result-screen h2{font-family:'Bangers',cursive;font-size:2.2em;color:var(--gold);margin-bottom:8px}
.result-rank{font-family:'Permanent Marker',cursive;font-size:1.5em;margin:16px 0}
.result-stats{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:20px 0;text-align:left}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}.stat-value{font-family:'Bangers',cursive;color:var(--odin-blue)}
.hint-box{background:#1a1530;border:1px solid var(--corvo-purple);border-radius:10px;padding:14px 18px;margin:12px 0;font-size:.95em;color:var(--corvo-purple);animation:fadeIn .5s ease}
.hint-box .hint-label{font-family:'Bangers',cursive;font-size:1em;margin-bottom:4px}
/* ── VISUAL: Matrix Structure ── */
.matrix-visual{display:flex;align-items:center;justify-content:center;gap:4px;margin:16px 0;flex-wrap:wrap}
.mat-segment{padding:12px 10px;text-align:center;font-family:'Courier New',monospace;font-size:.85em;min-width:80px;border-radius:6px}
.mat-total{background:#1a2040;color:var(--gold);border:2px solid var(--gold)}
.mat-hyp{background:#0d2818;color:var(--success);border:2px solid var(--success)}
.mat-err{background:#2d1116;color:var(--thor-red);border:2px solid var(--thor-red)}
.mat-eq{font-family:'Bangers',cursive;color:var(--text);font-size:1.2em;padding:0 4px}
/* ── VISUAL: Comparison Table ── */
.comparison-table{width:100%;border-collapse:separate;border-spacing:0;margin:16px 0;font-size:.9em}
.comparison-table th{background:var(--gold);color:var(--bg-dark);font-family:'Bangers',cursive;padding:10px;text-align:center}
.comparison-table td{padding:10px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg-card)}
.comparison-table tr:last-child td{border-bottom:none}
.comparison-table .highlight-row{background:var(--bg-panel);border:2px solid var(--gold)}
.comparison-table .highlight-row td{background:var(--bg-panel);color:var(--gold);font-weight:bold}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.title-screen h1{font-size:2em}.title-screen h2{font-size:1.2em}.difficulty-select{flex-direction:column;align-items:center}#game-container{padding:12px}.challenge-box{padding:16px}.matrix-visual{flex-wrap:wrap}.mat-segment{min-width:60px;font-size:.75em}.comparison-table{font-size:.78em}.comparison-table th,.comparison-table td{padding:6px 4px}}

/* ── ARMOR SYSTEM ── */
.armor-panel{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px}
.viking-mini{position:relative;width:120px;height:180px;flex-shrink:0}
.vm-head{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;background:#d4a574;border:1.5px solid #b8956a;z-index:5}
.vm-torso{position:absolute;top:56px;left:50%;transform:translateX(-50%);width:44px;height:58px;background:#8b7355;border-radius:7px 7px 4px 4px;z-index:3}
.vm-arm-l{position:absolute;top:59px;left:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-arm-r{position:absolute;top:59px;right:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-leg-l{position:absolute;top:111px;left:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-leg-r{position:absolute;top:111px;right:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-slot{position:absolute;opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1);transform:scale(.3)}
.vm-slot.on{opacity:1;transform:scale(1)}
.vm-helm{top:16px;left:50%;transform:translateX(-50%) scale(.3);z-index:8}.vm-helm.on{transform:translateX(-50%) scale(1)}
.vm-mail{top:57px;left:50%;transform:translateX(-50%) scale(.3);z-index:4}.vm-mail.on{transform:translateX(-50%) scale(1)}
.vm-cape{top:53px;left:50%;transform:translateX(-50%) scale(.3);z-index:1}.vm-cape.on{transform:translateX(-50%) scale(1)}
.vm-left{top:66px;left:0;z-index:7}.vm-right{top:56px;right:0;z-index:7}
.vm-boots{bottom:4px;left:50%;transform:translateX(-50%) scale(.3);z-index:7;display:flex;gap:10px}.vm-boots.on{transform:translateX(-50%) scale(1)}
.gear-progress{flex:1;display:flex;flex-direction:column;gap:4px}
.gp-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;font-size:.8em;color:var(--text-dim);transition:all .3s}
.gp-row.earned{color:var(--success);font-weight:bold}
.gp-row .gp-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:transparent;transition:all .3s;flex-shrink:0}
.gp-row.earned .gp-dot{background:var(--success);border-color:var(--success)}
.vm-sparks{position:absolute;pointer-events:none;z-index:20}
.vm-spark{position:absolute;border-radius:50%;animation:vmSp .6s ease-out forwards}
@keyframes vmSp{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}}
.vm-flash{animation:vmFl .4s ease}
@keyframes vmFl{0%{filter:brightness(1)}30%{filter:brightness(1.8) drop-shadow(0 0 12px rgba(240,180,40,.6))}100%{filter:brightness(1)}}
.result-viking{position:relative;width:160px;height:240px;margin:16px auto}
.rv-head{position:absolute;top:36px;left:50%;transform:translateX(-50%);width:42px;height:42px;border-radius:50%;background:#d4a574;border:2px solid #b8956a;z-index:5}
.rv-torso{position:absolute;top:73px;left:50%;transform:translateX(-50%);width:56px;height:74px;background:#8b7355;border-radius:9px 9px 5px 5px;z-index:3}
.rv-arm-l{position:absolute;top:77px;left:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-arm-r{position:absolute;top:77px;right:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-leg-l{position:absolute;top:144px;left:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-leg-r{position:absolute;top:144px;right:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-slot{position:absolute}
.rv-helm{top:20px;left:50%;transform:translateX(-50%);z-index:8}
.rv-mail{top:74px;left:50%;transform:translateX(-50%);z-index:4}
.rv-cape{top:69px;left:50%;transform:translateX(-50%);z-index:1}
.rv-left{top:86px;left:4px;z-index:7}.rv-right{top:72px;right:4px;z-index:7}
.rv-boots{bottom:4px;left:50%;transform:translateX(-50%);z-index:7;display:flex;gap:14px}
@media(max-width:600px){.armor-panel{flex-direction:column;align-items:center}.viking-mini{width:100px;height:160px}}
footer{text-align:center;padding:24px 12px;color:var(--text-dim);font-size:.85em;border-top:1px solid var(--border);margin-top:40px}
footer a{color:var(--odin-blue);text-decoration:none}footer a:hover{text-decoration:underline}
</style>

<div id="game-container"><div id="game-content"></div></div>
<footer>
  <a href="index.html">Return to Realm Hub</a><br>

<script>
// ════════════════════════════════════════════════════
// THE STATISTICAL SAGA OF ODINFATHER — REALM 14
// NON-PARAMETRIC TESTS
// ════════════════════════════════════════════════════
const GAME={difficulty:null,xp:0,maxXP:0,hits:0,total:0,currentScene:0,scenes:[]};
const content=()=>document.getElementById('game-content');
function dialogue(c,t){
  const cls={odin:'odin',thor:'thor',muninn:'corvo',huginn:'corvo',narrator:'narrator'};
  const nm={odin:'Odinfather \u{1F9D9}‍♂️',thor:'Thorment ⚡',muninn:'Muninn \u{1F426}‍⬛',huginn:'Huginn \u{1F426}',narrator:'\u{1F4DC} Narrator'};
  return `<div class="dialogue-box ${cls[c]||'narrator'}"><div class="char-name ${cls[c]||'narrator'}">${nm[c]||c}</div><div class="dialogue-text">${t}</div></div>`;
}
function hintBox(t){return `<div class="hint-box"><div class="hint-label">\u{1F426}‍⬛ Muninn's Hint</div>${t}</div>`;}
function xpBar(){
  const p=GAME.maxXP>0?Math.round((GAME.xp/GAME.maxXP)*100):0;
  return armorPanelHTML()+`<div class="xp-bar-container"><div class="xp-label">⚡ XP</div><div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${p}%"></div></div><div class="xp-count">${GAME.xp} / ${GAME.maxXP}</div></div>`;
}
function updateXPBar(){
  const b=document.querySelector('.xp-bar-fill'),c=document.querySelector('.xp-count');
  if(b&&c){const p=GAME.maxXP>0?Math.round((GAME.xp/GAME.maxXP)*100):0;b.style.width=p+'%';c.textContent=`${GAME.xp} / ${GAME.maxXP}`;}
}
function showTitleScreen(){
  content().innerHTML=`
  <div class="title-screen">
    <div class="reino-badge">REALM 14</div>
    <h1>The Statistical Saga of Odinfather</h1>
    <h2>Realm of Non-Parametric Tests</h2>
    <p class="subtitle">In the depths of Niflheim, where data refuses to follow the normal curve, Odinfather teaches the art of rankings — weapons that work when traditional ones fail.</p>
    <div class="difficulty-select">
      <button class="diff-btn" onclick="startGame('aprendiz')"><div class="diff-label">\u{1F6E1}️ Apprentice</div><div class="diff-desc">Undergraduate — with Muninn's hints</div></button>
      <button class="diff-btn" onclick="startGame('mestre')"><div class="diff-label">⚔️ Master</div><div class="diff-desc">Graduate — no hints, extra challenges</div></button>
    </div>
  </div>`;
}
function startGame(d){
  GAME.difficulty=d;GAME.xp=0;GAME.hits=0;GAME.total=0;GAME.currentScene=0;gearEarned=0;
  buildScenes();GAME.maxXP=countMaxXP();renderScene();
}

// ════════════════════════════════════════════════════
function buildScenes(){
  GAME.scenes=[];

  // ━━ SCENE 1: Arrival at Niflheim ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${dialogue('narrator','An icy mist envelops the path as the student descends toward <em>Niflheim</em> — the realm of eternal frost, where frozen rivers carry data that refuses to follow the normal curve. Distributions here are skewed, outliers roam like wild wolves, and scales are ordinal. Traditional parametric weapons rust in this hostile climate.')}
      ${dialogue('odin','Not all data is normal. When the distribution is skewed, data is ordinal, or the sample is very small, we need tools that work with <em>RANKINGS</em> instead of raw values.')}
      ${dialogue('thor','Rankings? That\'s for the weak! The t-test solves everything!')}
      ${dialogue('odin','Rankings make tests <em>robust to outliers</em> and don\'t require normality. They are weapons that work when traditional ones fail. Here in Niflheim, either you master rankings, or you freeze.')}
      <button class="continue-btn" onclick="nextScene()">Enter Niflheim →</button>
    </div>`});

  // ━━ SCENE 2: When to Use Non-Parametrics ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${dialogue('odin','When should you use non-parametric tests? Four classic situations:<br><br>• <em>Ordinal data</em> — satisfaction scales, rankings, 1-to-5 ratings<br>• <em>Normality violated</em> — significant Shapiro-Wilk, strong skewness<br>• <em>Small samples</em> — n < 15–20 per group, where the CLT won\'t save you<br>• <em>Heavy outliers</em> — extreme values that distort means and variances')}
      ${dialogue('muninn','The equivalence table is essential:<br><br><strong>Parametric → Non-Parametric</strong><br>• Independent t → <em>Mann-Whitney U</em><br>• Paired t → <em>Wilcoxon Signed-Rank</em><br>• ANOVA → <em>Kruskal-Wallis H</em><br>• RM ANOVA → <em>Friedman</em><br>• Pearson r → <em>Spearman ρ / Kendall τ</em>')}
      ${dialogue('huginn','Non-parametrics are not "second-class tests." They are <em>essential</em> tools in any researcher\'s arsenal. Parametric when possible, non-parametric when necessary!')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 3: CHALLENGE 1 — When to Choose ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Shapiro-Wilk with p < 0.05 rejects the normality hypothesis. What is the non-parametric alternative to the independent t-test?'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 1: The Warrior's Choice</div>
        <div class="challenge-question">A researcher has 12 observations per group. The Shapiro-Wilk test yielded p = 0.02 for one of the groups. What is the best approach?</div>
        <div class="data-display">
          n₁ = 12 &nbsp;|&nbsp; n₂ = 12<br>
          Shapiro-Wilk: p = 0.02 (group 1)
        </div>
        ${hint}
        <div class="options-grid" id="q1-opts">
          <button class="option-btn" onclick="checkQ(1,this,'a')">t-test — 12 observations is enough for normality</button>
          <button class="option-btn" onclick="checkQ(1,this,'b')">Log-transform the data and run a t-test</button>
          <button class="option-btn" onclick="checkQ(1,this,'c')">Mann-Whitney U — normality violated (Shapiro-Wilk p < 0.05), non-parametric alternative to the independent t-test</button>
          <button class="option-btn" onclick="checkQ(1,this,'d')">ANOVA — more robust than the t-test</button>
        </div>
        <div id="q1-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 4: Mann-Whitney U ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','The <em>Mann-Whitney U</em> is the star of non-parametric tests for two independent groups. The logic: combine all data, <em>rank from lowest to highest</em>, and compare the rank sums between the groups.')}
      ${dialogue('odin','Example: Wolf Clan (5 warriors) vs Serpent Clan (4 warriors). We pool them all, rank from 1 to 9, and sum the ranks for each clan separately.')}
      <div class="data-display">
        Formula: U₁ = n₁×n₂ + n₁(n₁+1)/2 − R₁<br><br>
        U counts how many times a value from<br>
        one group precedes a value from the other
      </div>
      ${dialogue('muninn','U is a measure of <em>overlap between distributions</em>. Maximum U (= n₁×n₂) means total separation. Minimum U (= 0) means one group completely dominates the other in rankings.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 5: CHALLENGE 2 — Mann-Whitney Calculation ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('U₁ = n₁×n₂ + n₁(n₁+1)/2 − R₁. Substitute: 5×4 + 5×6/2 − 32.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 2: Computing U</div>
        <div class="challenge-question">Two clans with 5 and 4 warriors. R₁ (rank sum of group 1) = 32, n₁ = 5, n₂ = 4. Calculate U₁.</div>
        <div class="data-display">
          n₁ = 5 &nbsp;|&nbsp; n₂ = 4 &nbsp;|&nbsp; R₁ = 32<br>
          U₁ = n₁×n₂ + n₁(n₁+1)/2 − R₁ = ?
        </div>
        ${hint}
        <div class="options-grid" id="q2-opts">
          <button class="option-btn" onclick="checkQ(2,this,'a')">U₁ = 5×4 + 5×6/2 − 32 = 20 + 15 − 32 = 3</button>
          <button class="option-btn" onclick="checkQ(2,this,'b')">U₁ = 32 − 20 = 12</button>
          <button class="option-btn" onclick="checkQ(2,this,'c')">U₁ = 5×4 = 20</button>
          <button class="option-btn" onclick="checkQ(2,this,'d')">U₁ = 32/5 = 6.4</button>
        </div>
        <div id="q2-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 6: Wilcoxon Signed-Rank ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','The <em>Wilcoxon Signed-Rank</em> is the non-parametric paired test. The recipe: (1) compute the before–after differences, (2) take the absolute values, (3) rank the absolute values, (4) sum the positive ranks (T+) and negative ranks (T−) separately.')}
      ${dialogue('thor','More rankings? This never ends!')}
      ${dialogue('odin','The Wilcoxon is <em>elegant</em>: if most ranks are on the positive values, there was improvement. If on the negative values, there was decline. T = min(T+, T−) is compared to the critical value. The smaller T is, the more extreme the result.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 7: CHALLENGE 3 — Wilcoxon Concept ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('High T+ and low T− indicates that most differences are positive (improvement). T = min(T+, T−) = 2.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 3: The Signed Ranks</div>
        <div class="challenge-question">8 warriors trained before and after. T+ = 34, T− = 2. What do these values indicate?</div>
        <div class="data-display">
          n = 8 warriors &nbsp;|&nbsp; T+ = 34 &nbsp;|&nbsp; T− = 2<br>
          T = min(T+, T−) = ?
        </div>
        ${hint}
        <div class="options-grid" id="q3-opts">
          <button class="option-btn" onclick="checkQ(3,this,'a')">There is no difference — T+ and T− are both positive</button>
          <button class="option-btn" onclick="checkQ(3,this,'b')">Training made things worse — T− is smaller</button>
          <button class="option-btn" onclick="checkQ(3,this,'c')">Most ranks are on positive values (improvement), indicating a significant effect. T = min(T+, T−) = 2, compared to the critical value</button>
          <button class="option-btn" onclick="checkQ(3,this,'d')">We need more data to draw a conclusion</button>
        </div>
        <div id="q3-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 8: Kruskal-Wallis ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','When we have <em>3 or more independent groups</em> and cannot use ANOVA, <em>Kruskal-Wallis</em> is the alternative. The logic: rank all data together and compare the rank sums across groups.')}
      <div class="data-display">
        H = [12 / N(N+1)] × Σ(Rⱼ² / nⱼ) − 3(N+1)<br><br>
        H follows a χ² distribution with df = k − 1<br>
        Post-hoc: Dunn with Bonferroni correction
      </div>
      ${dialogue('muninn','Large H = difference between groups. If significant, at least two groups differ — but we don\'t know <em>which ones</em>. That\'s why the Dunn post-hoc test is essential.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 9: CHALLENGE 4 — Kruskal-Wallis ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('p = .015 < .05 → significant. Kruskal-Wallis is omnibus — to find out WHICH pairs differ, you need a post-hoc test.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 4: The Kruskal Tribunal</div>
        <div class="challenge-question">3 villages (n = 6, 5, 5; N = 16) compared. H = 8.45, df = 2, p = .015. What is the conclusion and next step?</div>
        <div class="data-display">
          k = 3 villages &nbsp;|&nbsp; N = 16<br>
          H = 8.45 &nbsp;|&nbsp; df = 2 &nbsp;|&nbsp; p = .015
        </div>
        ${hint}
        <div class="options-grid" id="q4-opts">
          <button class="option-btn" onclick="checkQ(4,this,'a')">Significant (p < .05). Stop here — H already identifies which groups differ</button>
          <button class="option-btn" onclick="checkQ(4,this,'b')">Not significant — H needs to be greater than 10</button>
          <button class="option-btn" onclick="checkQ(4,this,'c')">Significant (p = .015 < .05, df = 2). There is a difference between at least two villages. Next step: Dunn post-hoc test with Bonferroni correction</button>
          <button class="option-btn" onclick="checkQ(4,this,'d')">Redo with ANOVA — Kruskal-Wallis is only preliminary</button>
        </div>
        <div id="q4-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 10: Friedman ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','<em>Friedman</em> is the Kruskal-Wallis for <em>repeated measures</em>. The crucial difference: rankings are done <em>WITHIN each subject</em> (by row), not across the entire set.')}
      ${dialogue('muninn','The key difference: in Kruskal-Wallis, we rank <em>ALL</em> data together. In Friedman, we rank <em>WITHIN each subject</em> (by row). Each subject gets their own ranks from 1 to k.')}
      ${dialogue('huginn','Kendall&rsquo;s W = χ²_F / [n(k−1)] measures the <em>concordance among subjects</em>. W = 1 means total unanimity; W = 0 means zero agreement. It\'s the effect size for Friedman!')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 11: CHALLENGE 5 — Friedman vs Kruskal-Wallis ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('The SAME subjects evaluated all conditions = repeated measures. Which non-parametric test for 3+ repeated conditions?'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 5: The Repeated Forge</div>
        <div class="challenge-question">The SAME 7 blacksmiths evaluated 3 forging techniques. Which test should be used and why?</div>
        <div class="data-display">
          7 blacksmiths × 3 techniques<br>
          Same subjects in all conditions
        </div>
        ${hint}
        <div class="options-grid" id="q5-opts">
          <button class="option-btn" onclick="checkQ(5,this,'a')">Kruskal-Wallis — any comparison of 3+ groups uses KW</button>
          <button class="option-btn" onclick="checkQ(5,this,'b')">Friedman — same subjects in all conditions (repeated measures), non-parametric alternative to RM ANOVA</button>
          <button class="option-btn" onclick="checkQ(5,this,'c')">One-way ANOVA — blacksmiths are independent in each technique</button>
          <button class="option-btn" onclick="checkQ(5,this,'d')">3 paired Wilcoxon tests with Bonferroni</button>
        </div>
        <div id="q5-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 12: Spearman and Kendall ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','For <em>non-parametric correlation</em>: <em>Spearman ρ</em> ranks X and Y separately, then computes Pearson on the ranks. <em>Kendall τ</em> counts concordant and discordant pairs.')}
      <div class="data-display">
        Spearman: ρ = 1 − 6Σd² / [n(n²−1)]<br><br>
        Kendall: τ = (C − D) / [n(n−1)/2]<br>
        C = concordant &nbsp;|&nbsp; D = discordant
      </div>
      ${dialogue('huginn','τ is more <em>robust</em> and has a direct probabilistic interpretation. ρ tends to be numerically <em>larger</em> than τ — don\'t compare the two directly!')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 13: CHALLENGE 6 — Spearman ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('ρ = 1 − 6Σd²/[n(n²−1)] = 1 − 6(12)/[10(100−1)] = 1 − 72/990'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 6: The Village Correlation</div>
        <div class="challenge-question">10 villages ranked on Warriors (X) and Grain (Y). Σd² = 12. Calculate ρ.</div>
        <div class="data-display">
          n = 10 &nbsp;|&nbsp; Σd² = 12<br>
          ρ = 1 − 6(12) / [10(100−1)] = ?
        </div>
        ${hint}
        <div class="options-grid" id="q6-opts">
          <button class="option-btn" onclick="checkQ(6,this,'a')">ρ = 1 − 72/990 = 1 − 0.073 = 0.927 — strong positive correlation</button>
          <button class="option-btn" onclick="checkQ(6,this,'b')">ρ = 72/990 = 0.073</button>
          <button class="option-btn" onclick="checkQ(6,this,'c')">ρ = 1 − 12/10 = −0.2</button>
          <button class="option-btn" onclick="checkQ(6,this,'d')">ρ = 6×12 = 72</button>
        </div>
        <div id="q6-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 14: CHALLENGE 7 — Effect Size ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('r = |z|/√N = 2.80/√25 = 2.80/5. Benchmarks: small ≈ 0.10, medium ≈ 0.30, large ≈ 0.50.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 7: The Strength of the Effect</div>
        <div class="challenge-question">Mann-Whitney with z = −2.80, N = 25. What is the effect size r and its classification?</div>
        <div class="data-display">
          z = −2.80 &nbsp;|&nbsp; N = 25<br>
          r = |z| / √N = ?
        </div>
        ${hint}
        <div class="options-grid" id="q7-opts">
          <button class="option-btn" onclick="checkQ(7,this,'a')">r = 2.80/5 = 0.56 — large effect (r > 0.50)</button>
          <button class="option-btn" onclick="checkQ(7,this,'b')">r = 2.80/25 = 0.112 — small effect</button>
          <button class="option-btn" onclick="checkQ(7,this,'c')">r = 2.80 × 25 = 70</button>
          <button class="option-btn" onclick="checkQ(7,this,'d')">It is not possible to calculate effect size for non-parametric tests</button>
        </div>
        <div id="q7-fb"></div>
      </div>
    </div>`;}});

  // ━━ MASTER CHALLENGES ━━
  if(GAME.difficulty==='mestre'){
    // CHALLENGE 8: Complete Scenario
    GAME.scenes.push({type:'challenge',html:()=>`
      <div class="scene">
        ${xpBar()}
        <div class="challenge-box">
          <div class="challenge-title">⚔️ Master Challenge 8: The Mead Trial</div>
          <div class="challenge-question">3 types of mead evaluated by 8 tasters (same tasters, ordinal scale 1–10). Shapiro-Wilk p = 0.03 for one type. χ²(2) = 11.2, p = .004. Describe the full analysis.</div>
          <div class="data-display">
            8 tasters × 3 meads<br>
            Ordinal scale &nbsp;|&nbsp; Shapiro-Wilk p = 0.03<br>
            χ²(2) = 11.2 &nbsp;|&nbsp; p = .004
          </div>
          <div class="options-grid" id="q8-opts">
            <button class="option-btn" onclick="checkQ(8,this,'a')">Repeated-measures ANOVA with Greenhouse-Geisser correction</button>
            <button class="option-btn" onclick="checkQ(8,this,'b')">Kruskal-Wallis with Dunn post-hoc</button>
            <button class="option-btn" onclick="checkQ(8,this,'c')">Friedman (same subjects, 3+ conditions, ordinal/non-normal data). χ²(2) = 11.2, p = .004. Kendall's W = 11.2/[8×2] = 0.70. Post-hoc: Nemenyi or paired Wilcoxon with Bonferroni (α = .05/3 ≈ .017)</button>
            <button class="option-btn" onclick="checkQ(8,this,'d')">3 separate Mann-Whitney tests between pairs</button>
          </div>
          <div id="q8-fb"></div>
        </div>
      </div>`});

    // CHALLENGE 9: Choosing the Correct Test
    GAME.scenes.push({type:'challenge',html:()=>`
      <div class="scene">
        ${xpBar()}
        <div class="challenge-box">
          <div class="challenge-title">⚔️ Master Challenge 9: The Test Map</div>
          <div class="challenge-question">A researcher has: (1) 2 independent groups, normal data; (2) 3 independent groups, ordinal data; (3) repeated measures with 4 time points, Shapiro-Wilk p = 0.01. Which test for EACH scenario?</div>
          <div class="data-display">
            Scenario 1: 2 indep. groups | normal data<br>
            Scenario 2: 3 indep. groups | ordinal data<br>
            Scenario 3: 4 time points (RM) | Shapiro-Wilk p = .01
          </div>
          <div class="options-grid" id="q9-opts">
            <button class="option-btn" onclick="checkQ(9,this,'a')">(1) t-test, (2) ANOVA, (3) RM ANOVA</button>
            <button class="option-btn" onclick="checkQ(9,this,'b')">(1) Mann-Whitney, (2) Friedman, (3) Kruskal-Wallis</button>
            <button class="option-btn" onclick="checkQ(9,this,'c')">(1) Independent t-test (normal data), (2) Kruskal-Wallis (ordinal data → 3+ independent groups), (3) Friedman (repeated measures + normality violated)</button>
            <button class="option-btn" onclick="checkQ(9,this,'d')">All with ANOVA — it is always more powerful</button>
          </div>
          <div id="q9-fb"></div>
        </div>
      </div>`});
  }

  // ━━ FINAL SCENE: Lesson of the Ravens ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('narrator','The mist of Niflheim begins to clear. The ranking tools gleam on the student\'s belt — Mann-Whitney, Wilcoxon, Kruskal-Wallis, Friedman, Spearman, Kendall. Each one forged to face the most rebellious data.')}
      ${dialogue('odin','You have conquered the <em>Realm of Non-Parametric Tests</em>! Rankings are versatile weapons that work where traditional metrics fail.')}
      ${dialogue('thor','Fine, I admit it... there are situations where the t-test just doesn\'t work. But I still prefer brute force!')}
      ${dialogue('muninn','<strong>Lesson of the Ravens — Muninn summarizes:</strong><br>• Mann-Whitney U: 2 independent groups<br>• Wilcoxon Signed-Rank: paired data<br>• Kruskal-Wallis H: 3+ independent groups (post-hoc: Dunn)<br>• Friedman: 3+ repeated conditions (effect: Kendall&rsquo;s W)<br>• Spearman ρ and Kendall τ: non-parametric correlations<br>• Effect size: r = |z|/√N')}
      ${dialogue('huginn','<strong>Lesson of the Ravens — Huginn challenges:</strong><br>• Parametric when possible (more power), non-parametric when necessary (more robust)<br>• The choice depends on the <em>data</em>, not your preference<br>• ALWAYS report effect size — even for non-parametric tests<br>• Kruskal-Wallis is omnibus — don\'t forget the post-hoc!')}
      <button class="continue-btn" onclick="showResults()">See Final Result ⚔️</button>
    </div>`});
}

function checkQ(q,btn,ans){
  const opts=document.querySelectorAll(`#q${q}-opts .option-btn`);
  opts.forEach(b=>{b.classList.add('disabled');b.onclick=null;});
  const fb=document.getElementById(`q${q}-fb`),cor=ANSWERS[q],exp=EXPLANATIONS[q];
  GAME.total++;
  if(ans===cor){
    btn.classList.add('correct');GAME.hits++;GAME.xp+=20;updateXPBar();earnGear();
    fb.innerHTML=`<div class="feedback-box correct">${dialogue(exp.charC,exp.correct+' <span class="xp-badge">+20 XP</span>')}<button class="continue-btn" onclick="nextScene()">Continue →</button></div>`;
  }else{
    btn.classList.add('wrong');
    const ci=['a','b','c','d'].indexOf(cor);if(opts[ci])opts[ci].classList.add('correct');
    fb.innerHTML=`<div class="feedback-box wrong">${dialogue(exp.charW,exp.wrong)}<button class="continue-btn" onclick="nextScene()">Continue →</button></div>`;
  }
}

  {s:'mail',n:'Ranking Chainmail',h:'<div style="width:46px;height:42px;background:linear-gradient(135deg,#6a6a7a,#4a4a5a);clip-path:polygon(50% 0%,100% 30%,100% 100%,0 100%,0 30%);border:1.5px solid #8a8a9a;position:relative"><div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:2px;align-items:center"><div style="display:flex;gap:1px"><span style="font-size:5px;color:#f0c040">1</span><span style="font-size:5px;color:#f0c040">2</span><span style="font-size:5px;color:#f0c040">3</span></div><div style="display:flex;gap:1px"><span style="font-size:5px;color:#f0c040">4</span><span style="font-size:5px;color:#f0c040">5</span><span style="font-size:5px;color:#f0c040">6</span></div></div></div>'},
  {s:'right',n:'Mann-Whitney Sword',h:'<div style="display:flex;flex-direction:column;align-items:center"><div style="width:12px;height:4px;background:linear-gradient(#c0c0c0,#808080);border-radius:2px"></div><div style="width:3px;height:32px;background:linear-gradient(#e0e0e0,#a0a0a0);border:1px solid #707070;position:relative"><span style="position:absolute;top:8px;left:-4px;font-size:7px;color:#58a6ff;font-weight:bold">U</span></div><div style="width:10px;height:6px;background:#5a3a1a;border-radius:1px;border:1px solid #3a2a10"></div></div>'},
  {s:'left',n:'Wilcoxon Shield',h:'<div style="width:28px;height:32px;background:radial-gradient(circle,#4a6a8a,#2a3a5a);border-radius:50% 50% 50% 50% / 45% 45% 55% 55%;border:2px solid #6a8aaa;position:relative"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:#f0c040;font-weight:bold;font-family:monospace">W</div></div>'},
  {s:'cape',n:'Kruskal\'s Cape',h:'<div style="width:58px;height:52px;background:linear-gradient(180deg,#2a2a3a,#1a1a2a);clip-path:polygon(15% 0%,85% 0%,100% 100%,0% 100%);opacity:.85;position:relative"><div style="position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:11px;color:#bc8cff;font-weight:bold;font-family:serif">H</div></div>'},
  {s:'helm',n:'Friedman\'s Helm',h:'<div style="width:38px;height:22px;background:linear-gradient(#6a6a7a,#4a4a5a);clip-path:polygon(5% 100%,15% 30%,50% 0%,85% 30%,95% 100%);border-bottom:3px solid #8a8a9a;position:relative"><div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:8px;color:#f0c040;font-weight:bold;font-family:serif">χ²</div></div>'}
];
var gearEarned=0;
function armorPanelHTML(){
  var rows='';
  for(var i=0;i<GEAR_ITEMS.length;i++){rows+='<div class="gp-row'+(i<gearEarned?' earned':'')+'" id="gprow'+i+'"><span class="gp-dot"></span><span>'+GEAR_ITEMS[i].n+'</span></div>';}
  var sl='<div class="vm-sparks" id="vmsparks"></div>';
  sl+='<div class="vm-slot vm-cape" id="vmslot-cape"></div>';
  sl+='<div class="vm-head"></div><div class="vm-arm-l"></div><div class="vm-arm-r"></div><div class="vm-torso"></div><div class="vm-leg-l"></div><div class="vm-leg-r"></div>';
  sl+='<div class="vm-slot vm-boots" id="vmslot-boots"></div><div class="vm-slot vm-mail" id="vmslot-mail"></div>';
  sl+='<div class="vm-slot vm-left" id="vmslot-left"></div><div class="vm-slot vm-right" id="vmslot-right"></div>';
  sl+='<div class="vm-slot vm-helm" id="vmslot-helm"></div>';
  return '<div class="armor-panel"><div class="viking-mini" id="vmini">'+sl+'</div><div class="gear-progress">'+rows+'</div></div>';
}
function restoreGear(){for(var i=0;i<gearEarned&&i<GEAR_ITEMS.length;i++){var g=GEAR_ITEMS[i],el=document.getElementById('vmslot-'+g.s);if(el){el.innerHTML=g.h;el.classList.add('on');}}}
function earnGear(){
  if(gearEarned>=GEAR_ITEMS.length)return;
  var g=GEAR_ITEMS[gearEarned],el=document.getElementById('vmslot-'+g.s);
  if(el){el.innerHTML=g.h;el.classList.add('on','vm-flash');setTimeout(function(){el.classList.remove('vm-flash')},500);spawnVMSparks(el);}
  var row=document.getElementById('gprow'+gearEarned);if(row)row.classList.add('earned');
  gearEarned++;
}
function spawnVMSparks(el){
  var sc=document.getElementById('vmsparks');if(!sc||!el)return;
  var r=el.getBoundingClientRect(),sr=document.getElementById('vmini').getBoundingClientRect();
  var cx=r.left-sr.left+r.width/2,cy=r.top-sr.top+r.height/2;
  var cols=['#f0c040','#f08030','#f0e080','#ff6040','#ffd060'];
  for(var i=0;i<10;i++){var s=document.createElement('div');s.className='vm-spark';
    var a=Math.random()*Math.PI*2,d=20+Math.random()*30;
    s.style.cssText='left:'+cx+'px;top:'+cy+'px;background:'+cols[Math.floor(Math.random()*5)]+';--sx:'+(Math.cos(a)*d)+'px;--sy:'+(Math.sin(a)*d)+'px;width:'+(2+Math.random()*3)+'px;height:'+(2+Math.random()*3)+'px';
    sc.appendChild(s);setTimeout(function(x){x.remove()},700,s);}
}
function resultVikingHTML(){
  var pct=GAME.total>0?Math.round((GAME.hits/GAME.total)*100):0;
  var ti=[];if(pct>=90)ti=GEAR_ITEMS;else if(pct>=70)ti=GEAR_ITEMS.slice(0,5);else if(pct>=50)ti=GEAR_ITEMS.slice(0,2);
  var html='<div class="result-viking">';
  html+='<div class="rv-slot rv-cape" id="rvs-cape"></div>';
  html+='<div class="rv-head"></div><div class="rv-arm-l"></div><div class="rv-arm-r"></div><div class="rv-torso"></div><div class="rv-leg-l"></div><div class="rv-leg-r"></div>';
  html+='<div class="rv-slot rv-boots" id="rvs-boots"></div><div class="rv-slot rv-mail" id="rvs-mail"></div>';
  html+='<div class="rv-slot rv-left" id="rvs-left"></div><div class="rv-slot rv-right" id="rvs-right"></div>';
  html+='<div class="rv-slot rv-helm" id="rvs-helm"></div></div>';
  setTimeout(function(){ti.forEach(function(g){var e=document.getElementById('rvs-'+g.s);if(e)e.innerHTML=g.h;});},100);
  return html;
}

showTitleScreen();
</script>
