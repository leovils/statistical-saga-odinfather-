<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Statistical Saga of Odinfather — Realm 3: Probability</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --silver: #8b949e;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  min-height: 100vh;
  overflow-x: hidden;
}
#game-container { max-width: 800px; margin: 0 auto; padding: 20px; min-height: 100vh; }

/* ── TITLE SCREEN ── */
.title-screen { text-align: center; padding: 60px 20px; animation: fadeIn 1s ease; }
.title-screen h1 {
  font-family: 'Bangers', cursive; font-size: 2.8em; color: var(--gold);
  text-shadow: 2px 2px 8px rgba(240,192,64,0.3); line-height: 1.1; margin-bottom: 8px;
}
.title-screen h2 { font-family: 'Permanent Marker', cursive; font-size: 1.5em; color: var(--odin-blue); margin-bottom: 30px; }
.title-screen .subtitle { color: var(--text-dim); font-size: 1.1em; margin-bottom: 40px; }
.reino-badge {
  display: inline-block; background: linear-gradient(135deg, var(--odin-blue), var(--corvo-purple));
  padding: 6px 20px; border-radius: 20px; font-family: 'Bangers', cursive; font-size: 1em; color: #fff; margin-bottom: 16px;
}

/* ── DIFFICULTY ── */
.difficulty-select { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
.diff-btn {
  background: var(--bg-card); border: 2px solid var(--border); color: var(--text);
  font-family: 'Bangers', cursive; font-size: 1.2em; padding: 16px 32px; border-radius: 12px;
  cursor: pointer; transition: all 0.3s; min-width: 180px;
}
.diff-btn:hover { border-color: var(--odin-blue); transform: translateY(-2px); }
.diff-btn .diff-label { font-size: 1.3em; }
.diff-btn .diff-desc { font-family: 'Patrick Hand', cursive; font-size: 0.65em; color: var(--text-dim); margin-top: 4px; }

/* ── SCENES / DIALOGUES ── */
.scene { animation: slideIn 0.5s ease; padding: 10px 0; }
.dialogue-box {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px 24px; margin-bottom: 16px; position: relative;
}
.dialogue-box.odin { border-left: 4px solid var(--odin-blue); }
.dialogue-box.thor { border-left: 4px solid var(--thor-red); }
.dialogue-box.corvo { border-left: 4px solid var(--corvo-purple); }
.dialogue-box.narrator { border-left: 4px solid var(--gold); }
.char-name { font-family: 'Bangers', cursive; font-size: 1.1em; margin-bottom: 6px; }
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }
.char-name.narrator { color: var(--gold); }
.dialogue-text { line-height: 1.5; font-size: 1.05em; }
.dialogue-text em { color: var(--gold); font-style: normal; font-weight: bold; }

/* ── CHALLENGES ── */
.challenge-box {
  background: var(--bg-panel); border: 2px solid var(--gold); border-radius: 12px;
  padding: 24px; margin: 20px 0; animation: pulse-border 2s ease infinite;
}
@keyframes pulse-border {
  0%,100% { border-color: var(--gold); box-shadow: 0 0 8px rgba(240,192,64,0.15); }
  50% { border-color: #f0c040cc; box-shadow: 0 0 16px rgba(240,192,64,0.3); }
}
.challenge-title { font-family: 'Bangers', cursive; font-size: 1.4em; color: var(--gold); margin-bottom: 12px; text-align: center; }
.challenge-question { margin-bottom: 16px; line-height: 1.5; }
.data-display {
  background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 18px; margin: 12px 0; font-family: 'Courier New', monospace; font-size: 1em;
  color: var(--odin-blue); text-align: center; letter-spacing: 1px; line-height: 1.6;
}

/* ── OPTIONS ── */
.options-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.option-btn {
  background: var(--bg-card); border: 2px solid var(--border); color: var(--text);
  font-family: 'Patrick Hand', cursive; font-size: 1.05em; padding: 14px 18px; border-radius: 10px;
  cursor: pointer; text-align: left; transition: all 0.25s; line-height: 1.4;
}
.option-btn:hover:not(.disabled) { border-color: var(--odin-blue); background: #1a2233; }
.option-btn.correct { border-color: var(--success); background: #0d2818; color: var(--success); }
.option-btn.wrong { border-color: var(--thor-red); background: #2d1116; color: var(--thor-red); }
.option-btn.disabled { cursor: default; opacity: 0.7; }

/* ── NUMERIC INPUT ── */
.num-input-group { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
.num-input {
  background: var(--bg-dark); border: 2px solid var(--border); color: var(--odin-blue);
  font-family: 'Patrick Hand', cursive; font-size: 1.2em; padding: 10px 16px; border-radius: 8px;
  width: 160px; text-align: center; outline: none;
}
.num-input:focus { border-color: var(--odin-blue); }
.submit-btn {
  background: var(--odin-blue); color: var(--bg-dark); border: none;
  font-family: 'Bangers', cursive; font-size: 1.1em; padding: 10px 24px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.submit-btn:hover { transform: scale(1.05); }

/* ── VISUAL: DICE / RUNES ── */
.dice-visual {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 16px 0;
}
.dice {
  width: 64px; height: 64px; background: var(--bg-card); border: 2px solid var(--gold);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-family: 'Bangers', cursive; font-size: 1.8em; color: var(--gold);
  transition: all 0.3s; cursor: default;
}
.dice.highlight { border-color: var(--odin-blue); color: var(--odin-blue); transform: scale(1.1); }
.tree-diagram {
  background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; margin: 12px 0; font-family: 'Courier New', monospace; font-size: 0.95em;
  color: var(--odin-blue); line-height: 1.8; white-space: pre;
}

/* ── FEEDBACK ── */
.feedback-box { border-radius: 10px; padding: 16px 20px; margin: 16px 0; animation: fadeIn 0.4s ease; line-height: 1.5; }
.feedback-box.correct { background: #0d2818; border: 1px solid var(--success); color: var(--success); }
.feedback-box.wrong { background: #2d1116; border: 1px solid var(--thor-red); color: var(--thor-red); }
.xp-badge {
  display: inline-block; background: var(--gold); color: var(--bg-dark);
  font-family: 'Bangers', cursive; padding: 2px 10px; border-radius: 6px; font-size: 0.9em; margin-left: 6px;
}

/* ── XP BAR ── */
.xp-bar-container {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
}
.xp-label { font-family: 'Bangers', cursive; color: var(--gold); font-size: 1em; white-space: nowrap; }
.xp-bar-bg { flex: 1; height: 14px; background: var(--bg-dark); border-radius: 7px; overflow: hidden; }
.xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--odin-blue), var(--gold)); border-radius: 7px; transition: width 0.6s ease; }
.xp-count { font-family: 'Bangers', cursive; color: var(--text); font-size: 1em; min-width: 60px; text-align: right; }

/* ── CONTINUE BUTTON ── */
.continue-btn {
  display: block; margin: 20px auto 0; background: transparent; border: 2px solid var(--odin-blue);
  color: var(--odin-blue); font-family: 'Bangers', cursive; font-size: 1.15em; padding: 12px 36px;
  border-radius: 10px; cursor: pointer; transition: all 0.25s;
}
.continue-btn:hover { background: var(--odin-blue); color: var(--bg-dark); }

/* ── FINAL RESULT ── */
.result-screen { text-align: center; padding: 40px 20px; animation: fadeIn 0.8s ease; }
.result-screen h2 { font-family: 'Bangers', cursive; font-size: 2.2em; color: var(--gold); margin-bottom: 8px; }
.result-rank { font-family: 'Permanent Marker', cursive; font-size: 1.5em; margin: 16px 0; }
.result-stats {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; margin: 20px 0; text-align: left;
}
.stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-dim); }
.stat-value { font-family: 'Bangers', cursive; color: var(--odin-blue); }

/* ── HINT ── */
.hint-box {
  background: #1a1530; border: 1px solid var(--corvo-purple); border-radius: 10px;
  padding: 14px 18px; margin: 12px 0; font-size: 0.95em; color: var(--corvo-purple); animation: fadeIn 0.5s ease;
}
.hint-box .hint-label { font-family: 'Bangers', cursive; font-size: 1em; margin-bottom: 4px; }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 600px) {
  .title-screen h1 { font-size: 2em; }
  .title-screen h2 { font-size: 1.2em; }
  .difficulty-select { flex-direction: column; align-items: center; }
  #game-container { padding: 12px; }
  .challenge-box { padding: 16px; }
  .dice { width: 52px; height: 52px; font-size: 1.4em; }
}

/* ── ARMOR SYSTEM ── */
.armor-panel{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px}
.viking-mini{position:relative;width:120px;height:180px;flex-shrink:0}
.vm-head{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;background:#d4a574;border:1.5px solid #b8956a;z-index:5}
.vm-torso{position:absolute;top:56px;left:50%;transform:translateX(-50%);width:44px;height:58px;background:#8b7355;border-radius:7px 7px 4px 4px;z-index:3}
.vm-arm-l{position:absolute;top:59px;left:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-arm-r{position:absolute;top:59px;right:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-leg-l{position:absolute;top:111px;left:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-leg-r{position:absolute;top:111px;right:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-slot{position:absolute;opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1);transform:scale(.3)}
.vm-slot.on{opacity:1;transform:scale(1)}
.vm-helm{top:16px;left:50%;transform:translateX(-50%) scale(.3);z-index:8}.vm-helm.on{transform:translateX(-50%) scale(1)}
.vm-mail{top:57px;left:50%;transform:translateX(-50%) scale(.3);z-index:4}.vm-mail.on{transform:translateX(-50%) scale(1)}
.vm-cape{top:53px;left:50%;transform:translateX(-50%) scale(.3);z-index:1}.vm-cape.on{transform:translateX(-50%) scale(1)}
.vm-left{top:66px;left:0;z-index:7}.vm-right{top:56px;right:0;z-index:7}
.vm-boots{bottom:4px;left:50%;transform:translateX(-50%) scale(.3);z-index:7;display:flex;gap:10px}.vm-boots.on{transform:translateX(-50%) scale(1)}
.gear-progress{flex:1;display:flex;flex-direction:column;gap:4px}
.gp-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;font-size:.8em;color:var(--text-dim);transition:all .3s}
.gp-row.earned{color:var(--success);font-weight:bold}
.gp-row .gp-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:transparent;transition:all .3s;flex-shrink:0}
.gp-row.earned .gp-dot{background:var(--success);border-color:var(--success)}
.vm-sparks{position:absolute;pointer-events:none;z-index:20}
.vm-spark{position:absolute;border-radius:50%;animation:vmSp .6s ease-out forwards}
@keyframes vmSp{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}}
.vm-flash{animation:vmFl .4s ease}
@keyframes vmFl{0%{filter:brightness(1)}30%{filter:brightness(1.8) drop-shadow(0 0 12px rgba(240,180,40,.6))}100%{filter:brightness(1)}}
.result-viking{position:relative;width:160px;height:240px;margin:16px auto}
.rv-head{position:absolute;top:36px;left:50%;transform:translateX(-50%);width:42px;height:42px;border-radius:50%;background:#d4a574;border:2px solid #b8956a;z-index:5}
.rv-torso{position:absolute;top:73px;left:50%;transform:translateX(-50%);width:56px;height:74px;background:#8b7355;border-radius:9px 9px 5px 5px;z-index:3}
.rv-arm-l{position:absolute;top:77px;left:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-arm-r{position:absolute;top:77px;right:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-leg-l{position:absolute;top:144px;left:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-leg-r{position:absolute;top:144px;right:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-slot{position:absolute}
.rv-helm{top:20px;left:50%;transform:translateX(-50%);z-index:8}
.rv-mail{top:74px;left:50%;transform:translateX(-50%);z-index:4}
.rv-cape{top:69px;left:50%;transform:translateX(-50%);z-index:1}
.rv-left{top:86px;left:4px;z-index:7}.rv-right{top:72px;right:4px;z-index:7}
.rv-boots{bottom:4px;left:50%;transform:translateX(-50%);z-index:7;display:flex;gap:14px}
@media(max-width:600px){.armor-panel{flex-direction:column;align-items:center}.viking-mini{width:100px;height:160px}}
</style>
</head>
<body>
<div id="game-container">
  <div id="game-content"></div>
</div>

<script>
// ════════════════════════════════════════════════════
// THE STATISTICAL SAGA OF ODINFATHER — REALM 3
// PROBABILITY
// ════════════════════════════════════════════════════

const GAME = {
  difficulty: null,
  xp: 0,
  maxXP: 0,
  hits: 0,
  total: 0,
  currentScene: 0,
  scenes: [],
};

const content = () => document.getElementById('game-content');

// ── CHARACTERS ──
function dialogue(char, text) {
  const cls = { odin:'odin', thor:'thor', muninn:'corvo', huginn:'corvo', narrator:'narrator' };
  const names = { odin:'Odinfather 🧙‍♂️', thor:'Thorment ⚡', muninn:'Muninn 🐦‍⬛', huginn:'Huginn 🐦', narrator:'📜 Narrator' };
  return `<div class="dialogue-box ${cls[char]||'narrator'}">
    <div class="char-name ${cls[char]||'narrator'}">${names[char]||char}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}
function hintBox(text) {
  return `<div class="hint-box"><div class="hint-label">🐦‍⬛ Muninn's Hint</div>${text}</div>`;
}

// ── XP ──
function xpBar() {
  const pct = GAME.maxXP > 0 ? Math.round((GAME.xp / GAME.maxXP) * 100) : 0;
  return armorPanelHTML()+`<div class="xp-bar-container">
    <div class="xp-label">⚡ XP</div>
    <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
    <div class="xp-count">${GAME.xp} / ${GAME.maxXP}</div>
  </div>`;
}
function updateXPBar() {
  const bar = document.querySelector('.xp-bar-fill');
  const count = document.querySelector('.xp-count');
  if (bar && count) {
    const pct = GAME.maxXP > 0 ? Math.round((GAME.xp / GAME.maxXP) * 100) : 0;
    bar.style.width = pct + '%';
    count.textContent = `${GAME.xp} / ${GAME.maxXP}`;
  }
}

// ── TITLE SCREEN ──
function showTitleScreen() {
  content().innerHTML = `
    <div class="title-screen">
      <div class="reino-badge">REALM 3</div>
      <h1>The Statistical Saga of Odinfather</h1>
      <h2>The Realm of Probability</h2>
      <p class="subtitle">When the Norns weave destiny, even gods roll the dice.</p>
      <div class="difficulty-select">
        <button class="diff-btn" onclick="startGame('aprendiz')">
          <div class="diff-label">🛡️ Apprentice</div>
          <div class="diff-desc">Undergraduate — with Muninn's hints</div>
        </button>
        <button class="diff-btn" onclick="startGame('mestre')">
          <div class="diff-label">⚔️ Master</div>
          <div class="diff-desc">Graduate — no hints, extra challenges</div>
        </button>
      </div>
    </div>`;
}

// ── START ──
function startGame(diff) {
  GAME.difficulty = diff;
  GAME.xp = 0; GAME.hits = 0; GAME.total = 0; GAME.currentScene = 0;
  gearEarned = 0;
  buildScenes();
  GAME.maxXP = countMaxXP();
  renderScene();
}

// ════════════════════════════════════════════════════
// SCENE CONSTRUCTION
// ════════════════════════════════════════════════════
function buildScenes() {
  GAME.scenes = [];

  // ━━ SCENE 1: Arrival at the Temple of the Norns ━━
  GAME.scenes.push({ type:'narrative', html: () => `
    <div class="scene">
      ${dialogue('narrator', 'Leaving the Tavern of Data behind, the young researcher climbs the highest peak in Midgard. At the summit, an ancestral temple shines beneath the auroras: the <em>Temple of the Norns</em> — the weavers of destiny.')}
      ${dialogue('odin', 'Welcome to the <em>Realm of Probability</em>, young seeker! Here dwelled the Norns — Urd (past), Verdandi (present), and Skuld (future). They wove the destiny of all beings. And probability is precisely that: the <em>science of measuring uncertainty</em>.')}
      ${dialogue('thor', 'Uncertainty? I have no uncertainty at all — I know you will fail! 😈')}
      ${dialogue('muninn', 'Probability is the foundation of all inferential statistics. Without it, there are no hypothesis tests, nor confidence intervals. Pay attention, young one.')}
      <button class="continue-btn" onclick="nextScene()">Enter the Temple →</button>
    </div>`
  });

  // ━━ SCENE 2: Concept — scale from 0 to 1 ━━
  GAME.scenes.push({ type:'narrative', html: () => `
    <div class="scene">
      ${dialogue('narrator', 'Inside the temple, three great runes float in the air. The first displays the number <em>0</em>, the second <em>0.5</em>, and the third <em>1</em>.')}
      ${dialogue('odin', 'The probability of any event ranges between <em>0</em> (impossible) and <em>1</em> (certain). If I flip a fair coin, the probability of "heads" is 0.5 — neither certain nor impossible. Fifty-fifty.')}
      ${dialogue('huginn', 'And there are two ways to estimate probabilities, Odinfather!')}
      ${dialogue('odin', 'Exactly! <em>Theoretical</em> probability — based on mathematics — and <em>empirical</em> probability — based on observation. If I know a die has 6 faces, the theoretical probability of rolling a 4 is 1/6. If I roll the die 600 times and the 4 appears 105 times, the empirical probability is 105/600 = 0.175.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`
  });

  // ━━ SCENE 3: CHALLENGE 1 — Basic Probability ━━
  GAME.scenes.push({ type:'challenge', html: () => {
    const hint = GAME.difficulty === 'aprendiz' ? hintBox('Probability = Number of favorable outcomes / Total number of possible outcomes. A fair die has 6 faces. Even faces: 2, 4, 6 = 3 faces.') : '';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 1: Odinfather\'s Die</div>
        <div class="challenge-question">Odinfather draws a runic die with 6 faces (1 to 6). What is the probability of rolling an <em>even</em> number?</div>
        <div class="dice-visual">
          <div class="dice">1</div><div class="dice highlight">2</div><div class="dice">3</div>
          <div class="dice highlight">4</div><div class="dice">5</div><div class="dice highlight">6</div>
        </div>
        ${hint}
        <div class="options-grid" id="q1-opts">
          <button class="option-btn" onclick="checkQ(1, this, 'a')">1/6 ≈ 0.17</button>
          <button class="option-btn" onclick="checkQ(1, this, 'b')">2/6 ≈ 0.33</button>
          <button class="option-btn" onclick="checkQ(1, this, 'c')">3/6 = 0.50</button>
          <button class="option-btn" onclick="checkQ(1, this, 'd')">4/6 ≈ 0.67</button>
        </div>
        <div id="q1-fb"></div>
      </div>
    </div>`;
  }});

  // ━━ SCENE 4: Narrative — Sample Space ━━
  GAME.scenes.push({ type:'narrative', html: () => `
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin', 'Very well! Before we advance, we must speak of the <em>sample space</em> — the set of ALL possible outcomes of an experiment.')}
      ${dialogue('muninn', 'When we roll a die, the sample space is S = {1, 2, 3, 4, 5, 6}. When we flip a coin, S = {Heads, Tails}. When we roll two dice... things get more interesting.')}
      ${dialogue('thor', 'Two dice? Now Thorment wants to see you calculate!')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`
  });

  // ━━ SCENE 5: CHALLENGE 2 — Sample Space of 2 Dice ━━

  // ━━ SCENE 6: Narrative — Addition Rule ━━
  GAME.scenes.push({ type:'narrative', html: () => `

  GAME.scenes.push({ type:'challenge', html: () => {

  // ━━ SCENE 8: Narrative — Multiplication Rule ━━
  GAME.scenes.push({ type:'narrative', html: () => `

  GAME.scenes.push({ type:'challenge', html: () => {

  // ━━ SCENE 12: Narrative — Mutually Exclusive vs Independent ━━
  GAME.scenes.push({ type:'narrative', html: () => `

  GAME.scenes.push({ type:'challenge', html: () => {

  // ━━ MASTER CHALLENGE: Bayes' Theorem ━━
  if (GAME.difficulty === 'mestre') {
    GAME.scenes.push({ type:'narrative', html: () => `
      <div class="scene">
        ${xpBar()}

        ${dialogue('odin', '<em>Bayes\' Theorem</em> inverts conditional probability. It allows us to update our beliefs in light of new evidence: <em>P(A|B) = P(B|A) × P(A) / P(B)</em>.')}

Calculation hint:<br>

        </div>

  // ━━ FINAL SCENE ━━
  GAME.scenes.push({ type:'narrative', html: () => `
    <div class="scene">

}

function checkQ(qNum, btn, answer) {
  const opts = document.querySelectorAll(`#q${qNum}-opts .option-btn`);
  opts.forEach(b => { b.classList.add('disabled'); b.onclick = null; });
  const fb = document.getElementById(`q${qNum}-fb`);
  const correct = ANSWERS[qNum];
  const exp = EXPLANATIONS[qNum];
  GAME.total++;

  if (answer === correct) {
    btn.classList.add('correct');
    GAME.hits++;
    GAME.xp += 20;
    updateXPBar();earnGear();
    fb.innerHTML = `<div class="feedback-box correct">
      ${dialogue(exp.charC, exp.correct + ' <span class="xp-badge">+20 XP</span>')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`;
  } else {
    btn.classList.add('wrong');
    // Highlight correct option
    const correctIdx = ['a','b','c','d'].indexOf(correct);
    if (opts[correctIdx]) opts[correctIdx].classList.add('correct');
    fb.innerHTML = `<div class="feedback-box wrong">
      ${dialogue(exp.charW, exp.wrong)}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`;
  }
}

// ── MAX XP ──
function countMaxXP() {
  let base = 7 * 20; // 7 base challenges
  if (GAME.difficulty === 'mestre') base += 20; // +1 Bayes
  return base;
}

// ── NAVIGATION ──
function renderScene() {
  if (GAME.currentScene < GAME.scenes.length) {
    content().innerHTML = GAME.scenes[GAME.currentScene].html();
    restoreGear();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
function nextScene() { GAME.currentScene++; renderScene(); }

}

var GEAR_ITEMS=[{"s":"boots","n":"Sandals of Fate","h":"<div style=\"display:flex;gap:14px\"><div style=\"width:24px;height:18px;background:#4a3060;border-radius:3px 3px 4px 7px;border:2px solid #604880\"></div><div style=\"width:24px;height:18px;background:#4a3060;border-radius:3px 3px 4px 7px;border:2px solid #604880\"></div></div>"},{"s":"mail","n":"Tunic of the Norns","h":"<div style=\"width:60px;height:72px;background:linear-gradient(180deg,#6a4890,#4a3070);border-radius:7px 7px 4px 4px;border:2px solid #3a2060\"></div>"},{"s":"right","n":"Runic Dice","h":"<div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:16px;height:16px;background:#e0d0b0;border-radius:3px;border:1.5px solid #a09070;text-align:center;font-size:8px;line-height:16px;color:#605040\">6</div><div style=\"width:16px;height:16px;background:#e0d0b0;border-radius:3px;border:1.5px solid #a09070;text-align:center;font-size:8px;line-height:16px;color:#605040\">3</div></div>"},{"s":"left","n":"Hourglass of Time","h":"<div style=\"width:22px;height:40px;position:relative\"><div style=\"position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#c0a040\"></div><div style=\"position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#c0a040\"></div><div style=\"position:absolute;top:3px;left:50%;transform:translateX(-50%);width:16px;height:34px;border:2px solid #c0a040;border-radius:8px;overflow:hidden\"><div style=\"position:absolute;bottom:0;width:100%;height:40%;background:#e0c870\"></div></div></div>"},{"s":"cape","n":"Cloak of Destiny","h":"<div style=\"width:84px;height:110px;background:linear-gradient(180deg,#5a2880,#3a1858);border-radius:5px 5px 28px 28px;clip-path:polygon(16% 0%,84% 0%,100% 18%,92% 100%,50% 88%,8% 100%,0% 18%)\"></div>"},{"s":"helm","n":"Tiara of the Norns","h":"<div style=\"width:52px;height:24px;background:linear-gradient(135deg,#a070d0,#7050a0);border-radius:26px 26px 5px 5px;border:2px solid #7050a0;position:relative\"><div style=\"position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:7px;height:12px;background:#e0c0ff;border-radius:3px 3px 1px 1px\"></div></div>"}];
var gearEarned=0;
function armorPanelHTML(){
  var rows='';
  for(var i=0;i<GEAR_ITEMS.length;i++){rows+='<div class="gp-row'+(i<gearEarned?' earned':'')+'" id="gprow'+i+'"><span class="gp-dot"></span><span>'+GEAR_ITEMS[i].n+'</span></div>';}
  var sl='<div class="vm-sparks" id="vmsparks"></div>';
  sl+='<div class="vm-slot vm-cape" id="vmslot-cape"></div>';
  sl+='<div class="vm-head"></div><div class="vm-arm-l"></div><div class="vm-arm-r"></div><div class="vm-torso"></div><div class="vm-leg-l"></div><div class="vm-leg-r"></div>';
  sl+='<div class="vm-slot vm-boots" id="vmslot-boots"></div><div class="vm-slot vm-mail" id="vmslot-mail"></div>';
  sl+='<div class="vm-slot vm-left" id="vmslot-left"></div><div class="vm-slot vm-right" id="vmslot-right"></div>';
  sl+='<div class="vm-slot vm-helm" id="vmslot-helm"></div>';
  return '<div class="armor-panel"><div class="viking-mini" id="vmini">'+sl+'</div><div class="gear-progress">'+rows+'</div></div>';
}
function restoreGear(){for(var i=0;i<gearEarned&&i<GEAR_ITEMS.length;i++){var g=GEAR_ITEMS[i],el=document.getElementById('vmslot-'+g.s);if(el){el.innerHTML=g.h;el.classList.add('on');}}}
function earnGear(){
  if(gearEarned>=GEAR_ITEMS.length)return;
  var g=GEAR_ITEMS[gearEarned],el=document.getElementById('vmslot-'+g.s);
  if(el){el.innerHTML=g.h;el.classList.add('on','vm-flash');setTimeout(function(){el.classList.remove('vm-flash')},500);spawnVMSparks(el);}
  var row=document.getElementById('gprow'+gearEarned);if(row)row.classList.add('earned');
  gearEarned++;
}
function spawnVMSparks(el){
  var sc=document.getElementById('vmsparks');if(!sc||!el)return;
  var r=el.getBoundingClientRect(),sr=document.getElementById('vmini').getBoundingClientRect();
  var cx=r.left-sr.left+r.width/2,cy=r.top-sr.top+r.height/2;
  var cols=['#f0c040','#f08030','#f0e080','#ff6040','#ffd060'];
  for(var i=0;i<10;i++){var s=document.createElement('div');s.className='vm-spark';
    var a=Math.random()*Math.PI*2,d=20+Math.random()*30;
    s.style.cssText='left:'+cx+'px;top:'+cy+'px;background:'+cols[Math.floor(Math.random()*5)]+';--sx:'+(Math.cos(a)*d)+'px;--sy:'+(Math.sin(a)*d)+'px;width:'+(2+Math.random()*3)+'px;height:'+(2+Math.random()*3)+'px';
    sc.appendChild(s);setTimeout(function(x){x.remove()},700,s);}
}
function resultVikingHTML(){
  var pct=GAME.total>0?Math.round((GAME.hits/GAME.total)*100):0;
  var ti=[];if(pct>=90)ti=GEAR_ITEMS;else if(pct>=70)ti=GEAR_ITEMS.slice(0,5);else if(pct>=50)ti=GEAR_ITEMS.slice(0,2);
  var sm={boots:'rv-boots',mail:'rv-mail',right:'rv-right',left:'rv-left',cape:'rv-cape',helm:'rv-helm'};
  var html='<div class="result-viking">';
  html+='<div class="rv-slot rv-cape" id="rvs-cape"></div>';
  html+='<div class="rv-head"></div><div class="rv-arm-l"></div><div class="rv-arm-r"></div><div class="rv-torso"></div><div class="rv-leg-l"></div><div class="rv-leg-r"></div>';
  html+='<div class="rv-slot rv-boots" id="rvs-boots"></div><div class="rv-slot rv-mail" id="rvs-mail"></div>';
  html+='<div class="rv-slot rv-left" id="rvs-left"></div><div class="rv-slot rv-right" id="rvs-right"></div>';
  html+='<div class="rv-slot rv-helm" id="rvs-helm"></div></div>';
  setTimeout(function(){ti.forEach(function(g){var e=document.getElementById('rvs-'+g.s);if(e)e.innerHTML=g.h;});},100);
  return html;
}
