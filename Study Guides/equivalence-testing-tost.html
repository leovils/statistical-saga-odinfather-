<style>

<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 10</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DATA =====
// Two forges: Asgard and Alfheim
const asgard = { name: 'Asgard', M: 752, SD: 18, n: 20, color: 'var(--asgard-color)', hex: '#58a6ff' };
const alfheim = { name: 'Alfheim', M: 748, SD: 20, n: 20, color: 'var(--alfheim-color)', hex: '#3fb950' };

const SESOI = 10; // +/- 10 degrees
const diff = asgard.M - alfheim.M; // 4
const SE = Math.sqrt((asgard.SD * asgard.SD / asgard.n) + (alfheim.SD * alfheim.SD / alfheim.n));
// SE = sqrt(324/20 + 400/20) = sqrt(16.2 + 20) = sqrt(36.2) = 6.0166...

// Welch degrees of freedom approximation
const s1sq_n = (asgard.SD * asgard.SD) / asgard.n; // 16.2
const s2sq_n = (alfheim.SD * alfheim.SD) / alfheim.n; // 20
const dfNum = Math.pow(s1sq_n + s2sq_n, 2);
const dfDen = (Math.pow(s1sq_n, 2) / (asgard.n - 1)) + (Math.pow(s2sq_n, 2) / (alfheim.n - 1));
const df_welch = dfNum / dfDen; // ~37.16

// TOST: Two one-sided tests
// Test 1: H01: delta <= -SESOI => t1 = (diff - (-SESOI)) / SE = (4+10)/6.0166 = 14/6.0166 = 2.327
// Test 2: H02: delta >= +SESOI => t2 = (diff - (+SESOI)) / SE = (4-10)/6.0166 = -6/6.0166 = -0.9972
const t1 = (diff - (-SESOI)) / SE;
const t2 = (diff - SESOI) / SE;

// 90% CI for equivalence: diff +/- t_crit(0.05, df) * SE
// t_crit(0.05, ~37) ≈ 1.687
const t_crit_90 = 1.687;
const ci90_lower = diff - t_crit_90 * SE;
const ci90_upper = diff + t_crit_90 * SE;

// p-value approximation using t distribution
function tDistCDF(t, df) {
  // Regularized incomplete beta function approximation
  const x = df / (df + t * t);
  if (t < 0) return 0.5 * betaInc(x, df/2, 0.5);
  return 1 - 0.5 * betaInc(x, df/2, 0.5);
}

function betaInc(x, a, b) {
  // Continued fraction approximation for regularized incomplete beta
  if (x === 0 || x === 1) return x === 0 ? 0 : 1;
  const lnBeta = gammln(a) + gammln(b) - gammln(a + b);
  const front = Math.exp(Math.log(x) * a + Math.log(1 - x) * b - lnBeta);
  // Lentz's continued fraction
  let f = 1, c = 1, d = 0;
  for (let m = 0; m <= 200; m++) {
    let numerator;
    if (m === 0) {
      numerator = 1;
    } else {
      const m2 = 2 * Math.ceil(m / 2);
      const k = Math.ceil(m / 2);
      if (m % 2 === 1) {
        numerator = -(a + k - 1 + k) * x / ((a + m2 - 2) * (a + m2 - 1));
        numerator = (a + k - 1) * (a + b + k - 1) * x / ((a + 2*k - 2) * (a + 2*k - 1));
        numerator = -numerator;
      } else {
        numerator = k * (b - k) * x / ((a + 2*k - 1) * (a + 2*k));
      }
    }
    d = 1 + numerator * d;
    if (Math.abs(d) < 1e-30) d = 1e-30;
    d = 1 / d;
    c = 1 + numerator / c;
    if (Math.abs(c) < 1e-30) c = 1e-30;
    const delta = c * d;
    f *= delta;
    if (Math.abs(delta - 1) < 1e-10) break;
  }
  return front * f / a;
}

function gammln(x) {
  const c = [76.18009172947146,-86.50532032941677,24.01409824083091,
    -1.231739572450155,0.001208650973866179,-0.000005395239384953];
  let y = x, tmp = x + 5.5;
  tmp -= (x + 0.5) * Math.log(tmp);
  let ser = 1.000000000190015;
  for (let j = 0; j < 6; j++) ser += c[j] / (++y);
  return -tmp + Math.log(2.5066282746310005 * ser / x);
}

// p-values for TOST
// p1 = P(T > t1) when t1 > 0 => 1 - CDF(t1, df)
// p2 = P(T < t2) when t2 < 0 => CDF(t2, df) but we want P(T < t2) = 1 - P(T > |t2|)
// For TOST, the p-value for each one-sided test:
// p1 (upper test): we want small p => P(T >= t1 | H01) for rejecting H01
// p2 (lower test): we want small p => P(T <= t2 | H02) for rejecting H02
// Simpler: p_tost = max(p1, p2) where
// p1 = 1 - CDF(t1, df) for testing diff >= -SESOI (reject left bound)
// p2 = CDF(t2, df) for testing diff <= +SESOI (reject right bound)

// Using pre-calculated values for accuracy
const p1_val = 0.0127; // one-sided p for t1=2.327, df~37
const p2_val = 0.1625; // one-sided p for t2=-0.997, df~37
const p_tost = Math.max(p1_val, p2_val);

function r(v, d=2) { return Number(v).toFixed(d); }
function r4(v) { return Number(v).toFixed(4); }

// ===== DIALOGUE HELPER =====
function dialogue(character, name, text) {
  return `<div class="dialogue-box ${character}">
    <div class="char-name ${character}">${name}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}

// ===== STEP FUNCTIONS =====
const totalSteps = 11; // 0..10
let currentStep = 0;

function step0() {
  return `
    <div class="step-title">The Bifrost Bridge: "Equal" or Just "No Difference Found"?</div>

    <p>On the Bifrost Bridge, two master blacksmiths &mdash; <span class="hl-blue">Asgard</span> e <span class="hl-green">Alfheim</span> &mdash; claim their mead recipes produce <em>equivalent</em> forge temperatures. Odinfather must prove the forges are truly equal &mdash; not merely that no difference was found.</p>

    ${dialogue('thor', '&#9889; Thorment', 'Easy! I run a t-test, p = 0.53 &mdash; not significant. Done: the forges are equal! Case closed.')}

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', '<strong>WRONG.</strong> This is the most dangerous error in frequentist statistics. <em>Failing to reject H&#8320;</em> is NOT the same as <em>confirming H&#8320;</em>. A p > 0.05 can mean three things:<br><br>1. The forges are truly equal<br>2. Your sample is too small to detect the difference<br>3. A difference exists, but the test power is low<br><br>Absence of evidence is <strong>not</strong> evidence of absence.')}

    <div class="visual-container">
      <svg viewBox="0 0 700 180" width="700">
        <!-- Two contrasting boxes -->
        <rect x="20" y="20" width="310" height="140" rx="12" fill="none" stroke="${'#f85149'}" stroke-width="2" stroke-dasharray="5"/>
        <text x="175" y="55" fill="#f85149" font-size="16" text-anchor="middle" font-family="Bangers">NHST (Classic t-test)</text>
        <text x="175" y="80" fill="#e6edf3" font-size="13" text-anchor="middle" font-family="Patrick Hand">p > 0,05</text>
        <text x="175" y="100" fill="#8b949e" font-size="12" text-anchor="middle" font-family="Patrick Hand">"No difference found"</text>
        <text x="175" y="125" fill="#f85149" font-size="14" text-anchor="middle" font-family="Permanent Marker">&#8800; "They are equal"</text>
        <text x="175" y="148" fill="#8b949e" font-size="11" text-anchor="middle" font-family="Patrick Hand">Could be lack of power!</text>

        <rect x="370" y="20" width="310" height="140" rx="12" fill="none" stroke="#3fb950" stroke-width="2"/>
        <text x="525" y="55" fill="#3fb950" font-size="16" text-anchor="middle" font-family="Bangers">TOST (Equivalence)</text>
        <text x="525" y="80" fill="#e6edf3" font-size="13" text-anchor="middle" font-family="Patrick Hand">90% CI within bounds</text>
        <text x="525" y="100" fill="#8b949e" font-size="12" text-anchor="middle" font-family="Patrick Hand">"I proved the difference is trivial"</text>
        <text x="525" y="125" fill="#3fb950" font-size="14" text-anchor="middle" font-family="Permanent Marker">= "They are equivalent"</text>
        <text x="525" y="148" fill="#8b949e" font-size="11" text-anchor="middle" font-family="Patrick Hand">Positive evidence of equality</text>

        <!-- Arrow -->
        <text x="350" y="95" fill="#f0c040" font-size="24" text-anchor="middle" font-family="Bangers">&#8800;</text>
      </svg>
    </div>

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'The TOST &mdash; <em>Two One-Sided Tests</em> &mdash; inverts the logic. Instead of testing <strong>"are they different?"</strong>, it tests <strong>"is the difference small enough to be irrelevant?"</strong>. It is the only statistically correct way to conclude equivalence.')}

    <p style="text-align:center;margin-top:10px"><span class="hl-gold">Our scenario:</span> Forge of Asgard (M=752&#176;, SD=18, n=20) vs. Forge of Alfheim (M=748&#176;, SD=20, n=20)</p>
  `;
}

function step1() {
  return `
    <div class="step-title">Step 1: SESOI &mdash; The Smallest Effect Size of Interest</div>

    <p class="step-subtitle">Smallest Effect Size of Interest</p>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Before any calculation, we need to answer: <strong>what difference would be large enough to matter in practice?</strong> This threshold is called SESOI. It is a <em>domain</em> decision, not a statistical one.')}

    <div class="formula">
      <div class="formula-label">Definition</div>
      SESOI = &Delta;<sub>L</sub> = Smallest difference with practical consequence
    </div>

    <p>In our case: the Asgard master blacksmith says any temperature difference <strong>up to 10 degrees</strong> does not alter forged sword quality. Above 10 degrees, however, changes the steel tempering.</p>

    <div class="formula" style="font-size:1.3rem">
      SESOI = <span class="hl-gold">&plusmn;10 degrees</span>
    </div>

    <div class="visual-container">
      <svg viewBox="0 0 700 160" width="700">
        <!-- Number line -->
        <line x1="50" y1="80" x2="650" y2="80" stroke="#30363d" stroke-width="2"/>

        <!-- Ticks -->
        ${[-20,-15,-10,-5,0,5,10,15,20].map(v => {
          const x = 350 + v * 15;
          const isLimit = Math.abs(v) === 10;
          const col = isLimit ? '#f0c040' : '#8b949e';
          return `<line x1="${x}" y1="72" x2="${x}" y2="88" stroke="${col}" stroke-width="${isLimit ? 3 : 1}"/>
                  <text x="${x}" y="105" fill="${col}" font-size="${isLimit ? 13 : 10}" text-anchor="middle" font-family="${isLimit ? 'Permanent Marker' : 'Patrick Hand'}">${v > 0 ? '+' : ''}${v}</text>`;
        }).join('')}

        <!-- Equivalence zone -->
        <rect x="${350 - 10*15}" y="55" width="${20*15}" height="50" rx="8" fill="#3fb950" opacity="0.12"/>
        <text x="350" y="48" fill="#3fb950" font-size="14" text-anchor="middle" font-family="Bangers">EQUIVALENCE ZONE</text>

        <!-- Bound labels -->
        <text x="${350-10*15}" y="130" fill="#f0c040" font-size="12" text-anchor="middle" font-family="Permanent Marker">&minus;SESOI</text>
        <text x="${350+10*15}" y="130" fill="#f0c040" font-size="12" text-anchor="middle" font-family="Permanent Marker">+SESOI</text>

        <!-- Bound lines -->
        <line x1="${350-10*15}" y1="50" x2="${350-10*15}" y2="110" stroke="#f0c040" stroke-width="2" stroke-dasharray="5"/>
        <line x1="${350+10*15}" y1="50" x2="${350+10*15}" y2="110" stroke="#f0c040" stroke-width="2" stroke-dasharray="5"/>

        <!-- Zero marker -->
        <circle cx="350" cy="80" r="5" fill="#e6edf3"/>
        <text x="350" y="143" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Patrick Hand">&Delta; = 0 (perfect equality)</text>

        <!-- Arrows showing "not relevant" zones -->
        <text x="${350-13*15}" y="75" fill="#f85149" font-size="11" text-anchor="middle" font-family="Permanent Marker">&larr; Relevant difference</text>
        <text x="${350+13*15}" y="75" fill="#f85149" font-size="11" text-anchor="middle" font-family="Permanent Marker">Relevant difference &rarr;</text>
      </svg>
    </div>

    ${dialogue('thor', '&#9889; Thorment', 'Can I choose SESOI = &plusmn;50? That way anything falls within!')}

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', '<strong>No!</strong> The SESOI must be defined <em>before</em> seeing the data, based on domain knowledge. Choosing a convenient SESOI after seeing results is as serious as p-hacking. This has a name: <strong>SESOI hacking</strong>.')}

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'The SESOI is the boundary between "irrelevant" and "relevant". If the true difference falls within [&minus;SESOI, +SESOI], we consider the groups <em>practically equivalent</em> &mdash; even if they are not identical.')}
  `;
}

function step2() {
  return `
    <div class="step-title">Step 2: The Logic of TOST</div>

    <p class="step-subtitle">Two One-Sided Tests</p>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'TOST works with an ingenious logic. Instead of a single test, we run <strong>two one-sided tests</strong> &mdash; one for each boundary of the equivalence zone.')}

    <div class="info-card">
      <div class="info-card-title">Test 1 (Lower Bound)</div>
      <p>H&#8320;&#8321;: &Delta; &le; &minus;SESOI (the difference is less than &minus;10)<br>
      H&#8321;&#8321;: &Delta; &gt; &minus;SESOI (the difference is greater than &minus;10)<br>
      <span class="hl-blue">Reject? &rarr; The mean is not below the lower bound.</span></p>
    </div>

    <div class="info-card">
      <div class="info-card-title">Test 2 (Upper Bound)</div>

    </div>

        <!-- Bounds -->
        <line x1="200" y1="30" x2="200" y2="90" stroke="#f0c040" stroke-width="2"/>
        <line x1="500" y1="30" x2="500" y2="90" stroke="#f0c040" stroke-width="2"/>
        <text x="200" y="25" fill="#f0c040" font-size="12" text-anchor="middle" font-family="Permanent Marker">&minus;10</text>
        <text x="500" y="25" fill="#f0c040" font-size="12" text-anchor="middle" font-family="Permanent Marker">+10</text>
        <text x="350" y="25" fill="#8b949e" font-size="11" text-anchor="middle" font-family="Patrick Hand">0</text>
        <line x1="350" y1="35" x2="350" y2="85" stroke="#8b949e" stroke-width="1" stroke-dasharray="3"/>

        <!-- Test 1 arrow -->
        <text x="80" y="130" fill="#58a6ff" font-size="14" font-family="Bangers">TEST 1</text>
        <text x="80" y="148" fill="#8b949e" font-size="11" font-family="Patrick Hand">H&#8320;: &Delta; &le; &minus;10</text>
        <text x="80" y="165" fill="#58a6ff" font-size="11" font-family="Patrick Hand">"The difference is NOT down there"</text>
        <line x1="200" y1="140" x2="350" y2="140" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
        <text x="275" y="135" fill="#58a6ff" font-size="11" text-anchor="middle" font-family="Permanent Marker">Reject &rarr;</text>

        <!-- Test 2 arrow -->
        <text x="400" y="130" fill="#3fb950" font-size="14" font-family="Bangers">TEST 2</text>
        <text x="400" y="148" fill="#8b949e" font-size="11" font-family="Patrick Hand">H&#8320;: &Delta; &ge; +10</text>
        <text x="400" y="165" fill="#3fb950" font-size="11" font-family="Patrick Hand">"The difference is NOT up there"</text>
        <line x1="500" y1="140" x2="350" y2="140" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
        <text x="425" y="135" fill="#3fb950" font-size="11" text-anchor="middle" font-family="Permanent Marker">&larr; Reject</text>

        <!-- Conclusion -->
        <rect x="170" y="200" width="360" height="55" rx="10" fill="none" stroke="#3fb950" stroke-width="2"/>
        <text x="350" y="225" fill="#3fb950" font-size="15" text-anchor="middle" font-family="Bangers">BOTH REJECTED?</text>
        <text x="350" y="245" fill="#e6edf3" font-size="13" text-anchor="middle" font-family="Permanent Marker">&#10003; EQUIVALENCE DECLARED</text>

        <!-- Arrow markers -->
        <defs>
          <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">

          </marker>
          <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">

    </div>

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'The logic is beautiful: if we prove that &Delta; is not below &minus;SESOI <strong>and</strong> not above +SESOI, then &Delta; is <em>within</em> the equivalence zone. The two tests function as a siege &mdash; closing the difference within bounds from both sides.')}
  `;
}

function step3() {
  return `

    <p class="step-subtitle">Why 90% and not 95%?</p>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Actually, <strong>90% is mathematically equivalent</strong> to two one-sided tests with &alpha; = 0.05 each. Think: if each tail has 5%, 90% remains in the middle. The 90% CI for equivalence is as rigorous as the 95% CI for difference &mdash; just with inverted logic.')}

    <div class="formula">
      <div class="formula-label">90% CI Rule</div>
      If the 90% CI falls <strong>entirely</strong> within [&minus;SESOI, +SESOI]<br>

        <line x1="300" y1="55" x2="300" y2="89" stroke="#f0c040" stroke-width="2"/>

        <rect x="300" y="62" width="220" height="20" rx="4" fill="#3fb950" opacity="0.1"/>
        <!-- CI bar inside -->
        <line x1="360" y1="72" x2="470" y2="72" stroke="#3fb950" stroke-width="6" stroke-linecap="round"/>
        <circle cx="415" cy="72" r="4" fill="#e6edf3"/>
        <text x="415" y="95" fill="#3fb950" font-size="11" text-anchor="middle" font-family="Permanent Marker">&#10003; EQUIVALENT</text>

        <!-- Scenario 2: IC exceeds bounds -->
        <text x="80" y="145" fill="#f85149" font-size="13" font-family="Permanent Marker">Scenario B:</text>
        <text x="80" y="162" fill="#8b949e" font-size="11" font-family="Patrick Hand">CI exceeds bounds</text>
        <line x1="200" y1="152" x2="620" y2="152" stroke="#30363d" stroke-width="1"/>
        <line x1="300" y1="135" x2="300" y2="169" stroke="#f0c040" stroke-width="2"/>
        <line x1="520" y1="135" x2="520" y2="169" stroke="#f0c040" stroke-width="2"/>
        <rect x="300" y="142" width="220" height="20" rx="4" fill="#3fb950" opacity="0.1"/>

        <circle cx="470" cy="152" r="4" fill="#e6edf3"/>
        <text x="470" y="175" fill="#f85149" font-size="11" text-anchor="middle" font-family="Permanent Marker">&#10007; NOT EQUIVALENT</text>

        <!-- Scenario 3: Indeterminate -->
        <text x="80" y="225" fill="#f0c040" font-size="13" font-family="Permanent Marker">Scenario C:</text>
        <text x="80" y="242" fill="#8b949e" font-size="11" font-family="Patrick Hand">CI crosses a bound</text>
        <line x1="200" y1="232" x2="620" y2="232" stroke="#30363d" stroke-width="1"/>
        <line x1="300" y1="215" x2="300" y2="249" stroke="#f0c040" stroke-width="2"/>
        <line x1="520" y1="215" x2="520" y2="249" stroke="#f0c040" stroke-width="2"/>
        <rect x="300" y="222" width="220" height="20" rx="4" fill="#3fb950" opacity="0.1"/>
        <!-- CI bar crossing left bound -->
        <line x1="270" y1="232" x2="430" y2="232" stroke="#f0c040" stroke-width="6" stroke-linecap="round"/>
        <circle cx="350" cy="232" r="4" fill="#e6edf3"/>
        <text x="350" y="260" fill="#f0c040" font-size="11" text-anchor="middle" font-family="Permanent Marker">? INCONCLUSIVE</text>

        <!-- Labels for bounds -->
        <text x="300" y="290" fill="#f0c040" font-size="11" text-anchor="middle" font-family="Permanent Marker">&minus;SESOI</text>
        <text x="520" y="290" fill="#f0c040" font-size="11" text-anchor="middle" font-family="Permanent Marker">+SESOI</text>
      </svg>
    </div>

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'The equivalence between the 90% CI and TOST with &alpha; = 0.05 was demonstrated by Schuirmann (1987). This is the <em>intersection-union test</em>: the 90% CI must fall entirely within the equivalence bounds. If the 95% CI falls within the bounds, even better &mdash; but the 90% is the minimum criterion.')}

function step4() {
  return `
    <div class="step-title">Step 4: Step-by-Step Calculation</div>

    <p class="step-subtitle">Using the Bifrost forge data</p>

    <table class="data-table">
      <tr>
        <th></th>
        <th>Mean (M)</th>
        <th>Standard deviation (SD)</th>
        <th>n</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--asgard-color)">Forge of Asgard</td>
        <td>752&#176;</td>
        <td>18</td>
        <td>20</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--alfheim-color)">Forge of Alfheim</td>
        <td>748&#176;</td>
        <td>20</td>
        <td>20</td>
      </tr>
    </table>

    <p style="text-align:center"><span class="hl-gold">SESOI = &plusmn;10 degrees</span></p>

    <!-- Step 4a: Difference -->
    <div class="formula">
      <div class="formula-label">1. Observed difference</div>
      &Delta; = M<sub>Asgard</sub> &minus; M<sub>Alfheim</sub> = 752 &minus; 748 = <span class="hl-gold">${r(diff)}</span>
    </div>

    <!-- Step 4b: SE -->
    <div class="formula">
      <div class="formula-label">2. Standard Error of the Difference</div>
      SE = &radic;(SD&#178;<sub>1</sub>/n<sub>1</sub> + SD&#178;<sub>2</sub>/n<sub>2</sub>) = &radic;(324/20 + 400/20) = &radic;(16,2 + 20) = &radic;36,2 = <span class="hl-gold">${r(SE, 4)}</span>
    </div>

    <!-- Step 4c: t-values -->
    <div class="formula">
      <div class="formula-label">3. t-statistic&#8321; (limite inferior)</div>
      t&#8321; = (&Delta; &minus; (&minus;SESOI)) / SE = (4 &minus; (&minus;10)) / ${r(SE, 4)} = 14 / ${r(SE, 4)} = <span class="hl-blue">${r(t1, 4)}</span>
    </div>

    <div class="formula">
      <div class="formula-label">4. t-statistic&#8322; (limite superior)</div>
      t&#8322; = (&Delta; &minus; (+SESOI)) / SE = (4 &minus; 10) / ${r(SE, 4)} = &minus;6 / ${r(SE, 4)} = <span class="hl-green">${r(t2, 4)}</span>
    </div>

    <!-- Step 4d: df -->
    <div class="formula">
      <div class="formula-label">5. Degrees of freedom (Welch)</div>
      df = (s&#178;<sub>1</sub>/n<sub>1</sub> + s&#178;<sub>2</sub>/n<sub>2</sub>)&#178; / [(s&#178;<sub>1</sub>/n<sub>1</sub>)&#178;/(n<sub>1</sub>&minus;1) + (s&#178;<sub>2</sub>/n<sub>2</sub>)&#178;/(n<sub>2</sub>&minus;1)] = <span class="hl-gold">${r(df_welch, 2)}</span>
    </div>

    <!-- Step 4e: 90% CI -->
    <div class="formula">
      <div class="formula-label">6. 90% CI</div>
      IC<sub>90%</sub> = &Delta; &plusmn; t<sub>crit(0,05; ${r(df_welch,0)})</sub> &times; SE = 4 &plusmn; ${t_crit_90} &times; ${r(SE,4)}<br>
      IC<sub>90%</sub> = [<span class="hl-gold">${r(ci90_lower, 2)}</span> ; <span class="hl-gold">${r(ci90_upper, 2)}</span>]
    </div>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Now the crucial question: o IC de 90% [${r(ci90_lower,2)} ; ${r(ci90_upper,2)}] falls entirely within [&minus;10 ; +10]?<br><br><strong>Limite inferior do IC = ${r(ci90_lower,2)}</strong> &mdash; is above &minus;10? <span class="hl-green">Sim! &#10003;</span><br><strong>Limite superior do IC = ${r(ci90_upper,2)}</strong> &mdash; is below +10? <span class="hl-red">Nao! &#10007; Exceeds by ${r(ci90_upper - 10, 2)} degrees</span><br><br>The CI does <strong>not</strong> fit entirely within the equivalence zone. Result: <strong>inconclusivo</strong>.')}

    ${dialogue('thor', '&#9889; Thorment', 'Mas a diferenca e so 4 degrees! Obvio que sao iguais!')}

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'The <em>point</em> difference is 4, yes. But the <em>uncertainty</em> around this estimate extends to ${r(ci90_upper,2)}. Com n = 20 por grupo, we do not have sufficient precision to exclude that the real difference could be greater than 10. We would need more warriors testing the forges &mdash; or forges with less variability.')}

    <div class="visual-container">
      <svg viewBox="0 0 700 130" width="700">
        <!-- Number line -->
        <line x1="50" y1="60" x2="650" y2="60" stroke="#30363d" stroke-width="2"/>

        <!-- Scale: -15 to +15 mapped to 50..650, but we need to go to ~15 to show the CI -->
        ${[-15,-10,-5,0,5,10,15].map(v => {
          const x = 350 + v * 18;
          const isLimit = Math.abs(v) === 10;
          return `<line x1="${x}" y1="52" x2="${x}" y2="68" stroke="${isLimit ? '#f0c040' : '#8b949e'}" stroke-width="${isLimit ? 2 : 1}"/>
                  <text x="${x}" y="85" fill="${isLimit ? '#f0c040' : '#8b949e'}" font-size="${isLimit ? 12 : 10}" text-anchor="middle" font-family="${isLimit ? 'Permanent Marker' : 'Patrick Hand'}">${v > 0 ? '+' : ''}${v}</text>`;
        }).join('')}

        <!-- Equivalence zone -->
        <rect x="${350-10*18}" y="40" width="${20*18}" height="40" rx="6" fill="#3fb950" opacity="0.1"/>

        <!-- 90% CI bar - extends beyond +10 -->
        <line x1="${350 + ci90_lower * 18}" y1="60" x2="${350 + ci90_upper * 18}" y2="60" stroke="#f85149" stroke-width="8" stroke-linecap="round"/>
        <!-- portion inside bounds in blue -->
        <line x1="${350 + ci90_lower * 18}" y1="60" x2="${350 + 10 * 18}" y2="60" stroke="#58a6ff" stroke-width="8" stroke-linecap="round"/>
        <circle cx="${350 + diff * 18}" cy="60" r="5" fill="#e6edf3"/>

        <!-- CI labels -->
        <text x="${350 + ci90_lower * 18}" y="35" fill="#58a6ff" font-size="10" text-anchor="middle" font-family="Permanent Marker">${r(ci90_lower,2)}</text>
        <text x="${350 + ci90_upper * 18}" y="35" fill="#f85149" font-size="10" text-anchor="middle" font-family="Permanent Marker">${r(ci90_upper,2)}</text>
        <text x="${350 + diff * 18}" y="110" fill="#e6edf3" font-size="11" text-anchor="middle" font-family="Permanent Marker">&Delta; = ${diff}</text>

        <!-- Overshoot annotation -->
        <line x1="${350 + 10*18}" y1="44" x2="${350 + ci90_upper*18}" y2="44" stroke="#f85149" stroke-width="2"/>
        <text x="${350 + (10 + ci90_upper)/2 * 18}" y="38" fill="#f85149" font-size="9" text-anchor="middle" font-family="Permanent Marker">exceeds!</text>

        <!-- Result -->
        <text x="350" y="125" fill="#f0c040" font-size="13" text-anchor="middle" font-family="Bangers">&#10007; CI EXCEEDS +SESOI &mdash; INCONCLUSIVE</text>
      </svg>
    </div>
  `;
}

function step5() {
  return `
    <div class="step-title">Step 5: The 4 Quadrants: NHST x TOST</div>

    <p class="step-subtitle">The crossover every researcher needs to understand</p>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'When we cross NHST (classic t-test) results with TOST results, <strong>four possible scenarios</strong> emerge. Each has a different interpretation &mdash; and only two are conclusive.')}

    <div class="quadrant-grid">
      <!-- Header row -->
      <div class="quadrant-header" style="background:var(--bg-dark)"></div>
      <div class="quadrant-header" style="color:var(--success)">TOST: Equivalent</div>
      <div class="quadrant-header" style="color:var(--thor-red)">TOST: Not Equivalent</div>

      <!-- Row 1: NHST Not Significant -->
      <div class="quadrant-header">NHST: p &gt; 0.05<br><span style="font-size:0.8rem;color:var(--text-dim)">(not significant)</span></div>
      <div class="quadrant-cell q-green">
        <span class="quadrant-emoji">&#10003;</span>
        <span style="font-family:'Permanent Marker';color:var(--success);font-size:1.1rem">Equivalent</span><br>
        <span style="font-size:0.9rem">No significant difference<br><strong>AND</strong> equivalence confirmed.<br>The ideal scenario.</span>
      </div>
      <div class="quadrant-cell q-gray">
        <span class="quadrant-emoji">&#10067;</span>
        <span style="font-family:'Permanent Marker';color:var(--text-dim);font-size:1.1rem">Inconclusive</span><br>
        <span style="font-size:0.9rem">No significant difference<br><strong>BUT</strong> no equivalence.<br>Lack of sample power?</span>
      </div>

      <!-- Row 2: NHST Significant -->
      <div class="quadrant-header">NHST: p &le; 0.05<br><span style="font-size:0.8rem;color:var(--text-dim)">(significant)</span></div>
      <div class="quadrant-cell q-yellow">
        <span class="quadrant-emoji">&#9888;&#65039;</span>
        <span style="font-family:'Permanent Marker';color:var(--gold);font-size:1.1rem">Trivially Different</span><br>
        <span style="font-size:0.9rem">Significant difference<br><strong>BUT</strong> equivalent (SESOI).<br>Real but irrelevant difference.</span>
      </div>
      <div class="quadrant-cell q-red">
        <span class="quadrant-emoji">&#10007;</span>
        <span style="font-family:'Permanent Marker';color:var(--thor-red);font-size:1.1rem">Different</span><br>
        <span style="font-size:0.9rem">Significant difference<br><strong>AND</strong> not equivalent.<br>Real and relevant difference.</span>
      </div>
    </div>

    ${dialogue('thor', '&#9889; Thorment', 'Wait &mdash; can it be significant AND equivalent at the same time?!')}

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Yes! With very large samples, uma diferenca minuscula (digamos, 0,3 degrees) pode dar p < 0,05 no NHST, mas o TOST confirma equivalencia porque 0,3 esta bem dentro de &plusmn;10. This is the difference between <strong>statistical significance</strong> and <strong>practical relevance</strong> &mdash; the Achilles heel of NHST.')}

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'The most dangerous quadrant is the <strong>inconclusive</strong> one (p > 0,05 no NHST, sem equivalencia no TOST). This is where most researchers stop &mdash; saying "there is no difference" without having proven anything. TOST transforms this gray zone into transparency.')}

    <div class="info-card" style="border-color:var(--gold)">
      <div class="info-card-title" style="color:var(--gold)">Our forge result</div>
      <p>NHST: p = 0,53 (not significant) + TOST: IC<sub>90%</sub> [${r(ci90_lower,2)} ; ${r(ci90_upper,2)}] <strong>exceeds</strong> +SESOI (not equivalent)<br>
      <strong>&rarr; Quadrante superior-direito: <span class="hl-gold">Inconclusive!</span></strong> No significant difference, mas tambem sem equivalencia. Precisamos de mais dados.</p>
    </div>
  `;
}

function step6() {
  return `
    <div class="step-title">Step 6: Paired TOST</div>

    <p class="step-subtitle">When the same warriors are tested twice</p>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'The independent TOST compares two distinct groups. But what if the same warriors test both forges? In that case, we use <strong>paired TOST</strong> &mdash; based on individual differences.')}

    <div class="info-card">
      <div class="info-card-title">Paired Scenario</div>
      <p>20 warriors forged a sword at each forge. For each warrior, we calculated:<br>
      <span class="hl-gold">d<sub>i</sub> = temperatura<sub>Asgard</sub> &minus; temperatura<sub>Alfheim</sub></span></p>
    </div>

    <table class="data-table" style="font-size:0.9rem">
      <tr>
        <th>Guerreiro</th>
        <th>Asgard</th>
        <th>Alfheim</th>
        <th>d<sub>i</sub></th>
      </tr>
      <tr><td>Bjorn</td><td>755</td><td>750</td><td style="color:var(--gold)">+5</td></tr>
      <tr><td>Ragnar</td><td>748</td><td>752</td><td style="color:var(--gold)">&minus;4</td></tr>
      <tr><td>Sigurd</td><td>760</td><td>755</td><td style="color:var(--gold)">+5</td></tr>
      <tr><td>Ivar</td><td>745</td><td>743</td><td style="color:var(--gold)">+2</td></tr>
      <tr><td>...</td><td>...</td><td>...</td><td>...</td></tr>
      <tr class="mean-row">
        <td colspan="3" style="text-align:right">M<sub>d</sub> =</td>
        <td style="color:var(--gold)">3,5</td>
      </tr>
    </table>

    <div class="formula">
      <div class="formula-label">Formulas do Paired TOST</div>
      SE<sub>d</sub> = SD<sub>d</sub> / &radic;n<br><br>
      t&#8321; = (M<sub>d</sub> &minus; (&minus;SESOI)) / SE<sub>d</sub><br>
      t&#8322; = (M<sub>d</sub> &minus; (+SESOI)) / SE<sub>d</sub><br><br>
      df = n &minus; 1
    </div>

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'The logic is identical to independent TOST &mdash; two one-sided tests, both must reject. The only difference is that we use the <strong>mean and standard deviation of paired differences</strong> instead of group means. The 90% CI of the mean difference must fit within [&minus;SESOI, +SESOI].')}

    ${dialogue('thor', '&#9889; Thorment', 'Ah, so it's just swapping the numbers and running the same thing?')}

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Essentially yes, but be careful: paired TOST usually has <strong>more power</strong> than independent TOST because it eliminates between-subject variability. If each warrior serves as their own control, the SD<sub>d</sub> tends to be smaller than the group SDs.')}
  `;
}

function step7() {
  return `
    <div class="step-title">Step 7: Choosing the SESOI</div>

    <p class="step-subtitle">Three approaches, one principle</p>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Defining the SESOI is the most important TOST decision &mdash; and the one that requires the most thought. There are three classic approaches.')}

    <div class="approach-grid">
      <div class="approach-card" style="border-color:var(--odin-blue)">
        <h4 style="color:var(--odin-blue)">1. Anchor-Based</h4>
        <p style="font-size:0.95rem">Uses an external, meaningful criterion.<br><br>
        <em>Example:</em> The master blacksmith defines that &plusmn;10&#176; does not affect steel tempering. This is the practical threshold &mdash; the "anchor" comes from domain knowledge.</p>
        <p style="color:var(--success);font-family:'Permanent Marker';margin-top:8px">&#10003; Preferred</p>
      </div>

      <div class="approach-card" style="border-color:var(--corvo-purple)">
        <h4 style="color:var(--corvo-purple)">2. Distribution-Based</h4>
        <p style="font-size:0.95rem">Uses data variability as reference.<br><br>
        <em>Exemplo:</em> SESOI = 0,5 &times; SD<sub>pooled</sub> (equivale a d = 0,5 de Cohen). It is a generic criterion when specific knowledge is lacking.</p>
        <p style="color:var(--gold);font-family:'Permanent Marker';margin-top:8px">&#9888; Acceptable</p>
      </div>

      <div class="approach-card" style="border-color:var(--success)">
        <h4 style="color:var(--success)">3. Practical / Clinical</h4>
        <p style="font-size:0.95rem">Based on real consequences.<br><br>
        <em>Example:</em> In medicine, a 5mmHg blood pressure difference is the threshold for changing treatment. In forging, &plusmn;10&#176; is the threshold for compromising the sword.</p>
        <p style="color:var(--success);font-family:'Permanent Marker';margin-top:8px">&#10003; Preferred</p>
      </div>
    </div>

    ${dialogue('thor', '&#9889; Thorment', 'I'll define the SESOI <em>after</em> seeing the data. If the difference is 8, I'll set SESOI = &plusmn;9. Genius!')}

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', '<strong>That is SESOI hacking!</strong> As serious as p-hacking. The SESOI must be defined and justified <em>before</em> data collection &mdash; ideally in the study pre-registration. Defining it after seeing results invalidates all inferential logic.')}

    <div class="info-card" style="border-color:var(--thor-red)">
      <div class="info-card-title" style="color:var(--thor-red)">&#9888; Pitfall: SESOI Hacking</div>
      <p>Warning signs:</p>
      <ul style="margin-left:20px;margin-top:6px">
        <li>SESOI defined after data collection</li>
        <li>SESOI exactly larger than the observed CI</li>
        <li>No theoretical or practical justification</li>
        <li>SESOI changes between studies without explanation</li>
      </ul>
    </div>

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'When in doubt, use the golden rule: choose the <em>narrowest</em> SESOI that still makes sense in your domain. If you err on the conservative side, the equivalence conclusion will be more robust. Equivalence with a tight SESOI is much more convincing than with a loose one.')}
  `;
}

function step8() {
  return `
    <div class="step-title">Step 8: Power of the Equivalence Test</div>

    <p class="step-subtitle">Why you need MORE participants</p>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Here is the unpleasant surprise: equivalence tests require <strong>substantially larger</strong> samples than difference tests with the same &alpha; and power.')}

    <div class="formula">
      <div class="formula-label">Approximate formula for n (per group)</div>
      n &ge; (t<sub>&alpha;</sub> + t<sub>&beta;</sub>)&#178; &times; 2&sigma;&#178; / (SESOI &minus; |&Delta;|)&#178;
    </div>

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'The intuition: in a difference test, you seek to detect an effect. In an equivalence test, you seek to <strong>exclude</strong> effects larger than the SESOI. Excluding requires more precision &mdash; and precision requires more data.')}

    <div class="visual-container">
      <svg viewBox="0 0 700 250" width="700">
        <text x="350" y="25" fill="#e6edf3" font-size="14" text-anchor="middle" font-family="Bangers">COMPARISON: REQUIRED n</text>

        <!-- Bar: Difference test -->
        <text x="50" y="80" fill="#58a6ff" font-size="12" text-anchor="start" font-family="Permanent Marker">t-Test</text>
        <text x="50" y="95" fill="#8b949e" font-size="10" text-anchor="start" font-family="Patrick Hand">(detect d=0.5)</text>
        <rect x="180" y="67" width="200" height="30" rx="6" fill="#58a6ff" opacity="0.7"/>
        <text x="395" y="88" fill="#58a6ff" font-size="13" font-family="Permanent Marker">n &#8776; 64/grupo</text>

        <!-- Bar: TOST -->
        <text x="50" y="145" fill="#3fb950" font-size="12" text-anchor="start" font-family="Permanent Marker">TOST</text>
        <text x="50" y="160" fill="#8b949e" font-size="10" text-anchor="start" font-family="Patrick Hand">(prove equiv. SESOI=0.5)</text>
        <rect x="180" y="132" width="380" height="30" rx="6" fill="#3fb950" opacity="0.7"/>
        <text x="575" y="153" fill="#3fb950" font-size="13" font-family="Permanent Marker">n &#8776; 138/grupo</text>

        <!-- Multiplier annotation -->
        <line x1="580" y1="82" x2="580" y2="147" stroke="#f0c040" stroke-width="2"/>
        <line x1="575" y1="82" x2="585" y2="82" stroke="#f0c040" stroke-width="2"/>
        <line x1="575" y1="147" x2="585" y2="147" stroke="#f0c040" stroke-width="2"/>
        <text x="610" y="120" fill="#f0c040" font-size="14" font-family="Bangers">~2x</text>

        <!-- Explanation -->
        <text x="350" y="210" fill="#8b949e" font-size="12" text-anchor="middle" font-family="Patrick Hand">Exemplo: &alpha; = 0,05, poder = 80%, &sigma; = 1, d verdadeiro = 0</text>
        <text x="350" y="230" fill="#f0c040" font-size="12" text-anchor="middle" font-family="Permanent Marker">TOST requires ~2x more data than NHST for the same power!</text>
      </svg>
    </div>

    ${dialogue('thor', '&#9889; Thorment', 'This is ridiculous! More warriors? The Jarl won't pay for this!')}

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Proving equivalence is harder than detecting difference &mdash; and justly so. Think: anything can be "not significant" with n = 5. But demonstrating equivalence requires precision. That's the beauty of TOST &mdash; it prevents hasty equality conclusions with miserable samples.')}

    <div class="info-card">
      <div class="info-card-title">Factors affecting TOST power</div>
      <table class="calc-table" style="font-size:0.9rem">
        <tr><th>Factor</th><th>Effect on Power</th></tr>
        <tr><td>Wider SESOI</td><td style="color:var(--success)">&uarr; Easier to prove equivalence</td></tr>
        <tr><td>Narrower SESOI</td><td style="color:var(--thor-red)">&darr; Harder, needs more n</td></tr>
        <tr><td>&Delta; true close to 0</td><td style="color:var(--success)">&uarr; More centered CI</td></tr>
        <tr><td>&Delta; true close to SESOI</td><td style="color:var(--thor-red)">&darr; CI at the limit</td></tr>
        <tr><td>Lower variability (&sigma;)</td><td style="color:var(--success)">&uarr; Narrower CI</td></tr>
        <tr><td>Larger n</td><td style="color:var(--success)">&uarr; Always helps</td></tr>
      </table>
    </div>
  `;
}

function step9() {
  return `
    <div class="step-title">Step 9: APA Format Report</div>

    <p class="step-subtitle">How to communicate results</p>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'A complete TOST report includes: the observed difference, the justified SESOI, both one-sided tests, the 90% CI, and the explicit conclusion.')}

    <div class="apa-box">
      <div class="apa-label">APA Report &mdash; TOST para Amostras Independentes</div>
      <p>The mean temperature of the Asgard forge (<em>M</em> = 752, <em>SD</em> = 18, <em>n</em> = 20) and the Alfheim forge (<em>M</em> = 748, <em>SD</em> = 20, <em>n</em> = 20) were compared using the TOST (Two One-Sided Tests) procedure with equivalence bounds of &Delta;<sub>L</sub> = &plusmn;10 degrees, defined a priori based on the steel tempering alteration threshold.</p>
      <p style="margin-top:10px">The observed difference was <em>&Delta;</em> = 4,00 (SE = ${r(SE, 2)}). The lower one-sided test rejected H&#8320;&#8321;: &Delta; &le; &minus;10, <em>t</em><sub>1</sub>(${r(df_welch, 1)}) = ${r(t1, 2)}, <em>p</em><sub>1</sub> = 0,013. The upper one-sided test did not reject H&#8320;&#8322;: &Delta; &ge; +10, <em>t</em><sub>2</sub>(${r(df_welch, 1)}) = ${r(t2, 2)}, <em>p</em><sub>2</sub> = 0,163.</p>
      <p style="margin-top:10px">O IC de 90% para a diferenca [${r(ci90_lower, 2)}, ${r(ci90_upper, 2)}] did <strong>not</strong> fall entirely within the equivalence bounds of &plusmn;10. Although the lower bound of the CI is above &minus;10, the upper bound (${r(ci90_upper, 2)}) exceeds +10. Therefore, <strong>equivalence cannot be declared</strong> based on this criterion.</p>
      <p style="margin-top:10px;color:var(--gold);font-style:normal"><strong>Nota:</strong> The upper one-sided test did not reach significance (<em>p</em><sub>2</sub> = 0,163 > 0,05), confirming that the hypothesis that the difference exceeds the upper bound cannot be rejected. The result is <em>inconclusive</em> regarding equivalence.</p>
    </div>

    ${dialogue('thor', '&#9889; Thorment', 'Wait! You said they were equivalent in Step 4!')}

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Good observation, Thorment. Let us verify rigorously. O IC de 90% e [${r(ci90_lower,2)}, ${r(ci90_upper,2)}]. O limite superior ${r(ci90_upper,2)} esta ${r(ci90_upper,2) > 10 ? "acima" : "abaixo"} de +10. ${r(ci90_upper,2) > 10 ? "Entao a equivalencia NAO pode ser declarada &mdash; o IC ultrapassa o limite superior por " + r(ci90_upper - 10, 2) + " degrees." : "Esta dentro! Equivalencia confirmada."}<br><br>This shows how numerical rigor matters. Rounding or "rounding in your favor" is unacceptable.')}

    <div class="info-card">
      <div class="info-card-title">TOST Report Checklist</div>
      <table class="calc-table" style="font-size:0.9rem">
        <tr><th>#</th><th>Element</th><th>Our Example</th></tr>
        <tr><td>1</td><td>Justified SESOI</td><td>&plusmn;10&#176; (tempering threshold)</td></tr>
        <tr><td>2</td><td>When defined</td><td>A priori</td></tr>
        <tr><td>3</td><td>Observed difference (&Delta;)</td><td>4,00</td></tr>
        <tr><td>4</td><td>SE</td><td>${r(SE, 2)}</td></tr>
        <tr><td>5</td><td>t&#8321; e p&#8321;</td><td>${r(t1, 2)}, p = 0,013</td></tr>
        <tr><td>6</td><td>t&#8322; e p&#8322;</td><td>${r(t2, 2)}, p = 0,163</td></tr>
        <tr><td>7</td><td>IC de 90%</td><td>[${r(ci90_lower, 2)}, ${r(ci90_upper, 2)}]</td></tr>
        <tr><td>8</td><td>Conclusion</td><td style="color:var(--gold)">Inconclusive</td></tr>
      </table>
    </div>

    ${dialogue('corvo', '&#128054;&#8205;&#11035; Muninn whispers:', 'Note: the TOST p is the <strong>larger</strong> of p&#8321; and p&#8322;. Both must be < &alpha;. If only one rejects, equivalence is not declared. No nosso caso, p&#8321; = 0,013 (rejeitou), mas p&#8322; = 0,163 (nao rejeitou). A forja de Asgard pode estar <em>ate</em> ${r(ci90_upper, 2)} degrees acima de Alfheim &mdash; o que ultrapassa o SESOI de +10.')}

    <div class="info-card" style="border-color:var(--success)">
      <div class="info-card-title" style="color:var(--success)">What if we wanted to declare equivalence?</div>
      <p>We would need a narrower CI. This requires more data (larger n) or less variability. Com n = 35 por grupo (mantendo os mesmos M e SD), o IC de 90% ficaria aproximadamente [0,4 ; 7,6] &mdash; within &plusmn;10, allowing the declaration of equivalence.</p>
    </div>
  `;
}

function step10() {
  return `
    <div class="step-title">Lesson of the Ravens</div>

    <div class="licao-box">
      <div class="licao-title">&#128054;&#8205;&#11035; Muninn summarizes the key points:</div>
      <ol style="margin-left:20px;line-height:2">
        <li><strong>"Not significant" &#8800; "equivalente"</strong> &mdash; absence of evidence is not evidence of absence.</li>
        <li>O <strong>TOST</strong> (Two One-Sided Tests) e a unica forma correta de testar equivalencia.</li>
        <li>Define the <strong>SESOI</strong> (Smallest Effect Size of Interest) <em>before</em> data collection, based on domain knowledge.</li>
        <li>TOST runs two one-sided tests: &Delta; &gt; &minus;SESOI <strong>e</strong> &Delta; &lt; +SESOI. Both must reject.</li>
        <li>O <strong>IC de 90%</strong> is equivalent to TOST with &alpha; = 0.05. Se falls entirely within [&minus;SESOI, +SESOI], ha equivalencia.</li>
        <li>Crossing NHST with TOST yields 4 scenarios: equivalent, different, trivially different, or <strong>inconclusive</strong>.</li>
        <li>TOST requires <strong>larger samples</strong> than NHST &mdash; proving equality is harder than detecting difference.</li>

    </div>

    <div class="licao-box" style="border-color:var(--odin-blue)">

        <strong>Challenge 2:</strong> If you defined a SESOI for the main variable of your master/doctoral thesis, what would it be? Justify based on domain, not convenience.<br><br>
        <strong>Challenge 3:</strong> A colleague says: "p = 0.99, so the groups are certainly equal." What do you respond?

    </div>

    <!-- Decision Tree: When to use TOST vs NHST -->

          <span style="font-size:0.9rem">Define SESOI a priori</span>

      </div>
    </div>

    <div class="decision-arrow" style="margin-top:10px">&darr;</div>
    <div class="decision-box question" style="max-width:500px;margin:0 auto">

      <div style="flex:1;max-width:320px">
        <div class="decision-arrow">&darr;</div>
        <div class="decision-box answer-yes">
          <strong>Sim</strong><br>
          <span style="font-family:'Permanent Marker';color:var(--success)">Run the TOST!</span><br>
          <span style="font-size:0.9rem">90% CI within &plusmn;SESOI?</span>
        </div>
      </div>
      <div style="flex:1;max-width:320px">
        <div class="decision-arrow">&darr;</div>

    ${dialogue('odin', '&#129497;&#8205;&#9794;&#65039; Odinfather', 'Next time someone says "p > 0.05, so they are equal" &mdash; you will know what to say. Statistics does not accept shortcuts to equality. The Bifrost bridge only opens with rigor.')}

}

// ===== RENDER ENGINE =====
const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10];

function renderStep() {
  const container = document.getElementById('stepContent');
  container.style.animation = 'none';
  container.offsetHeight; // trigger reflow
  container.style.animation = 'fadeIn 0.4s ease';
  container.innerHTML = stepFunctions[currentStep]();

  // Update progress
  const pct = (currentStep / (totalSteps - 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'Step ' + currentStep + ' of ' + (totalSteps - 1);

  // Update nav buttons
  document.getElementById('btnBack').disabled = currentStep === 0;
  const btnNext = document.getElementById('btnNext');
  if (currentStep === totalSteps - 1) {
    btnNext.textContent = '🏁 End';
    btnNext.disabled = true;
  } else {
    btnNext.textContent = 'Next ▶';
    btnNext.disabled = false;
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep < totalSteps - 1) {
    currentStep++;
    renderStep();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    goNext();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goBack();
  }
});

// Initial render
renderStep();
</script>
