<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Statistical Saga of Odinfather — Realm 13: MANCOVA</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{--bg-dark:#0d1117;--bg-card:#161b22;--bg-panel:#1c2333;--odin-blue:#58a6ff;--thor-red:#f85149;--corvo-purple:#bc8cff;--gold:#f0c040;--silver:#8b949e;--text:#e6edf3;--text-dim:#8b949e;--success:#3fb950;--border:#30363d}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-dark);color:var(--text);font-family:'Patrick Hand',cursive;font-size:18px;min-height:100vh;overflow-x:hidden}
#game-container{max-width:800px;margin:0 auto;padding:20px;min-height:100vh}
.title-screen{text-align:center;padding:60px 20px;animation:fadeIn 1s ease}
.title-screen h1{font-family:'Bangers',cursive;font-size:2.8em;color:var(--gold);text-shadow:2px 2px 8px rgba(240,192,64,.3);line-height:1.1;margin-bottom:8px}
.title-screen h2{font-family:'Permanent Marker',cursive;font-size:1.5em;color:var(--odin-blue);margin-bottom:30px}
.title-screen .subtitle{color:var(--text-dim);font-size:1.1em;margin-bottom:40px}
.reino-badge{display:inline-block;background:linear-gradient(135deg,var(--odin-blue),var(--corvo-purple));padding:6px 20px;border-radius:20px;font-family:'Bangers',cursive;font-size:1em;color:#fff;margin-bottom:16px}
.difficulty-select{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.diff-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Bangers',cursive;font-size:1.2em;padding:16px 32px;border-radius:12px;cursor:pointer;transition:all .3s;min-width:180px}
.diff-btn:hover{border-color:var(--odin-blue);transform:translateY(-2px)}
.diff-btn .diff-label{font-size:1.3em}.diff-btn .diff-desc{font-family:'Patrick Hand',cursive;font-size:.65em;color:var(--text-dim);margin-top:4px}
.scene{animation:slideIn .5s ease;padding:10px 0}
.dialogue-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;position:relative}
.dialogue-box.odin{border-left:4px solid var(--odin-blue)}.dialogue-box.thor{border-left:4px solid var(--thor-red)}.dialogue-box.corvo{border-left:4px solid var(--corvo-purple)}.dialogue-box.narrator{border-left:4px solid var(--gold)}
.char-name{font-family:'Bangers',cursive;font-size:1.1em;margin-bottom:6px}
.char-name.odin{color:var(--odin-blue)}.char-name.thor{color:var(--thor-red)}.char-name.corvo{color:var(--corvo-purple)}.char-name.narrator{color:var(--gold)}
.dialogue-text{line-height:1.5;font-size:1.05em}.dialogue-text em{color:var(--gold);font-style:normal;font-weight:bold}
.challenge-box{background:var(--bg-panel);border:2px solid var(--gold);border-radius:12px;padding:24px;margin:20px 0;animation:pulse-border 2s ease infinite}
@keyframes pulse-border{0%,100%{border-color:var(--gold);box-shadow:0 0 8px rgba(240,192,64,.15)}50%{border-color:#f0c040cc;box-shadow:0 0 16px rgba(240,192,64,.3)}}
.challenge-title{font-family:'Bangers',cursive;font-size:1.4em;color:var(--gold);margin-bottom:12px;text-align:center}
.challenge-question{margin-bottom:16px;line-height:1.5}
.data-display{background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin:12px 0;font-family:'Courier New',monospace;font-size:1em;color:var(--odin-blue);text-align:center;letter-spacing:1px;line-height:1.6}
.options-grid{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.option-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Patrick Hand',cursive;font-size:1.05em;padding:14px 18px;border-radius:10px;cursor:pointer;text-align:left;transition:all .25s;line-height:1.4}
.option-btn:hover:not(.disabled){border-color:var(--odin-blue);background:#1a2233}
.option-btn.correct{border-color:var(--success);background:#0d2818;color:var(--success)}
.option-btn.wrong{border-color:var(--thor-red);background:#2d1116;color:var(--thor-red)}
.option-btn.disabled{cursor:default;opacity:.7}
.feedback-box{border-radius:10px;padding:16px 20px;margin:16px 0;animation:fadeIn .4s ease;line-height:1.5}
.feedback-box.correct{background:#0d2818;border:1px solid var(--success);color:var(--success)}
.feedback-box.wrong{background:#2d1116;border:1px solid var(--thor-red);color:var(--thor-red)}
.xp-badge{display:inline-block;background:var(--gold);color:var(--bg-dark);font-family:'Bangers',cursive;padding:2px 10px;border-radius:6px;font-size:.9em;margin-left:6px}
.xp-bar-container{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.xp-label{font-family:'Bangers',cursive;color:var(--gold);font-size:1em;white-space:nowrap}
.xp-bar-bg{flex:1;height:14px;background:var(--bg-dark);border-radius:7px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--odin-blue),var(--gold));border-radius:7px;transition:width .6s ease}
.xp-count{font-family:'Bangers',cursive;color:var(--text);font-size:1em;min-width:60px;text-align:right}
.continue-btn{display:block;margin:20px auto 0;background:transparent;border:2px solid var(--odin-blue);color:var(--odin-blue);font-family:'Bangers',cursive;font-size:1.15em;padding:12px 36px;border-radius:10px;cursor:pointer;transition:all .25s}
.continue-btn:hover{background:var(--odin-blue);color:var(--bg-dark)}
.result-screen{text-align:center;padding:40px 20px;animation:fadeIn .8s ease}
.result-screen h2{font-family:'Bangers',cursive;font-size:2.2em;color:var(--gold);margin-bottom:8px}
.result-rank{font-family:'Permanent Marker',cursive;font-size:1.5em;margin:16px 0}
.result-stats{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:20px 0;text-align:left}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}.stat-value{font-family:'Bangers',cursive;color:var(--odin-blue)}
.hint-box{background:#1a1530;border:1px solid var(--corvo-purple);border-radius:10px;padding:14px 18px;margin:12px 0;font-size:.95em;color:var(--corvo-purple);animation:fadeIn .5s ease}
.hint-box .hint-label{font-family:'Bangers',cursive;font-size:1em;margin-bottom:4px}
/* ── VISUAL: Matrix Structure ── */
.matrix-visual{display:flex;align-items:center;justify-content:center;gap:4px;margin:16px 0;flex-wrap:wrap}
.mat-segment{padding:12px 10px;text-align:center;font-family:'Courier New',monospace;font-size:.85em;min-width:80px;border-radius:6px}
.mat-total{background:#1a2040;color:var(--gold);border:2px solid var(--gold)}
.mat-hyp{background:#0d2818;color:var(--success);border:2px solid var(--success)}
.mat-err{background:#2d1116;color:var(--thor-red);border:2px solid var(--thor-red)}
.mat-eq{font-family:'Bangers',cursive;color:var(--text);font-size:1.2em;padding:0 4px}
/* ── VISUAL: Comparison Table ── */
.comparison-table{width:100%;border-collapse:separate;border-spacing:0;margin:16px 0;font-size:.9em}
.comparison-table th{background:var(--gold);color:var(--bg-dark);font-family:'Bangers',cursive;padding:10px;text-align:center}
.comparison-table td{padding:10px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg-card)}
.comparison-table tr:last-child td{border-bottom:none}
.comparison-table .highlight-row{background:var(--bg-panel);border:2px solid var(--gold)}
.comparison-table .highlight-row td{background:var(--bg-panel);color:var(--gold);font-weight:bold}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.title-screen h1{font-size:2em}.title-screen h2{font-size:1.2em}.difficulty-select{flex-direction:column;align-items:center}#game-container{padding:12px}.challenge-box{padding:16px}.matrix-visual{flex-wrap:wrap}.mat-segment{min-width:60px;font-size:.75em}.comparison-table{font-size:.78em}.comparison-table th,.comparison-table td{padding:6px 4px}}

/* ── ARMOR SYSTEM ── */
.armor-panel{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px}
.viking-mini{position:relative;width:120px;height:180px;flex-shrink:0}
.vm-head{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;background:#d4a574;border:1.5px solid #b8956a;z-index:5}
.vm-torso{position:absolute;top:56px;left:50%;transform:translateX(-50%);width:44px;height:58px;background:#8b7355;border-radius:7px 7px 4px 4px;z-index:3}
.vm-arm-l{position:absolute;top:59px;left:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-arm-r{position:absolute;top:59px;right:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-leg-l{position:absolute;top:111px;left:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-leg-r{position:absolute;top:111px;right:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-slot{position:absolute;opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1);transform:scale(.3)}
.vm-slot.on{opacity:1;transform:scale(1)}
.vm-helm{top:16px;left:50%;transform:translateX(-50%) scale(.3);z-index:8}.vm-helm.on{transform:translateX(-50%) scale(1)}
.vm-mail{top:57px;left:50%;transform:translateX(-50%) scale(.3);z-index:4}.vm-mail.on{transform:translateX(-50%) scale(1)}
.vm-cape{top:53px;left:50%;transform:translateX(-50%) scale(.3);z-index:1}.vm-cape.on{transform:translateX(-50%) scale(1)}
.vm-left{top:66px;left:0;z-index:7}.vm-right{top:56px;right:0;z-index:7}
.vm-boots{bottom:4px;left:50%;transform:translateX(-50%) scale(.3);z-index:7;display:flex;gap:10px}.vm-boots.on{transform:translateX(-50%) scale(1)}
.gear-progress{flex:1;display:flex;flex-direction:column;gap:4px}
.gp-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;font-size:.8em;color:var(--text-dim);transition:all .3s}
.gp-row.earned{color:var(--success);font-weight:bold}
.gp-row .gp-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:transparent;transition:all .3s;flex-shrink:0}
.gp-row.earned .gp-dot{background:var(--success);border-color:var(--success)}
.vm-sparks{position:absolute;pointer-events:none;z-index:20}
.vm-spark{position:absolute;border-radius:50%;animation:vmSp .6s ease-out forwards}
@keyframes vmSp{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}}
.vm-flash{animation:vmFl .4s ease}
@keyframes vmFl{0%{filter:brightness(1)}30%{filter:brightness(1.8) drop-shadow(0 0 12px rgba(240,180,40,.6))}100%{filter:brightness(1)}}
.result-viking{position:relative;width:160px;height:240px;margin:16px auto}
.rv-head{position:absolute;top:36px;left:50%;transform:translateX(-50%);width:42px;height:42px;border-radius:50%;background:#d4a574;border:2px solid #b8956a;z-index:5}
.rv-torso{position:absolute;top:73px;left:50%;transform:translateX(-50%);width:56px;height:74px;background:#8b7355;border-radius:9px 9px 5px 5px;z-index:3}
.rv-arm-l{position:absolute;top:77px;left:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-arm-r{position:absolute;top:77px;right:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-leg-l{position:absolute;top:144px;left:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-leg-r{position:absolute;top:144px;right:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-slot{position:absolute}
.rv-helm{top:20px;left:50%;transform:translateX(-50%);z-index:8}
.rv-mail{top:74px;left:50%;transform:translateX(-50%);z-index:4}
.rv-cape{top:69px;left:50%;transform:translateX(-50%);z-index:1}
.rv-left{top:86px;left:4px;z-index:7}.rv-right{top:72px;right:4px;z-index:7}
.rv-boots{bottom:4px;left:50%;transform:translateX(-50%);z-index:7;display:flex;gap:14px}
@media(max-width:600px){.armor-panel{flex-direction:column;align-items:center}.viking-mini{width:100px;height:160px}}
footer{text-align:center;padding:24px 12px;color:var(--text-dim);font-size:.85em;border-top:1px solid var(--border);margin-top:40px}
footer a{color:var(--odin-blue);text-decoration:none}footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="game-container"><div id="game-content"></div></div>
<footer>
  <a href="index.html">Return to Realm Hub</a><br>
  Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
</footer>
<script>
// ════════════════════════════════════════════════════
// THE STATISTICAL SAGA OF ODINFATHER — REALM 13
// MANCOVA — MULTIVARIATE ANALYSIS OF COVARIANCE
// ════════════════════════════════════════════════════
const GAME={difficulty:null,xp:0,maxXP:0,hits:0,total:0,currentScene:0,scenes:[]};
const content=()=>document.getElementById('game-content');
function dialogue(c,t){
  const cls={odin:'odin',thor:'thor',muninn:'corvo',huginn:'corvo',narrator:'narrator'};
  const nm={odin:'Odinfather \u{1F9D9}‍♂️',thor:'Thorment ⚡',muninn:'Muninn \u{1F426}‍⬛',huginn:'Huginn \u{1F426}',narrator:'\u{1F4DC} Narrator'};
  return `<div class="dialogue-box ${cls[c]||'narrator'}"><div class="char-name ${cls[c]||'narrator'}">${nm[c]||c}</div><div class="dialogue-text">${t}</div></div>`;
}
function hintBox(t){return `<div class="hint-box"><div class="hint-label">\u{1F426}‍⬛ Muninn's Hint</div>${t}</div>`;}
function xpBar(){
  const p=GAME.maxXP>0?Math.round((GAME.xp/GAME.maxXP)*100):0;
  return armorPanelHTML()+`<div class="xp-bar-container"><div class="xp-label">⚡ XP</div><div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${p}%"></div></div><div class="xp-count">${GAME.xp} / ${GAME.maxXP}</div></div>`;
}
function updateXPBar(){
  const b=document.querySelector('.xp-bar-fill'),c=document.querySelector('.xp-count');
  if(b&&c){const p=GAME.maxXP>0?Math.round((GAME.xp/GAME.maxXP)*100):0;b.style.width=p+'%';c.textContent=`${GAME.xp} / ${GAME.maxXP}`;}
}
function showTitleScreen(){
  content().innerHTML=`
  <div class="title-screen">
    <div class="reino-badge">REALM 13</div>
    <h1>The Statistical Saga of Odinfather</h1>
    <h2>Odin's Throne — MANCOVA</h2>
    <p class="subtitle">At the Supreme Throne of Odin, where all variations of ANOVA converge, the Godfather of Methods reveals the ultimate technique: controlling covariates while analyzing multiple dependent variables simultaneously. MANCOVA — the most general case of the General Linear Model.</p>
    <div class="difficulty-select">
      <button class="diff-btn" onclick="startGame('aprendiz')"><div class="diff-label">\u{1F6E1}️ Apprentice</div><div class="diff-desc">Undergraduate — with Muninn's hints</div></button>
      <button class="diff-btn" onclick="startGame('mestre')"><div class="diff-label">⚔️ Master</div><div class="diff-desc">Graduate — no hints, extra challenges</div></button>
    </div>
  </div>`;
}
function startGame(d){
  GAME.difficulty=d;GAME.xp=0;GAME.hits=0;GAME.total=0;GAME.currentScene=0;gearEarned=0;
  buildScenes();GAME.maxXP=countMaxXP();renderScene();
}

// ════════════════════════════════════════════════════
function buildScenes(){
  GAME.scenes=[];

  // ━━ SCENE 1: Arrival at Odin's Throne ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${dialogue('narrator','The gates of <em>Odin\'s Throne</em> swing open with a thunder that echoes across all Nine Worlds. The hall is immense — marble pillars engraved with General Linear Model equations support a ceiling studded with matrices. At the center, Odinfather sits upon his golden throne, the spear of regression in one hand and the shield of the normal distribution in the other.')}
      ${dialogue('odin','You have traversed 12 Realms. You mastered ANOVA, ANCOVA, MANOVA. Now, upon my Throne, I reveal the technique that <em>unifies everything</em>: MANCOVA — Multivariate Analysis of Covariance.')}
      ${dialogue('thor','Here comes the old man with more complications! What\'s the point of this alphabet soup? Just run an ANOVA for each DV and be done with it! If you need a covariate, throw in an ANCOVA. Simple, fast, painless!')}
      ${dialogue('odin','Simple? Fast? And <em>wrong</em>! Running separate tests is like a Midgard merchant weighing each spice on different scales — you lose sight of the entire shipment and inflate Type I Error. MANCOVA does everything in a single model.')}
      <button class="continue-btn" onclick="nextScene()">Enter the Throne →</button>
    </div>`});

  // ━━ SCENE 2: What is MANCOVA ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${dialogue('odin','MANCOVA = MANOVA + ANCOVA. In a single recipe: <em>multiple DVs</em> (continuous and correlated) + <em>categorical IVs</em> (groups) + <em>continuous covariates</em> (statistical control). All at the same time, in the same cauldron.')}
      ${dialogue('odin','Think of it this way: a Jarl wants to compare <em>3 warrior clans</em> on <em>strength AND agility</em> simultaneously, but needs to <em>control for years of training</em>. Strength and agility are the DVs. Clan is the IV. Years of training is the covariate. That is MANCOVA!')}
      ${dialogue('muninn','Remember: ANCOVA = ANOVA + covariate. MANOVA = ANOVA + multiple DVs. MANCOVA = MANOVA + covariates. It is the supreme fusion — the best of both worlds.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 3: CHALLENGE 1 — What MANCOVA adds ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Remember that ANCOVA = ANOVA + covariate? Now think about the "M" for multivariate...'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 1: The Supreme Fusion</div>
        <div class="challenge-question">What does MANCOVA add compared to MANOVA?</div>
        ${hint}
        <div class="options-grid" id="q1-opts">
          <button class="option-btn" onclick="checkQ(1,this,'a')">More categorical independent variables</button>
          <button class="option-btn" onclick="checkQ(1,this,'b')">Inclusion of continuous covariates for statistical control</button>
          <button class="option-btn" onclick="checkQ(1,this,'c')">A larger number of participants per group</button>
          <button class="option-btn" onclick="checkQ(1,this,'d')">Exclusive use of repeated measures</button>
        </div>
        <div id="q1-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 4: Parsimony ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','The great advantage of MANCOVA is <em>parsimony</em>. A single model handles what previously required a separate MANOVA plus several ANCOVAs. Fewer tests = less Type I Error inflation = more confidence in the results.')}
      ${dialogue('huginn','Parsimony is the virtue of the wise cook: why use three pots when a single one does the job? MANCOVA is the pressure cooker of the GLM — everything cooks together, at the same time, with the same flame.')}
      ${dialogue('thor','But I like lots of pots! One for each ingredient! It takes more effort, but... well... actually it just takes more effort.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 5: CHALLENGE 2 — Parsimony ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Parsimony = doing more with less. A single model that solves multiple problems...'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 2: The Pressure Cooker</div>
        <div class="challenge-question">Why is MANCOVA more parsimonious than running separate ANOVAs, ANCOVAs, and MANOVAs?</div>
        ${hint}
        <div class="options-grid" id="q2-opts">
          <button class="option-btn" onclick="checkQ(2,this,'a')">Because it requires fewer participants</button>
          <button class="option-btn" onclick="checkQ(2,this,'b')">Because it ignores the covariates</button>
          <button class="option-btn" onclick="checkQ(2,this,'c')">Because it tests everything in a single model, controlling Type I error and covariates simultaneously</button>
          <button class="option-btn" onclick="checkQ(2,this,'d')">Because it eliminates the need for assumptions</button>
        </div>
        <div id="q2-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 6: Comparison table ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','See how the GLM family is organized. Each technique adds a layer:')}
      <table class="comparison-table">
        <thead><tr><th>Technique</th><th>IVs</th><th>DVs</th><th>Covariates</th></tr></thead>
        <tbody>
          <tr><td>ANOVA</td><td>1+ categorical</td><td>1 continuous</td><td>—</td></tr>
          <tr><td>ANCOVA</td><td>1+ categorical</td><td>1 continuous</td><td>1+ continuous</td></tr>
          <tr><td>MANOVA</td><td>1+ categorical</td><td>2+ continuous</td><td>—</td></tr>
          <tr class="highlight-row"><td>MANCOVA</td><td>1+ categorical</td><td>2+ continuous</td><td>1+ continuous</td></tr>
        </tbody>
      </table>
      ${dialogue('muninn','MANCOVA is the most general case. ANOVA, ANCOVA, and MANOVA are all special cases of it — just remove DVs or covariates.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 7: CHALLENGE 3 — Comparison table ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('M = multiple DVs. ANCOVA = covariates. Combine the two...'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 3: The GLM Family Scroll</div>
        <div class="challenge-question">Which technique uses multiple DVs AND covariates at the same time?</div>
        ${hint}
        <div class="options-grid" id="q3-opts">
          <button class="option-btn" onclick="checkQ(3,this,'a')">ANOVA</button>
          <button class="option-btn" onclick="checkQ(3,this,'b')">ANCOVA</button>
          <button class="option-btn" onclick="checkQ(3,this,'c')">MANOVA</button>
          <button class="option-btn" onclick="checkQ(3,this,'d')">MANCOVA</button>
        </div>
        <div id="q3-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 8: MANCOVA assumptions ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','MANCOVA inherits <em>all</em> MANOVA assumptions: multivariate normality, homogeneity of covariance matrices (Box\'s M), independence of observations.')}
      ${dialogue('odin','And it adds a specific assumption: <em>homogeneity of regression slopes</em>. The relationship between each covariate and each DV must be <em>similar across all groups</em>. If the covariate "years of training" affects strength differently in Clan A and Clan B, the covariate adjustment becomes distorted.')}
      ${dialogue('muninn','In practice: test the Group × Covariate interaction. If it is significant, the slopes are not homogeneous and MANCOVA may not be appropriate — or you need to model the slopes separately.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 9: CHALLENGE 4 — Assumptions ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('The covariate enters as a regressor. What happens if the covariate→DV relationship differs across groups?'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 4: The Hidden Assumption</div>
        <div class="challenge-question">Besides MANOVA's assumptions, what additional assumption does MANCOVA require?</div>
        ${hint}
        <div class="options-grid" id="q4-opts">
          <button class="option-btn" onclick="checkQ(4,this,'a')">Bivariate normality</button>
          <button class="option-btn" onclick="checkQ(4,this,'b')">Sphericity</button>
          <button class="option-btn" onclick="checkQ(4,this,'c')">Homogeneity of regression slopes across groups</button>
          <button class="option-btn" onclick="checkQ(4,this,'d')">Temporal independence</button>
        </div>
        <div id="q4-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 10: Follow-up — Pillai → ANCOVAs ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','Interpreting MANCOVA in two steps: First, the <em>multivariate test</em> — Pillai\'s Trace (or Wilks\' Lambda). If significant, there is an overall difference between groups after controlling for covariates.')}
      ${dialogue('odin','Second, the <em>follow-ups</em>: univariate ANCOVAs for each DV, <em>keeping the covariates in the model</em>, with Bonferroni correction. Do not remove the covariates in follow-ups — that undoes the adjustment MANCOVA made!')}
      ${dialogue('huginn','Note: if the Jarl evaluated 4 mead recipes on <em>flavor AND aroma</em>, adjusting for <em>water quality</em>, the follow-ups are ANCOVAs — one for flavor and one for aroma — both with water quality as a covariate. Bonferroni: α = .05/2 = .025.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 11: CHALLENGE 5 — Follow-up ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('The multivariate test is omnibus. To find out WHICH DV differs, you need to go one level down...'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 5: The Next Step</div>
        <div class="challenge-question">After a significant Pillai's Trace in MANCOVA, what is the next step?</div>
        ${hint}
        <div class="options-grid" id="q5-opts">
          <button class="option-btn" onclick="checkQ(5,this,'a')">Run t-tests for each DV</button>
          <button class="option-btn" onclick="checkQ(5,this,'b')">Perform univariate ANCOVAs with Bonferroni correction</button>
          <button class="option-btn" onclick="checkQ(5,this,'c')">Ignore and report only the global test</button>
          <button class="option-btn" onclick="checkQ(5,this,'d')">Remove the covariates and run ANOVA</button>
        </div>
        <div id="q5-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 12: Kitchen sink warning ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('huginn','Beware of the <em>kitchen sink</em> approach — throwing every available covariate into the model! Each covariate consumes error degrees of freedom. Too many covariates = too little statistical power.')}
      ${dialogue('odin','Rule: include only <em>theoretically justified</em> covariates. If the Jarl wants to compare clans on strength and agility, "years of training" makes sense as a covariate. "Helmet color" does not. Furthermore, correlated covariates generate <em>multicollinearity</em>.')}
      ${dialogue('muninn','Remember: covariates correlated with each other (r > .80) create multicollinearity — the model cannot separate each one\'s effect. Choose one or combine them.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 13: CHALLENGE 6 — Too many covariates ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Each covariate "costs" degrees of freedom. And if you spend too many...'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 6: The Kitchen Sink</div>
        <div class="challenge-question">What is the risk of including too many covariates in a MANCOVA?</div>
        ${hint}
        <div class="options-grid" id="q6-opts">
          <button class="option-btn" onclick="checkQ(6,this,'a')">It increases statistical power</button>
          <button class="option-btn" onclick="checkQ(6,this,'b')">It reduces error degrees of freedom and can mask real effects</button>
          <button class="option-btn" onclick="checkQ(6,this,'c')">It eliminates all variance in the DVs</button>
          <button class="option-btn" onclick="checkQ(6,this,'d')">It makes Box's test unnecessary</button>
        </div>
        <div id="q6-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 14: GLM — Grand Unification ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','Now, the final revelation. In the <em>General Linear Model (GLM)</em> framework, everything connects through the matrix equation:')}
      <div class="matrix-visual">
        <div class="mat-segment mat-total"><strong>Y</strong><br><small>DV Matrix</small></div>
        <div class="mat-eq">=</div>
        <div class="mat-segment mat-hyp"><strong>Xβ</strong><br><small>Factors + Covariates</small></div>
        <div class="mat-eq">+</div>
        <div class="mat-segment mat-err"><strong>ε</strong><br><small>Error</small></div>
      </div>
      ${dialogue('odin','If Y has one column = ANOVA/ANCOVA. If Y has multiple columns and X only has factors = MANOVA. If Y has multiple columns and X includes factors + covariates = <em>MANCOVA</em>. MANCOVA is the most general case!')}
      ${dialogue('muninn','The beauty of the GLM: ANOVA, ANCOVA, MANOVA, and MANCOVA are all instances of the same equation. The difference lies in the <em>dimensionality of Y</em> and the <em>composition of X</em>.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 15: CHALLENGE 7 — GLM ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Y = Xβ + ε. If Y is a matrix (multiple DVs) and X includes factors + covariates...'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 7: The Supreme Equation</div>
        <div class="challenge-question">In the GLM framework, how does MANCOVA fit in?</div>
        ${hint}
        <div class="options-grid" id="q7-opts">
          <button class="option-btn" onclick="checkQ(7,this,'a')">It is a special case of logistic regression</button>
          <button class="option-btn" onclick="checkQ(7,this,'b')">It is the most general case of the general linear model, with a Y matrix of multiple DVs and covariates in the X matrix</button>
          <button class="option-btn" onclick="checkQ(7,this,'c')">It is independent of the GLM</button>
          <button class="option-btn" onclick="checkQ(7,this,'d')">It is identical to repeated measures ANOVA</button>
        </div>
        <div id="q7-fb"></div>
      </div>
    </div>`;}});

  // ━━ MASTER CHALLENGES ━━
  if(GAME.difficulty==='mestre'){
    // CHALLENGE 8: Sample size
    GAME.scenes.push({type:'challenge',html:()=>`
      <div class="scene">
        ${xpBar()}
        <div class="challenge-box">
          <div class="challenge-title">⚔️ Master Challenge: The Minimum Army</div>
          <div class="challenge-question">In a MANCOVA with 3 groups, 4 DVs, and 2 covariates, what is the most critical concern regarding sample size?</div>
          <div class="data-display">
            3 groups &nbsp;|&nbsp; 4 DVs &nbsp;|&nbsp; 2 covariates<br>
            Total variables in the model: 4 + 2 = 6
          </div>
          <div class="options-grid" id="q8-opts">
            <button class="option-btn" onclick="checkQ(8,this,'a')">Having at least 5 participants per group</button>
            <button class="option-btn" onclick="checkQ(8,this,'b')">Having more participants in each group than the combined number of DVs + covariates</button>
            <button class="option-btn" onclick="checkQ(8,this,'c')">Having exactly the same N in all groups</button>
            <button class="option-btn" onclick="checkQ(8,this,'d')">Having at least 1000 participants in total</button>
          </div>
          <div id="q8-fb"></div>
        </div>
      </div>`});

    // CHALLENGE 9: Thorment refuted
    GAME.scenes.push({type:'challenge',html:()=>`
      <div class="scene">
        ${xpBar()}
        <div class="challenge-box">
          <div class="challenge-title">⚔️ Master Challenge: Thorment's Folly</div>
          <div class="challenge-question">Thorment suggests: "Run a MANOVA and then several separate ANCOVAs — same thing!" Why is this incorrect?</div>
          <div class="data-display">
            Thorment's proposal:<br>
            MANOVA (without covariates) + separate ANCOVAs (one per DV)<br>
            vs. MANCOVA (single model)
          </div>
          <div class="options-grid" id="q9-opts">
            <button class="option-btn" onclick="checkQ(9,this,'a')">Because MANOVA cannot handle more than one DV</button>
            <button class="option-btn" onclick="checkQ(9,this,'b')">Because separate ANCOVAs do not account for the correlation between DVs, inflate Type I error, and waste information that MANCOVA preserves in a unified model</button>
            <button class="option-btn" onclick="checkQ(9,this,'c')">Because ANCOVA is more powerful than MANCOVA</button>
            <button class="option-btn" onclick="checkQ(9,this,'d')">Because Thorment is always right about parsimony</button>
          </div>
          <div id="q9-fb"></div>
        </div>
      </div>`});
  }

  // ━━ FINAL SCENE: Lesson of the Ravens ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('narrator','Odin\'s Throne pulses with golden energy. The equations on the pillars glow — ANOVA, ANCOVA, MANOVA, MANCOVA — all converging toward the supreme formula of the GLM. The student who has made it this far has mastered the entire family.')}
      ${dialogue('muninn','<strong>Lesson of the Ravens — Muninn summarizes:</strong><br>• MANCOVA = MANOVA + continuous covariates<br>• Parsimony: a single model for multiple DVs + covariates<br>• Assumptions: all of MANOVA\'s + homogeneity of regression slopes<br>• Follow-up: univariate ANCOVAs with Bonferroni (keeping covariates!)<br>• MANCOVA is the most general case of the GLM: Y = Xβ + ε')}
      ${dialogue('huginn','<strong>Lesson of the Ravens — Huginn challenges:</strong><br>• Don\'t throw covariates into the model just because you collected them — justify them theoretically!<br>• N per group must exceed the number of DVs + covariates<br>• Test homogeneity of slopes BEFORE running MANCOVA<br>• MANOVA + separate ANCOVAs ≠ MANCOVA — don\'t fall for that!')}
      ${dialogue('odin','You have conquered <em>Odin\'s Throne</em>! MANCOVA is the crown of the General Linear Model — and now it is yours. Use it with wisdom, parsimony, and rigor. May the data be ever in your favor!')}
      ${dialogue('thor','Fine... I admit that running MANOVA + separate ANCOVAs was a terrible idea. But nobody will convince me to like SSCP matrices!')}
      <button class="continue-btn" onclick="showResults()">See Final Result ⚔️</button>
    </div>`});
}

function checkQ(q,btn,ans){
  const opts=document.querySelectorAll(`#q${q}-opts .option-btn`);
  opts.forEach(b=>{b.classList.add('disabled');b.onclick=null;});
  const fb=document.getElementById(`q${q}-fb`),cor=ANSWERS[q],exp=EXPLANATIONS[q];
  GAME.total++;
  if(ans===cor){
    btn.classList.add('correct');GAME.hits++;GAME.xp+=20;updateXPBar();earnGear();
    fb.innerHTML=`<div class="feedback-box correct">${dialogue(exp.charC,exp.correct+' <span class="xp-badge">+20 XP</span>')}<button class="continue-btn" onclick="nextScene()">Continue →</button></div>`;
  }else{
    btn.classList.add('wrong');
    const ci=['a','b','c','d'].indexOf(cor);if(opts[ci])opts[ci].classList.add('correct');
    fb.innerHTML=`<div class="feedback-box wrong">${dialogue(exp.charW,exp.wrong)}<button class="continue-btn" onclick="nextScene()">Continue →</button></div>`;
  }
}

function countMaxXP(){return (GAME.difficulty==='mestre'?9:7)*20;}
function renderScene(){if(GAME.currentScene<GAME.scenes.length){content().innerHTML=GAME.scenes[GAME.currentScene].html();restoreGear();window.scrollTo({top:0,behavior:'smooth'});}}
function nextScene(){GAME.currentScene++;renderScene();}

  else if(pct>=40){rank='\u{1F6E1}️ Squire of the Hall';rc='#8b949e';}
  else{rank='⛓️ Servant of the Corridors';rc='#f85149';}
  content().innerHTML=`
  <div class="result-screen">
    <div class="reino-badge">REALM 13 — COMPLETE</div>
    <h2>Adventure Result</h2>
    ${resultVikingHTML()}
    <div class="result-rank" style="color:${rc}">${rank}</div>
    <div class="result-stats">
      <div class="stat-row"><span class="stat-label">Difficulty</span><span class="stat-value">${GAME.difficulty==='mestre'?'⚔️ Master':'\u{1F6E1}️ Apprentice'}</span></div>
      <div class="stat-row"><span class="stat-label">Correct</span><span class="stat-value">${GAME.hits} / ${GAME.total}</span></div>
      <div class="stat-row"><span class="stat-label">Accuracy</span><span class="stat-value">${pct}%</span></div>

    </div>
    ${dialogue('odin',pct>=70
      ?'Odin\'s Throne shines in your honor! You have mastered MANCOVA — the crown of the General Linear Model. From parsimony to regression slopes, from Pillai\'s Trace to Bonferroni, everything converges in your hands. Go forth and analyze with wisdom!'
      :'The Throne trembled, but did not bow... Return and review: the MANOVA + ANCOVA fusion, the additional assumptions, the follow-up with ANCOVAs, the kitchen sink trap, and the GLM. MANCOVA awaits your second attempt!'

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px">
      <button class="continue-btn" onclick="showTitleScreen()">\u{1F504} Play Again</button>

  window.scrollTo({top:0,behavior:'smooth'});
}

  return '<div class="armor-panel"><div class="viking-mini" id="vmini">'+sl+'</div><div class="gear-progress">'+rows+'</div></div>';
}
function restoreGear(){for(var i=0;i<gearEarned&&i<GEAR_ITEMS.length;i++){var g=GEAR_ITEMS[i],el=document.getElementById('vmslot-'+g.s);if(el){el.innerHTML=g.h;el.classList.add('on');}}}
function earnGear(){
  if(gearEarned>=GEAR_ITEMS.length)return;
  var g=GEAR_ITEMS[gearEarned],el=document.getElementById('vmslot-'+g.s);
  if(el){el.innerHTML=g.h;el.classList.add('on','vm-flash');setTimeout(function(){el.classList.remove('vm-flash')},500);spawnVMSparks(el);}
  var row=document.getElementById('gprow'+gearEarned);if(row)row.classList.add('earned');
  gearEarned++;
}
function spawnVMSparks(el){
  var sc=document.getElementById('vmsparks');if(!sc||!el)return;
  var r=el.getBoundingClientRect(),sr=document.getElementById('vmini').getBoundingClientRect();
  var cx=r.left-sr.left+r.width/2,cy=r.top-sr.top+r.height/2;
  var cols=['#f0c040','#f08030','#f0e080','#ff6040','#ffd060'];
  for(var i=0;i<10;i++){var s=document.createElement('div');s.className='vm-spark';
    var a=Math.random()*Math.PI*2,d=20+Math.random()*30;
    s.style.cssText='left:'+cx+'px;top:'+cy+'px;background:'+cols[Math.floor(Math.random()*5)]+';--sx:'+(Math.cos(a)*d)+'px;--sy:'+(Math.sin(a)*d)+'px;width:'+(2+Math.random()*3)+'px;height:'+(2+Math.random()*3)+'px';
    sc.appendChild(s);setTimeout(function(x){x.remove()},700,s);}
}
function resultVikingHTML(){
  var pct=GAME.total>0?Math.round((GAME.hits/GAME.total)*100):0;
  var ti=[];if(pct>=90)ti=GEAR_ITEMS;else if(pct>=70)ti=GEAR_ITEMS.slice(0,5);else if(pct>=40)ti=GEAR_ITEMS.slice(0,2);
  var html='<div class="result-viking">';
  html+='<div class="rv-slot rv-cape" id="rvs-cape"></div>';
  html+='<div class="rv-head"></div><div class="rv-arm-l"></div><div class="rv-arm-r"></div><div class="rv-torso"></div><div class="rv-leg-l"></div><div class="rv-leg-r"></div>';
  html+='<div class="rv-slot rv-boots" id="rvs-boots"></div><div class="rv-slot rv-mail" id="rvs-mail"></div>';
  html+='<div class="rv-slot rv-left" id="rvs-left"></div><div class="rv-slot rv-right" id="rvs-right"></div>';
  html+='<div class="rv-slot rv-helm" id="rvs-helm"></div></div>';
  setTimeout(function(){ti.forEach(function(g){var e=document.getElementById('rvs-'+g.s);if(e)e.innerHTML=g.h;});},100);
  return html;
}

showTitleScreen();
</script>
