<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probability — Step by Step | Odinfather</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
  --norn-teal: #39d2c0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* PROGRESS BAR */
.progress-bar-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-dark);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* STEP CONTENT */
.step-content {
  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.step-subtitle {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.3rem;
  color: var(--odin-blue);
  margin-bottom: 15px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
  position: relative;
}

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}
.dialogue-box.huginn {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 6px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }
.char-name.huginn { color: var(--corvo-purple); }

.dialogue-text {
  font-size: 1.05rem;
  line-height: 1.5;
}

/* DATA TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.data-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

.data-table td {
  background: var(--bg-card);
  transition: background 0.2s;
}

.data-table tr:hover td {
  background: rgba(88,166,255,0.1);
}

/* FORMULA */
.formula {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.15rem;
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  color: var(--gold);
}

.formula-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 6px;
}

/* CALC TABLE */
.calc-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 0.95rem;
}

.calc-table th, .calc-table td {
  padding: 8px 10px;
  text-align: center;
  border: 1px solid var(--border);
}

.calc-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.85rem;
  color: var(--text-dim);
}

.calc-table td {
  background: var(--bg-card);
}

/* SVG VISUALS */
.visual-container {
  margin: 20px 0;
  text-align: center;
}

.visual-container svg {
  max-width: 100%;
  height: auto;
}

/* NAVIGATION */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 40px;
  gap: 12px;
}

.nav-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  padding: 12px 28px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover {
  border-color: var(--odin-blue);
  background: rgba(88,166,255,0.1);
}

.nav-btn.primary {
  background: var(--odin-blue);
  color: var(--bg-dark);
  border-color: var(--odin-blue);
}

.nav-btn.primary:hover {
  background: #79bbff;
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* SIGNATURE */
.signature {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* HIGHLIGHTS */
.hl-gold { color: var(--gold); font-weight: bold; }
.hl-blue { color: var(--odin-blue); }
.hl-red { color: var(--thor-red); }
.hl-green { color: var(--success); }
.hl-purple { color: var(--corvo-purple); }
.hl-teal { color: var(--norn-teal); }

/* LICAO DOS CORVOS */
.licao-box {
  background: rgba(188,140,255,0.06);
  border: 2px solid var(--corvo-purple);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.licao-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--corvo-purple);
  margin-bottom: 12px;
}

/* TRAP BOX */
.armadilha-box {
  background: rgba(248,81,73,0.06);
  border: 2px solid var(--thor-red);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.armadilha-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--thor-red);
  margin-bottom: 12px;
}

/* EXAMPLE BLOCK */
.example-block {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 22px;
  margin: 16px 0;
}

.example-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--norn-teal);
  font-size: 0.9rem;
  margin-bottom: 8px;
}

/* TREE NODE */
.tree-container {
  margin: 20px 0;
  text-align: center;
  overflow-x: auto;
}

/* VENN */
.venn-container {
  margin: 20px 0;
  text-align: center;
}

/* SUMMARY GRID */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 20px 0;
}

.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.summary-card-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  color: var(--odin-blue);
  margin-bottom: 8px;
}

.summary-card-formula {
  font-size: 1.1rem;
  color: var(--gold);
  text-align: center;
  padding: 8px 0;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .step-title { font-size: 1.6rem; }
  .summary-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 10px 18px; font-size: 0.95rem; }
  body { font-size: 16px; }
}

/* ANIMATE */
.fade-in {
  animation: fadeIn 0.6s ease both;
}

.fade-in-delay {
  animation: fadeIn 0.6s ease 0.3s both;
}

/* STEP INDICATOR DOTS */
.step-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin: 8px 0 0;
}

.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s;
}

.step-dot.active {
  background: var(--odin-blue);
  transform: scale(1.3);
}

.step-dot.done {
  background: var(--gold);
}
</style>
</head>
<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 11</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="step-dots" id="stepDots"></div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== HELPERS =====
function r(v, d=2) { return Number(v).toFixed(d); }
function pct(v) { return (v * 100).toFixed(1) + '%'; }

// ===== DIALOGUE HELPER =====
function dialogue(character, name, text) {
  return `<div class="dialogue-box ${character}">
    <div class="char-name ${character}">${name}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}

// ===== STEP SYSTEM =====
const totalSteps = 12; // 0..11
let currentStep = 0;

// ========================
//  STEP 0 — INTRODUÇÃO
// ========================
function step0() {
  return `
    <div class="step-title">The Temple of the Norns: The Art of Calculating Destiny</div>

    <p>At the heart of Yggdrasil, three Norns &mdash; <span class="hl-teal">Urd</span> (past), <span class="hl-teal">Verdandi</span> (present), and <span class="hl-teal">Skuld</span> (future) &mdash; weave the threads of fate. Each thread carries a <strong>probability</strong>. Before every Viking raid, a wise warrior calculates the odds.</p>

    <div class="visual-container">
      <svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Yggdrasil trunk -->
        <rect x="335" y="40" width="30" height="120" rx="8" fill="#2d5016" opacity="0.5"/>
        <!-- branches -->
        <path d="M350 40 Q350 10 280 15" stroke="#3fb950" stroke-width="3" fill="none" opacity="0.5"/>
        <path d="M350 40 Q350 5 350 5" stroke="#3fb950" stroke-width="3" fill="none" opacity="0.5"/>
        <path d="M350 40 Q350 10 420 15" stroke="#3fb950" stroke-width="3" fill="none" opacity="0.5"/>
        <!-- roots -->
        <path d="M350 160 Q330 185 280 190" stroke="#6b4e2a" stroke-width="3" fill="none" opacity="0.5"/>
        <path d="M350 160 Q370 185 420 190" stroke="#6b4e2a" stroke-width="3" fill="none" opacity="0.5"/>
        <!-- Three Norns -->
        <circle cx="180" cy="100" r="32" fill="none" stroke="var(--norn-teal)" stroke-width="2"/>
        <text x="180" y="95" fill="var(--norn-teal)" font-size="11" text-anchor="middle" font-family="Permanent Marker">Urd</text>
        <text x="180" y="110" fill="var(--text-dim)" font-size="9" text-anchor="middle">Past</text>

        <circle cx="350" cy="100" r="32" fill="none" stroke="var(--norn-teal)" stroke-width="2"/>
        <text x="350" y="95" fill="var(--norn-teal)" font-size="11" text-anchor="middle" font-family="Permanent Marker">Showdandi</text>
        <text x="350" y="110" fill="var(--text-dim)" font-size="9" text-anchor="middle">Present</text>

        <circle cx="520" cy="100" r="32" fill="none" stroke="var(--norn-teal)" stroke-width="2"/>
        <text x="520" y="95" fill="var(--norn-teal)" font-size="11" text-anchor="middle" font-family="Permanent Marker">Skuld</text>
        <text x="520" y="110" fill="var(--text-dim)" font-size="9" text-anchor="middle">Future</text>

        <!-- threads connecting -->
        <line x1="212" y1="100" x2="318" y2="100" stroke="var(--gold)" stroke-width="1.5" stroke-dasharray="4" opacity="0.6"/>
        <line x1="382" y1="100" x2="488" y2="100" stroke="var(--gold)" stroke-width="1.5" stroke-dasharray="4" opacity="0.6"/>
        <!-- probability labels on threads -->
        <text x="265" y="92" fill="var(--gold)" font-size="10" text-anchor="middle" font-family="Patrick Hand">P = ?</text>
        <text x="435" y="92" fill="var(--gold)" font-size="10" text-anchor="middle" font-family="Patrick Hand">P = ?</text>
      </svg>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Warrior, fortune favors those who can calculate! Before setting sail on a raid, we must measure our chances. Probability &mdash; the art of quantifying uncertainty &mdash; separates the wise general from the fool who trusts in pure luck.')}

    ${dialogue('thor', '⚡ Thorment', 'Why bother calculating? Luck is enough! A good hammer and courage &mdash; that\x27s all that matters!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Courage without calculation, Thorment, is suicide. The Norns weave destiny, but we can <em>read the threads</em>. Let\x27s learn their language.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Probability</strong> is the numerical measure of the chance that an event will occur. It ranges from 0 (impossible) to 1 (certain). It is the foundation of all statistical inference &mdash; without it, we have no hypothesis tests, confidence intervals, or regression.')}
  `;
}

// ========================
//  STEP 1 — ESPAÇO AMOSTRAL
// ========================
function step1() {
  return `
    <div class="step-title">Step 1: Sample Space (S)</div>

    <div class="formula">
      <div class="formula-label">Definition</div>
      S = the set of ALL possible outcomes of a random experiment
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Before calculating any probability, first define the <strong>sample space</strong> &mdash; the universe of possibilities. Without knowing the whole, you cannot measure the part.')}

    <div class="example-block">
      <div class="example-label">Example 1: Runic Die (6 faces)</div>
      <p>A 6-sided runic die is thrown in the Banquet Hall:</p>
      <div class="formula" style="font-size:1.3rem">
        S = {1, 2, 3, 4, 5, 6}
      </div>
      <p style="text-align:center;color:var(--text-dim)">|S| = 6 resultados possible</p>
    </div>

    <div class="visual-container">
      <svg viewBox="0 0 700 120" xmlns="http://www.w3.org/2000/svg">
        ${[1,2,3,4,5,6].map((v, i) => {
          const x = 80 + i * 95;
          return `
            <rect x="${x-30}" y="20" width="60" height="60" rx="10" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2"/>
            <text x="${x}" y="60" fill="var(--gold)" font-size="24" text-anchor="middle" font-family="Bangers">${v}</text>
          `;
        }).join('')}
        <text x="350" y="105" fill="var(--text-dim)" font-size="13" text-anchor="middle" font-family="Permanent Marker">S = {1, 2, 3, 4, 5, 6}</text>
      </svg>
    </div>

    <div class="example-block">
      <div class="example-label">Example 2: Two Bow Shots (hit or miss)</div>
      <p>An archer fires two arrows. Each arrow: <span class="hl-green">H</span> (hit) or <span class="hl-red">M</span> (miss).</p>
      <div class="formula" style="font-size:1.1rem">
        S = {(H,H), (H,M), (M,H), (M,M)} &rarr; |S| = 4
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'An <strong>event</strong> is any subset of S. Example: "rolling an even number" = {2, 4, 6} &mdash; a subset of S with 3 elements.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Think of the sample space as a complete map of a realm. The event is the region we are interested in. You cannot measure the region without having the full map.')}

    ${dialogue('thor', '⚡ Thorment', 'Easy! S of the die is 6. But what if the die is loaded?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The sample space <em>does not change</em> if the die is loaded &mdash; the possible outcomes remain the same. What changes are the <strong>probabilities</strong> of each outcome. Good question, Thorment.')}
  `;
}

// ========================
//  STEP 2 — PROBABILIDADE CLÁSSICA
// ========================
function step2() {
  return `
    <div class="step-title">Step 2: Classical Probability</div>

    <div class="formula">
      <div class="formula-label">Laplace Formula</div>
      P(A) = favorable outcomes / possible outcomes = |A| / |S|
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'This formula assumes all outcomes in the sample space are <strong>equally likely</strong>. Called classical or Laplacian probability &mdash; the foundation of everything.')}

    <div class="example-block">
      <div class="example-label">Example: Bag of Runes</div>
      <p>A pouch contains <strong>10 runes</strong>: 3 <span class="hl-blue">Protection</span> runes, 4 <span class="hl-red">Attack</span> runes, and 3 <span class="hl-green">Cure</span> runes.</p>
      <p>You draw one rune at random. What is the probability of drawing a Protection rune?</p>
    </div>

    <div class="visual-container">
      <svg viewBox="0 0 700 150" xmlns="http://www.w3.org/2000/svg">
        <!-- bag -->
        <path d="M250 30 Q250 10 350 10 Q450 10 450 30 L470 120 Q470 140 350 140 Q230 140 230 120 Z" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="2"/>
        <text x="350" y="28" fill="var(--text-dim)" font-size="11" text-anchor="middle" font-family="Permanent Marker">Bag of Runes</text>
        <!-- runes inside -->
        ${[
          {x:280,y:55,c:'var(--odin-blue)',l:'P'},{x:320,y:70,c:'var(--odin-blue)',l:'P'},{x:360,y:55,c:'var(--odin-blue)',l:'P'},
          {x:290,y:90,c:'var(--thor-red)',l:'A'},{x:330,y:100,c:'var(--thor-red)',l:'A'},{x:370,y:90,c:'var(--thor-red)',l:'A'},{x:410,y:100,c:'var(--thor-red)',l:'A'},
          {x:300,y:120,c:'var(--success)',l:'C'},{x:350,y:115,c:'var(--success)',l:'C'},{x:400,y:120,c:'var(--success)',l:'C'}
        ].map(r => `<circle cx="${r.x}" cy="${r.y}" r="14" fill="${r.c}" opacity="0.7"/><text x="${r.x}" y="${r.y+5}" fill="white" font-size="12" text-anchor="middle" font-family="Bangers">${r.l}</text>`).join('')}
        <!-- legend -->
        <circle cx="530" cy="50" r="8" fill="var(--odin-blue)" opacity="0.7"/>
        <text x="545" y="55" fill="var(--text)" font-size="12" font-family="Patrick Hand">= Protection (3)</text>
        <circle cx="530" cy="80" r="8" fill="var(--thor-red)" opacity="0.7"/>
        <text x="545" y="85" fill="var(--text)" font-size="12" font-family="Patrick Hand">= Attack (4)</text>
        <circle cx="530" cy="110" r="8" fill="var(--success)" opacity="0.7"/>
        <text x="545" y="115" fill="var(--text)" font-size="12" font-family="Patrick Hand">= Cure (3)</text>
      </svg>
    </div>

    <div class="formula">
      <div class="formula-label">Calculation Step by Step</div>
      P(Protection) = |A| / |S| = 3 / 10 = <span class="hl-gold">0,30</span> = <span class="hl-gold">30%</span>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Simple and powerful! Three protection runes out of ten total &mdash; 30% chance. Now: the probability of <em>not</em> drawing protection? P(not Protection) = 1 &minus; 0.30 = <strong>0.70</strong>. The sum always equals 1.')}

    <div class="formula">
      <div class="formula-label">Complement Rule</div>
      P(A<sup>c</sup>) = 1 &minus; P(A)
    </div>

    ${dialogue('thor', '⚡ Thorment', 'If the chance of protection is 30%, just draw 3 times and one is guaranteed!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'No, Thorment. 30% per draw does not guarantee success in 3 attempts. Later we\x27ll see how to combine probabilities of sequential events. Patience.')}
  `;
}

// ========================
//  STEP 3 — REGRA DA ADIÇÃO
// ========================
function step3() {
  return `
    <div class="step-title">Step 3: Addition Rule</div>

    <div class="formula">
      <div class="formula-label">General Addition Rule</div>
      P(A &cup; B) = P(A) + P(B) &minus; P(A &cap; B)
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The symbol &cup; means "or" (union). The symbol &cap; means "and" (intersection). We subtract the intersection because it was counted twice.')}

    <div class="example-block">
      <div class="example-label">Scenario: Warriors at the Camp</div>
      <p>In a camp of 40 warriors:</p>
      <ul style="margin:8px 0 8px 20px">
        <li><span class="hl-blue">15 belong to Clan Fenrir</span></li>
        <li><span class="hl-red">12 carry an axe</span></li>
        <li><span class="hl-purple">5 belong to Clan Fenrir AND carry an axe</span></li>
      </ul>
      <p>What is the probability of selecting a warrior who <strong>belongs to Fenrir OR carries an axe</strong>?</p>
    </div>

    <!-- VENN DIAGRAM -->
    <div class="venn-container">
      <svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Universal set -->
        <rect x="50" y="20" width="600" height="260" rx="16" fill="none" stroke="var(--border)" stroke-width="2"/>
        <text x="70" y="45" fill="var(--text-dim)" font-size="13" font-family="Permanent Marker">S = 40 warriors</text>

        <!-- Circle A (Fenrir) -->
        <circle cx="280" cy="150" r="110" fill="var(--odin-blue)" opacity="0.15" stroke="var(--odin-blue)" stroke-width="2"/>
        <text x="210" y="130" fill="var(--odin-blue)" font-size="14" font-family="Permanent Marker">Fenrir</text>
        <text x="210" y="155" fill="var(--odin-blue)" font-size="22" font-family="Bangers">10</text>
        <text x="210" y="175" fill="var(--text-dim)" font-size="10">Fenrir only</text>

        <!-- Circle B (Axe) -->
        <circle cx="420" cy="150" r="110" fill="var(--thor-red)" opacity="0.15" stroke="var(--thor-red)" stroke-width="2"/>
        <text x="455" y="130" fill="var(--thor-red)" font-size="14" font-family="Permanent Marker">Axe</text>
        <text x="465" y="155" fill="var(--thor-red)" font-size="22" font-family="Bangers">7</text>
        <text x="455" y="175" fill="var(--text-dim)" font-size="10">Axe only</text>

        <!-- Intersection -->
        <text x="345" y="145" fill="var(--corvo-purple)" font-size="22" font-family="Bangers">5</text>
        <text x="335" y="165" fill="var(--corvo-purple)" font-size="10">Fenrir &amp; Axe</text>

        <!-- Outside -->
        <text x="560" y="255" fill="var(--text-dim)" font-size="16" font-family="Bangers">18</text>
        <text x="545" y="272" fill="var(--text-dim)" font-size="9">neither</text>
      </svg>
    </div>

    <div class="formula">
      <div class="formula-label">Calculation</div>
      P(Fenrir &cup; Axe) = 15/40 + 12/40 &minus; 5/40<br>
      = 0,375 + 0,300 &minus; 0,125 = <span class="hl-gold">0,55</span> = <span class="hl-gold">55%</span>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Veja o diagrama de Venn: 10 are Fenrir only, 7 Axe only, 5 are both. Event total = 10 + 7 + 5 = 22. And 22/40 = 0.55. Matches the formula!')}

    ${dialogue('thor', '⚡ Thorment', 'Wait, why not just add 15 + 12 = 27? That gives 27/40!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Because the 5 warriors who are Fenrir <em>and</em> carry an axe would be counted <strong>twice</strong>! The subtraction corrects that double counting. Without it, the math overflows.')}
  `;
}

// ========================
//  STEP 4 — MUTUAMENTE EXCLUDENTES
// ========================
function step4() {
  return `
    <div class="step-title">Step 4: Mutually Exclusive Events</div>

    <div class="formula">
      <div class="formula-label">Definition</div>
      Mutually exclusive events: P(A &cap; B) = 0 &rarr; they cannot occur together
    </div>

    <div class="formula">
      <div class="formula-label">Simplified Rule</div>
      If A and B are mutually exclusive: P(A &cup; B) = P(A) + P(B)
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'When two events cannot happen at the same time, the intersection is empty. The addition formula loses the &minus; P(A &cap; B) term because it equals zero.')}

    <div class="example-block">
      <div class="example-label">Scenario: Warrior\x27s Origin</div>
      <p>A warrior comes from <strong>exactly one</strong> of three realms:</p>
      <ul style="margin:8px 0 8px 20px">
        <li><span class="hl-blue">Asgard</span>: 20 warriors</li>
        <li><span class="hl-green">Midgard</span>: 50 warriors</li>
        <li><span class="hl-red">Jotunheim</span>: 30 warriors</li>
      </ul>
      <p>Total: 100 warriors. What is P(Asgard or Jotunheim)?</p>
    </div>

    <!-- VENN NON-OVERLAPPING -->
    <div class="venn-container">
      <svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="50" y="20" width="600" height="160" rx="12" fill="none" stroke="var(--border)" stroke-width="2"/>
        <text x="350" y="42" fill="var(--text-dim)" font-size="12" text-anchor="middle" font-family="Permanent Marker">S = 100 warriors</text>

        <circle cx="170" cy="110" r="60" fill="var(--odin-blue)" opacity="0.2" stroke="var(--odin-blue)" stroke-width="2"/>
        <text x="170" y="105" fill="var(--odin-blue)" font-size="13" text-anchor="middle" font-family="Permanent Marker">Asgard</text>
        <text x="170" y="125" fill="var(--odin-blue)" font-size="20" text-anchor="middle" font-family="Bangers">20</text>

        <circle cx="350" cy="110" r="70" fill="var(--success)" opacity="0.2" stroke="var(--success)" stroke-width="2"/>
        <text x="350" y="105" fill="var(--success)" font-size="13" text-anchor="middle" font-family="Permanent Marker">Midgard</text>
        <text x="350" y="125" fill="var(--success)" font-size="20" text-anchor="middle" font-family="Bangers">50</text>

        <circle cx="530" cy="110" r="55" fill="var(--thor-red)" opacity="0.2" stroke="var(--thor-red)" stroke-width="2"/>
        <text x="530" y="105" fill="var(--thor-red)" font-size="13" text-anchor="middle" font-family="Permanent Marker">Jotunheim</text>
        <text x="530" y="125" fill="var(--thor-red)" font-size="20" text-anchor="middle" font-family="Bangers">30</text>
      </svg>
    </div>

    <div class="formula">
      <div class="formula-label">Calculation</div>
      P(Asgard &cup; Jotunheim) = P(Asgard) + P(Jotunheim)<br>
      = 20/100 + 30/100 = 0,20 + 0,30 = <span class="hl-gold">0,50</span>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'A warrior cannot be from Asgard <em>and</em> Jotunheim at the same time. They are mutually exclusive events &mdash; no intersection. We add directly.')}

    ${dialogue('thor', '⚡ Thorment', 'But what if a warrior was born in Asgard and lived in Jotunheim?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Then the events <strong>would not be</strong> mutually exclusive! The definition depends on how we categorize. If "origin" is the birth realm, there is no overlap. If it were "has lived in," then there could be an intersection &mdash; and we\x27d go back to the full formula from Step 3.')}
  `;
}

// ========================
//  STEP 5 — REGRA DA MULTIPLICAÇÃO
// ========================
function step5() {
  return `
    <div class="step-title">Step 5: Multiplication Rule</div>

    <div class="formula">
      <div class="formula-label">General Rule</div>
      P(A &cap; B) = P(A) &times; P(B|A)
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The multiplication rule answers: what is the probability that A <strong>and</strong> B occur together? We multiply P(A) by the probability of B <em>given that</em> A has already occurred.')}

    <div class="example-block">
      <div class="example-label">Scenario: Bag of Runes (WITHOUT replacement)</div>
      <p>The pouch has <strong>10 runes</strong>: 4 <span class="hl-blue">Ice</span> and 6 <span class="hl-red">Fire</span>.</p>
      <p>You draw <strong>two runes in a row without replacing them</strong>. What is P(both are Ice)?</p>
    </div>

    <div class="visual-container">
      <svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg">
        <!-- First draw -->
        <text x="100" y="25" fill="var(--gold)" font-size="14" text-anchor="middle" font-family="Bangers">1st Draw</text>
        <rect x="40" y="35" width="120" height="60" rx="10" fill="var(--bg-card)" stroke="var(--odin-blue)" stroke-width="2"/>
        <text x="100" y="65" fill="var(--odin-blue)" font-size="12" text-anchor="middle" font-family="Permanent Marker">Ice</text>
        <text x="100" y="85" fill="var(--odin-blue)" font-size="14" text-anchor="middle" font-family="Bangers">P = 4/10</text>

        <!-- Arrow -->
        <line x1="170" y1="65" x2="250" y2="65" stroke="var(--gold)" stroke-width="2" marker-end="url(#arrowGold)"/>
        <defs><marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="var(--gold)"/></marker></defs>

        <!-- Second draw -->
        <text x="370" y="25" fill="var(--gold)" font-size="14" text-anchor="middle" font-family="Bangers">2nd Draw (without replacement)</text>
        <rect x="280" y="35" width="180" height="60" rx="10" fill="var(--bg-card)" stroke="var(--odin-blue)" stroke-width="2"/>
        <text x="370" y="60" fill="var(--odin-blue)" font-size="12" text-anchor="middle" font-family="Permanent Marker">Ice again?</text>
        <text x="370" y="82" fill="var(--odin-blue)" font-size="14" text-anchor="middle" font-family="Bangers">P = 3/9 (3 left out of 9!)</text>

        <!-- Equals -->
        <line x1="470" y1="65" x2="520" y2="65" stroke="var(--gold)" stroke-width="2"/>
        <text x="495" y="60" fill="var(--gold)" font-size="16" text-anchor="middle" font-family="Bangers">=</text>

        <!-- Result -->
        <rect x="520" y="35" width="140" height="60" rx="10" fill="var(--bg-panel)" stroke="var(--gold)" stroke-width="2"/>
        <text x="590" y="60" fill="var(--gold)" font-size="12" text-anchor="middle" font-family="Permanent Marker">P(Ice &amp; Ice)</text>
        <text x="590" y="82" fill="var(--gold)" font-size="16" text-anchor="middle" font-family="Bangers">= 12/90</text>

        <!-- Detailed calc -->
        <rect x="100" y="130" width="500" height="70" rx="12" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="1"/>
        <text x="350" y="155" fill="var(--text)" font-size="14" text-anchor="middle" font-family="Patrick Hand">P(G1 &cap; G2) = P(G1) &times; P(G2 | G1) = 4/10 &times; 3/9</text>
        <text x="350" y="180" fill="var(--gold)" font-size="18" text-anchor="middle" font-family="Bangers">= 12/90 = 2/15 &asymp; 0,1333 = 13,3%</text>
      </svg>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Hey, why did the second draw change to 3/9? Wasn\x27t it 4/10?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Because we drew an Ice rune and <strong>did not replace it</strong>! 3 Ice remain among 9 total. The probability <em>updates</em> as the context changes. Ignoring this &mdash; the classic error of those who don\x27t understand conditional probability.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'P(B|A) reads "probability of B given A." It is the probability of B when we know that A has occurred. The bar "|" is the mark of conditionality.')}
  `;
}

// ========================
//  STEP 6 — EVENTOS INDEPENDENTES
// ========================
function step6() {
  return `
    <div class="step-title">Step 6: Independent Events</div>

    <div class="formula">
      <div class="formula-label">Definition</div>
      A and B are independent when P(B|A) = P(B)<br>
      &rarr; Knowing that A occurred does NOT change the probability of B
    </div>

    <div class="formula">
      <div class="formula-label">Simplified Rule</div>
      If A and B are independent: P(A &cap; B) = P(A) &times; P(B)
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'If two events do not influence each other, they are <strong>independent</strong>. The outcome of one does not change the probability of the other. Classic example: consecutive coin tosses.')}

    <div class="example-block">
      <div class="example-label">Scenario: Merchant\x27s Coins</div>
      <p>A merchant from Birka tosses a gold coin 3 times. What is P(3 heads in a row)?</p>
      <div class="formula">
        P(C &cap; C &cap; C) = P(C) &times; P(C) &times; P(C) = 1/2 &times; 1/2 &times; 1/2 = <span class="hl-gold">1/8 = 0,125 = 12,5%</span>
      </div>
    </div>

    ${dialogue('thor', '⚡ Thorment', '5 heads in a row! The next one HAS to be tails &mdash; it\x27s the "law of compensation"!')}

    <div class="armadilha-box">
      <div class="armadilha-title">Trap: Gambler\x27s Fallacy</div>
      <p>Thorment fell for the oldest trap in the world! The coin <strong>has no memory</strong>. Each toss is independent of the previous one.</p>
      <p style="margin-top:8px">After 5 heads in a row, the probability that the 6th is heads remains <span class="hl-gold">exactly 50%</span>.</p>
      <p style="margin-top:8px">The gambler\x27s fallacy is believing that past results influence future independent events. The universe doesn\x27t "owe" anyone a tails.</p>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The coin doesn\x27t know what happened before, Thorment! Each toss resets to zero. The "law of large numbers" says proportions converge in the long run &mdash; but <em>not</em> because the next result "compensates" for the previous ones.')}

    <div class="example-block">
      <div class="example-label">Counterexample: When is it NOT independent?</div>
      <p>Drawing cards from a deck <strong>without replacement</strong>. The first card drawn changes the composition of the deck &mdash; so the second draw <em>depends</em> on the first. They are <strong>dependent</strong> events.</p>
      <p style="margin-top:6px">With replacement &rarr; independent. Without replacement &rarr; dependent.</p>
    </div>
  `;
}

// ========================
//  STEP 7 — PROBABILIDADE CONDICIONAL
// ========================
function step7() {
  return `
    <div class="step-title">Step 7: Conditional Probability</div>

    <div class="formula">
      <div class="formula-label">Formula</div>
      P(A|B) = P(A &cap; B) / P(B)
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'P(A|B) means: "given that B occurred, what is the probability of A?" Event B redefines our universe &mdash; B becomes the new sample space.')}

    <div class="example-block">
      <div class="example-label">Scenario: Survival in Battle</div>
      <p>After the Battle of Svolder, the record of 200 warriors shows:</p>
    </div>

    <table class="data-table">
      <tr>
        <th></th>
        <th style="color:var(--success)">Survived</th>
        <th style="color:var(--thor-red)">Fell</th>
        <th>Total</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">With Shield</td>
        <td>90</td>
        <td>30</td>
        <td style="font-family:'Permanent Marker'">120</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--thor-red)">Without Shield</td>
        <td>40</td>
        <td>40</td>
        <td style="font-family:'Permanent Marker'">80</td>
      </tr>
      <tr style="background:var(--bg-panel)">
        <td style="font-family:'Permanent Marker'">Total</td>
        <td style="font-family:'Permanent Marker'">130</td>
        <td style="font-family:'Permanent Marker'">70</td>
        <td style="font-family:'Permanent Marker';color:var(--gold)">200</td>
      </tr>
    </table>

    <p style="margin:16px 0"><strong>Question:</strong> Given that a warrior <span class="hl-green">survived</span>, what is the probability that he <span class="hl-blue">carried a shield</span>?</p>

    <div class="formula">
      <div class="formula-label">Solution</div>
      P(Shield | Survived) = P(Shield &cap; Survived) / P(Survived)<br><br>
      = (90/200) / (130/200) = 90/130 = <span class="hl-gold">0,6923 &asymp; 69,2%</span>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Here\x27s the logic: among the 130 survivors, 90 carried a shield. The event "survived" reduced our universe from 200 to 130. Within that smaller universe, we calculate the proportion.')}

    <div class="visual-container">
      <svg viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg">
        <!-- Full rectangle (S) -->
        <rect x="50" y="30" width="600" height="190" rx="12" fill="none" stroke="var(--border)" stroke-width="2"/>
        <text x="350" y="25" fill="var(--text-dim)" font-size="12" text-anchor="middle" font-family="Permanent Marker">S = 200 warriors</text>

        <!-- Survived column (highlight) -->
        <rect x="60" y="40" width="390" height="170" rx="8" fill="var(--success)" opacity="0.08" stroke="var(--success)" stroke-width="2" stroke-dasharray="5"/>
        <text x="255" y="60" fill="var(--success)" font-size="13" text-anchor="middle" font-family="Permanent Marker">Survived = 130</text>

        <!-- Shield + Survived -->
        <rect x="80" y="75" width="200" height="80" rx="8" fill="var(--odin-blue)" opacity="0.15" stroke="var(--odin-blue)" stroke-width="2"/>
        <text x="180" y="110" fill="var(--odin-blue)" font-size="14" text-anchor="middle" font-family="Permanent Marker">Shield &amp;</text>
        <text x="180" y="130" fill="var(--odin-blue)" font-size="14" text-anchor="middle" font-family="Permanent Marker">Survived</text>
        <text x="180" y="148" fill="var(--odin-blue)" font-size="20" text-anchor="middle" font-family="Bangers">90</text>

        <!-- Without Shield + Survived -->
        <rect x="300" y="75" width="130" height="80" rx="8" fill="var(--success)" opacity="0.15" stroke="var(--success)" stroke-width="2"/>
        <text x="365" y="110" fill="var(--success)" font-size="12" text-anchor="middle" font-family="Permanent Marker">Without Shield &amp;</text>
        <text x="365" y="128" fill="var(--success)" font-size="12" text-anchor="middle" font-family="Permanent Marker">Survived</text>
        <text x="365" y="148" fill="var(--success)" font-size="20" text-anchor="middle" font-family="Bangers">40</text>

        <!-- Fell section -->
        <rect x="470" y="75" width="160" height="80" rx="8" fill="var(--thor-red)" opacity="0.1" stroke="var(--thor-red)" stroke-width="1"/>
        <text x="550" y="110" fill="var(--thor-red)" font-size="12" text-anchor="middle" font-family="Permanent Marker">Fell</text>
        <text x="550" y="140" fill="var(--thor-red)" font-size="18" text-anchor="middle" font-family="Bangers">70</text>

        <!-- Result arrow -->
        <text x="350" y="205" fill="var(--gold)" font-size="15" text-anchor="middle" font-family="Bangers">P(Shield | Survived) = 90 / 130 = 69.2%</text>
      </svg>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'So the shield changes everything? The overall probability of a shield is 120/200 = 60%, but among survivors it jumps to 69%!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Exactly! The information "survived" <em>updates</em> the probability. That\x27s the essence of conditional thinking &mdash; and the foundation of Bayes\x27 Theorem, which comes next.')}
  `;
}

// ========================
//  STEP 8 — TEOREMA DE BAYES
// ========================
function step8() {
  return `
    <div class="step-title">Step 8: Bayes\x27 Theorem</div>

    <div class="formula">
      <div class="formula-label">Teorema de Bayes</div>
      P(A|B) = P(B|A) &times; P(A) / P(B)
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Bayes reverses the direction of conditionality: if I know P(B|A) and want P(A|B), Bayes bridges the gap. The prior P(A) is updated by the evidence B to produce the posterior P(A|B).')}

    <div class="example-block">
      <div class="example-label">Scenario: Poison Detection</div>
      <p>The alchemist of Asgard developed a test to detect poison in the mead:</p>
      <ul style="margin:8px 0 8px 20px">
        <li><strong>Prevalence:</strong> 2% of barrels are poisoned &rarr; P(Poison) = 0,02</li>
        <li><strong>Sensitivity:</strong> If the barrel HAS poison, the test detects it 95% of the time &rarr; P(+|Poison) = 0,95</li>
        <li><strong>Specificity:</strong> If the barrel does NOT have poison, the test gives a negative result 90% of the time &rarr; P(&minus;|Clean) = 0,90</li>
        <li>Logo, <strong>falso positivo</strong>: P(+|Clean) = 0,10</li>
      </ul>
      <p style="margin-top:8px"><strong>The test came back positive. What is the REAL probability the barrel is poisoned?</strong></p>
    </div>

    <!-- TREE DIAGRAM -->
    <div class="tree-container">
      <svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg">
        <!-- Level 0 -->
        <circle cx="60" cy="180" r="22" fill="var(--bg-panel)" stroke="var(--gold)" stroke-width="2"/>
        <text x="60" y="185" fill="var(--gold)" font-size="10" text-anchor="middle" font-family="Bangers">Barrel</text>

        <!-- Branch: Poison -->
        <line x1="82" y1="168" x2="220" y2="90" stroke="var(--thor-red)" stroke-width="2"/>
        <text x="140" y="112" fill="var(--thor-red)" font-size="11" text-anchor="middle" font-family="Permanent Marker">0,02</text>
        <rect x="220" y="68" width="110" height="44" rx="8" fill="var(--bg-card)" stroke="var(--thor-red)" stroke-width="2"/>
        <text x="275" y="87" fill="var(--thor-red)" font-size="12" text-anchor="middle" font-family="Permanent Marker">Poison</text>
        <text x="275" y="103" fill="var(--text-dim)" font-size="9" text-anchor="middle">P = 0,02</text>

        <!-- Branch from Poison: Teste + -->
        <line x1="330" y1="78" x2="440" y2="45" stroke="var(--success)" stroke-width="1.5"/>
        <text x="380" y="52" fill="var(--success)" font-size="10" text-anchor="middle" font-family="Permanent Marker">0,95</text>
        <rect x="440" y="25" width="120" height="40" rx="8" fill="var(--bg-card)" stroke="var(--success)" stroke-width="2"/>
        <text x="500" y="42" fill="var(--success)" font-size="11" text-anchor="middle" font-family="Permanent Marker">Teste +</text>
        <text x="500" y="58" fill="var(--gold)" font-size="10" text-anchor="middle" font-family="Bangers">0,02 x 0,95 = 0,019</text>

        <!-- Branch from Poison: Teste - -->
        <line x1="330" y1="100" x2="440" y2="110" stroke="var(--text-dim)" stroke-width="1.5"/>
        <text x="380" y="115" fill="var(--text-dim)" font-size="10" text-anchor="middle" font-family="Permanent Marker">0,05</text>
        <rect x="440" y="90" width="120" height="40" rx="8" fill="var(--bg-card)" stroke="var(--text-dim)" stroke-width="1"/>
        <text x="500" y="107" fill="var(--text-dim)" font-size="11" text-anchor="middle" font-family="Permanent Marker">Teste &minus;</text>
        <text x="500" y="123" fill="var(--text-dim)" font-size="10" text-anchor="middle">0,02 x 0,05 = 0,001</text>

        <!-- Branch: Clean -->
        <line x1="82" y1="192" x2="220" y2="270" stroke="var(--odin-blue)" stroke-width="2"/>
        <text x="140" y="255" fill="var(--odin-blue)" font-size="11" text-anchor="middle" font-family="Permanent Marker">0,98</text>
        <rect x="220" y="248" width="110" height="44" rx="8" fill="var(--bg-card)" stroke="var(--odin-blue)" stroke-width="2"/>
        <text x="275" y="267" fill="var(--odin-blue)" font-size="12" text-anchor="middle" font-family="Permanent Marker">Clean</text>
        <text x="275" y="283" fill="var(--text-dim)" font-size="9" text-anchor="middle">P = 0,98</text>

        <!-- Branch from Clean: Teste + (false positive) -->

        <!-- Branch from Clean: Teste - -->
        <line x1="330" y1="280" x2="440" y2="300" stroke="var(--text-dim)" stroke-width="1.5"/>
        <text x="380" y="300" fill="var(--text-dim)" font-size="10" text-anchor="middle" font-family="Permanent Marker">0,90</text>

  `;
}

function step11() {
  return `
    <div class="step-title">Step 11: Probability Traps</div>

    <p style="margin-bottom:20px">Thorment compiled an involuntary catalog of errors. Each one is a documented cognitive bias &mdash; and each one has a name.</p>

    <!-- ARMADILHA 1 -->
    <div class="armadilha-box">
      <div class="armadilha-title">Trap 1: Gambler\x27s Fallacy</div>

      ${dialogue('thor', '⚡ Thorment', '7 tails in a row on the coin toss! The next one HAS to be heads &mdash; the universe needs to balance out!')}

      ${dialogue('odin', '🧙‍♂️ Odinfather', 'Wrong. Independent events have no memory. Each toss resets to zero &mdash; the coin doesn\x27t know what came before. P(heads) = 50%, always, regardless of history.')}

      <p style="margin-top:8px;color:var(--text-dim)"><strong>Why do we make this error?</strong> Our brain seeks patterns where none exist. We confuse "convergence of proportion in the long run" with "compensation in the short run."</p>
    </div>

    <!-- ARMADILHA 2 -->
    <div class="armadilha-box">
      <div class="armadilha-title">Trap 2: Conjunction Fallacy</div>

      <div class="example-block">
        <div class="example-label">The Freyja Problem</div>
        <p>Freyja is an Asgard warrior, a rune scholar, and fights for equality on the council of gods. What is MORE likely?</p>
        <p style="margin:8px 0 0 20px"><strong>A)</strong> Freyja is a merchant.</p>
        <p style="margin:4px 0 0 20px"><strong>B)</strong> Freyja is a merchant <em>and</em> a political activist.</p>
      </div>

      ${dialogue('thor', '⚡ Thorment', 'Option B, obviously! It matches her profile better!')}

      ${dialogue('odin', '🧙‍♂️ Odinfather', 'Wrong again! Option A is <em>always</em> more likely (or equal) than B. Why? B is a subset of A. The set "merchant" contains all cases of "merchant and activist." The intersection never exceeds the larger set.')}

      <div class="formula" style="font-size:1rem">
        <div class="formula-label">Logical Rule</div>
        P(A &cap; B) &le; P(A) &mdash; sempre. The intersection fits within each part.
      </div>

      <p style="margin-top:8px;color:var(--text-dim)"><strong>Why do we make this error?</strong> The detailed description seems more "representative" and our brain substitutes probability with resemblance. Kahneman and Tversky documented this in 1983.</p>
    </div>

    <!-- ARMADILHA 3 -->
    <div class="armadilha-box">
      <div class="armadilha-title">Trap 3: Base Rate Neglect</div>

      ${dialogue('thor', '⚡ Thorment', 'The poison test came back positive! The barrel is definitely poisoned!')}

      ${dialogue('odin', '🧙‍♂️ Odinfather', 'We saw in Step 8: when prevalence is low, a positive test can have more false positives than true ones. Thorment ignored the <em>base rate</em> (2% of barrels poisoned) and focused only on the test\x27s accuracy.')}

      <div class="visual-container">
        <svg viewBox="0 0 700 120" xmlns="http://www.w3.org/2000/svg">

          <rect x="50" y="78" width="57" height="35" rx="6" fill="var(--success)" opacity="0.3" stroke="var(--success)" stroke-width="2"/>

          <text x="400" y="101" fill="var(--text)" font-size="12" text-anchor="start" font-family="Patrick Hand">&larr; Truly poisoned and detected</text>

          <text x="580" y="58" fill="var(--gold)" font-size="13" text-anchor="middle" font-family="Bangers">19 / (19+98) = 16,2%</text>

      </div>

      <p style="margin-top:8px;color:var(--text-dim)"><strong>Why do we make this error?</strong> The prevalence seems "abstract" and distant. The feeling of "the test came back positive!" is visceral. Bayes forces us to integrate both pieces of information.</p>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'These three fallacies &mdash; gambler\x27s, conjunction, and base rate &mdash; are the most documented in behavioral research. Tversky, Kahneman, and Gigerenzer devoted entire careers to studying them. Recognizing the bias is the first step toward avoiding it.')}

// ========================
//  RENDER & NAVIGATION
// ========================
const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10, step11];

function renderStep() {
  const content = document.getElementById('stepContent');
  content.style.animation = 'none';
  content.offsetHeight; // trigger reflow
  content.style.animation = 'fadeIn 0.4s ease';
  content.innerHTML = stepFunctions[currentStep]();

  // Update progress
  const pct = (currentStep / (totalSteps - 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Step ${currentStep} of ${totalSteps - 1}`;

  // Update buttons
  document.getElementById('btnBack').disabled = (currentStep === 0);
  const btnNext = document.getElementById('btnNext');
  if (currentStep === totalSteps - 1) {
    btnNext.textContent = 'Done ✓';
    btnNext.disabled = true;
    btnNext.classList.remove('primary');
    btnNext.style.background = 'var(--success)';
    btnNext.style.borderColor = 'var(--success)';
    btnNext.style.color = 'white';
  } else {
    btnNext.textContent = 'Next ▶';
    btnNext.disabled = false;
    btnNext.classList.add('primary');
    btnNext.style.background = '';
    btnNext.style.borderColor = '';
    btnNext.style.color = '';
  }

  // Update dots
  renderDots();

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDots() {
  const dotsContainer = document.getElementById('stepDots');
  let html = '';
  for (let i = 0; i < totalSteps; i++) {
    let cls = 'step-dot';
    if (i === currentStep) cls += ' active';
    else if (i < currentStep) cls += ' done';
    html += `<div class="${cls}"></div>`;
  }
  dotsContainer.innerHTML = html;
}

function goNext() {
  if (currentStep < totalSteps - 1) {
    currentStep++;
    renderStep();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    goNext();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goBack();
  }
});

// Initialize
renderStep();
</script>

</body>
</html>
