<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampling — Step by Step | Odinfather</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* PROGRESS BAR */
.progress-bar-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-dark);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* STEP CONTENT */
.step-content {
  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.step-subtitle {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.3rem;
  color: var(--odin-blue);
  margin-bottom: 15px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
  position: relative;
}

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}
.dialogue-box.huginn {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 6px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }
.char-name.huginn { color: var(--corvo-purple); }

.dialogue-text {
  font-size: 1.05rem;
  line-height: 1.5;
}

/* DATA TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.data-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

.data-table td {
  background: var(--bg-card);
  transition: background 0.2s;
}

.data-table tr:hover td {
  background: rgba(88,166,255,0.1);
}

/* FORMULA */
.formula {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.15rem;
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  color: var(--gold);
}

.formula-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 6px;
}

/* SVG VISUALS */
.visual-container {
  margin: 20px 0;
  text-align: center;
}

.visual-container svg {
  max-width: 100%;
  height: auto;
}

/* CONCEPT CARD */
.concept-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 22px;
  margin: 14px 0;
}

.concept-card h3 {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  color: var(--odin-blue);
  margin-bottom: 8px;
}

/* COMPARISON GRID */
.comparison-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 20px 0;
}

.comparison-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.comparison-card.pro {
  border-color: var(--success);
}

.comparison-card.con {
  border-color: var(--thor-red);
}

.comparison-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  margin-bottom: 8px;
}

/* METHOD CARD */
.method-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin: 14px 0;
  transition: border-color 0.3s;
}

.method-card:hover {
  border-color: var(--odin-blue);
}

.method-card h3 {
  font-family: 'Bangers', cursive;
  font-size: 1.3rem;
  margin-bottom: 8px;
}

.method-card .tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-family: 'Permanent Marker', cursive;
  margin-right: 6px;
}

.tag.prob { background: rgba(88,166,255,0.2); color: var(--odin-blue); }
.tag.nprob { background: rgba(248,81,73,0.2); color: var(--thor-red); }

/* BIAS CARD */
.bias-card {
  background: rgba(248,81,73,0.05);
  border: 1px solid var(--thor-red);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 14px 0;
}

.bias-card h4 {
  font-family: 'Permanent Marker', cursive;
  color: var(--thor-red);
  margin-bottom: 6px;
}

/* NAVIGATION */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 40px;
  gap: 12px;
}

.nav-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  padding: 12px 28px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover {
  border-color: var(--odin-blue);
  background: rgba(88,166,255,0.1);
}

.nav-btn.primary {
  background: var(--odin-blue);
  color: var(--bg-dark);
  border-color: var(--odin-blue);
}

.nav-btn.primary:hover {
  background: #79bbff;
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* SIGNATURE */
.signature {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* HIGHLIGHT */
.hl-gold { color: var(--gold); font-weight: bold; }
.hl-blue { color: var(--odin-blue); }
.hl-red { color: var(--thor-red); }
.hl-green { color: var(--success); }
.hl-purple { color: var(--corvo-purple); }

/* LICAO DOS CORVOS */
.licao-box {
  background: rgba(188,140,255,0.06);
  border: 2px solid var(--corvo-purple);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.licao-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--corvo-purple);
  margin-bottom: 12px;
}

/* TCL ANIMATION */
.tcl-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0;
}

.tcl-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
  flex: 1;
  min-width: 200px;
  max-width: 280px;
}

.tcl-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  margin-bottom: 8px;
  color: var(--odin-blue);
}

/* SUMMARY TABLE */
.summary-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 0.95rem;
}

.summary-table th, .summary-table td {
  padding: 10px 12px;
  border: 1px solid var(--border);
  text-align: left;
}

.summary-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.9rem;
  color: var(--gold);
}

.summary-table td {
  background: var(--bg-card);
}

.summary-table tr:hover td {
  background: rgba(88,166,255,0.08);
}

/* INFO BOX */
.info-box {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
}

.info-box h4 {
  font-family: 'Permanent Marker', cursive;
  color: var(--gold);
  margin-bottom: 8px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .step-title { font-size: 1.6rem; }
  .comparison-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 10px 18px; font-size: 0.95rem; }
  body { font-size: 16px; }
  .tcl-row { flex-direction: column; align-items: center; }
  .tcl-card { max-width: 100%; }
}

.fade-in {
  animation: fadeIn 0.6s ease both;
}

.fade-in-delay {
  animation: fadeIn 0.6s ease 0.3s both;
}
</style>
</head>
<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 10</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DIALOGUE HELPER =====
function dialogue(character, name, text) {
  return `<div class="dialogue-box ${character}">
    <div class="char-name ${character}">${name}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}

// ===== STEP FUNCTIONS =====
const totalSteps = 11; // 0..10
let currentStep = 0;

// ============================================================
// STEP 0 — INTRO: O DESAFIO DA SAMPLEGEM
// ============================================================
function step0() {
  return `
    <div class="step-title">Sampling: The Impossible Census of the Nine Realms</div>

    <p>O Grande Conselho de Asgard precisa saber o nível de satisfação dos guerreiros viking com a distribuição de espólios após as batalhas. O problema? Existem <span class="hl-gold">1.000 clãs</span> espalhados pelos Nove Reinos &mdash; de Midgard a Niflheim.</p>

    <p>Visitar todos? Meses de navegação, centenas de longships, provisões infinitas. O censo completo é um luxo que nem Odin pode pagar.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Não precisamos ouvir <em>todos</em> os 1.000 clãs. Precisamos de uma <strong>amostra</strong> &mdash; um subconjunto que represente bem a população inteira. A questão é: <em>como escolher</em>?')}

    ${dialogue('thor', '⚡ Thorment', 'Fácil! Pergunta pros clãs que moram aqui perto de Asgard. São os mais acessíveis, e pronto &mdash; economizamos tempo e hidromel!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'E é exatamente assim que nasce o <strong>viés amostral</strong>, Thorment. Os clãs próximos a Asgard são mais ricos, mais favorecidos. A opinião deles não representa Niflheim nem Jötunheim.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Sampling</strong> é o processo de selecionar um subconjunto (amostra) de uma população para estimar características do todo. A qualidade da amostra determina a qualidade da inferência.')}

    <div class="info-box">
      <h4>Why sample?</h4>
      <ul style="margin-left: 20px; margin-top: 8px;">
        <li><span class="hl-blue">Custo</span> &mdash; censos são caríssimos (longships não são baratas)</li>
        <li><span class="hl-blue">Tempo</span> &mdash; enquanto o censo termina, a guerra já mudou</li>
        <li><span class="hl-blue">Praticidade</span> &mdash; nem sempre é possível acessar todos os elementos</li>
        <li><span class="hl-blue">Destrutividade</span> &mdash; testar a qualidade de <em>todas</em> as espadas significaria quebrá-las</li>
      </ul>
    </div>

    <p>Nos próximos passos, Odinfather vai guiar você pelos métodos de amostragem &mdash; dos mais rigorosos aos mais perigosos. Thorment vai tentar atalhos. Os corvos vão lembrar as definições.</p>
  `;
}

// ============================================================
// STEP 1 — POPULAÇÃO vs SAMPLE
// ============================================================
function step1() {
  return `
    <div class="step-title">Population vs. Sample</div>

    <p>Antes de qualquer método, precisamos separar dois conceitos fundamentais que confundem até guerreiros experientes.</p>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>População (N)</strong>: conjunto completo de todos os elementos de interesse. No nosso caso, todos os 1.000 clãs viking. <br><strong>Amostra (n)</strong>: subconjunto selecionado da população para estudo.')}

    <div class="visual-container">
      <svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
        <!-- Population circle -->
        <ellipse cx="220" cy="160" rx="180" ry="140" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>
        <text x="220" y="40" text-anchor="middle" fill="#58a6ff" font-family="Bangers" font-size="22">POPULATION (N = 1.000)</text>

        <!-- Dots representing population -->
        <g fill="#8b949e" opacity="0.4">
          <circle cx="140" cy="100" r="3"/><circle cx="180" cy="85" r="3"/><circle cx="220" cy="95" r="3"/>
          <circle cx="260" cy="80" r="3"/><circle cx="300" cy="100" r="3"/><circle cx="120" cy="130" r="3"/>
          <circle cx="160" cy="120" r="3"/><circle cx="200" cy="115" r="3"/><circle cx="240" cy="125" r="3"/>
          <circle cx="280" cy="110" r="3"/><circle cx="320" cy="130" r="3"/><circle cx="100" cy="160" r="3"/>
          <circle cx="340" cy="160" r="3"/><circle cx="130" cy="190" r="3"/><circle cx="310" cy="190" r="3"/>
          <circle cx="150" cy="220" r="3"/><circle cx="290" cy="220" r="3"/><circle cx="180" cy="240" r="3"/>
          <circle cx="260" cy="240" r="3"/><circle cx="220" cy="250" r="3"/>
          <circle cx="170" cy="170" r="3"/><circle cx="270" cy="170" r="3"/><circle cx="200" cy="200" r="3"/>
          <circle cx="240" cy="200" r="3"/><circle cx="210" cy="180" r="3"/>
        </g>

        <!-- Sample circle inside -->
        <ellipse cx="220" cy="170" rx="70" ry="55" fill="rgba(240,192,64,0.15)" stroke="#f0c040" stroke-width="2.5"/>

        <!-- Sample dots (highlighted) -->
        <g fill="#f0c040">
          <circle cx="200" cy="155" r="5"/><circle cx="235" cy="150" r="5"/><circle cx="215" cy="175" r="5"/>
          <circle cx="250" cy="170" r="5"/><circle cx="190" cy="180" r="5"/><circle cx="230" cy="195" r="5"/>
          <circle cx="210" cy="200" r="5"/><circle cx="245" cy="190" r="5"/>
        </g>
        <text x="220" y="230" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="18">SAMPLE (n)</text>

        <!-- Arrow -->
        <line x1="410" y1="120" x2="530" y2="120" stroke="#f0c040" stroke-width="2" marker-end="url(#arrowGold)"/>
        <defs>
          <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#f0c040"/>
          </marker>
        </defs>

        <!-- Parameters vs Statistics -->
        <rect x="440" y="60" width="240" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
        <text x="560" y="85" text-anchor="middle" fill="#58a6ff" font-family="Permanent Marker" font-size="14">Population (Parameters)</text>
        <text x="560" y="108" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="16">Media: μ (mu)</text>
        <text x="560" y="130" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="16">Desvio-padrao: σ (sigma)</text>
        <text x="560" y="150" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="13">Valores fixos (geralmente desconhecidos)</text>

        <rect x="440" y="180" width="240" height="100" rx="10" fill="#161b22" stroke="#f0c040" stroke-width="1.5"/>
        <text x="560" y="205" text-anchor="middle" fill="#f0c040" font-family="Permanent Marker" font-size="14">Sample (Statistics)</text>
        <text x="560" y="228" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="16">Media: x&#772; (x-barra)</text>
        <text x="560" y="250" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="16">Desvio-padrao: s</text>
        <text x="560" y="270" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="13">Estimativas (variam entre amostras)</text>
      </svg>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'A amostra <strong>estima</strong> a população. O x&#772; da amostra é nossa melhor aposta para adivinhar o μ da população. Entretanto, cada amostra diferente dará um x&#772; ligeiramente diferente &mdash; essa é a <em>variabilidade amostral</em>.')}

    ${dialogue('thor', '⚡ Thorment', 'Então cada vez que eu tirar uma amostra, a média muda? Isso é uma bagunça!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Não é bagunça &mdash; é estatística. E essa variação tem nome: <strong>erro amostral</strong>. A boa notícia? Métodos adequados <em>controlam</em> essa variação. Vamos conhecê-los.')}
  `;
}

// ============================================================
// STEP 2 — SAMPLEGEM ALEATÓRIA SIMPLES
// ============================================================
function step2() {
  return `
    <div class="step-title">Sampling Simple Random</div>
    <div class="step-subtitle">The Helmet Draw</div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Sampling Aleatória Simples (AAS)</strong>: cada elemento da população tem <em>igual probabilidade</em> de ser selecionado. É o método de referência &mdash; a "régua de ouro" da amostragem.')}

    <p>Odinfather escreve o nome de cada um dos 1.000 clãs em runas, coloca todos dentro de um grande <span class="hl-gold">elmo cerimonial</span> e draws, sem olhar, os clãs que serão visitados.</p>

    <div class="visual-container">
      <svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Helmet -->
        <ellipse cx="350" cy="200" rx="120" ry="40" fill="#1c2333" stroke="#f0c040" stroke-width="2"/>
        <path d="M230,200 Q230,80 350,60 Q470,80 470,200" fill="#1c2333" stroke="#f0c040" stroke-width="2"/>
        <text x="350" y="170" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="18">1.000 RUNAS</text>

        <!-- Flying runes (selected) -->
        <g>
          <rect x="520" y="50" width="50" height="35" rx="5" fill="rgba(240,192,64,0.2)" stroke="#f0c040" stroke-width="1.5" transform="rotate(-10, 545, 67)"/>
          <text x="545" y="73" text-anchor="middle" fill="#f0c040" font-family="Patrick Hand" font-size="12" transform="rotate(-10, 545, 67)">Clã 47</text>
        </g>
        <g>
          <rect x="540" y="110" width="50" height="35" rx="5" fill="rgba(240,192,64,0.2)" stroke="#f0c040" stroke-width="1.5" transform="rotate(5, 565, 127)"/>
          <text x="565" y="133" text-anchor="middle" fill="#f0c040" font-family="Patrick Hand" font-size="12" transform="rotate(5, 565, 127)">Clã 382</text>
        </g>
        <g>
          <rect x="510" y="170" width="50" height="35" rx="5" fill="rgba(240,192,64,0.2)" stroke="#f0c040" stroke-width="1.5" transform="rotate(-3, 535, 187)"/>
          <text x="535" y="193" text-anchor="middle" fill="#f0c040" font-family="Patrick Hand" font-size="12" transform="rotate(-3, 535, 187)">Clã 691</text>
        </g>

        <!-- Arrow from helmet to runes -->
        <path d="M470,160 Q500,100 515,70" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="5,3"/>
        <path d="M470,180 Q510,150 530,130" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="5,3"/>
        <path d="M470,195 Q500,195 505,190" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="5,3"/>

        <!-- Label -->
        <text x="100" y="50" fill="#58a6ff" font-family="Permanent Marker" font-size="15">Cada runa tem a</text>

        <g>

            const x = 25 + i * 22;
            const selected = (i + 1) % 5 === 3; // every 5th, starting at 3
            return `<rect x="${x}" y="40" width="18" height="40" rx="4"
              fill="${selected ? 'rgba(240,192,64,0.4)' : 'rgba(139,148,158,0.15)'}"

                font-family="Patrick Hand" font-size="${selected ? 11 : 9}">${i+1}</text>`;
          }).join('')}
        </g>

        <!-- Arrows pointing to selected -->
        ${[3,8,13,18,23,28].map(i => {
          const x = 25 + (i-1) * 22 + 9;
          return `<line x1="${x}" y1="85" x2="${x}" y2="100" stroke="#f0c040" stroke-width="1.5" marker-end="url(#arrDown)"/>`;
        }).join('')}

        <defs>
          <marker id="arrDown" markerWidth="6" markerHeight="5" refX="3" refY="5" orient="auto">
            <polygon points="0 0, 6 0, 3 5" fill="#f0c040"/>

        <text x="350" y="125" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="15">k = 5 &rarr; draws o 3&deg;, depois cada 5&deg;: 3, 8, 13, 18, 23, 28...</text>

        <text x="350" y="155" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="13">Apenas o primeiro é aleatório. Os demais são determinísticos.</text>

function step8() {
  return `
    <div class="step-title">Sample Size</div>
    <div class="step-subtitle">How Many Clans to Visit?</div>

    ${dialogue('thor', '⚡ Thorment', 'Quanto mais, melhor! Bora entrevistar 999 dos 1.000 clãs!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Maior nem sempre é melhor, Thorment. Existe um ponto onde o ganho de precisão não justifica o custo adicional. A fórmula nos diz <em>exatamente</em> quantos precisamos.')}

    <div class="formula">
      <div class="formula-label">Sample Size Formula (proporcoes)</div>
      n = (Z&sup2; &middot; p &middot; q) / E&sup2;
    </div>

    <div class="info-box">
      <h4>Where:</h4>
      <ul style="margin-left: 20px; margin-top: 8px;">
        <li><span class="hl-gold">n</span> = tamanho da amostra necessário</li>
        <li><span class="hl-gold">Z</span> = valor crítico da distribuição normal (1,96 para 95% de confiança)</li>
        <li><span class="hl-gold">p</span> = proporção esperada (se desconhecida, usar 0,50 &mdash; cenário mais conservador)</li>
        <li><span class="hl-gold">q</span> = 1 &minus; p</li>
        <li><span class="hl-gold">E</span> = margem de erro desejada (ex.: 0,05 = &plusmn; 5%)</li>
      </ul>
    </div>

    <div class="concept-card">

      <div class="formula" style="margin-top: 12px; text-align: left; font-size: 1rem;">
        <div class="formula-label">Step-by-step calculation</div>
        n = (1,96&sup2; &times; 0,50 &times; 0,50) / 0,05&sup2;<br>
        n = (3,8416 &times; 0,25) / 0,0025<br>

        <circle cx="200" cy="100" r="5" fill="#58a6ff"/><text x="200" y="93" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="11">9,8%</text>

const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10];

  'Population vs. Sample',

// ===== NAVIGATION =====
function renderStep() {
  const content = document.getElementById('stepContent');
  content.innerHTML = stepFunctions[currentStep]();
  content.style.animation = 'none';
  content.offsetHeight; // trigger reflow
  content.style.animation = 'fadeIn 0.4s ease';

  document.getElementById('progressLabel').textContent = `Step ${currentStep} of ${totalSteps - 1} — ${stepNames[currentStep]}`;
  document.getElementById('progressFill').style.width = `${(currentStep / (totalSteps - 1)) * 100}%`;

  document.getElementById('btnBack').disabled = currentStep === 0;
  document.getElementById('btnNext').textContent = currentStep === totalSteps - 1 ? 'Start Over ↻' : 'Next ▶';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep >= totalSteps - 1) {
    currentStep = 0;
  } else {
    currentStep++;
  }
  renderStep();
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

// Initialize
renderStep();
</script>
