<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampling — Step by Step | Odinfather</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* PROGRESS BAR */
.progress-bar-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-dark);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* STEP CONTENT */
.step-content {
  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.step-subtitle {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.3rem;
  color: var(--odin-blue);
  margin-bottom: 15px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
  position: relative;
}

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}
.dialogue-box.huginn {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 6px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }
.char-name.huginn { color: var(--corvo-purple); }

.dialogue-text {
  font-size: 1.05rem;
  line-height: 1.5;
}

/* DATA TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.data-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

.data-table td {
  background: var(--bg-card);
  transition: background 0.2s;
}

.data-table tr:hover td {
  background: rgba(88,166,255,0.1);
}

/* FORMULA */
.formula {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.15rem;
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  color: var(--gold);
}

.formula-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 6px;
}

/* SVG VISUALS */
.visual-container {
  margin: 20px 0;
  text-align: center;
}

.visual-container svg {
  max-width: 100%;
  height: auto;
}

/* CONCEPT CARD */
.concept-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 22px;
  margin: 14px 0;
}

.concept-card h3 {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  color: var(--odin-blue);
  margin-bottom: 8px;
}

/* COMPARISON GRID */
.comparison-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 20px 0;
}

.comparison-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.comparison-card.pro {
  border-color: var(--success);
}

.comparison-card.con {
  border-color: var(--thor-red);
}

.comparison-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  margin-bottom: 8px;
}

/* METHOD CARD */
.method-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin: 14px 0;
  transition: border-color 0.3s;
}

.method-card:hover {
  border-color: var(--odin-blue);
}

.method-card h3 {
  font-family: 'Bangers', cursive;
  font-size: 1.3rem;
  margin-bottom: 8px;
}

.method-card .tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-family: 'Permanent Marker', cursive;
  margin-right: 6px;
}

.tag.prob { background: rgba(88,166,255,0.2); color: var(--odin-blue); }
.tag.nprob { background: rgba(248,81,73,0.2); color: var(--thor-red); }

/* BIAS CARD */
.bias-card {
  background: rgba(248,81,73,0.05);
  border: 1px solid var(--thor-red);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 14px 0;
}

.bias-card h4 {
  font-family: 'Permanent Marker', cursive;
  color: var(--thor-red);
  margin-bottom: 6px;
}

/* NAVIGATION */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 40px;
  gap: 12px;
}

.nav-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  padding: 12px 28px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover {
  border-color: var(--odin-blue);
  background: rgba(88,166,255,0.1);
}

.nav-btn.primary {
  background: var(--odin-blue);
  color: var(--bg-dark);
  border-color: var(--odin-blue);
}

.nav-btn.primary:hover {
  background: #79bbff;
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* SIGNATURE */
.signature {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* HIGHLIGHT */
.hl-gold { color: var(--gold); font-weight: bold; }
.hl-blue { color: var(--odin-blue); }
.hl-red { color: var(--thor-red); }
.hl-green { color: var(--success); }
.hl-purple { color: var(--corvo-purple); }

/* LICAO DOS CORVOS */
.licao-box {
  background: rgba(188,140,255,0.06);
  border: 2px solid var(--corvo-purple);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.licao-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--corvo-purple);
  margin-bottom: 12px;
}

/* TCL ANIMATION */
.tcl-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0;
}

.tcl-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
  flex: 1;
  min-width: 200px;
  max-width: 280px;
}

.tcl-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  margin-bottom: 8px;
  color: var(--odin-blue);
}

/* SUMMARY TABLE */
.summary-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 0.95rem;
}

.summary-table th, .summary-table td {
  padding: 10px 12px;
  border: 1px solid var(--border);
  text-align: left;
}

.summary-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.9rem;
  color: var(--gold);
}

.summary-table td {
  background: var(--bg-card);
}

.summary-table tr:hover td {
  background: rgba(88,166,255,0.08);
}

/* INFO BOX */
.info-box {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
}

.info-box h4 {
  font-family: 'Permanent Marker', cursive;
  color: var(--gold);
  margin-bottom: 8px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .step-title { font-size: 1.6rem; }
  .comparison-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 10px 18px; font-size: 0.95rem; }
  body { font-size: 16px; }
  .tcl-row { flex-direction: column; align-items: center; }
  .tcl-card { max-width: 100%; }
}

.fade-in {
  animation: fadeIn 0.6s ease both;
}

.fade-in-delay {
  animation: fadeIn 0.6s ease 0.3s both;
}
</style>
</head>
<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 10</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DIALOGUE HELPER =====
function dialogue(character, name, text) {
  return `<div class="dialogue-box ${character}">
    <div class="char-name ${character}">${name}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}

// ===== STEP FUNCTIONS =====
const totalSteps = 11; // 0..10
let currentStep = 0;

// ============================================================
// STEP 0 — INTRO: O DESAFIO DA SAMPLEGEM
// ============================================================
function step0() {
  return `
    <div class="step-title">Sampling: The Impossible Census of the Nine Realms</div>

    <p>The Great Council of Asgard needs to know the satisfaction level of Viking warriors with the distribution of spoils after battles. The problem? There are <span class="hl-gold">1,000 clans</span> scattered across the Nine Realms &mdash; from Midgard to Niflheim.</p>

    <p>Visit them all? Months of sailing, hundreds of longships, endless provisions. A complete census is a luxury not even Odin can afford.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'We don\x27t need to hear from <em>all</em> 1,000 clans. We need a <strong>sample</strong> &mdash; a subset that represents the entire population well. The question is: <em>how to choose</em>?')}

    ${dialogue('thor', '⚡ Thorment', 'Easy! Just ask the clans that live near Asgard. They\x27re the most accessible, and done &mdash; we save time and mead!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'And that is exactly how <strong>sampling bias</strong> is born, Thorment. The clans near Asgard are richer, more favored. Their opinion does not represent Niflheim or J\xf6tunheim.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Sampling</strong> is the process of selecting a subset (sample) from a population to estimate characteristics of the whole. The quality of the sample determines the quality of the inference.')}

    <div class="info-box">
      <h4>Why sample?</h4>
      <ul style="margin-left: 20px; margin-top: 8px;">
        <li><span class="hl-blue">Cost</span> &mdash; censuses are extremely expensive (longships aren\x27t cheap)</li>
        <li><span class="hl-blue">Time</span> &mdash; by the time the census ends, the war has already changed</li>
        <li><span class="hl-blue">Practicality</span> &mdash; it is not always possible to access all elements</li>
        <li><span class="hl-blue">Destructiveness</span> &mdash; testing the quality of <em>all</em> swords would mean breaking them</li>
      </ul>
    </div>

    <p>In the next steps, Odinfather will guide you through sampling methods &mdash; from the most rigorous to the most dangerous. Thorment will try shortcuts. The ravens will remember the definitions.</p>
  `;
}

// ============================================================
// STEP 1 — POPULAÇÃO vs SAMPLE
// ============================================================
function step1() {
  return `
    <div class="step-title">Population vs. Sample</div>

    <p>Before any method, we need to separate two fundamental concepts that confuse even experienced warriors.</p>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Population (N)</strong>: the complete set of all elements of interest. In our case, all 1,000 Viking clans. <br><strong>Sample (n)</strong>: a subset selected from the population for study.')}

    <div class="visual-container">
      <svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
        <!-- Population circle -->
        <ellipse cx="220" cy="160" rx="180" ry="140" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>
        <text x="220" y="40" text-anchor="middle" fill="#58a6ff" font-family="Bangers" font-size="22">POPULATION (N = 1.000)</text>

        <!-- Dots representing population -->
        <g fill="#8b949e" opacity="0.4">
          <circle cx="140" cy="100" r="3"/><circle cx="180" cy="85" r="3"/><circle cx="220" cy="95" r="3"/>
          <circle cx="260" cy="80" r="3"/><circle cx="300" cy="100" r="3"/><circle cx="120" cy="130" r="3"/>
          <circle cx="160" cy="120" r="3"/><circle cx="200" cy="115" r="3"/><circle cx="240" cy="125" r="3"/>
          <circle cx="280" cy="110" r="3"/><circle cx="320" cy="130" r="3"/><circle cx="100" cy="160" r="3"/>
          <circle cx="340" cy="160" r="3"/><circle cx="130" cy="190" r="3"/><circle cx="310" cy="190" r="3"/>
          <circle cx="150" cy="220" r="3"/><circle cx="290" cy="220" r="3"/><circle cx="180" cy="240" r="3"/>
          <circle cx="260" cy="240" r="3"/><circle cx="220" cy="250" r="3"/>
          <circle cx="170" cy="170" r="3"/><circle cx="270" cy="170" r="3"/><circle cx="200" cy="200" r="3"/>
          <circle cx="240" cy="200" r="3"/><circle cx="210" cy="180" r="3"/>
        </g>

        <!-- Sample circle inside -->
        <ellipse cx="220" cy="170" rx="70" ry="55" fill="rgba(240,192,64,0.15)" stroke="#f0c040" stroke-width="2.5"/>

        <!-- Sample dots (highlighted) -->
        <g fill="#f0c040">
          <circle cx="200" cy="155" r="5"/><circle cx="235" cy="150" r="5"/><circle cx="215" cy="175" r="5"/>
          <circle cx="250" cy="170" r="5"/><circle cx="190" cy="180" r="5"/><circle cx="230" cy="195" r="5"/>
          <circle cx="210" cy="200" r="5"/><circle cx="245" cy="190" r="5"/>
        </g>
        <text x="220" y="230" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="18">SAMPLE (n)</text>

        <!-- Arrow -->
        <line x1="410" y1="120" x2="530" y2="120" stroke="#f0c040" stroke-width="2" marker-end="url(#arrowGold)"/>
        <defs>
          <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#f0c040"/>
          </marker>
        </defs>

        <!-- Parameters vs Statistics -->
        <rect x="440" y="60" width="240" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
        <text x="560" y="85" text-anchor="middle" fill="#58a6ff" font-family="Permanent Marker" font-size="14">Population (Parameters)</text>
        <text x="560" y="108" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="16">Mean: \u03bc (mu)</text>
        <text x="560" y="130" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="16">Std. Dev.: \u03c3 (sigma)</text>
        <text x="560" y="150" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="13">Fixed values (usually unknown)</text>

        <rect x="440" y="180" width="240" height="100" rx="10" fill="#161b22" stroke="#f0c040" stroke-width="1.5"/>
        <text x="560" y="205" text-anchor="middle" fill="#f0c040" font-family="Permanent Marker" font-size="14">Sample (Statistics)</text>
        <text x="560" y="228" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="16">Mean: x\u0304 (x-bar)</text>
        <text x="560" y="250" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="16">Std. Dev.: s</text>
        <text x="560" y="270" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="13">Estimates (vary between samples)</text>
      </svg>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The sample <strong>estimates</strong> the population. The sample x\u0304 is our best bet for guessing the population \u03bc. However, each different sample will give a slightly different x\u0304 &mdash; that is <em>sampling variability</em>.')}

    ${dialogue('thor', '⚡ Thorment', 'So every time I draw a sample, the mean changes? That\x27s a mess!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'It\x27s not a mess &mdash; it\x27s statistics. And this variation has a name: <strong>sampling error</strong>. The good news? Proper methods <em>control</em> this variation. Let\x27s learn about them.')}
  `;
}

// ============================================================
// STEP 2 — SAMPLEGEM ALEATÓRIA SIMPLES
// ============================================================
function step2() {
  return `
    <div class="step-title">Sampling Simple Random</div>
    <div class="step-subtitle">The Helmet Draw</div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Simple Random Sampling (SRS)</strong>: each element of the population has an <em>equal probability</em> of being selected. It is the reference method &mdash; the "gold standard" of sampling.')}

    <p>Odinfather writes the name of each of the 1,000 clans on runes, places them all inside a large <span class="hl-gold">ceremonial helmet</span>, and draws, without looking, the clans that will be visited.</p>

    <div class="visual-container">
      <svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Helmet -->
        <ellipse cx="350" cy="200" rx="120" ry="40" fill="#1c2333" stroke="#f0c040" stroke-width="2"/>
        <path d="M230,200 Q230,80 350,60 Q470,80 470,200" fill="#1c2333" stroke="#f0c040" stroke-width="2"/>
        <text x="350" y="170" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="18">1.000 RUNAS</text>

        <!-- Flying runes (selected) -->
        <g>
          <rect x="520" y="50" width="50" height="35" rx="5" fill="rgba(240,192,64,0.2)" stroke="#f0c040" stroke-width="1.5" transform="rotate(-10, 545, 67)"/>
          <text x="545" y="73" text-anchor="middle" fill="#f0c040" font-family="Patrick Hand" font-size="12" transform="rotate(-10, 545, 67)">Clan 47</text>
        </g>
        <g>
          <rect x="540" y="110" width="50" height="35" rx="5" fill="rgba(240,192,64,0.2)" stroke="#f0c040" stroke-width="1.5" transform="rotate(5, 565, 127)"/>
          <text x="565" y="133" text-anchor="middle" fill="#f0c040" font-family="Patrick Hand" font-size="12" transform="rotate(5, 565, 127)">Clan 382</text>
        </g>
        <g>
          <rect x="510" y="170" width="50" height="35" rx="5" fill="rgba(240,192,64,0.2)" stroke="#f0c040" stroke-width="1.5" transform="rotate(-3, 535, 187)"/>
          <text x="535" y="193" text-anchor="middle" fill="#f0c040" font-family="Patrick Hand" font-size="12" transform="rotate(-3, 535, 187)">Clan 691</text>
        </g>

        <!-- Arrow from helmet to runes -->
        <path d="M470,160 Q500,100 515,70" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="5,3"/>
        <path d="M470,180 Q510,150 530,130" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="5,3"/>
        <path d="M470,195 Q500,195 505,190" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="5,3"/>

        <!-- Label -->
        <text x="100" y="50" fill="#58a6ff" font-family="Permanent Marker" font-size="15">Each rune has the</text>
        <text x="100" y="72" fill="#58a6ff" font-family="Permanent Marker" font-size="15">same chance: 1/N</text>

        <text x="570" y="240" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="14">Drawn sample</text>
      </svg>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'In practice, we use <strong>random number generators</strong> or random number tables, not helmets. The principle is the same: each clan has a 1/N probability of being chosen. No favoritism, no bias.')}

    <div class="comparison-grid">
      <div class="comparison-card pro">
        <div class="comparison-title" style="color:var(--success)">✅ Advantages</div>
        <ul style="margin-left: 16px; font-size: 0.95rem;">

// ============================================================
// STEP 5 — SAMPLEGEM SISTEMÁTICA
// ============================================================
function step5() {
  return `
    <div class="step-title">Sampling Systematic</div>
    <div class="step-subtitle">Every K-th Warrior</div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Systematic Sampling</strong>: a random starting point is selected, and from it, every <em>k</em>-th element is selected. The interval k = N/n.')}

    <p>The warriors enter the great hall of Valhalla in a line. Odinfather needs a sample of 100 from 1,000. The interval will be <span class="hl-gold">k = 1,000/100 = 10</span>. He draws the first between 1 and 10 (say, 3). Then takes the 3rd, 13th, 23rd, 33rd...</p>

    <div class="visual-container">
      <svg viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg">
        <text x="350" y="20" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="18">LINE OF WARRIORS AT THE GATE OF VALHALLA</text>

        <!-- Warriors in line -->
        <g>
          ${Array.from({length: 30}, (_, i) => {
            const x = 25 + i * 22;
            const selected = (i + 1) % 5 === 3; // every 5th, starting at 3
            return `<rect x="${x}" y="40" width="18" height="40" rx="4"
              fill="${selected ? 'rgba(240,192,64,0.4)' : 'rgba(139,148,158,0.15)'}"
              stroke="${selected ? '#f0c040' : '#30363d'}"
              stroke-width="${selected ? 2 : 0.5}"/>
              <text x="${x+9}" y="65" text-anchor="middle"
                fill="${selected ? '#f0c040' : '#8b949e'}"
                font-family="Patrick Hand" font-size="${selected ? 11 : 9}">${i+1}</text>`;
          }).join('')}
        </g>

        <!-- Arrows pointing to selected -->
        ${[3,8,13,18,23,28].map(i => {
          const x = 25 + (i-1) * 22 + 9;
          return `<line x1="${x}" y1="85" x2="${x}" y2="100" stroke="#f0c040" stroke-width="1.5" marker-end="url(#arrDown)"/>`;
        }).join('')}

        <defs>
          <marker id="arrDown" markerWidth="6" markerHeight="5" refX="3" refY="5" orient="auto">
            <polygon points="0 0, 6 0, 3 5" fill="#f0c040"/>
          </marker>
        </defs>

        <text x="350" y="125" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="15">k = 5 &rarr; draws the 3rd, then every 5th: 3, 8, 13, 18, 23, 28...</text>

        <text x="350" y="155" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="13">Only the first is random. The rest are deterministic.</text>
      </svg>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'It\x27s fast and practical. However, there is a subtle risk: if the population has a <strong>cyclical pattern</strong> with period equal to k, the sample always captures the same "piece" of the cycle.')}

    <div class="concept-card">
      <h3>Cycle Trap</h3>
      <p>If warriors enter the gate alternating between <em>archers</em> and <em>swordsmen</em> (period-2 pattern), and k = 2, your sample will have <strong>only archers</strong> or <strong>only swordsmen</strong>.</p>
      <p style="margin-top: 8px; color: var(--text-dim);">In practice: work shifts, seasonality, alphabetical order &mdash; any periodic pattern can distort the systematic sample.</p>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'So it\x27s like counting every 10th! Easy! And you don\x27t even need a complete list, just stand at the gate and count.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Almost right, Thorment. Systematic sampling <em>seems</em> simple, but it\x27s not truly "random" &mdash; once the starting point is set, all the rest are determined. That\x27s why it works <em>almost</em> like SRS, but it\x27s not identical.')}
  `;
}

// ============================================================
// STEP 8 — TAMANHO DA SAMPLE
// ============================================================
function step8() {
  return `
    <div class="step-title">Sample Size</div>
    <div class="step-subtitle">How Many Clans to Visit?</div>

    ${dialogue('thor', '⚡ Thorment', 'The more the better! Let\x27s interview 999 of the 1,000 clans!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Bigger is not always better, Thorment. There is a point where the precision gain doesn\x27t justify the additional cost. The formula tells us <em>exactly</em> how many we need.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The classic formula for estimating proportions with simple random sampling:')}

    <div class="formula">
      <div class="formula-label">Sample Size Formula (proportions)</div>
      n = (Z&sup2; &middot; p &middot; q) / E&sup2;
    </div>

    <div class="info-box">
      <h4>Where:</h4>
      <ul style="margin-left: 20px; margin-top: 8px;">
        <li><span class="hl-gold">n</span> = required sample size</li>
        <li><span class="hl-gold">Z</span> = critical value of the normal distribution (1.96 for 95% confidence)</li>
        <li><span class="hl-gold">p</span> = expected proportion (if unknown, use 0.50 &mdash; most conservative scenario)</li>
        <li><span class="hl-gold">q</span> = 1 &minus; p</li>
        <li><span class="hl-gold">E</span> = margem de erro desejada (ex.: 0,05 = &plusmn; 5%)</li>
      </ul>
    </div>

    <div class="concept-card">
      <h3>Odinfather Calculates: How Many Clans?</h3>
      <p>Odinfather wants to estimate the proportion of clans satisfied with the spoils distribution, with 95% confidence and a &plusmn;5% margin of error. He has no idea of the true proportion, so he uses p = 0.50.</p>

      <div class="formula" style="margin-top: 12px; text-align: left; font-size: 1rem;">
        <div class="formula-label">Step-by-step calculation</div>
        n = (1,96&sup2; &times; 0,50 &times; 0,50) / 0,05&sup2;<br>
        n = (3,8416 &times; 0,25) / 0,0025<br>
        n = 0,9604 / 0,0025<br>
        <span class="hl-gold" style="font-size: 1.2rem;">n = 384,16 &rarr; 385 clans</span>
      </div>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'With 385 clans, we have 95% confidence that our estimate is at most 5 percentage points from the true value. Not bad for a population of 1,000!')}

    <div class="concept-card">
      <h3>The Square Root and the Law of Diminishing Returns</h3>
      <p>The margin of error drops with <span class="hl-gold">1/&radic;n</span>. To <strong>cut the margin of error in half</strong>, you need to <strong>quadruple</strong> the sample. This explains why election polls with n=2,000 already achieve margins of &plusmn;2% &mdash; going to n=8,000 would only bring it down to &plusmn;1%.</p>
    </div>

    <div class="visual-container">
      <svg viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg">
        <text x="350" y="20" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="18">MARGIN OF ERROR vs. SAMPLE SIZE</text>

        <text x="30" y="125" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="13" transform="rotate(-90, 30, 125)">Margin of Error</text>

        <!-- Curve: E = 1.96 * sqrt(0.25/n), scaled -->
        <!-- n points: 30, 50, 100, 200, 400, 800, 1500 -->
        <!-- E values: 17.9%, 13.9%, 9.8%, 6.9%, 4.9%, 3.5%, 2.5% -->
        <polyline points="100,52 140,72 200,100 300,135 430,165 540,185 630,196"
          fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Data points -->
        <circle cx="100" cy="52" r="5" fill="#58a6ff"/><text x="100" y="45" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="11">17,9%</text>
        <circle cx="200" cy="100" r="5" fill="#58a6ff"/><text x="200" y="93" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="11">9,8%</text>
        <circle cx="430" cy="165" r="5" fill="#f0c040"/><text x="430" y="155" text-anchor="middle" fill="#f0c040" font-family="Permanent Marker" font-size="12">4,9%</text>
        <circle cx="630" cy="196" r="5" fill="#58a6ff"/><text x="630" y="189" text-anchor="middle" fill="#e6edf3" font-family="Patrick Hand" font-size="11">2,5%</text>

        <!-- Annotation for n=400 -->
        <line x1="430" y1="165" x2="430" y2="210" stroke="#f0c040" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="430" y="225" text-anchor="middle" fill="#f0c040" font-family="Patrick Hand" font-size="11">n = 400</text>

        <!-- x-axis labels -->
        <text x="100" y="225" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="10">30</text>
        <text x="200" y="225" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="10">100</text>
        <text x="540" y="225" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="10">800</text>
        <text x="630" y="225" text-anchor="middle" fill="#8b949e" font-family="Patrick Hand" font-size="10">1500</text>
      </svg>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'So 385 out of 1,000 is almost 40%! Wouldn\x27t it be easier to do a census?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'For small populations, yes &mdash; the sample becomes a large fraction of the whole. There is even a <strong>finite population correction</strong>: n<sub>adjusted</sub> = n / (1 + n/N). With N=1,000 and n=385, this gives ~278. When N is large (100,000+), the correction is negligible.')}
  `;
}

    <p>Imagine the wealth distribution of the 1,000 Viking clans is <span class="hl-red">completely asymmetric</span> &mdash; few very rich clans, many poor clans. Seems impossible to use the normal curve? The CLT says: <em>it doesn\x27t matter</em>.</p>

        </tr>
        <tr>
          <td style="font-family:'Permanent Marker'; color:var(--odin-blue)">Systematic</td>
          <td><span class="tag prob">Probabilistic*</span></td>
          <td>Every k-th element</td>
          <td>Simple and fast</td>
          <td>Risk with cyclical patterns</td>
          <td>Ordered list without patterns</td>
        </tr>
        <tr>
          <td style="font-family:'Permanent Marker'; color:var(--thor-red)">Convenience</td>
          <td><span class="tag nprob">Non-Probabilistic</span></td>
          <td>Selects the most accessible</td>
          <td>Cheap and fast</td>
          <td>Does not generalize! High bias</td>
          <td>Exploratory / pilot studies</td>
        </tr>
      </table>

      <p style="margin-top: 10px; color: var(--text-dim); font-size: 0.9rem;">* A sistematica so e <em>estritamente</em> probabilistica se o ponto de partida e aleatorio. Alguns autores a clanssificam como quase-probabilistica.</p>
    </div>

    <div class="licao-box" style="border-color: var(--gold); margin-top: 20px;">
      <div class="licao-title" style="color: var(--gold);">Key Formulas</div>

      <div class="formula" style="text-align: left;">
        <div class="formula-label">Sample Size (proportions)</div>
        n = (Z&sup2; &middot; p &middot; q) / E&sup2;
      </div>

      <div class="formula" style="text-align: left;">
        <div class="formula-label">Finite Population Correction</div>
        n<sub>ajust</sub> = n / (1 + n/N)
      </div>

      <div class="formula" style="text-align: left;">
        <div class="formula-label">Standard Error of the Mean (TCL)</div>
        SE = &sigma; / &radic;n
      </div>

      <div class="formula" style="text-align: left;">
        <div class="formula-label">Systematic Interval</div>
        k = N / n
      </div>
    </div>

    ${dialogue('huginn', '🐦‍⬛ Huginn challenges:', '<strong>Challenge for the reader:</strong> Under what circumstances is convenience sampling <em>acceptable</em> in academic research? Think of three concrete situations before moving on. Furthermore: if 95% of studies in business research use convenience sampling, what does that say about the generalizability of our findings?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Sampling is the <strong>first decision</strong> of any quantitative research &mdash; and one of the most consequential. A sophisticated statistical method applied to a biased sample is like a sharp runic sword cutting the wind: perfect technique, wrong target.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Remember: bias does not decrease with larger n. The only cure for bias is <strong>sampling design</strong>. The Central Limit Theorem guarantees normality of means with sufficient n &mdash; but does not guarantee <em>representativeness</em>. These are distinct things.')}

    <div class="info-box" style="border-color: var(--success);">
      <h4 style="color: var(--success);">Checklist for Sampling</h4>
      <ul style="margin-left: 20px; margin-top: 8px;">
        <li>&#9745; Clearly defined the <strong>target population</strong>?</li>
        <li>&#9745; Do I have an adequate <strong>sampling frame</strong>?</li>
        <li>&#9745; Is the selection method <strong>probabilistic</strong>? If not, did I justify it?</li>
        <li>&#9745; Did I calculate the <strong>required n</strong> before collecting?</li>
        <li>&#9745; Considerei possiveis <strong>biases</strong> e como mitiga-los?</li>
        <li>&#9745; Did I report the method with <strong>transparency</strong> in the paper?</li>
      </ul>
    </div>

    <p style="text-align: center; margin-top: 30px; font-family: 'Permanent Marker'; color: var(--gold); font-size: 1.2rem;">
      End of the Sampling guide. May Odinfather guide your samples!
    </p>
  `;
}

// ===== STEP REGISTRY =====
const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10];

const stepNames = [
  'Introduction',
  'Population vs. Sample',
  'Simple Random',
  'Stratified',
  'Cluster',
  'Systematic',
  'Convenience',
  'Sampling Bias',
  'Sample Size',
  'Central Limit Theorem',
  'Lesson of the Ravens'
];

// ===== NAVIGATION =====
function renderStep() {
  const content = document.getElementById('stepContent');
  content.innerHTML = stepFunctions[currentStep]();
  content.style.animation = 'none';
  content.offsetHeight; // trigger reflow
  content.style.animation = 'fadeIn 0.4s ease';

  document.getElementById('progressLabel').textContent = `Step ${currentStep} of ${totalSteps - 1} — ${stepNames[currentStep]}`;
  document.getElementById('progressFill').style.width = `${(currentStep / (totalSteps - 1)) * 100}%`;

  document.getElementById('btnBack').disabled = currentStep === 0;
  document.getElementById('btnNext').textContent = currentStep === totalSteps - 1 ? 'Start Over ↻' : 'Next ▶';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep >= totalSteps - 1) {
    currentStep = 0;
  } else {
    currentStep++;
  }
  renderStep();
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

// Initialize
renderStep();
</script>

</html>
