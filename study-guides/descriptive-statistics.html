<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descriptive Statistics — Step by Step | Odinfather</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* PROGRESS BAR */
.progress-bar-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-dark);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* STEP CONTENT */
.step-content {
  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.step-subtitle {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.3rem;
  color: var(--odin-blue);
  margin-bottom: 15px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
  position: relative;
}

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 6px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }

.dialogue-text {
  font-size: 1.05rem;
  line-height: 1.5;
}

/* DATA TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.data-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

.data-table td {
  background: var(--bg-card);
  transition: background 0.2s;
}

.data-table tr:hover td {
  background: rgba(88,166,255,0.1);
}

.mean-row td {
  font-family: 'Permanent Marker', cursive;
  background: var(--bg-panel) !important;
}

/* FORMULA */
.formula {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.15rem;
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  color: var(--gold);
}

.formula-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 6px;
}

/* CALC TABLE */
.calc-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 0.95rem;
}

.calc-table th, .calc-table td {
  padding: 8px 10px;
  text-align: center;
  border: 1px solid var(--border);
}

.calc-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.85rem;
  color: var(--text-dim);
}

.calc-table td {
  background: var(--bg-card);
}

/* ANIMATED BAR */
.bar-container {
  margin: 20px 0;
}

.bar-wrapper {
  display: flex;
  align-items: center;
  margin: 8px 0;
}

.bar-label {
  width: 100px;
  font-family: 'Permanent Marker', cursive;
  font-size: 0.9rem;
  text-align: right;
  padding-right: 10px;
}

.bar-track {
  flex: 1;
  height: 30px;
  background: var(--bg-panel);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1.5s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  font-family: 'Permanent Marker', cursive;
  font-size: 0.85rem;
  color: #fff;
}

.bar-fill.raid { background: var(--odin-blue); }
.bar-fill.mean-bar { background: var(--gold); color: var(--bg-dark); }
.bar-fill.dev-pos { background: var(--success); }
.bar-fill.dev-neg { background: var(--thor-red); }

/* SVG VISUALS */
.visual-container {
  margin: 20px 0;
  text-align: center;
}

.visual-container svg {
  max-width: 100%;
  height: auto;
}

/* APA BOX */
.apa-box {
  background: var(--bg-panel);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 20px 0;
  font-style: italic;
  line-height: 1.7;
}

.apa-label {
  font-family: 'Bangers', cursive;
  color: var(--gold);
  font-style: normal;
  font-size: 1.1rem;
  margin-bottom: 8px;
}

/* NAVIGATION */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 40px;
  gap: 12px;
}

.nav-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  padding: 12px 28px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover {
  border-color: var(--odin-blue);
  background: rgba(88,166,255,0.1);
}

.nav-btn.primary {
  background: var(--odin-blue);
  color: var(--bg-dark);
  border-color: var(--odin-blue);
}

.nav-btn.primary:hover {
  background: #79bbff;
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* SIGNATURE */
.signature {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* HIGHLIGHTS */
.hl-gold { color: var(--gold); font-weight: bold; }
.hl-blue { color: var(--odin-blue); }
.hl-red { color: var(--thor-red); }
.hl-green { color: var(--success); }
.hl-purple { color: var(--corvo-purple); }

/* LICAO DOS CORVOS */
.licao-box {
  background: rgba(188,140,255,0.06);
  border: 2px solid var(--corvo-purple);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.licao-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--corvo-purple);
  margin-bottom: 12px;
}

/* CONCEPT CARDS */
.concept-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin: 20px 0;
}

.concept-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}

.concept-card.active {
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(240,192,64,0.15);
}

.concept-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  margin-bottom: 8px;
  color: var(--odin-blue);
}

.concept-value {
  font-size: 1.6rem;
  font-family: 'Bangers', cursive;
  color: var(--gold);
}

/* INFO PANEL */
.info-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
}

.info-panel-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 8px;
}

/* FREQ TABLE */
.freq-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 0.95rem;
}

.freq-table th, .freq-table td {
  padding: 8px 12px;
  text-align: center;
  border: 1px solid var(--border);
}

.freq-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.85rem;
  color: var(--text-dim);
}

.freq-table td {
  background: var(--bg-card);
}

/* NUMBER LINE */
.number-line-container {
  overflow-x: auto;
  margin: 20px 0;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .step-title { font-size: 1.6rem; }
  .concept-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 10px 18px; font-size: 0.95rem; }
  body { font-size: 16px; }
}

/* ANIMATE ON APPEAR */
.fade-in {
  animation: fadeIn 0.6s ease both;
}
.fade-in-delay {
  animation: fadeIn 0.6s ease 0.3s both;
}
</style>
</head>
<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 13</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DATA =====
const raids = ['Lindisfarne', 'Birka', 'Hedeby', 'Kaupang', 'Jómsborg'];
const data = [12, 15, 18, 22, 33];
const n = data.length;

// Computed stats
const soma = data.reduce((a,b) => a+b, 0); // 100
const media = soma / n; // 20
const sorted = [...data].sort((a,b) => a-b); // [12,15,18,22,33]
const mediana = sorted[Math.floor(n/2)]; // 18

// Deviations
const desvios = data.map(x => x - media); // [-8, -5, -2, 2, 13]
const desviosQuad = desvios.map(d => d * d); // [64, 25, 4, 4, 169]
const somaDesviosQuad = desviosQuad.reduce((a,b) => a+b, 0); // 266

// Variance & SD (sample: n-1)
const variancia = somaDesviosQuad / (n - 1); // 66.5
const desvioPadrao = Math.sqrt(variancia); // ~8.155
const cv = (desvioPadrao / media) * 100; // ~40.77%

// Quartiles for IQR
const Q1 = sorted[1]; // 15
const Q3 = sorted[3]; // 22
const IQR = Q3 - Q1; // 7
const fenceL = Q1 - 1.5 * IQR; // 4.5
const fenceU = Q3 + 1.5 * IQR; // 32.5
const amplitude = sorted[n-1] - sorted[0]; // 21

// Skewness (Fisher)
const skewNum = data.reduce((s, x) => s + Math.pow((x - media) / desvioPadrao, 3), 0);
const skewness = (n / ((n-1)*(n-2))) * skewNum;

// Kurtosis (excess)
const kurtNum = data.reduce((s, x) => s + Math.pow((x - media) / desvioPadrao, 4), 0);
const kurtosis = ((n*(n+1)) / ((n-1)*(n-2)*(n-3))) * kurtNum - (3*(n-1)*(n-1)) / ((n-2)*(n-3));

function fmt(v, d=2) { return Number(v).toFixed(d); }

// ===== DIALOGUE HELPER =====
function dialogue(type, name, text) {
  return `
    <div class="dialogue-box ${type}">
      <div class="char-name ${type}">${name}</div>
      <div class="dialogue-text">${text}</div>
    </div>`;
}

// ===== STEP FUNCTIONS =====

function step0() {
  let barsSVG = '';
  const maxVal = Math.max(...data);
  const barW = 70, gap = 20, padL = 60, padR = 20, padT = 40, padB = 60;
  const svgW = padL + data.length * (barW + gap) + padR;
  const chartH = 200;
  const svgH = padT + chartH + padB;

  data.forEach((v, i) => {
    const bH = (v / maxVal) * chartH;
    const x = padL + i * (barW + gap);
    const y = padT + chartH - bH;
    barsSVG += `<rect x="${x}" y="${svgH}" width="${barW}" height="0" fill="#58a6ff" rx="4" opacity="0.85">
      <animate attributeName="y" from="${padT + chartH}" to="${y}" dur="0.8s" begin="${i*0.15}s" fill="freeze"/>
      <animate attributeName="height" from="0" to="${bH}" dur="0.8s" begin="${i*0.15}s" fill="freeze"/>
    </rect>
    <text x="${x + barW/2}" y="${padT + chartH + 20}" text-anchor="middle" fill="#8b949e" font-family="Permanent Marker" font-size="11">${raids[i]}</text>
    <text x="${x + barW/2}" y="${y - 6}" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="16" opacity="0">
      ${v}
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="${i*0.15 + 0.6}s" fill="freeze"/>
    </text>`;
  });

  // Y axis labels
  let yLabels = '';
  for (let tick = 0; tick <= maxVal; tick += 10) {
    const y = padT + chartH - (tick / maxVal) * chartH;
    yLabels += `<text x="${padL - 8}" y="${y + 4}" text-anchor="end" fill="#8b949e" font-size="12">${tick}</text>`;
    yLabels += `<line x1="${padL}" y1="${y}" x2="${svgW - padR}" y2="${y}" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>`;
  }

  return `
    <h2 class="step-title">The Treasure of Five Viking Raids</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Jovem guerreiro, temos os registros de cinco saques vikings. Cada expedição trouxe uma quantidade diferente de moedas de ouro. Antes de tomar qualquer decisão sobre o butim, precisamos <strong>descrever</strong> esses dados com rigor.')}
    <p style="margin:14px 0;">Os exploradores retornaram com os seguintes tesouros (em moedas de ouro):</p>
    <table class="data-table">
      <tr><th>Expedition</th>${raids.map(r => `<th style="color:var(--odin-blue)">${r}</th>`).join('')}</tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Moedas</td>${data.map(v => `<td class="hl-gold">${v}</td>`).join('')}</tr>
    </table>
    <div class="visual-container">
      <svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
        <line x1="${padL}" y1="${padT + chartH}" x2="${svgW - padR}" y2="${padT + chartH}" stroke="#30363d" stroke-width="1.5"/>
        ${yLabels}
        ${barsSVG}
      </svg>
    </div>
    ${dialogue('thor', '⚡ Thorment', 'Bah, para que tantos cálculos? Olha o gráfico – dá pra ver de relance que Jómsborg foi o melhor saque. Bora dividir logo e ir beber hidromel!')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Olhar de relance é receita para desastre. Estatística descritiva nos dá ferramentas precisas para resumir, comparar e entender distribuições. Vamos passo a passo.')}
  `;
}

function step1() {
  return `
    <h2 class="step-title">Measures of Central Tendency</h2>
    <p class="step-subtitle">Mean, Median, and Mode</p>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'As medidas de tendência central respondem a pergunta: <strong>qual valor representa o "centro" dos dados?</strong> Temos três ferramentas clássicas.')}

    <div class="info-panel" style="margin-top:14px;">
      <div class="info-panel-title">1. Média Aritmética (x̄)</div>
      <div class="formula-label">Formula</div>
      <div class="formula">x̄ = Σxᵢ / n</div>
      <p>Somamos todos os valores e dividimos pelo total de observações.</p>
      <table class="calc-table" style="margin-top:10px;">
        <tr><th>Passo</th><th>Calculation</th></tr>
        <tr><td>Soma (Σxᵢ)</td><td>${data.join(' + ')} = <span class="hl-gold">${soma}</span></td></tr>
        <tr><td>Dividir por n</td><td>${soma} / ${n} = <span class="hl-gold">${fmt(media)}</span></td></tr>
      </table>
    </div>

    <div class="info-panel">
      <div class="info-panel-title">2. Mediana (Md)</div>
      <p>Valor que divide os dados ordenados ao meio. Com n ímpar, é o valor central.</p>
      <table class="calc-table">
        <tr><th>Dados ordenados</th><td>${sorted.join(', ')}</td></tr>
        <tr><th>Posição central</th><td>(${n}+1)/2 = posição ${(n+1)/2} → <span class="hl-gold">${mediana}</span></td></tr>
      </table>
    </div>

    <div class="info-panel">
      <div class="info-panel-title">3. Moda (Mo)</div>
      <p>Valor que aparece com maior frequência. Neste dataset, <strong>nenhum valor se repete</strong> — logo, <span class="hl-red">não há moda</span> (distribuição amodal).</p>
    </div>

    <div class="concept-grid" style="margin-top:20px;">
      <div class="concept-card active">
        <div class="concept-title">Média</div>
        <div class="concept-value">${fmt(media)}</div>
      </div>
      <div class="concept-card active">
        <div class="concept-title">Mediana</div>
        <div class="concept-value">${mediana}</div>
      </div>
      <div class="concept-card">
        <div class="concept-title">Moda</div>
        <div class="concept-value" style="color:var(--thor-red);">—</div>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'A <strong>média</strong> considera todos os valores; a <strong>mediana</strong> resiste a valores extremos; a <strong>moda</strong> identifica o valor mais frequente. Cada uma conta uma história diferente.')}
  `;
}

function step2() {
  const dataOutlier = [12, 15, 18, 22, 100];
  const mediaOutlier = dataOutlier.reduce((a,b)=>a+b,0) / dataOutlier.length;
  const sortedOutlier = [...dataOutlier].sort((a,b)=>a-b);
  const medianaOutlier = sortedOutlier[Math.floor(sortedOutlier.length/2)];

  return `
    <h2 class="step-title">When to Use Each Measure?</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'A média é a mais usada, mas tem um calcanhar de Aquiles: é <strong>sensível a valores extremos</strong>. Imagina que Jómsborg não trouxe 33, mas sim 100 moedas de ouro. Olha o estrago:')}

    <table class="data-table">
      <tr><th></th><th>Original Data</th><th>Data with Outlier</th></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Valores</td>
        <td>${data.join(', ')}</td>
        <td>${dataOutlier.join(', ')}</td></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Média</td>
        <td class="hl-gold">${fmt(media)}</td>
        <td class="hl-red">${fmt(mediaOutlier)}</td></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Mediana</td>
        <td class="hl-gold">${mediana}</td>
        <td class="hl-green">${medianaOutlier}</td></tr>
    </table>

    ${dialogue('thor', '⚡ Thorment', 'Putz! A média pulou de 20 para ${fmt(mediaOutlier)}! O Jarl vai achar que somos ricos!')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Exato. A mediana mal se mexeu – continuou ${medianaOutlier}. Por isso, em dados com distribuição assimétrica ou outliers, a mediana é mais robusta.')}

    <div class="info-panel">
      <div class="info-panel-title">Quick Guide</div>
      <table class="calc-table">
        <tr><th>Measure</th><th>Use quando...</th><th>Evite quando...</th></tr>
        <tr><td class="hl-blue">Média</td><td>Distribuição simétrica, sem outliers</td><td>Dados com valores extremos</td></tr>
        <tr><td class="hl-blue">Mediana</td><td>Dados assimétricos, com outliers</td><td>Precisa de cálculos algébricos posteriores</td></tr>
        <tr><td class="hl-blue">Moda</td><td>Dados categóricos ou multimodais</td><td>Dados contínuos sem repetição</td></tr>
      </table>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Regra dos corvos: se média ≈ mediana, a distribuição é razoavelmente simétrica. Se divergem muito, investigue a assimetria e possíveis outliers.')}
  `;
}

function step3() {
  // SVG number line with outlier detection
  const nlW = 700, nlH = 180;
  const nlPad = 60;
  const minV = 0, maxV = 40;
  const scale = (v) => nlPad + ((v - minV) / (maxV - minV)) * (nlW - 2*nlPad);

  let dots = '';
  data.forEach((v, i) => {
    const cx = scale(v);
    const isOutlier = v > fenceU || v < fenceL;
    const color = isOutlier ? '#f85149' : '#58a6ff';
    dots += `<circle cx="${cx}" cy="55" r="8" fill="${color}" opacity="0">

    </text>`;
  });

  return `
    <h2 class="step-title">Outliers — Suspicious Treasures</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'O valor 33 salta aos olhos. Será um outlier? Vamos usar o <strong>método do IQR</strong> (Intervalo Interquartil) para verificar.')}

    <div class="info-panel">
      <div class="info-panel-title">Step by Step: Método IQR</div>
      <table class="calc-table">

        <tr><td>Q3 (75° percentil)</td><td>4ª posição</td><td class="hl-blue">${Q3}</td></tr>
        <tr><td>IQR = Q3 − Q1</td><td>${Q3} − ${Q1}</td><td class="hl-gold">${IQR}</td></tr>
        <tr><td>Lower Fenceerior</td><td>Q1 − 1.5 × IQR = ${Q1} − ${1.5*IQR}</td><td>${fmt(fenceL)}</td></tr>
        <tr><td>Upper Fenceerior</td><td>Q3 + 1.5 × IQR = ${Q3} + ${1.5*IQR}</td><td class="hl-red">${fmt(fenceU)}</td></tr>
      </table>
    </div>

    <div class="visual-container">
      <svg viewBox="0 0 ${nlW} ${nlH}" xmlns="http://www.w3.org/2000/svg">
        <!-- Number line -->
        <line x1="${nlPad}" y1="55" x2="${nlW-nlPad}" y2="55" stroke="#30363d" stroke-width="2"/>
        <!-- Ticks -->
        ${[0,5,10,15,20,25,30,35,40].map(v => `
          <line x1="${scale(v)}" y1="50" x2="${scale(v)}" y2="60" stroke="#8b949e" stroke-width="1"/>
          <text x="${scale(v)}" y="75" text-anchor="middle" fill="#8b949e" font-size="11">${v}</text>

        <!-- Fences -->
        <line x1="${scale(fenceL)}" y1="30" x2="${scale(fenceL)}" y2="80" stroke="#f85149" stroke-width="2" stroke-dasharray="6,3"/>
        <text x="${scale(fenceL)}" y="95" text-anchor="middle" fill="#f85149" font-size="10" font-family="Permanent Marker">Lower Fence (${fmt(fenceL)})</text>
        <line x1="${scale(fenceU)}" y1="30" x2="${scale(fenceU)}" y2="80" stroke="#f85149" stroke-width="2" stroke-dasharray="6,3"/>
        <text x="${scale(fenceU)}" y="95" text-anchor="middle" fill="#f85149" font-size="10" font-family="Permanent Marker">Upper Fence (${fmt(fenceU)})</text>

        <rect x="${scale(Q1)}" y="45" width="${scale(Q3)-scale(Q1)}" height="20" fill="rgba(88,166,255,0.15)" stroke="#58a6ff" stroke-width="1.5" rx="3"/>
        <text x="${(scale(Q1)+scale(Q3))/2}" y="120" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">IQR = ${IQR}</text>

function step5() {

    <div class="formula-label">Formula do Desvio</div>
    <div class="formula">dᵢ = xᵢ − x̄</div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'A soma dos desvios <strong>sempre</strong> dá zero — é uma propriedade matemática da média. Os positivos cancelam os negativos. Por isso precisamos de um truque: elevar ao quadrado.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Σ(xᵢ − x̄) = 0 <strong>sempre</strong>. É por isso que a variância usa desvios <em>ao quadrado</em> — para eliminar o cancelamento.')}

function step6() {
  let rows = '';
  data.forEach((v, i) => {
    const d = desvios[i];
    const dq = desviosQuad[i];
    rows += `<tr>
      <td>${raids[i]}</td>

  return `

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Elevamos cada desvio ao quadrado, somamos tudo e dividimos. Mas dividimos por <strong>n − 1</strong>, não por n. Isso é crucial.')}

    <div class="formula-label">Formula da Variância Amostral</div>
    <div class="formula">s² = Σ(xᵢ − x̄)² / (n − 1)</div>

    <table class="calc-table">
      <tr><th>Expedition</th><th>xᵢ</th><th>Desvio (dᵢ)</th><th>Desvio²</th></tr>

      <p style="margin-top:10px;">Dividir por n subestima a variância real da população. Dividir por n − 1 corrige esse viés — é a chamada <strong>correção de Bessel</strong>.</p>

}

function step8() {

    <div class="formula-label">Formula</div>
    <div class="formula">CV = (s / x̄) × 100%</div>

    ${dialogue('thor', '⚡ Thorment', 'O desvio padrão das espadas (${fmt(swordsDP)}) é menor que o das moedas (${fmt(desvioPadrao)}). Então espadas variam menos, né?')}

    <div class="concept-grid" style="grid-template-columns: 1fr 1fr;">

  `;
}

function step9() {
  // SVG bell curve with 68-95-99.7 regions
  const bellW = 700, bellH = 320;
  const cx = bellW / 2, baseY = 250;

  // Normal curve path
  function normalPDF(x, mu, sigma) {
    return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
  }

  const mu = 350, sigma = 80;
  let curvePath = '';
  const yScale = 20000;
  for (let px = 50; px <= 650; px += 2) {
    const y = baseY - normalPDF(px, mu, sigma) * yScale;
    curvePath += (px === 50 ? 'M' : 'L') + `${px},${y} `;
  }

  // Region fills
  function regionPath(from, to) {
    let path = `M${from},${baseY} `;
    for (let px = from; px <= to; px += 2) {
      const y = baseY - normalPDF(px, mu, sigma) * yScale;
      path += `L${px},${y} `;
    }
    path += `L${to},${baseY} Z`;
    return path;
  }

  const sd1L = mu - sigma, sd1R = mu + sigma;
  const sd2L = mu - 2*sigma, sd2R = mu + 2*sigma;
  const sd3L = mu - 3*sigma, sd3R = mu + 3*sigma;

  return `
    <h2 class="step-title">Empirical Rule: 68 – 95 – 99.7</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Quando os dados seguem uma distribuição aproximadamente normal (formato de sino), o desvio padrão ganha superpoderes. Odinfather desenha no pergaminho:')}

    <div class="visual-container">
      <svg viewBox="0 0 ${bellW} ${bellH}" xmlns="http://www.w3.org/2000/svg">
        <!-- 3SD region -->
        <path d="${regionPath(Math.max(50, sd3L), Math.min(650, sd3R))}" fill="rgba(188,140,255,0.1)"/>
        <!-- 2SD region -->
        <path d="${regionPath(sd2L, sd2R)}" fill="rgba(88,166,255,0.12)"/>
        <!-- 1SD region -->
        <path d="${regionPath(sd1L, sd1R)}" fill="rgba(240,192,64,0.18)"/>
        <!-- Curve -->
        <path d="${curvePath}" fill="none" stroke="#e6edf3" stroke-width="2.5"/>
        <!-- Mean line -->
        <line x1="${mu}" y1="${baseY - normalPDF(mu,mu,sigma)*yScale - 5}" x2="${mu}" y2="${baseY}" stroke="#f0c040" stroke-width="2" stroke-dasharray="5,3"/>
        <text x="${mu}" y="${baseY + 18}" text-anchor="middle" fill="#f0c040" font-family="Permanent Marker" font-size="13">x̄</text>
        <!-- SD labels -->
        <text x="${sd1L}" y="${baseY + 18}" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">-1s</text>
        <text x="${sd1R}" y="${baseY + 18}" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">+1s</text>
        <text x="${sd2L}" y="${baseY + 18}" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">-2s</text>
        <text x="${sd2R}" y="${baseY + 18}" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">+2s</text>
        <text x="${Math.max(55, sd3L)}" y="${baseY + 18}" text-anchor="middle" fill="#bc8cff" font-size="11" font-family="Permanent Marker">-3s</text>
        <text x="${Math.min(645, sd3R)}" y="${baseY + 18}" text-anchor="middle" fill="#bc8cff" font-size="11" font-family="Permanent Marker">+3s</text>
        <!-- Baseline -->
        <line x1="50" y1="${baseY}" x2="650" y2="${baseY}" stroke="#30363d" stroke-width="1.5"/>
        <!-- Percentages -->
        <text x="${mu}" y="${baseY - 100}" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="22">68%</text>
        <text x="${mu}" y="${baseY - 135}" text-anchor="middle" fill="#58a6ff" font-family="Bangers" font-size="18">95%</text>
        <text x="${mu}" y="${baseY - 160}" text-anchor="middle" fill="#bc8cff" font-family="Bangers" font-size="15">99.7%</text>
        <!-- Bracket lines -->
        <line x1="${sd1L}" y1="${baseY - 90}" x2="${sd1R}" y2="${baseY - 90}" stroke="#f0c040" stroke-width="1.5"/>

function step10() {
  // SVG curves for skewness
  function skewCurve(skew, label, color, xOff) {
    const w = 180, h = 100, base = 90;
    let path = '';
    for (let px = 0; px <= w; px += 2) {
      let t = (px / w);
      let y;
      if (skew === 0) {
        // Symmetric
        y = base - 80 * Math.exp(-0.5 * Math.pow((t - 0.5) / 0.15, 2));
      } else if (skew > 0) {
        // Right skew (positive)
        y = base - 80 * Math.pow(t, 1.5) * Math.exp(-5 * t);
        y = base - (base - y) * 3.5;
      } else {
        // Left skew (negative)
        t = 1 - t;
        y = base - 80 * Math.pow(t, 1.5) * Math.exp(-5 * t);
        y = base - (base - y) * 3.5;
      }
      path += (px === 0 ? 'M' : 'L') + `${px + xOff},${Math.max(10, y)} `;
    }
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>
      <text x="${xOff + w/2}" y="${base + 16}" text-anchor="middle" fill="${color}" font-family="Permanent Marker" font-size="12">${label}</text>`;
  }

  // Kurtosis curves
  function kurtCurve(type, label, color, xOff) {
    const w = 180, h = 100, base = 90;
    let path = '';
    const sigma = type === 'lepto' ? 0.10 : type === 'platy' ? 0.22 : 0.15;
    for (let px = 0; px <= w; px += 2) {
      const t = (px / w);
      const y = base - 80 * Math.exp(-0.5 * Math.pow((t - 0.5) / sigma, 2));
      path += (px === 0 ? 'M' : 'L') + `${px + xOff},${Math.max(10, y)} `;
    }
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>
      <text x="${xOff + w/2}" y="${base + 16}" text-anchor="middle" fill="${color}" font-family="Permanent Marker" font-size="11">${label}</text>`;
  }

  return `
    <h2 class="step-title">Skewness and Kurtosis</h2>
    <p class="step-subtitle">The Shape of the Distribution</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Média e desvio padrão dizem <em>onde</em> e <em>quão espalhados</em> são os dados. A <strong>assimetria</strong> e a <strong>curtose</strong> descrevem a <em>forma</em>.')}

    <div class="info-panel">
      <div class="info-panel-title">Assimetria (Skewness)</div>
      <p style="margin-bottom:12px;">Mede se a cauda da distribuição puxa para um lado.</p>
      <div class="visual-container">
        <svg viewBox="0 0 620 120" xmlns="http://www.w3.org/2000/svg">
          ${skewCurve(-1, 'Negative (← tail)', '#f85149', 0)}
          ${skewCurve(0, 'Symmetric', '#3fb950', 210)}
          ${skewCurve(1, 'Positive (tail →)', '#58a6ff', 420)}
          <line x1="0" y1="90" x2="620" y2="90" stroke="#30363d" stroke-width="0.5"/>
        </svg>
      </div>
      <p>Nosso dataset: skewness ≈ <span class="hl-gold">${fmt(skewness)}</span> — assimetria positiva (cauda à direita, puxada pelo 33).</p>
    </div>

    <div class="info-panel" style="margin-top:16px;">
      <div class="info-panel-title">Curtose (Kurtosis)</div>
      <p style="margin-bottom:12px;">Mede quão "pontuda" ou "achatada" é a distribuição em relação à normal.</p>
      <div class="visual-container">
        <svg viewBox="0 0 620 120" xmlns="http://www.w3.org/2000/svg">
          ${kurtCurve('platy', 'Platicúrtica (< 0)', '#f85149', 0)}
          ${kurtCurve('meso', 'Mesocúrtica (≈ 0)', '#3fb950', 210)}
          ${kurtCurve('lepto', 'Leptocúrtica (> 0)', '#58a6ff', 420)}
          <line x1="0" y1="90" x2="620" y2="90" stroke="#30363d" stroke-width="0.5"/>
        </svg>
      </div>
      <p>Nosso dataset: curtose (excesso) ≈ <span class="hl-gold">${fmt(kurtosis)}</span> — ${kurtosis > 0 ? 'leptocúrtica (mais pontuda, caudas pesadas)' : kurtosis < -0.5 ? 'platicúrtica (mais achatada)' : 'próxima de mesocúrtica'}.</p>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Leptocúrtica? Platicúrtica? Isso é feitiço rúnico?')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Pense assim: <strong>leptocúrtica</strong> = pico afiado como lança, caudas pesadas. <strong>Platicúrtica</strong> = plana como o escudo, caudas leves. <strong>Mesocúrtica</strong> = a normal, o meio-termo.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Valores de referência: |skewness| < 1 = aceitável; |curtose| < 2 = aceitável para maioria das análises paramétricas. Nosso dataset é pequeno (n=5), então esses valores oscilam muito.')}
  `;
}

function step11() {
  // Expanded dataset for frequency table
  const expanded = [8, 10, 12, 12, 14, 15, 15, 16, 18, 18, 19, 20, 22, 22, 24, 25, 28, 30, 33, 35];
  const classes = [

  const freqs = classes.map(c => expanded.filter(v => v >= c.min && v <= c.max).length);
  const totalF = freqs.reduce((a,b)=>a+b,0);
  const relFreqs = freqs.map(f => f / totalF);
  let cumFreq = 0;
  const cumFreqs = freqs.map(f => { cumFreq += f; return cumFreq; });

  // SVG histogram
  const histW = 600, histH = 220, histPadL = 50, histPadB = 50, histPadT = 20;

  let histBars = '';
  freqs.forEach((f, i) => {

    const x = histPadL + i * barW2;
    const y = histPadT + chartH - bH;
    histBars += `<rect x="${x+2}" y="${histH}" width="${barW2-4}" height="0" fill="${colors[i]}" rx="3" opacity="0.8">
      <animate attributeName="y" from="${histPadT + chartH}" to="${y}" dur="0.6s" begin="${i*0.15}s" fill="freeze"/>

    </text>`;
  });

  return `
    <h2 class="step-title">Frequency Table and Histogram</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Quando temos muitos dados, agrupá-los em classes facilita a visualização. Suponha que expandimos os registros para 20 saques vikings:')}

      ${classes.map((c, i) => `
        <tr>

      <tr class="mean-row">

    <div class="visual-container">
      <svg viewBox="0 0 ${histW} ${histH}" xmlns="http://www.w3.org/2000/svg">

        <line x1="${histPadL}" y1="${histPadT + chartH}" x2="${histW - 20}" y2="${histPadT + chartH}" stroke="#30363d" stroke-width="1.5"/>
        <line x1="${histPadL}" y1="${histPadT}" x2="${histPadL}" y2="${histPadT + chartH}" stroke="#30363d" stroke-width="1.5"/>
        <!-- Y labels -->
        ${[0,2,4,6,8].map(v => {
          const y = histPadT + chartH - (v / maxFreq) * chartH;
          return `<text x="${histPadL - 8}" y="${y + 4}" text-anchor="end" fill="#8b949e" font-size="11">${v}</text>
            <line x1="${histPadL}" y1="${y}" x2="${histW-20}" y2="${y}" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>`;
        }).join('')}
        ${histBars}
        <text x="${histW/2}" y="${histH - 2}" text-anchor="middle" fill="#8b949e" font-size="11" font-family="Permanent Marker">Gold Coins</text>
      </svg>

    ${dialogue('thor', '⚡ Thorment', 'Agora sim, visual bonito! Mas por que 5 classes?')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'A regra de Sturges sugere k ≈ 1 + 3.322 × log₁₀(n). Para n=20: k ≈ 1 + 3.322 × 1.301 ≈ 5.3, arredondamos para 5. Poucas classes demais escondem padrões; muitas classes geram ruído.')}

  `;
}

  // Animate deviation bars after render
  setTimeout(() => {
    const maxDev = Math.max(...desvios.map(Math.abs));
    desvios.forEach((d, i) => {
      const bar = document.getElementById('devBar' + i);
      if (bar) {
        bar.style.width = (Math.abs(d) / maxDev * 80) + '%';
      }
    });
  }, 300);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep >= totalSteps - 1) {
    currentStep = 0;
  } else {
    currentStep++;
  }
  renderStep();
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

// Initialize
renderStep();
</script>
</body>
</html>
