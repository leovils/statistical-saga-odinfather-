<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descriptive Statistics — Step by Step | Odinfather</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* PROGRESS BAR */
.progress-bar-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-dark);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* STEP CONTENT */
.step-content {
  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.step-subtitle {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.3rem;
  color: var(--odin-blue);
  margin-bottom: 15px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
  position: relative;
}

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 6px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }

.dialogue-text {
  font-size: 1.05rem;
  line-height: 1.5;
}

/* DATA TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.data-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

.data-table td {
  background: var(--bg-card);
  transition: background 0.2s;
}

.data-table tr:hover td {
  background: rgba(88,166,255,0.1);
}

.mean-row td {
  font-family: 'Permanent Marker', cursive;
  background: var(--bg-panel) !important;
}

/* FORMULA */
.formula {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.15rem;
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  color: var(--gold);
}

.formula-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 6px;
}

/* CALC TABLE */
.calc-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 0.95rem;
}

.calc-table th, .calc-table td {
  padding: 8px 10px;
  text-align: center;
  border: 1px solid var(--border);
}

.calc-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.85rem;
  color: var(--text-dim);
}

.calc-table td {
  background: var(--bg-card);
}

/* ANIMATED BAR */
.bar-container {
  margin: 20px 0;
}

.bar-wrapper {
  display: flex;
  align-items: center;
  margin: 8px 0;
}

.bar-label {
  width: 100px;
  font-family: 'Permanent Marker', cursive;
  font-size: 0.9rem;
  text-align: right;
  padding-right: 10px;
}

.bar-track {
  flex: 1;
  height: 30px;
  background: var(--bg-panel);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1.5s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  font-family: 'Permanent Marker', cursive;
  font-size: 0.85rem;
  color: #fff;
}

.bar-fill.raid { background: var(--odin-blue); }
.bar-fill.mean-bar { background: var(--gold); color: var(--bg-dark); }
.bar-fill.dev-pos { background: var(--success); }
.bar-fill.dev-neg { background: var(--thor-red); }

/* SVG VISUALS */
.visual-container {
  margin: 20px 0;
  text-align: center;
}

.visual-container svg {
  max-width: 100%;
  height: auto;
}

/* APA BOX */
.apa-box {
  background: var(--bg-panel);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 20px 0;
  font-style: italic;
  line-height: 1.7;
}

.apa-label {
  font-family: 'Bangers', cursive;
  color: var(--gold);
  font-style: normal;
  font-size: 1.1rem;
  margin-bottom: 8px;
}

/* NAVIGATION */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 40px;
  gap: 12px;
}

.nav-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  padding: 12px 28px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover {
  border-color: var(--odin-blue);
  background: rgba(88,166,255,0.1);
}

.nav-btn.primary {
  background: var(--odin-blue);
  color: var(--bg-dark);
  border-color: var(--odin-blue);
}

.nav-btn.primary:hover {
  background: #79bbff;
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* SIGNATURE */
.signature {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* HIGHLIGHTS */
.hl-gold { color: var(--gold); font-weight: bold; }
.hl-blue { color: var(--odin-blue); }
.hl-red { color: var(--thor-red); }
.hl-green { color: var(--success); }
.hl-purple { color: var(--corvo-purple); }

/* LICAO DOS CORVOS */
.licao-box {
  background: rgba(188,140,255,0.06);
  border: 2px solid var(--corvo-purple);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.licao-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--corvo-purple);
  margin-bottom: 12px;
}

/* CONCEPT CARDS */
.concept-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin: 20px 0;
}

.concept-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}

.concept-card.active {
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(240,192,64,0.15);
}

.concept-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  margin-bottom: 8px;
  color: var(--odin-blue);
}

.concept-value {
  font-size: 1.6rem;
  font-family: 'Bangers', cursive;
  color: var(--gold);
}

/* INFO PANEL */
.info-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
}

.info-panel-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 8px;
}

/* FREQ TABLE */
.freq-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 0.95rem;
}

.freq-table th, .freq-table td {
  padding: 8px 12px;
  text-align: center;
  border: 1px solid var(--border);
}

.freq-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.85rem;
  color: var(--text-dim);
}

.freq-table td {
  background: var(--bg-card);
}

/* NUMBER LINE */
.number-line-container {
  overflow-x: auto;
  margin: 20px 0;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .step-title { font-size: 1.6rem; }
  .concept-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 10px 18px; font-size: 0.95rem; }
  body { font-size: 16px; }
}

/* ANIMATE ON APPEAR */
.fade-in {
  animation: fadeIn 0.6s ease both;
}
.fade-in-delay {
  animation: fadeIn 0.6s ease 0.3s both;
}
</style>
</head>
<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 13</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DATA =====
const raids = ['Lindisfarne', 'Birka', 'Hedeby', 'Kaupang', 'Jómsborg'];
const data = [12, 15, 18, 22, 33];
const n = data.length;

// Computed stats
const soma = data.reduce((a,b) => a+b, 0); // 100
const media = soma / n; // 20
const sorted = [...data].sort((a,b) => a-b); // [12,15,18,22,33]
const mediana = sorted[Math.floor(n/2)]; // 18

// Deviations
const desvios = data.map(x => x - media); // [-8, -5, -2, 2, 13]
const desviosQuad = desvios.map(d => d * d); // [64, 25, 4, 4, 169]
const somaDesviosQuad = desviosQuad.reduce((a,b) => a+b, 0); // 266

// Variance & SD (sample: n-1)
const variancia = somaDesviosQuad / (n - 1); // 66.5
const desvioPadrao = Math.sqrt(variancia); // ~8.155
const cv = (desvioPadrao / media) * 100; // ~40.77%

// Quartiles for IQR
const Q1 = sorted[1]; // 15
const Q3 = sorted[3]; // 22
const IQR = Q3 - Q1; // 7
const fenceL = Q1 - 1.5 * IQR; // 4.5
const fenceU = Q3 + 1.5 * IQR; // 32.5
const amplitude = sorted[n-1] - sorted[0]; // 21

// Skewness (Fisher)
const skewNum = data.reduce((s, x) => s + Math.pow((x - media) / desvioPadrao, 3), 0);
const skewness = (n / ((n-1)*(n-2))) * skewNum;

// Kurtosis (excess)
const kurtNum = data.reduce((s, x) => s + Math.pow((x - media) / desvioPadrao, 4), 0);
const kurtosis = ((n*(n+1)) / ((n-1)*(n-2)*(n-3))) * kurtNum - (3*(n-1)*(n-1)) / ((n-2)*(n-3));

function fmt(v, d=2) { return Number(v).toFixed(d); }

// ===== DIALOGUE HELPER =====
function dialogue(type, name, text) {
  return `
    <div class="dialogue-box ${type}">
      <div class="char-name ${type}">${name}</div>
      <div class="dialogue-text">${text}</div>
    </div>`;
}

// ===== STEP FUNCTIONS =====

function step0() {
  let barsSVG = '';
  const maxVal = Math.max(...data);
  const barW = 70, gap = 20, padL = 60, padR = 20, padT = 40, padB = 60;
  const svgW = padL + data.length * (barW + gap) + padR;
  const chartH = 200;
  const svgH = padT + chartH + padB;

  data.forEach((v, i) => {
    const bH = (v / maxVal) * chartH;
    const x = padL + i * (barW + gap);
    const y = padT + chartH - bH;
    barsSVG += `<rect x="${x}" y="${svgH}" width="${barW}" height="0" fill="#58a6ff" rx="4" opacity="0.85">
      <animate attributeName="y" from="${padT + chartH}" to="${y}" dur="0.8s" begin="${i*0.15}s" fill="freeze"/>
      <animate attributeName="height" from="0" to="${bH}" dur="0.8s" begin="${i*0.15}s" fill="freeze"/>
    </rect>
    <text x="${x + barW/2}" y="${padT + chartH + 20}" text-anchor="middle" fill="#8b949e" font-family="Permanent Marker" font-size="11">${raids[i]}</text>
    <text x="${x + barW/2}" y="${y - 6}" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="16" opacity="0">
      ${v}
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="${i*0.15 + 0.6}s" fill="freeze"/>
    </text>`;
  });

  // Y axis labels
  let yLabels = '';
  for (let tick = 0; tick <= maxVal; tick += 10) {
    const y = padT + chartH - (tick / maxVal) * chartH;
    yLabels += `<text x="${padL - 8}" y="${y + 4}" text-anchor="end" fill="#8b949e" font-size="12">${tick}</text>`;
    yLabels += `<line x1="${padL}" y1="${y}" x2="${svgW - padR}" y2="${y}" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,4"/>`;
  }

  return `
    <h2 class="step-title">The Treasure of Five Viking Raids</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Young warrior, we have the records of five Viking raids. Each expedition brought back a different amount of gold coins. Before making any decision about the spoils, we must <strong>describe</strong> this data with rigor.')}
    <p style="margin:14px 0;">The explorers returned with the following treasures (in gold coins):</p>
    <table class="data-table">
      <tr><th>Expedition</th>${raids.map(r => `<th style="color:var(--odin-blue)">${r}</th>`).join('')}</tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Coins</td>${data.map(v => `<td class="hl-gold">${v}</td>`).join('')}</tr>
    </table>
    <div class="visual-container">
      <svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
        <line x1="${padL}" y1="${padT + chartH}" x2="${svgW - padR}" y2="${padT + chartH}" stroke="#30363d" stroke-width="1.5"/>
        ${yLabels}
        ${barsSVG}
      </svg>
    </div>
    ${dialogue('thor', '⚡ Thorment', 'Bah, why so many calculations? Look at the chart \x96 you can tell at a glance that J\xf3msborg was the best raid. Let\x27s just split it up and go drink mead!')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Eyeballing it is a recipe for disaster. Descriptive statistics gives us precise tools to summarize, compare, and understand distributions. Let\x27s go step by step.')}
  `;
}

function step1() {
  return `
    <h2 class="step-title">Measures of Central Tendency</h2>
    <p class="step-subtitle">Mean, Median, and Mode</p>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Measures of central tendency answer the question: <strong>what value represents the "center" of the data?</strong> We have three classic tools.')}

    <div class="info-panel" style="margin-top:14px;">
      <div class="info-panel-title">1. Arithmetic Mean (x\u0304)</div>
      <div class="formula-label">Formula</div>
      <div class="formula">x̄ = Σxᵢ / n</div>
      <p>We add all the values and divide by the total number of observations.</p>
      <table class="calc-table" style="margin-top:10px;">
        <tr><th>Step</th><th>Calculation</th></tr>
        <tr><td>Sum (\u03a3x\u1d62)</td><td>${data.join(' + ')} = <span class="hl-gold">${soma}</span></td></tr>
        <tr><td>Divide by n</td><td>${soma} / ${n} = <span class="hl-gold">${fmt(media)}</span></td></tr>
      </table>
    </div>

    <div class="info-panel">
      <div class="info-panel-title">2. Median (Md)</div>
      <p>The value that divides the sorted data in half. With odd n, it is the middle value.</p>
      <table class="calc-table">
        <tr><th>Sorted data</th><td>${sorted.join(', ')}</td></tr>
        <tr><th>Central position</th><td>(${n}+1)/2 = position ${(n+1)/2} → <span class="hl-gold">${mediana}</span></td></tr>
      </table>
    </div>

    <div class="info-panel">
      <div class="info-panel-title">3. Mode (Mo)</div>
      <p>The value that appears most frequently. In this dataset, <strong>no value repeats</strong> \x96 therefore, <span class="hl-red">there is no mode</span> (amodal distribution).</p>
    </div>

    <div class="concept-grid" style="margin-top:20px;">
      <div class="concept-card active">
        <div class="concept-title">Mean</div>
        <div class="concept-value">${fmt(media)}</div>
      </div>
      <div class="concept-card active">
        <div class="concept-title">Median</div>
        <div class="concept-value">${mediana}</div>
      </div>
      <div class="concept-card">
        <div class="concept-title">Mode</div>
        <div class="concept-value" style="color:var(--thor-red);">—</div>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The <strong>mean</strong> considers all values; the <strong>median</strong> resists extreme values; the <strong>mode</strong> identifies the most frequent value. Each tells a different story.')}
  `;
}

function step2() {
  const dataOutlier = [12, 15, 18, 22, 100];
  const mediaOutlier = dataOutlier.reduce((a,b)=>a+b,0) / dataOutlier.length;
  const sortedOutlier = [...dataOutlier].sort((a,b)=>a-b);
  const medianaOutlier = sortedOutlier[Math.floor(sortedOutlier.length/2)];

  return `
    <h2 class="step-title">When to Use Each Measure?</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The mean is the most used, but it has an Achilles\x27 heel: it is <strong>sensitive to extreme values</strong>. Imagine J\xf3msborg brought not 33 but 100 gold coins. Look at the damage:')}

    <table class="data-table">
      <tr><th></th><th>Original Data</th><th>Data with Outlier</th></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Values</td>
        <td>${data.join(', ')}</td>
        <td>${dataOutlier.join(', ')}</td></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Mean</td>
        <td class="hl-gold">${fmt(media)}</td>
        <td class="hl-red">${fmt(mediaOutlier)}</td></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Median</td>
        <td class="hl-gold">${mediana}</td>
        <td class="hl-green">${medianaOutlier}</td></tr>
    </table>

    ${dialogue('thor', '⚡ Thorment', 'Wow! The mean jumped from 20 to ${fmt(mediaOutlier)}! The Jarl will think we\x27re rich!')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Exactly. The median barely moved \x96 it stayed at ${medianaOutlier}. That\x27s why, with skewed data or outliers, the median is more robust.')}

    <div class="info-panel">
      <div class="info-panel-title">Quick Guide</div>
      <table class="calc-table">
        <tr><th>Measure</th><th>Use when...</th><th>Avoid when...</th></tr>
        <tr><td class="hl-blue">Mean</td><td>Symmetric distribution, no outliers</td><td>Data with extreme values</td></tr>
        <tr><td class="hl-blue">Median</td><td>Skewed data with outliers</td><td>Need further algebraic calculations</td></tr>
        <tr><td class="hl-blue">Mode</td><td>Categorical or multimodal data</td><td>Continuous data without repetition</td></tr>
      </table>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Raven\x27s rule: if mean \u2248 median, the distribution is reasonably symmetric. If they diverge a lot, investigate skewness and possible outliers.')}
  `;
}

function step3() {
  // SVG number line with outlier detection
  const nlW = 700, nlH = 180;
  const nlPad = 60;
  const minV = 0, maxV = 40;
  const scale = (v) => nlPad + ((v - minV) / (maxV - minV)) * (nlW - 2*nlPad);

  let dots = '';
  data.forEach((v, i) => {
    const cx = scale(v);
    const isOutlier = v > fenceU || v < fenceL;
    const color = isOutlier ? '#f85149' : '#58a6ff';
    dots += `<circle cx="${cx}" cy="55" r="8" fill="${color}" opacity="0">
      <animate attributeName="opacity" from="0" to="0.9" dur="0.4s" begin="${i*0.2}s" fill="freeze"/>
    </circle>
    <text x="${cx}" y="42" text-anchor="middle" fill="${color}" font-family="Bangers" font-size="14" opacity="0">
      ${v}
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="${i*0.2+0.2}s" fill="freeze"/>
    </text>`;
  });

  return `
    <h2 class="step-title">Outliers — Suspicious Treasures</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The value 33 jumps out. Could it be an outlier? Let\x27s use the <strong>IQR method</strong> (Interquartile Range) to check.')}

    <div class="info-panel">
      <div class="info-panel-title">Step by Step: IQR Method</div>
      <table class="calc-table">
        <tr><th>Stage</th><th>Calculation</th><th>Result</th></tr>
        <tr><td>Sorted Data</td><td colspan="2">${sorted.join(', ')}</td></tr>
        <tr><td>Q1 (25° percentil)</td><td>2ª position</td><td class="hl-blue">${Q1}</td></tr>
        <tr><td>Q3 (75° percentil)</td><td>4ª position</td><td class="hl-blue">${Q3}</td></tr>
        <tr><td>IQR = Q3 − Q1</td><td>${Q3} − ${Q1}</td><td class="hl-gold">${IQR}</td></tr>
        <tr><td>Lower Fence</td><td>Q1 − 1.5 × IQR = ${Q1} − ${1.5*IQR}</td><td>${fmt(fenceL)}</td></tr>
        <tr><td>Upper Fence</td><td>Q3 + 1.5 × IQR = ${Q3} + ${1.5*IQR}</td><td class="hl-red">${fmt(fenceU)}</td></tr>
      </table>

    <div class="visual-container">
      <svg viewBox="0 0 ${nlW} ${nlH}" xmlns="http://www.w3.org/2000/svg">
        <!-- Number line -->

        <!-- Ticks -->

          <line x1="${scale(v)}" y1="50" x2="${scale(v)}" y2="60" stroke="#8b949e" stroke-width="1"/>

        <text x="${scale(fenceL)}" y="95" text-anchor="middle" fill="#f85149" font-size="10" font-family="Permanent Marker">Lower Fence (${fmt(fenceL)})</text>
        <line x1="${scale(fenceU)}" y1="30" x2="${scale(fenceU)}" y2="80" stroke="#f85149" stroke-width="2" stroke-dasharray="6,3"/>
        <text x="${scale(fenceU)}" y="95" text-anchor="middle" fill="#f85149" font-size="10" font-family="Permanent Marker">Upper Fence (${fmt(fenceU)})</text>
        <!-- IQR box -->
        <rect x="${scale(Q1)}" y="45" width="${scale(Q3)-scale(Q1)}" height="20" fill="rgba(88,166,255,0.15)" stroke="#58a6ff" stroke-width="1.5" rx="3"/>
        <text x="${(scale(Q1)+scale(Q3))/2}" y="120" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">IQR = ${IQR}</text>

}

function step4() {
  return `
    <h2 class="step-title">Range and Interval</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The simplest measure of spread: what is the distance between the smallest and largest value?')}

    <div class="formula-label">Formula</div>

        }).join('')}

        <line x1="50" y1="75" x2="550" y2="75" stroke="#f0c040" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>

        <defs>

          <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="#f0c040"/></marker>

    ${dialogue('thor', '⚡ Thorment', 'Easy! Range of ${amplitude}. Done, right?')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Not even close. The range uses <strong>only two values</strong> \x96 the smallest and the largest. It ignores everything in between. If we replaced 15, 18, and 22 with 12, 12, and 12, the range would be the same! We need something better.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The range is fragile: one outlier is enough to inflate it. Use it as a quick overview, never as a definitive measure of spread.')}

function step5() {
  let rows = '';
  data.forEach((v, i) => {
    const d = desvios[i];
    const sign = d >= 0 ? '+' : '';
    const color = d >= 0 ? 'var(--success)' : 'var(--thor-red)';
    rows += `<tr>
      <td>${raids[i]}</td>
      <td class="hl-gold">${v}</td>
      <td>${v} − ${fmt(media)} = <span style="color:${color}">${sign}${fmt(d)}</span></td>
    </tr>`;
  });

  // Bar chart of deviations
  const maxDev = Math.max(...desvios.map(Math.abs));
  let devBars = '';
  data.forEach((v, i) => {
    const d = desvios[i];
    const pct = Math.abs(d) / maxDev * 100;
    const cls = d >= 0 ? 'dev-pos' : 'dev-neg';
    devBars += `
    <div class="bar-wrapper">
      <div class="bar-label" style="color:var(--odin-blue)">${raids[i]}</div>
      <div class="bar-track">
        <div class="bar-fill ${cls}" id="devBar${i}" style="width:0%;">${d >= 0 ? '+' : ''}${fmt(d)}</div>
      </div>
    </div>`;
  });

  return `
    <h2 class="step-title">Deviations from the Mean</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'To measure real spread, we calculate the <strong>deviation</strong> of each value from the mean. How much did each raid deviate from the "expected"?')}

    <div class="formula-label">Deviation Formula</div>
    <div class="formula">dᵢ = xᵢ − x̄</div>

    <table class="calc-table">
      <tr><th>Expedition</th><th>Coins (xᵢ)</th><th>Desvio (xᵢ − ${fmt(media)})</th></tr>
      ${rows}
      <tr class="mean-row">
        <td colspan="2" style="text-align:right;">Sum of Deviations:</td>
        <td class="hl-gold">${fmt(desvios.reduce((a,b)=>a+b,0))}</td>
      </tr>
    </table>

    <div class="bar-container" style="margin-top:16px;">
      ${devBars}
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Wait... the sum is ZERO?! So there\x27s no deviation at all?')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The sum of deviations <strong>always</strong> equals zero \x96 it\x27s a mathematical property of the mean. The positives cancel the negatives. That\x27s why we need a trick: squaring them.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '\u03a3(x\u1d62 \u2212 x\u0304) = 0 <strong>always</strong>. That\x27s why variance uses <em>squared</em> deviations \x96 to eliminate the cancellation.')}
  `;
}

function step6() {
  let rows = '';
  data.forEach((v, i) => {
    const d = desvios[i];
    const dq = desviosQuad[i];
    rows += `<tr>
      <td>${raids[i]}</td>
      <td>${v}</td>
      <td>${fmt(d)}</td>
      <td>(${fmt(d)})² = <span class="hl-gold">${fmt(dq)}</span></td>
    </tr>`;
  });

  return `
    <h2 class="step-title">Variance (s\xb2)</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'We square each deviation, add them all up, and divide. But we divide by <strong>n \u2212 1</strong>, not by n. This is crucial.')}

    <div class="formula-label">Sample Variance Formula</div>
    <div class="formula">s² = Σ(xᵢ − x̄)² / (n − 1)</div>

    <table class="calc-table">
      <tr><th>Expedition</th><th>x\u1d62</th><th>Deviation (d\u1d62)</th><th>Deviation\xb2</th></tr>
      ${rows}
      <tr class="mean-row">
        <td colspan="3" style="text-align:right;">Σ(xᵢ − x̄)² =</td>
        <td class="hl-gold">${fmt(somaDesviosQuad)}</td>
      </tr>
    </table>

    <div class="formula" style="margin-top:12px;">
      s² = ${fmt(somaDesviosQuad)} / (${n} − 1) = ${fmt(somaDesviosQuad)} / ${n-1} = <span style="font-size:1.3em;">${fmt(variancia)}</span>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Why n \u2212 1 and not n? Seems like overkill!')}

    <div class="info-panel" style="border-left: 3px solid var(--gold);">
      <div class="info-panel-title">Why n \u2212 1? Degrees of Freedom</div>
      ${dialogue('odin', '🧙‍♂️ Odinfather', 'Imagine you have 5 warriors and you know the mean strength is 20. If I tell you the value of 4 warriors \x96 say 12, 15, 18, 22 \x96 the fifth is <strong>not free</strong>: it HAS to be 33 for the sum to equal 100. Only 4 values are truly "free" to vary. That\x27s <strong>degrees of freedom</strong>: n \u2212 1 = ${n} \u2212 1 = ${n-1}.')}
      <p style="margin-top:10px;">Dividing by n underestimates the true population variance. Dividing by n - 1 corrects this bias \x96 it\x27s called <strong>Bessel\x27s correction</strong>.</p>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Sample variance uses n \u2212 1 (Bessel\x27s correction). Population variance uses N. In practice, we almost always work with samples.')}
  `;
}

function step7() {
  return `
    <h2 class="step-title">Standard Deviation (s)</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Variance is expressed in squared units \x96 "coins squared" makes no practical sense. The solution? Take the square root.')}

    <div class="formula-label">Formula</div>
    <div class="formula">s = √s² = √${fmt(variancia)} = <span style="font-size:1.3em;">${fmt(desvioPadrao)}</span></div>

    <p style="margin:14px 0;">The standard deviation returns to the <strong>same unit</strong> as the original data: gold coins.</p>

    <div class="concept-grid" style="grid-template-columns: 1fr 1fr;">

        <div class="concept-title">Variance (s\xb2)</div>
        <div class="concept-value">${fmt(variancia)}</div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Interpretation: on average, each raid deviated about <strong>${fmt(desvioPadrao)} coins</strong> from the overall mean of ${fmt(media)}. The larger the SD, the more spread out the data.')}

    <div class="info-panel">
      <div class="info-panel-title">Visualizing Spread</div>
      <div class="visual-container">

          <!-- Mean marker -->
          ${(() => {

            // Mean line
            svg += `<line x1="${sc(media)}" y1="20" x2="${sc(media)}" y2="60" stroke="#f0c040" stroke-width="2.5"/>`;
            svg += `<text x="${sc(media)}" y="75" text-anchor="middle" fill="#f0c040" font-family="Permanent Marker" font-size="11">x̄=${fmt(media)}</text>`;
            // SD bands
            svg += `<rect x="${sc(media - desvioPadrao)}" y="30" width="${sc(media + desvioPadrao) - sc(media - desvioPadrao)}" height="20" fill="rgba(88,166,255,0.15)" rx="3" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3"/>`;
            svg += `<text x="${sc(media + desvioPadrao) + 5}" y="44" fill="#58a6ff" font-size="10" font-family="Permanent Marker">+1s</text>`;
            svg += `<text x="${sc(media - desvioPadrao) - 20}" y="44" fill="#58a6ff" font-size="10" font-family="Permanent Marker">-1s</text>`;
            // Data dots

            });
            return svg;
          })()}
        </svg>
      </div>
      <p style="font-size:0.9rem; color:var(--text-dim); text-align:center;">Blue dashed band = \xb11 standard deviation from the mean</p>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The standard deviation is the most widely used measure of spread in statistics. It feeds into t-tests, confidence intervals, effect sizes \x96 virtually everything.')}
  `;
}

function step8() {
  // Comparison dataset: swords forged
  const swords = [190, 200, 210, 205, 195];
  const swordsMedia = swords.reduce((a,b)=>a+b,0) / swords.length;
  const swordsDP = Math.sqrt(swords.reduce((s,x)=>s+Math.pow(x-swordsMedia,2),0)/(swords.length-1));
  const swordsCV = (swordsDP / swordsMedia) * 100;

  return `
    <h2 class="step-title">Coefficient of Variation (CV)</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'E se quisermos comparar a variabilidade entre coisas com escalas diferentes? Por exemplo: coins de ouro versus espadas forjadas?')}

    <div class="formula-label">Formula</div>
    <div class="formula">CV = (s / x̄) × 100%</div>

    <table class="data-table">
      <tr><th></th><th>Gold Coins</th><th>Swords Forged</th></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Data</td>
        <td>${data.join(', ')}</td>
        <td>${swords.join(', ')}</td></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Mean (x̄)</td>
        <td class="hl-gold">${fmt(media)}</td>
        <td class="hl-blue">${fmt(swordsMedia)}</td></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">Standard Deviation (s)</td>
        <td class="hl-gold">${fmt(desvioPadrao)}</td>
        <td class="hl-blue">${fmt(swordsDP)}</td></tr>
      <tr><td style="font-family:'Permanent Marker',cursive;">CV</td>
        <td class="hl-red">${fmt(cv)}%</td>
        <td class="hl-green">${fmt(swordsCV)}%</td></tr>
    </table>

    ${dialogue('thor', '⚡ Thorment', 'The standard deviation of swords (${fmt(swordsDP)}) is less than that of coins (${fmt(desvioPadrao)}). So swords vary less, right?')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Look at the CV! Coins have a CV of ${fmt(cv)}% and swords only ${fmt(swordsCV)}%. Proportionally, coins vary <strong>much more</strong>. The absolute SD is misleading when scales differ.')}

    <div class="concept-grid" style="grid-template-columns: 1fr 1fr;">
      <div class="concept-card" style="border-color:var(--thor-red);">
        <div class="concept-title">Coins</div>
        <div class="concept-value" style="color:var(--thor-red);">CV = ${fmt(cv)}%</div>
        <p style="font-size:0.85rem; color:var(--text-dim);">High relative variability</p>
      </div>
      <div class="concept-card" style="border-color:var(--success);">

        <div class="concept-value" style="color:var(--success);">CV = ${fmt(swordsCV)}%</div>

      </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The CV is dimensionless \x96 it allows comparing variability of variables with completely different units and scales. Rule of thumb: CV < 15% = low; 15-30% = moderate; > 30% = high.')}
  `;
}

function step9() {
  // SVG bell curve with 68-95-99.7 regions
  const bellW = 700, bellH = 320;
  const cx = bellW / 2, baseY = 250;

  // Normal curve path
  function normalPDF(x, mu, sigma) {
    return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
  }

  const mu = 350, sigma = 80;
  let curvePath = '';
  const yScale = 20000;
  for (let px = 50; px <= 650; px += 2) {
    const y = baseY - normalPDF(px, mu, sigma) * yScale;
    curvePath += (px === 50 ? 'M' : 'L') + `${px},${y} `;
  }

  // Region fills
  function regionPath(from, to) {
    let path = `M${from},${baseY} `;
    for (let px = from; px <= to; px += 2) {
      const y = baseY - normalPDF(px, mu, sigma) * yScale;
      path += `L${px},${y} `;
    }
    path += `L${to},${baseY} Z`;
    return path;
  }

  const sd1L = mu - sigma, sd1R = mu + sigma;
  const sd2L = mu - 2*sigma, sd2R = mu + 2*sigma;
  const sd3L = mu - 3*sigma, sd3R = mu + 3*sigma;

  return `
    <h2 class="step-title">Empirical Rule: 68 – 95 – 99.7</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'When data follow an approximately normal distribution (bell shape), the standard deviation gains superpowers. Odinfather draws on the parchment:')}

    <div class="visual-container">
      <svg viewBox="0 0 ${bellW} ${bellH}" xmlns="http://www.w3.org/2000/svg">
        <!-- 3SD region -->
        <path d="${regionPath(Math.max(50, sd3L), Math.min(650, sd3R))}" fill="rgba(188,140,255,0.1)"/>
        <!-- 2SD region -->
        <path d="${regionPath(sd2L, sd2R)}" fill="rgba(88,166,255,0.12)"/>
        <!-- 1SD region -->
        <path d="${regionPath(sd1L, sd1R)}" fill="rgba(240,192,64,0.18)"/>
        <!-- Curve -->
        <path d="${curvePath}" fill="none" stroke="#e6edf3" stroke-width="2.5"/>
        <!-- Mean line -->
        <line x1="${mu}" y1="${baseY - normalPDF(mu,mu,sigma)*yScale - 5}" x2="${mu}" y2="${baseY}" stroke="#f0c040" stroke-width="2" stroke-dasharray="5,3"/>
        <text x="${mu}" y="${baseY + 18}" text-anchor="middle" fill="#f0c040" font-family="Permanent Marker" font-size="13">x̄</text>
        <!-- SD labels -->
        <text x="${sd1L}" y="${baseY + 18}" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">-1s</text>
        <text x="${sd1R}" y="${baseY + 18}" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">+1s</text>
        <text x="${sd2L}" y="${baseY + 18}" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">-2s</text>
        <text x="${sd2R}" y="${baseY + 18}" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="Permanent Marker">+2s</text>
        <text x="${Math.max(55, sd3L)}" y="${baseY + 18}" text-anchor="middle" fill="#bc8cff" font-size="11" font-family="Permanent Marker">-3s</text>
        <text x="${Math.min(645, sd3R)}" y="${baseY + 18}" text-anchor="middle" fill="#bc8cff" font-size="11" font-family="Permanent Marker">+3s</text>
        <!-- Baseline -->
        <line x1="50" y1="${baseY}" x2="650" y2="${baseY}" stroke="#30363d" stroke-width="1.5"/>
        <!-- Percentages -->
        <text x="${mu}" y="${baseY - 100}" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="22">68%</text>
        <text x="${mu}" y="${baseY - 135}" text-anchor="middle" fill="#58a6ff" font-family="Bangers" font-size="18">95%</text>
        <text x="${mu}" y="${baseY - 160}" text-anchor="middle" fill="#bc8cff" font-family="Bangers" font-size="15">99.7%</text>
        <!-- Bracket lines -->
        <line x1="${sd1L}" y1="${baseY - 90}" x2="${sd1R}" y2="${baseY - 90}" stroke="#f0c040" stroke-width="1.5"/>
        <line x1="${sd2L}" y1="${baseY - 126}" x2="${sd2R}" y2="${baseY - 126}" stroke="#58a6ff" stroke-width="1.5"/>
        <line x1="${Math.max(50, sd3L)}" y1="${baseY - 153}" x2="${Math.min(650, sd3R)}" y2="${baseY - 153}" stroke="#bc8cff" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="info-panel">
      <div class="info-panel-title">Rule for Normal Distributions</div>
      <table class="calc-table">
        <tr><th>Range</th><th>Contains</th><th>In our example</th></tr>
        <tr><td>x̄ ± 1s</td><td class="hl-gold">~68% of the data</td><td>${fmt(media - desvioPadrao)} a ${fmt(media + desvioPadrao)}</td></tr>
        <tr><td>x̄ ± 2s</td><td class="hl-blue">~95% of the data</td><td>${fmt(media - 2*desvioPadrao)} a ${fmt(media + 2*desvioPadrao)}</td></tr>
        <tr><td>x̄ ± 3s</td><td class="hl-purple">~99.7% of the data</td><td>${fmt(media - 3*desvioPadrao)} a ${fmt(media + 3*desvioPadrao)}</td></tr>
      </table>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'So if a value falls outside 3 standard deviations, it\x27s practically impossible?')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Only 0.3% of data fall outside \xb13s in a normal distribution. It\x27s rare, but not impossible. And be careful: the rule only works well for <strong>approximately normal</strong> data.')}
  `;
}

function step10() {
  // SVG curves for skewness
  function skewCurve(skew, label, color, xOff) {
    const w = 180, h = 100, base = 90;
    let path = '';
    for (let px = 0; px <= w; px += 2) {
      let t = (px / w);
      let y;
      if (skew === 0) {
        // Symmetric
        y = base - 80 * Math.exp(-0.5 * Math.pow((t - 0.5) / 0.15, 2));
      } else if (skew > 0) {
        // Right skew (positive)
        y = base - 80 * Math.pow(t, 1.5) * Math.exp(-5 * t);
        y = base - (base - y) * 3.5;
      } else {
        // Left skew (negative)
        t = 1 - t;
        y = base - 80 * Math.pow(t, 1.5) * Math.exp(-5 * t);
        y = base - (base - y) * 3.5;
      }
      path += (px === 0 ? 'M' : 'L') + `${px + xOff},${Math.max(10, y)} `;
    }
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>
      <text x="${xOff + w/2}" y="${base + 16}" text-anchor="middle" fill="${color}" font-family="Permanent Marker" font-size="12">${label}</text>`;
  }

  // Kurtosis curves
  function kurtCurve(type, label, color, xOff) {
    const w = 180, h = 100, base = 90;
    let path = '';
    const sigma = type === 'lepto' ? 0.10 : type === 'platy' ? 0.22 : 0.15;
    for (let px = 0; px <= w; px += 2) {
      const t = (px / w);
      const y = base - 80 * Math.exp(-0.5 * Math.pow((t - 0.5) / sigma, 2));
      path += (px === 0 ? 'M' : 'L') + `${px + xOff},${Math.max(10, y)} `;
    }
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>
      <text x="${xOff + w/2}" y="${base + 16}" text-anchor="middle" fill="${color}" font-family="Permanent Marker" font-size="11">${label}</text>`;
  }

  return `
    <h2 class="step-title">Skewness and Kurtosis</h2>
    <p class="step-subtitle">The Shape of the Distribution</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Mean and standard deviation tell <em>where</em> and <em>how spread out</em> the data are. <strong>Skewness</strong> and <strong>kurtosis</strong> describe the <em>shape</em>.')}

    <div class="info-panel">
      <div class="info-panel-title">Skewness</div>
      <p style="margin-bottom:12px;">Measures whether the tail of the distribution pulls to one side.</p>
      <div class="visual-container">
        <svg viewBox="0 0 620 120" xmlns="http://www.w3.org/2000/svg">
          ${skewCurve(-1, 'Negative (← tail)', '#f85149', 0)}
          ${skewCurve(0, 'Symmetric', '#3fb950', 210)}
          ${skewCurve(1, 'Positive (tail →)', '#58a6ff', 420)}
          <line x1="0" y1="90" x2="620" y2="90" stroke="#30363d" stroke-width="0.5"/>
        </svg>
      </div>
      <p>Our dataset: skewness \u2248 <span class="hl-gold">${fmt(skewness)}</span> \x96 positive skew (right tail, pulled by 33).</p>
    </div>

    <div class="info-panel" style="margin-top:16px;">
      <div class="info-panel-title">Kurtosis</div>
      <p style="margin-bottom:12px;">Measures how "peaked" or "flat" the distribution is relative to the normal.</p>
      <div class="visual-container">
        <svg viewBox="0 0 620 120" xmlns="http://www.w3.org/2000/svg">
          ${kurtCurve('platy', 'Platykurtic (< 0)', '#f85149', 0)}
          ${kurtCurve('meso', 'Mesokurtic (\u2248 0)', '#3fb950', 210)}
          ${kurtCurve('lepto', 'Leptokurtic (> 0)', '#58a6ff', 420)}
          <line x1="0" y1="90" x2="620" y2="90" stroke="#30363d" stroke-width="0.5"/>
        </svg>
      </div>
      <p>Our dataset: kurtosis (excess) \u2248 <span class="hl-gold">${fmt(kurtosis)}</span> \x96 ${kurtosis > 0 ? 'leptokurtic (more peaked, heavy tails)' : kurtosis < -0.5 ? 'platykurtic (flatter)' : 'close to mesokurtic'}.</p>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Leptokurtic? Platykurtic? Is that a runic spell?')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Think of it this way: <strong>leptokurtic</strong> = sharp peak like a spear, heavy tails. <strong>Platykurtic</strong> = flat like the shield, light tails. <strong>Mesokurtic</strong> = normal, the middle ground.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Reference values: |skewness| < 1 = acceptable; |kurtosis| < 2 = acceptable for most parametric analyses. Our dataset is small (n=5), so these values fluctuate greatly.')}
  `;
}

function step11() {
  // Expanded dataset for frequency table
  const expanded = [8, 10, 12, 12, 14, 15, 15, 16, 18, 18, 19, 20, 22, 22, 24, 25, 28, 30, 33, 35];
  const classes = [
    { label: '8 – 13', min: 8, max: 13 },
    { label: '14 – 19', min: 14, max: 19 },
    { label: '20 – 25', min: 20, max: 25 },
    { label: '26 – 31', min: 26, max: 31 },
    { label: '32 – 37', min: 32, max: 37 }
  ];

  const freqs = classes.map(c => expanded.filter(v => v >= c.min && v <= c.max).length);
  const totalF = freqs.reduce((a,b)=>a+b,0);
  const relFreqs = freqs.map(f => f / totalF);
  let cumFreq = 0;
  const cumFreqs = freqs.map(f => { cumFreq += f; return cumFreq; });

  // SVG histogram
  const histW = 600, histH = 220, histPadL = 50, histPadB = 50, histPadT = 20;
  const chartW = histW - histPadL - 20;
  const chartH = histH - histPadT - histPadB;
  const barW2 = chartW / classes.length;
  const maxFreq = Math.max(...freqs);
  const colors = ['#58a6ff', '#3fb950', '#f0c040', '#bc8cff', '#f85149'];

  let histBars = '';
  freqs.forEach((f, i) => {
    const bH = (f / maxFreq) * chartH;
    const x = histPadL + i * barW2;
    const y = histPadT + chartH - bH;
    histBars += `<rect x="${x+2}" y="${histH}" width="${barW2-4}" height="0" fill="${colors[i]}" rx="3" opacity="0.8">
      <animate attributeName="y" from="${histPadT + chartH}" to="${y}" dur="0.6s" begin="${i*0.15}s" fill="freeze"/>
      <animate attributeName="height" from="0" to="${bH}" dur="0.6s" begin="${i*0.15}s" fill="freeze"/>
    </rect>
    <text x="${x + barW2/2}" y="${histPadT + chartH + 16}" text-anchor="middle" fill="#8b949e" font-size="10" font-family="Permanent Marker">${classes[i].label}</text>
    <text x="${x + barW2/2}" y="${y - 5}" text-anchor="middle" fill="#f0c040" font-family="Bangers" font-size="14" opacity="0">
      ${f}
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="${i*0.15+0.4}s" fill="freeze"/>
    </text>`;
  });

  return `
    <h2 class="step-title">Frequency Table and Histogram</h2>
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'When we have a lot of data, grouping them into classes makes visualization easier. Suppose we expanded the records to 20 Viking raids:')}

    <p style="margin:8px 0; font-size:0.95rem; color:var(--text-dim);">Expanded dataset: ${expanded.join(', ')}</p>

    <table class="freq-table">
      <tr><th>Class</th><th>Frequency (f)</th><th>Relative Freq.</th><th>Cumulative Freq.</th></tr>
      ${classes.map((c, i) => `
        <tr>
          <td style="color:${colors[i]}">${c.label}</td>
          <td class="hl-gold">${freqs[i]}</td>
          <td>${fmt(relFreqs[i] * 100, 1)}%</td>
          <td>${cumFreqs[i]}</td>
        </tr>`).join('')}
      <tr class="mean-row">
        <td style="text-align:right;"><strong>Total</strong></td>
        <td class="hl-gold">${totalF}</td>
        <td>100%</td>
        <td>—</td>
      </tr>
    </table>

    <div class="visual-container">
      <svg viewBox="0 0 ${histW} ${histH}" xmlns="http://www.w3.org/2000/svg">
        <!-- Axis -->
        <line x1="${histPadL}" y1="${histPadT + chartH}" x2="${histW - 20}" y2="${histPadT + chartH}" stroke="#30363d" stroke-width="1.5"/>
        <line x1="${histPadL}" y1="${histPadT}" x2="${histPadL}" y2="${histPadT + chartH}" stroke="#30363d" stroke-width="1.5"/>
        <!-- Y labels -->
        ${[0,2,4,6,8].map(v => {
          const y = histPadT + chartH - (v / maxFreq) * chartH;
          return `<text x="${histPadL - 8}" y="${y + 4}" text-anchor="end" fill="#8b949e" font-size="11">${v}</text>
            <line x1="${histPadL}" y1="${y}" x2="${histW-20}" y2="${y}" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>`;
        }).join('')}
        ${histBars}
        <text x="${histW/2}" y="${histH - 2}" text-anchor="middle" fill="#8b949e" font-size="11" font-family="Permanent Marker">Gold Coins</text>
      </svg>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Now that\x27s a nice visual! But why 5 classes?')}
    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Sturges\x27 rule suggests k \u2248 1 + 3.322 \xd7 log\u2081\u2080(n). For n=20: k \u2248 1 + 3.322 \xd7 1.301 \u2248 5.3, rounded to 5. Too few classes hide patterns; too many create noise.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The histogram bridges raw data and probability distribution. It is the first visual step to check for normality, skewness, and outliers.')}
  `;
}

function step12() {
  // Box plot SVG
  const bpW = 600, bpH = 160;
  const bpPad = 60;
  const bpScale = (v) => bpPad + ((v - 5) / 35) * (bpW - 2*bpPad);

  const bpMin = sorted[0];  // 12
  const bpMax = sorted[n-1]; // 33
  const bpQ1 = Q1;  // 15
  const bpQ3 = Q3;  // 22
  const bpMed = mediana; // 18

  // Whisker limits (capped at fences or actual min/max)
  const whiskerLow = Math.max(bpMin, fenceL);   // 12 (above 4.5)
  const whiskerHigh = Math.min(bpMax, fenceU);  // 32.5, so whisker to 22, outlier at 33
  // Actually: whisker extends to the most extreme value WITHIN fences
  const withinFence = sorted.filter(v => v >= fenceL && v <= fenceU); // [12,15,18,22]
  const whiskerL = withinFence[0]; // 12
  const whiskerR = withinFence[withinFence.length - 1]; // 22
  const outliers = sorted.filter(v => v < fenceL || v > fenceU); // [33]

  return `
    <h2 class="step-title">Lesson of the Ravens — Final Summary</h2>
    <div class="licao-box">
      <div class="licao-title">🐦‍⬛ Lesson of the Ravens</div>

      ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Key points you should commit to memory:</strong>')}

      <div class="info-panel" style="margin:12px 0;">
        <div class="info-panel-title">Complete Dataset Summary</div>
        <table class="data-table">
          <tr><th>Measure</th><th>Formula</th><th>Value</th></tr>
          <tr><td>Mean (x̄)</td><td>Σxᵢ / n</td><td class="hl-gold">${fmt(media)}</td></tr>
          <tr><td>Median (Md)</td><td>Central sorted value</td><td class="hl-gold">${mediana}</td></tr>
          <tr><td>Range</td><td>x<sub>max</sub> − x<sub>min</sub></td><td class="hl-gold">${amplitude}</td></tr>
          <tr><td>Variance (s\xb2)</td><td>Σ(xᵢ−x̄)² / (n−1)</td><td class="hl-gold">${fmt(variancia)}</td></tr>
          <tr><td>Standard Deviation (s)</td><td>√s²</td><td class="hl-gold">${fmt(desvioPadrao)}</td></tr>
          <tr><td>CV</td><td>(s / x̄) × 100%</td><td class="hl-gold">${fmt(cv)}%</td></tr>
          <tr><td>IQR</td><td>Q3 − Q1</td><td class="hl-gold">${IQR}</td></tr>
          <tr><td>Skewness</td><td>Skewness</td><td class="hl-gold">${fmt(skewness)}</td></tr>
          <tr><td>Kurtosis (excess)</td><td>Kurtosis (excesso)</td><td class="hl-gold">${fmt(kurtosis)}</td></tr>
        </table>
      </div>

      <div class="info-panel" style="margin:16px 0;">
        <div class="info-panel-title">Visual Box-Plot</div>
        <div class="visual-container">
          <svg viewBox="0 0 ${bpW} ${bpH}" xmlns="http://www.w3.org/2000/svg">
            <!-- Axis -->
            <line x1="${bpPad}" y1="100" x2="${bpW-bpPad}" y2="100" stroke="#30363d" stroke-width="1"/>
            ${[5,10,15,20,25,30,35,40].map(v => `
              <line x1="${bpScale(v)}" y1="95" x2="${bpScale(v)}" y2="105" stroke="#8b949e" stroke-width="1"/>
              <text x="${bpScale(v)}" y="118" text-anchor="middle" fill="#8b949e" font-size="11">${v}</text>
            `).join('')}
            <!-- Whiskers -->
            <line x1="${bpScale(whiskerL)}" y1="50" x2="${bpScale(whiskerL)}" y2="70" stroke="#e6edf3" stroke-width="2"/>
            <line x1="${bpScale(whiskerL)}" y1="60" x2="${bpScale(bpQ1)}" y2="60" stroke="#e6edf3" stroke-width="2"/>
            <line x1="${bpScale(whiskerR)}" y1="50" x2="${bpScale(whiskerR)}" y2="70" stroke="#e6edf3" stroke-width="2"/>
            <line x1="${bpScale(bpQ3)}" y1="60" x2="${bpScale(whiskerR)}" y2="60" stroke="#e6edf3" stroke-width="2"/>
            <!-- Box -->
            <rect x="${bpScale(bpQ1)}" y="40" width="${bpScale(bpQ3) - bpScale(bpQ1)}" height="40" fill="rgba(88,166,255,0.15)" stroke="#58a6ff" stroke-width="2" rx="3"/>
            <!-- Median line -->
            <line x1="${bpScale(bpMed)}" y1="40" x2="${bpScale(bpMed)}" y2="80" stroke="#f0c040" stroke-width="3"/>
            <text x="${bpScale(bpMed)}" y="35" text-anchor="middle" fill="#f0c040" font-family="Permanent Marker" font-size="11">Md=${bpMed}</text>
            <!-- Labels -->
            <text x="${bpScale(bpQ1)}" y="92" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="Permanent Marker">Q1=${bpQ1}</text>
            <text x="${bpScale(bpQ3)}" y="92" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="Permanent Marker">Q3=${bpQ3}</text>
            <!-- Outliers -->
            ${outliers.map(v => `
              <circle cx="${bpScale(v)}" cy="60" r="6" fill="none" stroke="#f85149" stroke-width="2.5"/>
              <text x="${bpScale(v)}" y="35" text-anchor="middle" fill="#f85149" font-family="Permanent Marker" font-size="11">${v} ⚠</text>
            `).join('')}
            <!-- Fence markers -->
            <line x1="${bpScale(fenceL)}" y1="42" x2="${bpScale(fenceL)}" y2="78" stroke="#f85149" stroke-width="1" stroke-dasharray="3,3"/>
            <line x1="${bpScale(fenceU)}" y1="42" x2="${bpScale(fenceU)}" y2="78" stroke="#f85149" stroke-width="1" stroke-dasharray="3,3"/>
            <text x="${bpScale(fenceU)}" y="${130}" text-anchor="middle" fill="#f85149" font-size="9" font-family="Permanent Marker">Fence=${fmt(fenceU)}</text>
          </svg>
        </div>
      </div>

      <div style="margin-top:16px;">
        ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>Huginn challenges:</strong> When would the median be better than the mean for reporting the "typical treasure" of a Viking expedition? And if the Jarl asked for the "most likely" treasure instead of the "average treasure," which measure would you use? Think before moving on.')}
      </div>
    </div>
  `;
}

        <tr><td>Median</td><td><em>Mdn</em> = X.XX</td><td><em>Mdn</em> = ${mediana}</td></tr>
        <tr><td>Range</td><td>Range: X – Y</td><td>Range: ${sorted[0]} – ${sorted[n-1]}</td></tr>

    <div class="info-panel" style="border-left: 3px solid var(--success); margin-top:16px;">
      <div class="info-panel-title" style="color:var(--success);">Complete Descriptive Table (Template)</div>
      <table class="data-table" style="font-size:0.95rem;">

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Congratulations, warrior. You have mastered the fundamental tools of descriptive statistics. From central tendency to spread, from shape to reporting \x96 each measure is a piece of the parchment. Now move forward: inferential statistics awaits you in the coming chapters.')}

    <div class="licao-box" style="margin-top:20px; text-align:center;">

// ===== STEP REGISTRY =====
const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10, step11, step12, step13];
const totalSteps = stepFunctions.length;
let currentStep = 0;

const stepNames = [
  'Introduction',
  'Central Tendency',
  'When to Use Each Measure',
  'Outliers',
  'Range',
  'Deviations',
  'Variance',
  'Standard Deviation',
  'Coefficient of Variation',
  '68-95-99.7 Rule',
  'Skewness and Kurtosis',
  'Frequency Table',
  'Lesson of the Ravens',
  'APA Report'
];

// ===== NAVIGATION =====
function renderStep() {
  const content = document.getElementById('stepContent');
  content.innerHTML = stepFunctions[currentStep]();
  content.style.animation = 'none';
  content.offsetHeight; // trigger reflow
  content.style.animation = 'fadeIn 0.4s ease';

  document.getElementById('progressLabel').textContent = `Step ${currentStep} of ${totalSteps - 1} — ${stepNames[currentStep]}`;
  document.getElementById('progressFill').style.width = `${(currentStep / (totalSteps - 1)) * 100}%`;

  document.getElementById('btnBack').disabled = currentStep === 0;
  document.getElementById('btnNext').textContent = currentStep === totalSteps - 1 ? 'Start Over ↻' : 'Next ▶';

  // Animate deviation bars after render
  setTimeout(() => {
    const maxDev = Math.max(...desvios.map(Math.abs));
    desvios.forEach((d, i) => {
      const bar = document.getElementById('devBar' + i);
      if (bar) {
        bar.style.width = (Math.abs(d) / maxDev * 80) + '%';
      }
    });
  }, 300);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep >= totalSteps - 1) {
    currentStep = 0;
  } else {
    currentStep++;
  }
  renderStep();
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

// Initialize
renderStep();
</script>
