<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantitative Research — Step by Step | Odinfather</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* PROGRESS BAR */
.progress-bar-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-dark);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* STEP CONTENT */
.step-content {
  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.step-subtitle {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.3rem;
  color: var(--odin-blue);
  margin-bottom: 15px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
  position: relative;
}

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}
.dialogue-box.huginn {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 6px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }
.char-name.huginn { color: var(--corvo-purple); }

.dialogue-text {
  font-size: 1.05rem;
  line-height: 1.5;
}

/* DATA TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {
  padding: 10px 14px;
  text-align: left;
  border: 1px solid var(--border);
}

.data-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

.data-table td {
  background: var(--bg-card);
  transition: background 0.2s;
}

.data-table tr:hover td {
  background: rgba(88,166,255,0.1);
}

/* FORMULA / DATA-DISPLAY */
.formula {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.15rem;
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  color: var(--gold);
}

.formula-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 6px;
}

.data-display {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.05rem;
  line-height: 1.7;
}

.data-display .label {
  font-family: 'Permanent Marker', cursive;
  color: var(--gold);
  font-size: 0.9rem;
  margin-bottom: 8px;
}

/* CONCEPT CARDS */
.concept-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 20px 0;
}

.concept-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.concept-card h4 {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 8px;
}

.concept-card p {
  font-size: 0.95rem;
  color: var(--text-dim);
  line-height: 1.4;
}

.concept-card.blue { border-left: 3px solid var(--odin-blue); }
.concept-card.blue h4 { color: var(--odin-blue); }

.concept-card.red { border-left: 3px solid var(--thor-red); }
.concept-card.red h4 { color: var(--thor-red); }

.concept-card.gold { border-left: 3px solid var(--gold); }
.concept-card.gold h4 { color: var(--gold); }

.concept-card.green { border-left: 3px solid var(--success); }
.concept-card.green h4 { color: var(--success); }

.concept-card.purple { border-left: 3px solid var(--corvo-purple); }
.concept-card.purple h4 { color: var(--corvo-purple); }

/* THREAT LIST */
.threat-list {
  list-style: none;
  margin: 16px 0;
  padding: 0;
}

.threat-list li {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin: 8px 0;
  border-left: 3px solid var(--thor-red);
}

.threat-list li strong {
  color: var(--gold);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

/* CHECKLIST */
.checklist {
  list-style: none;
  margin: 16px 0;
  padding: 0;
}

.checklist li {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin: 8px 0;
  border-left: 3px solid var(--success);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.checklist li .check-icon {
  color: var(--success);
  font-size: 1.2rem;
  flex-shrink: 0;
  margin-top: 2px;
}

/* NAVIGATION */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 40px;
  gap: 12px;
}

.nav-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  padding: 12px 28px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover {
  border-color: var(--odin-blue);
  background: rgba(88,166,255,0.1);
}

.nav-btn.primary {
  background: var(--odin-blue);
  color: var(--bg-dark);
  border-color: var(--odin-blue);
}

.nav-btn.primary:hover {
  background: #79bbff;
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* SIGNATURE */
.signature {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* HIGHLIGHT */
.hl-gold { color: var(--gold); font-weight: bold; }
.hl-blue { color: var(--odin-blue); }
.hl-red { color: var(--thor-red); }
.hl-green { color: var(--success); }
.hl-purple { color: var(--corvo-purple); }

em {
  color: var(--gold);
  font-weight: bold;
  font-style: normal;
}

/* LICAO DOS CORVOS */
.licao-box {
  background: rgba(188,140,255,0.06);
  border: 2px solid var(--corvo-purple);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.licao-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--corvo-purple);
  margin-bottom: 12px;
}

.licao-section {
  margin: 12px 0;
}

.licao-section h4 {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  color: var(--corvo-purple);
  margin-bottom: 6px;
}

.licao-section ul {
  margin: 0;
  padding-left: 20px;
}

.licao-section li {
  margin: 4px 0;
  line-height: 1.5;
}

/* BOX HISTORICO */
.box-historico {
  background: var(--bg-panel);
  border: 1px solid var(--gold);
  border-left: 4px solid var(--gold);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
}

.box-historico .box-title {
  font-family: 'Bangers', cursive;
  color: var(--gold);
  font-size: 1.1rem;
  margin-bottom: 8px;
}

/* BOX ARMADILHA */
.box-armadilha {
  background: rgba(248,81,73,0.05);
  border: 1px solid var(--thor-red);
  border-left: 4px solid var(--thor-red);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
}

.box-armadilha .box-title {
  font-family: 'Bangers', cursive;
  color: var(--thor-red);
  font-size: 1.1rem;
  margin-bottom: 8px;
}

/* CYCLE DIAGRAM */
.cycle-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: 20px 0;
  align-items: center;
}

.cycle-step {
  background: var(--bg-card);
  border: 2px solid var(--odin-blue);
  border-radius: 10px;
  padding: 12px 18px;
  text-align: center;
  min-width: 120px;
}

.cycle-step .cycle-num {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--gold);
}

.cycle-step .cycle-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 0.85rem;
  color: var(--odin-blue);
}

.cycle-arrow {
  font-size: 1.5rem;
  color: var(--gold);
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .step-title { font-size: 1.6rem; }
  .concept-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 10px 18px; font-size: 0.95rem; }
  body { font-size: 16px; }
  .data-table { font-size: 0.85rem; }
  .data-table th, .data-table td { padding: 6px 8px; }
}

/* FADE ANIMATIONS */
.fade-in {
  animation: fadeIn 0.6s ease both;
}

.fade-in-delay {
  animation: fadeIn 0.6s ease 0.3s both;
}
</style>
</head>
<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 11</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DIALOGUE HELPER =====
function dialogue(character, name, text) {
  return `<div class="dialogue-box ${character}">
    <div class="char-name ${character}">${name}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}

// ===== STEP FUNCTIONS =====
const totalSteps = 12; // 0..11
let currentStep = 0;

// ---- STEP 0: INTRO ----
function step0() {
  return `
    <div class="step-title">Quantitative Research: The Council at the Gates of Midgard</div>

    <p>The Jarl examines the harvest scroll for the quarter and decrees: "Barley production has improved." Improved based on what? A hunch? The smile of the farmer who brought him mead?</p>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'Quantitative research exists to transform impressions into <em>evidence</em> &mdash; and evidence into defensible decisions. It\x27s not a matter of preference. It\x27s a matter of consequence.')}

    ${dialogue('thor', '⚡ Thorment', 'Why all the fuss? Just ask the people and feel the market! Data is scribe nonsense...')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'When a merchant from Midgard launches a trade route based on a biased sample of travelers, ships sink and gold evaporates. The difference between research and opinion is not sophistication &mdash; it\x27s <em>responsibility</em>.')}

    ${dialogue('corvo', '🐦‍⬛‍⬛ Muninn whispers:', 'The root of the word "statistics" comes from the Latin <em>status</em> &mdash; the state of things. Since the 17th century, to quantify is to govern.')}

    <p>In this guide, we will walk through the fundamentals of quantitative research &mdash; step by step, no shortcuts from Thorment. Each concept is an ingredient in Odinfather\x27s kitchen: skip one and the dish falls apart.</p>

    <div class="box-historico">
      <div class="box-title">Historical Box: Fisher e a Senhora que Tomava Cha</div>
      <p>In 1920, in Cambridge, biologist Muriel Bristol claimed she could distinguish &mdash; by taste &mdash; whether the milk was poured before or after the tea. Ronald Fisher prepared eight cups in random order. Bristol got them all right. The experiment became the foundation of <em>The Design of Experiments</em> (1935). Odinfather\x27s lesson: even the most trivial claim can &mdash; and should &mdash; be tested with rigor.</p>
    </div>
  `;
}

// ---- STEP 1: QUANTI VS QUALI ----
function step1() {
  return `
    <div class="step-title">Quantitative vs. Qualitative</div>

    ${dialogue('thor', '⚡ Thorment', 'Just ask the warriors what they think! In-depth interviews, observation... who needs numbers?')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'Qualitative and quantitative research are not enemies &mdash; they are approaches for different questions. However, confusing when to use each one is the recipe for disaster.')}

    <table class="data-table">
      <tr>
        <th>Criterion</th>
        <th style="color:var(--odin-blue)">Quantitative</th>
        <th style="color:var(--success)">Qualitative</th>
      </tr>
      <tr>
        <td><strong>Objective</strong></td>
        <td>Measure, test hypotheses, generalize</td>
        <td>Understand, explore, interpret</td>
      </tr>
      <tr>
        <td><strong>Data</strong></td>
        <td>Numbers, scales, metrics</td>
        <td>Words, narratives, images</td>
      </tr>
      <tr>
        <td><strong>Sample</strong></td>
        <td>Large, representative</td>
        <td>Small, purposive</td>
      </tr>
      <tr>
        <td><strong>Analysis</strong></td>
        <td>Statistical (tests, models)</td>
        <td>Thematic, discursive, phenomenological</td>
      </tr>
      <tr>
        <td><strong>Result</strong></td>
        <td>Generalizations, p-values, CI</td>
        <td>Categories, patterns, meanings</td>
      </tr>
      <tr>
        <td><strong>Norse Example</strong></td>
        <td>"Villages with a forge produce 23% more weapons" (n=200)</td>
        <td>"How blacksmiths perceive the forge as clan identity"</td>
      </tr>
    </table>

    ${dialogue('corvo', '🐦‍⬛‍⬛ Muninn whispers:', 'The research question dictates the method &mdash; never the other way around. Questions of "how much", "how often" and "what is the relationship between" call for a quantitative approach.')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'Thorment wants you to choose by minimum effort. Odinfather wants you to choose by the question. The pot depends on the dish &mdash; not on the cook\x27s laziness.')}
  `;
}

// ---- STEP 2: TIPOS DE VARIAVEIS ----
function step2() {
  return `
    <div class="step-title">Types of Variables</div>

    <p>Thorment thinks a variable is a variable. "Throw it in the model and run it," he says, raising the hammer over the Enter key. Odinfather takes a deep breath. And explains.</p>

    <div class="concept-grid">
      <div class="concept-card blue">
        <h4>Independent Variable (IV)</h4>
        <p>What you manipulate or measure as a cause. Example: type of weapon used in battle (sword, axe, spear).</p>
      </div>
      <div class="concept-card gold">
        <h4>Dependent Variable (DV)</h4>
        <p>The effect you want to explain. Example: number of enemies defeated in combat.</p>
      </div>
      <div class="concept-card green">
        <h4>Moderating Variable</h4>
        <p>Changes the strength or direction of the IV &rarr; DV relationship. Example: warrior experience &mdash; does the sword work better for veterans?</p>
      </div>
      <div class="concept-card purple">
        <h4>Mediating Variable</h4>
        <p>The mechanism that explains *how* the IV affects the DV. Example: weapon type &rarr; <em>warrior confidence</em> &rarr; battle performance.</p>
      </div>
      <div class="concept-card red">
        <h4>Control Variable</h4>
        <p>What you keep constant to isolate the effect. Example: same terrain, same time, same pre-battle diet.</p>
      </div>
    </div>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'If you don\x27t know who is the IV and who is the DV in your study, you don\x27t have a study. You have a longship ride with no destination.')}

    ${dialogue('thor', '⚡ Thorment', 'Moderator, mediator... it\x27s all the same thing, right?')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'No. The <em>moderator</em> changes the strength of the relationship (for whom it works best). The <em>mediator</em> explains the pathway through which the effect occurs (why it works). Confusing the two is a serious error &mdash; and Thorment makes it every week.')}

    <div class="data-display">
      <div class="label">Viking Conceptual Model</div>
      <p style="text-align:center; font-family:'Permanent Marker'; font-size:1.1rem;">
        <span class="hl-blue">Weapon Type (IV)</span>
        &nbsp;&rarr;&nbsp;
        <span class="hl-purple">Confidence (Mediator)</span>
        &nbsp;&rarr;&nbsp;
        <span class="hl-gold">Performance (DV)</span>
      </p>
      <p style="text-align:center; margin-top:8px; font-size:0.95rem;">
        <span class="hl-green">Warrior Experience (Moderator)</span> changes the strength of IV &rarr; DV
      </p>
    </div>
  `;
}

// ---- STEP 3: ESCALAS DE MEDIDA ----
function step3() {
  return `
    <div class="step-title">Measurement Scales: The Four Levels</div>

    <p>The choice of statistical test depends on the type of variable. Running an ANOVA with a nominal dependent variable is like using a thermometer to measure the weight of a pig &mdash; the instrument works, but it measures the wrong thing.</p>

    <table class="data-table">
      <tr>
        <th>Scale</th>
        <th>Property</th>
        <th>Norse Example</th>
        <th>Operations</th>
      </tr>
      <tr>
        <td><span class="hl-blue">Nominal</span></td>
        <td>Categories without order</td>
        <td>Clan name: Fenrir, Hel, Jormungandr</td>
        <td>= , &ne;</td>
      </tr>
      <tr>
        <td><span class="hl-green">Ordinal</span></td>
        <td>Order, unequal distances</td>
        <td>Warrior ranking: Jarl > Huskarl > Thrall</td>
        <td>= , &ne; , &lt; , &gt;</td>
      </tr>
      <tr>
        <td><span class="hl-gold">Interval</span></td>
        <td>Equal distances, arbitrary zero</td>
        <td>Forge oven temperature (Celsius)</td>
        <td>= , &ne; , &lt; , &gt; , + , &minus;</td>
      </tr>
      <tr>
        <td><span class="hl-red">Ratio</span></td>
        <td>Equal distances, absolute zero</td>
        <td>Gold coins collected in tribute</td>
        <td>= , &ne; , &lt; , &gt; , + , &minus; , &times; , &divide;</td>
      </tr>
    </table>

    ${dialogue('thor', '⚡ Thorment', '5-point Likert is interval, right? So I can calculate the mean!')}

    <div class="box-armadilha">
      <div class="box-title">Trap Box</div>
      <p>"Are 5-point Likert scale data interval?" &mdash; This debate never ends. Most Business researchers treat it as interval, but know that this decision has consequences and you need to justify it.</p>
    </div>

    ${dialogue('corvo', '🐦‍⬛‍⬛ Muninn whispers:', 'Memorize the acronym <em>NOIR</em>: Nominal, Ordinal, Interval, Ratio. Each level adds a mathematical property to the previous one.')}

    <p style="margin-top:16px">On the other hand, there is another distinction that cuts across all four levels:</p>

    <div class="concept-grid">
      <div class="concept-card blue">
        <h4>Discrete</h4>
        <p>Specific, countable values. There is no "1.47 egg" in the recipe. Number of the Jarl\x27s children, villages under tribute, heads of cattle. You <strong>count</strong>.</p>
      </div>
      <div class="concept-card gold">
        <h4>Continuous</h4>
        <p>Infinite values between two points. Oven temperature, flour weight in kilos, bread baking time. You <strong>measure</strong>.</p>
      </div>
    </div>
  `;
}

// ---- STEP 4: HIPOTESES ----
function step4() {
  return `
    <div class="step-title">Hypotheses: H&#8320; e H&#8321;</div>

    <p>From theory are born <em>hypotheses</em> &mdash; testable, falsifiable statements with direction and scope. Without a hypothesis, there is no test. Without a test, there is no science.</p>

    <div class="data-display">
      <div class="label">Formal Definition</div>
      <p><span class="hl-blue">H&#8320; (Null Hypothesis):</span> There is no effect or difference in the population. The observed result is merely random variation.</p>
      <p style="margin-top:8px"><span class="hl-gold">H&#8321; (Alternative Hypothesis):</span> There is a real effect or difference in the population. The result is not due to chance.</p>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'My hypothesis: "Swords are good and warriors are strong." Done! Let\x27s run SPSS!')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'That is not a hypothesis, Thorment. It\x27s a platitude. A hypothesis needs to be <em>specific</em>, <em>directional</em> and <em>falsifiable</em>.')}

    <div class="concept-grid">
      <div class="concept-card red">
        <h4>BAD Hypothesis (Thorment)</h4>
        <p>"Good swords are important for warriors."</p>
        <p style="margin-top:6px; color:var(--thor-red); font-size:0.9rem;">Vague, not testable, not falsifiable. What is "good"? "Important" how?</p>
      </div>
      <div class="concept-card green">
        <h4>GOOD Hypothesis (Odinfather)</h4>
        <p>"The quality of steel from the Nidavellir forge increases sword durability by 20% compared to Svartalfheim steel."</p>
        <p style="margin-top:6px; color:var(--success); font-size:0.9rem;">Specific, directional, measurable, falsifiable.</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛‍⬛ Muninn whispers:', 'The statistical test evaluates <em>H&#8320;</em>. If the probability of the data under H&#8320; is very low (p &lt; &alpha;), we reject H&#8320; in favor of H&#8321;. We never "prove" H&#8321; &mdash; we only find evidence against H&#8320;.')}

    ${dialogue('huginn', '🐦‍⬛‍⬛ Huginn challenges:', 'If your hypothesis emerged <em>after</em> seeing the results, it\x27s not a hypothesis. It\x27s a retroactive prophecy. This has a technical name: <em>HARKing</em> (Hypothesizing After Results are Known). Thorment loves it.')}
  `;
}

// ---- STEP 5: VALIDADE INTERNA ----
function step5() {
  return `
    <div class="step-title">Internal Validity</div>

    <p>Internal validity answers a brutal question: is the relationship you found between IV and DV <em>causal</em>, or is there an alternative explanation?</p>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'Research with high internal validity allows you to say: "A changed B." With low internal validity, you can only say: "A and B occurred together &mdash; and maybe C, D, and E also helped."')}

    <p class="step-subtitle">The 7 Classic Threats (Campbell & Stanley)</p>

    <ul class="threat-list">
      <li>
        <strong>1. History</strong><br>
        External events that occur during the study. The clan tested a new sword, but midway through the experiment a storm came that affected all battles.
      </li>
      <li>
        <strong>2. Maturation</strong><br>
        Natural changes in participants over time. The warriors got stronger simply because they trained between measurements &mdash; not because of the new sword.
      </li>
      <li>
        <strong>3. Instrumentation</strong><br>
        Change in the measurement instrument. The scribe who counted casualties in the first battle was replaced by a less precise apprentice in the second.
      </li>
      <li>
        <strong>4. Regression to the Mean</strong><br>
        Extreme values tend to return to the mean. The worst clan from last season improved &mdash; but this would be expected even without intervention.
      </li>
      <li>
        <strong>5. Selection</strong><br>
        Non-equivalent groups from the start. If you compared volunteer warriors with recruits, motivation was already different before the treatment.
      </li>
      <li>
        <strong>6. Experimental Mortality</strong><br>
        Participants who drop out of the study. If only the strongest warriors survive until the final measurement, your results are inflated.
      </li>
      <li>
        <strong>7. Interaction Between Threats</strong><br>
        Combination of two or more threats. Selection + maturation: the experimental group was already stronger AND had more time to train.
      </li>
    </ul>

    ${dialogue('thor', '⚡ Thorment', 'Seven threats? Who cares! If the p-value was significant, it\x27s over!')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'The p-value cannot distinguish signal from noise when the design is compromised. A p < 0.05 with zero internal validity is worth less than a blank scroll.')}
  `;
}

// ---- STEP 6: VALIDADE EXTERNA ----
function step6() {
  return `
    <div class="step-title">External Validity: From Midgard to Asgard?</div>

    <p>If internal validity asks "is the effect real?", external validity asks: "does the effect apply <em>beyond this sample</em>?"</p>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'You tested a healing elixir on 30 warriors from Midgard. It worked. Good news. But &mdash; would it also work in Asgard? In Jotunheim? On women? On the elderly? That is the question of <em>generalization</em>.')}

    <div class="concept-grid">
      <div class="concept-card blue">
        <h4>Generalization to Populations</h4>
        <p>Do the results hold for people different from the sample? If you only tested young men from one clan, you cannot claim anything about women or the elderly from other clans.</p>
      </div>
      <div class="concept-card gold">
        <h4>Generalization to Contexts</h4>
        <p>Do the results hold in other settings? What works in an open-field battle may not work in a fortress siege.</p>
      </div>
      <div class="concept-card green">
        <h4>Temporal Generalization</h4>
        <p>Do the results hold in other time periods? Combat tactics that worked in summer may fail in the Nordic winter.</p>
      </div>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Tested in Midgard, valid for all Nine Realms! Obviously!')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'Wrong. <em>Replication</em> in different contexts is the only way to gain confidence in generalization. A single study does not prove universality &mdash; it suggests a possibility.')}

    <div class="box-armadilha">
      <div class="box-title">Trap Box: Convenience Sample</div>
      <p>If your 5,000 respondents all came from a single village, a single clan, a single realm &mdash; you don\x27t have a large sample. You have a case study disguised as a survey. A large sample without representativeness is <em>garbage with lots of data</em>.</p>
    </div>

    ${dialogue('corvo', '🐦‍⬛‍⬛ Muninn whispers:', 'There is a classic tension: designs that maximize <em>internal</em> validity (controlled laboratory) often sacrifice <em>external</em> validity (real world) &mdash; and vice versa.')}
  `;
}

// ---- STEP 7: CONFIABILIDADE ----
function step7() {
  return `
    <div class="step-title">Reliability: The Scale That Does Not Lie</div>

    <p>Reliability is the <em>consistency</em> of a measurement. If you weigh the same sack of barley three times on the Birka market scale and get 48kg, 51kg, and 44kg &mdash; the scale is not reliable. The problem is not the barley; it\x27s the instrument.</p>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'A <em>reliable</em> instrument produces consistent results in repeated measurements under the same conditions. Without reliability, your data is noise disguised as information.')}

    <div class="concept-grid">
      <div class="concept-card blue">
        <h4>Test-Retest</h4>
        <p>Applies the same instrument twice to the same group. The correlation between measurements indicates temporal stability. If warriors answer a morale scale today and in two weeks, the results should be similar.</p>
      </div>
      <div class="concept-card gold">
        <h4>Internal Consistency</h4>
        <p>Do the instrument items measure the same thing? <em>Cronbach\x27s alpha</em> assesses whether the questions of a scale converge. Values above 0.70 are generally accepted.</p>
      </div>
      <div class="concept-card green">
        <h4>Parallel Forms</h4>
        <p>Two equivalent versions of the instrument. If both yield similar results, reliability is guaranteed. Like having two different scales at the fair and checking if they agree.</p>
      </div>
      <div class="concept-card purple">
        <h4>Inter-Rater</h4>
        <p>Two or more judges evaluate the same phenomenon. If three weapon masters rate the quality of a sword and agree, the measure is reliable.</p>
      </div>
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Cronbach\x27s alpha above 0.70? Any scale can hit that. Just throw in 20 similar questions!')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'Careful. Inflating alpha with redundant items is like weighing the same sack of barley 20 times &mdash; the mean stays stable, but you haven\x27t learned anything new. <em>Reliability without validity is consistency in error.</em>')}

    <div class="data-display">
      <div class="label">Reliability &times; Validity Relationship</div>
      <p><span class="hl-red">Neither reliable nor valid:</span> bullets scattered, far from the target.</p>
      <p><span class="hl-blue">Reliable but not valid:</span> bullets clustered, but far from the center.</p>
      <p><span class="hl-green">Reliable AND valid:</span> bullets clustered at the center of the target.</p>
      <p style="margin-top:8px; color:var(--text-dim);">You can be consistent and still be wrong. Validity requires reliability, but reliability does not guarantee validity.</p>
    </div>
  `;
}

// ---- STEP 8: DESENHOS DE PESQUISA ----
function step8() {
  return `
    <div class="step-title">Research Designs</div>

    <p>The research design is the blueprint of the study. Getting it wrong here is like building a wall on a crooked foundation &mdash; no matter how imposing the watchtower looks.</p>

    <table class="data-table">
      <tr>
        <th>Design</th>
        <th>Manipulation?</th>
        <th>Control?</th>
        <th>Causal Inference</th>
        <th>Norse Example</th>
      </tr>
      <tr>
        <td><span class="hl-gold">Experimental</span></td>
        <td>Yes</td>
        <td>Control group + randomization</td>
        <td><span class="hl-green">High</span></td>
        <td>Two identical ovens: one with new seasoning, the other without. Which bread turns out better?</td>
      </tr>
      <tr>
        <td><span class="hl-blue">Quasi-experimental</span></td>
        <td>Yes</td>
        <td>No randomization</td>
        <td><span class="hl-gold">Moderate</span></td>
        <td>Compare two villages: one received combat training, the other did not (without randomization).</td>
      </tr>
      <tr>
        <td><span class="hl-purple">Survey</span></td>
        <td>No</td>
        <td>None</td>
        <td><span class="hl-red">Low</span></td>
        <td>Questionnaire on satisfaction with the Jarl, administered to 500 warriors.</td>
      </tr>
      <tr>
        <td><span class="hl-blue">Correlational</span></td>
        <td>No</td>
        <td>None</td>
        <td><span class="hl-red">Low</span></td>
        <td>Association between herd size and village wealth (secondary data).</td>
      </tr>
    </table>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'Experiments are the gold standard. When randomization is impossible or unethical &mdash; you can\x27t randomly assign which villages get raided &mdash; you use quasi-experiments. The survey is the bread and butter of Business Administration: easy to collect, hard to do well.')}

    ${dialogue('thor', '⚡ Thorment', 'Survey with convenience sample! Quick, cheap, and the reviewer won\x27t complain!')}

    ${dialogue('huginn', '🐦‍⬛‍⬛ Huginn challenges:', 'The research question should dictate the design &mdash; <em>never the other way around</em>. You don\x27t choose the pot before knowing what you\x27re going to cook.')}

    <div class="box-armadilha">
      <div class="box-title">Trap Box: Common Method Bias</div>
      <p>When the same warrior, at the same time, responds to both the independent and dependent variables &mdash; it\x27s like asking the defendant if he\x27s guilty. The risk is that inflated correlations appear because of the <em>method</em>, not <em>reality</em>.</p>
    </div>
  `;
}

// ---- STEP 9: VIES E AMEACAS ----
function step9() {
  return `
    <div class="step-title">Common Biases and Threats</div>

    <p>Biases are systematic distortions that contaminate results. Thorment collects biases like battle trophies &mdash; without realizing that each one compromises his research.</p>

    <ul class="threat-list">
      <li>
        <strong>Confirmation Bias</strong><br>
        Seeking only evidence that confirms your belief. Thorment believes that Nidavellir swords are superior and ignores all contrary evidence.
        ${dialogue('thor', '⚡ Thorment', 'Look &mdash; I found THREE studies that support my hypothesis! The other twelve that contradict it? Weak methodology.')}
      </li>
      <li>
        <strong>Survivorship Bias</strong><br>
        Analyzing only those who "survived" the process. If you study only successful merchants at the Birka fair, you ignore all who failed &mdash; and your conclusions are inflated.
      </li>
      <li>
        <strong>Selection Bias</strong><br>
        Non-random sample that distorts results. Asking "do you like mead?" only inside a tavern yields 98% "yes" &mdash; zero surprise.
      </li>
      <li>
        <strong>Social Desirability Bias</strong><br>
        Respondents say what they think the researcher wants to hear. "Is the Jarl a good leader?" &mdash; asked the Jarl himself.
      </li>
      <li>
        <strong>Response Bias</strong><br>
        Tendency to always mark the same point on the scale (acquiescence) or extreme responses. The warrior marks 5 on everything because he\x27s in a hurry for the feast.
      </li>
      <li>
        <strong>Researcher Bias</strong><br>
        The researcher unconsciously influences results. Odinfather insists: pre-register hypotheses and analysis plan <em>before</em> collecting data.
      </li>
    </ul>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'Biases are not calculation errors &mdash; they are <em>design</em> errors. No statistical test corrects biased data. Garbage in, garbage out.')}

    ${dialogue('corvo', '🐦‍⬛‍⬛ Muninn whispers:', 'The antidote against biases: randomization, blinding, pre-registration, validated instruments and &mdash; above all &mdash; epistemological humility.')}
  `;
}

// ---- STEP 10: LICAO DOS CORVOS ----
function step10() {
  return `
    <div class="step-title">Lesson of the Ravens</div>

    <div class="licao-box">
      <div class="licao-title">Muninn Summarizes &mdash; What You Need to Remember</div>

      <div class="licao-section">
        <h4>Key Points</h4>
        <ul>
          <li>Quantitative research transforms impressions into <em>evidence</em> &mdash; and evidence into defensible decisions.</li>
          <li>The research question dictates the method: "how much?", "what is the relationship?" and "how often?" call for a quantitative approach.</li>
          <li>Variables are classified as IV, DV, moderator, mediator, and control &mdash; confusing them is fatal.</li>
          <li>Scales follow NOIR: Nominal, Ordinal, Interval, Ratio. The test depends on the scale.</li>
          <li>Hypotheses must be specific, directional, and falsifiable. If it\x27s not falsifiable, it\x27s not science.</li>
          <li>Internal validity = is the effect real? External validity = does the effect generalize?</li>
          <li>Reliability = measurement consistency. Validity requires reliability, but not the other way around.</li>
          <li>Experiments are the gold standard. Surveys are the bread and butter &mdash; but require extra care.</li>
          <li>Biases are <em>design</em> errors, not calculation errors. No statistical test corrects biased data.</li>
        </ul>
      </div>
    </div>

    <div class="licao-box" style="border-color: var(--odin-blue); background: rgba(88,166,255,0.04);">
      <div class="licao-title" style="color: var(--odin-blue);">Huginn Challenges &mdash; Questions for Reflection</div>

      <div class="licao-section">
        <h4 style="color: var(--odin-blue);">Challenges</h4>
        <ul>
          <li>In your research project, do you know exactly who is the IV and who is the DV? And the moderators and mediators?</li>
          <li>Were your hypotheses formulated <em>before</em> seeing the data &mdash; or are you HARKing like Thorment?</li>
          <li>What is the greatest threat to your study\x27s internal validity? What have you done to control it?</li>
          <li>Does your sample allow generalization &mdash; or do you have a case study disguised as a survey?</li>
          <li>Do your instruments have reliability evidence in your research context? Cronbach\x27s alpha is not sufficient by itself.</li>
          <li>Which bias is most likely in your design? Do you have a strategy to mitigate it?</li>
        </ul>
      </div>
    </div>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'The statistical kitchen is demanding. The ingredients need screening. The utensils need calibration. And the cook &mdash; you &mdash; needs patience.')}

    ${dialogue('thor', '⚡ Thorment', 'Enough already! Let\x27s skip to data analysis!')}

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'In the next chapter, we will open the provisions barrel. See what\x27s inside. Check for validity. Examine what\x27s fresh, what\x27s wilted, and what needs to go in the trash. <em>Descriptive statistics</em> &mdash; the diagnosis before the treatment.')}
  `;
}

// ---- STEP 11: REPORTE FINAL / CHECKLIST ----
function step11() {
  return `
    <div class="step-title">Checklist: What a Good Quantitative Study Needs</div>

    <p>Before collecting a single data point, go through this list. If you answered "no" to more than two items, Thorment has the hammer in your hand. Drop it.</p>

    <ul class="checklist">
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Teoria:</strong> Do I have a theoretical foundation that justifies my hypotheses &mdash; or am I "fishing" for relationships in the data like Thorment?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Hypotheses:</strong> Are my hypotheses specific, directional, and falsifiable?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Variables:</strong> Do I know exactly the type of each variable (nominal, ordinal, interval, ratio) and its nature (discrete or continuous)?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Design:</strong> Did I choose the design based on the question &mdash; or on convenience?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Population and Sample:</strong> Do I know my target population and how I will select the sample? Is the sample representative?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Sample Size:</strong> Did I conduct a power analysis to determine the minimum n? (If you don\x27t know how, read Chapter 14.)</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Instruments:</strong> Have the scales I will use been validated in my context? Do I have reliability evidence?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Internal Validity:</strong> Have I identified threats to my design and do I have strategies to mitigate them?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>External Validity:</strong> To whom and in what context do my results apply? Am I making promises my sample cannot support?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Biases:</strong> What is the most likely bias in my study and what am I doing to control it?</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Pre-registration:</strong> Did I register hypotheses and analysis plan before collecting? (If not, Thorment smiles.)</div>
      </li>
      <li>
        <span class="check-icon">&check;</span>
        <div><strong>Ethics:</strong> Do I have ethics committee approval? Did participants give informed consent?</div>
      </li>
    </ul>

    ${dialogue('odin', '🧙‍♂️‍♂️ Odinfather', 'This checklist is not bureaucratic &mdash; it\x27s the difference between science and guesswork. Every item you skip is a gap through which Thorment enters with the hammer.')}

    <div class="box-historico">
      <div class="box-title">Complete Cycle of Quantitative Research</div>
      <div class="cycle-container">
        <div class="cycle-step">
          <div class="cycle-num">1</div>
          <div class="cycle-label">Theory</div>
        </div>
        <span class="cycle-arrow">&rarr;</span>
        <div class="cycle-step">
          <div class="cycle-num">2</div>
          <div class="cycle-label">Hypotheses</div>
        </div>
        <span class="cycle-arrow">&rarr;</span>
        <div class="cycle-step">
          <div class="cycle-num">3</div>
          <div class="cycle-label">Design</div>
        </div>
        <span class="cycle-arrow">&rarr;</span>
        <div class="cycle-step">
          <div class="cycle-num">4</div>
          <div class="cycle-label">Collection</div>
        </div>
        <span class="cycle-arrow">&rarr;</span>
        <div class="cycle-step">
          <div class="cycle-num">5</div>
          <div class="cycle-label">Analysis</div>
        </div>
        <span class="cycle-arrow">&rarr;</span>
        <div class="cycle-step">
          <div class="cycle-num">6</div>
          <div class="cycle-label">Inference</div>
        </div>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛‍⬛ Muninn whispers:', 'Quantitative research is the discipline of transforming the chaos of the world into structured information &mdash; well-defined variables, well-selected samples, well-planned designs, well-grounded analyses.')}

    ${dialogue('huginn', '🐦‍⬛‍⬛ Huginn challenges:', 'And the discipline of resisting Thorment\x27s temptation &mdash; who will offer you seductive shortcuts at <em>each and every</em> stage. Don\x27t let him.')}
  `;
}

// ===== STEP MAP =====
const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10, step11];

const stepNames = [
  'Introduction',
  'Quanti vs Quali',
  'Types of Variables',
  'Measurement Scales',
  'Hypotheses',
  'Internal Validity',
  'External Validity',
  'Reliability',
  'Research Designs',
  'Biases and Threats',
  'Lesson of the Ravens',
  'Final Checklist'
];

// ===== NAVIGATION =====
function renderStep() {
  const content = document.getElementById('stepContent');
  content.innerHTML = stepFunctions[currentStep]();
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = 'fadeIn 0.4s ease';

  document.getElementById('progressLabel').textContent = `Step ${currentStep} of ${totalSteps - 1} — ${stepNames[currentStep]}`;
  document.getElementById('progressFill').style.width = `${(currentStep / (totalSteps - 1)) * 100}%`;

  document.getElementById('btnBack').disabled = currentStep === 0;
  document.getElementById('btnNext').textContent = currentStep === totalSteps - 1 ? 'Start Over ↻' : 'Next ▶';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep >= totalSteps - 1) {
    currentStep = 0;
  } else {
    currentStep++;
  }
  renderStep();
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

// Initialize
renderStep();
</script>
