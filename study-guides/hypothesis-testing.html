<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypothesis Testing (NHST) — Step by Step | Odinfather</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* PROGRESS BAR */
.progress-bar-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-dark);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* STEP CONTENT */
.step-content {
  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.step-subtitle {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.3rem;
  color: var(--odin-blue);
  margin-bottom: 15px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
  position: relative;
}

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 6px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }

.dialogue-text {
  font-size: 1.05rem;
  line-height: 1.5;
}

/* DATA TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.data-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

.data-table td {
  background: var(--bg-card);
  transition: background 0.2s;
}

.data-table tr:hover td {
  background: rgba(88,166,255,0.1);
}

/* FORMULA */
.formula {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.15rem;
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  color: var(--gold);
}

.formula-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 6px;
}

/* VISUAL CONTAINER */
.visual-container {
  margin: 20px 0;
  text-align: center;
}

.visual-container svg {
  max-width: 100%;
  height: auto;
}

/* DECISION TABLE */
.decision-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.decision-table th, .decision-table td {
  padding: 14px 16px;
  text-align: center;
  border: 2px solid var(--border);
}

.decision-table th {
  background: var(--bg-panel);
  font-family: 'Bangers', cursive;
  font-size: 1.1rem;
  color: var(--gold);
}

.decision-table td {
  background: var(--bg-card);
  font-family: 'Patrick Hand', cursive;
}

.decision-table .correct-cell {
  background: rgba(63,185,80,0.12);
  border-color: var(--success);
}

.decision-table .error-cell {
  background: rgba(248,81,73,0.12);
  border-color: var(--thor-red);
}

/* CONCEPT CARDS */
.concept-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 20px 0;
}

.concept-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.concept-card .card-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 8px;
}

.concept-card .card-value {
  font-family: 'Bangers', cursive;
  font-size: 1.6rem;
}

/* EFFECT SIZE TABLE */
.es-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 1rem;
}

.es-table th, .es-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.es-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  color: var(--gold);
}

.es-table td {
  background: var(--bg-card);
}

/* WARNING BOX */
.warning-box {
  background: rgba(248,81,73,0.08);
  border: 2px solid var(--thor-red);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
}

.warning-title {
  font-family: 'Bangers', cursive;
  color: var(--thor-red);
  font-size: 1.2rem;
  margin-bottom: 8px;
}

/* CORRECT BOX */
.correct-box {
  background: rgba(63,185,80,0.08);
  border: 2px solid var(--success);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
}

.correct-title {
  font-family: 'Bangers', cursive;
  color: var(--success);
  font-size: 1.2rem;
  margin-bottom: 8px;
}

/* APA BOX */
.apa-box {
  background: var(--bg-panel);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 20px 0;
  font-style: italic;
  line-height: 1.7;
}

.apa-label {
  font-family: 'Bangers', cursive;
  color: var(--gold);
  font-style: normal;
  font-size: 1.1rem;
  margin-bottom: 8px;
}

/* FLOWCHART */
.flowchart-container {
  margin: 20px 0;
  text-align: center;
  overflow-x: auto;
}

.flowchart-container svg {
  max-width: 100%;
  height: auto;
}

/* NAVIGATION */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 40px;
  gap: 12px;
}

.nav-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  padding: 12px 28px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover {
  border-color: var(--odin-blue);
  background: rgba(88,166,255,0.1);
}

.nav-btn.primary {
  background: var(--odin-blue);
  color: var(--bg-dark);
  border-color: var(--odin-blue);
}

.nav-btn.primary:hover {
  background: #79bbff;
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* SIGNATURE */
.signature {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* HIGHLIGHT */
.hl-gold { color: var(--gold); font-weight: bold; }
.hl-blue { color: var(--odin-blue); }
.hl-red { color: var(--thor-red); }
.hl-green { color: var(--success); }
.hl-purple { color: var(--corvo-purple); }

/* LICAO DOS CORVOS */
.licao-box {
  background: rgba(188,140,255,0.06);
  border: 2px solid var(--corvo-purple);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.licao-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--corvo-purple);
  margin-bottom: 12px;
}

/* TRAP CARDS */
.trap-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin: 16px 0;
}

.trap-card {
  background: var(--bg-card);
  border: 1px solid var(--thor-red);
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.trap-icon {
  font-size: 1.4rem;
  flex-shrink: 0;
}

.trap-title {
  font-family: 'Permanent Marker', cursive;
  color: var(--thor-red);
  font-size: 0.95rem;
  margin-bottom: 4px;
}

/* ANIMATE ON APPEAR */
.fade-in {
  animation: fadeIn 0.6s ease both;
}

.fade-in-delay {
  animation: fadeIn 0.6s ease 0.3s both;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .step-title { font-size: 1.6rem; }
  .concept-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 10px 18px; font-size: 0.95rem; }
  body { font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 12</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DIALOGUE HELPER =====
function dialogue(character, name, text) {
  return `<div class="dialogue-box ${character}">
    <div class="char-name ${character}">${name}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}

// ===== SVG HELPERS =====
function normalPDF(x, mu, sigma) {
  const z = (x - mu) / sigma;
  return Math.exp(-0.5 * z * z) / (sigma * Math.sqrt(2 * Math.PI));
}

function buildNormalCurve(opts) {
  // opts: { width, height, mu, sigma, fillLeft, fillRight, showAlpha, label, xMin, xMax }
  const w = opts.width || 680;
  const h = opts.height || 220;
  const mu = opts.mu || 0;
  const sigma = opts.sigma || 1;
  const xMin = opts.xMin !== undefined ? opts.xMin : mu - 3.5 * sigma;
  const xMax = opts.xMax !== undefined ? opts.xMax : mu + 3.5 * sigma;
  const padL = 40, padR = 20, padT = 20, padB = 40;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  function xToSvg(x) { return padL + ((x - xMin) / (xMax - xMin)) * plotW; }
  function yToSvg(y) {
    const maxY = normalPDF(mu, mu, sigma) * 1.15;
    return padT + plotH - (y / maxY) * plotH;
  }

  // Build curve path
  const steps = 200;
  const dx = (xMax - xMin) / steps;
  let pathD = '';
  for (let i = 0; i <= steps; i++) {
    const x = xMin + i * dx;
    const y = normalPDF(x, mu, sigma);
    const sx = xToSvg(x);
    const sy = yToSvg(y);
    pathD += (i === 0 ? 'M' : 'L') + sx.toFixed(1) + ',' + sy.toFixed(1);
  }

  // Build shaded region (right tail)
  let shadedRight = '';
  if (opts.fillRight !== undefined) {
    const cr = opts.fillRight;
    let fill = 'M' + xToSvg(cr).toFixed(1) + ',' + yToSvg(0).toFixed(1);
    for (let i = 0; i <= 80; i++) {
      const x = cr + i * ((xMax - cr) / 80);
      fill += 'L' + xToSvg(x).toFixed(1) + ',' + yToSvg(normalPDF(x, mu, sigma)).toFixed(1);
    }
    fill += 'L' + xToSvg(xMax).toFixed(1) + ',' + yToSvg(0).toFixed(1) + 'Z';
    shadedRight = `<path d="${fill}" fill="var(--thor-red)" opacity="0.35"/>`;
  }

  // Build shaded region (left tail)
  let shadedLeft = '';
  if (opts.fillLeft !== undefined) {
    const cl = opts.fillLeft;
    let fill = 'M' + xToSvg(xMin).toFixed(1) + ',' + yToSvg(0).toFixed(1);
    for (let i = 0; i <= 80; i++) {
      const x = xMin + i * ((cl - xMin) / 80);
      fill += 'L' + xToSvg(x).toFixed(1) + ',' + yToSvg(normalPDF(x, mu, sigma)).toFixed(1);
    }
    fill += 'L' + xToSvg(cl).toFixed(1) + ',' + yToSvg(0).toFixed(1) + 'Z';
    shadedLeft = `<path d="${fill}" fill="var(--thor-red)" opacity="0.35"/>`;
  }

  // Axis
  const axisLine = `<line x1="${padL}" y1="${yToSvg(0)}" x2="${w-padR}" y2="${yToSvg(0)}" stroke="var(--border)" stroke-width="1.5"/>`;

  // Ticks
  let ticks = '';
  for (let z = -3; z <= 3; z++) {
    const xv = mu + z * sigma;
    if (xv >= xMin && xv <= xMax) {
      const sx = xToSvg(xv);
      const sy = yToSvg(0);
      ticks += `<line x1="${sx}" y1="${sy}" x2="${sx}" y2="${sy+6}" stroke="var(--text-dim)" stroke-width="1"/>`;
      const label = opts.xLabels ? (opts.xLabels[z+3] || '') : (z === 0 ? (opts.muLabel || 'μ') : '');
      if (label) {
        ticks += `<text x="${sx}" y="${sy+22}" fill="var(--text-dim)" font-size="12" text-anchor="middle" font-family="Patrick Hand">${label}</text>`;
      }
    }
  }

  // Mean line
  const meanLine = `<line x1="${xToSvg(mu)}" y1="${padT}" x2="${xToSvg(mu)}" y2="${yToSvg(0)}" stroke="var(--odin-blue)" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>`;

  // Critical value lines
  let critLines = '';
  if (opts.fillRight !== undefined) {
    const cx = xToSvg(opts.fillRight);
    critLines += `<line x1="${cx}" y1="${padT}" x2="${cx}" y2="${yToSvg(0)}" stroke="var(--thor-red)" stroke-width="2" stroke-dasharray="4,3"/>`;
    critLines += `<text x="${cx}" y="${padT - 4}" fill="var(--thor-red)" font-size="11" text-anchor="middle" font-family="Permanent Marker">${opts.critLabelRight || ''}</text>`;
  }
  if (opts.fillLeft !== undefined) {
    const cx = xToSvg(opts.fillLeft);
    critLines += `<line x1="${cx}" y1="${padT}" x2="${cx}" y2="${yToSvg(0)}" stroke="var(--thor-red)" stroke-width="2" stroke-dasharray="4,3"/>`;
    critLines += `<text x="${cx}" y="${padT - 4}" fill="var(--thor-red)" font-size="11" text-anchor="middle" font-family="Permanent Marker">${opts.critLabelLeft || ''}</text>`;
  }

  // Alpha label
  let alphaLabel = '';
  if (opts.showAlpha && opts.fillRight !== undefined) {
    const midX = xToSvg((opts.fillRight + xMax) / 2);
    const midY = yToSvg(normalPDF((opts.fillRight + xMax) / 2, mu, sigma)) - 8;
    alphaLabel = `<text x="${midX}" y="${midY}" fill="var(--thor-red)" font-size="13" text-anchor="middle" font-family="Permanent Marker">α</text>`;
  }

  // Title
  let titleSvg = '';
  if (opts.label) {
    titleSvg = `<text x="${w/2}" y="${h-2}" fill="var(--text-dim)" font-size="12" text-anchor="middle" font-family="Permanent Marker">${opts.label}</text>`;
  }

  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" xmlns="http://www.w3.org/2000/svg">
    ${shadedLeft}${shadedRight}
    <path d="${pathD}" fill="none" stroke="var(--odin-blue)" stroke-width="2.5"/>
    ${axisLine}${ticks}${meanLine}${critLines}${alphaLabel}${titleSvg}
  </svg>`;
}


// ===== STEP FUNCTIONS =====
const totalSteps = 13; // 0..12
let currentStep = 0;

// ------ STEP 0: INTRO ------
function step0() {
  return `
    <div class="step-title">The Court of Asgard: The Trial of the Swords</div>

    <p>In the Great Forge of Asgard, a blacksmith named <span class="hl-gold">Brokkr</span> claims to have discovered a new tempering technique that produces more resistant swords. The warriors are excited &mdash; but Odinfather does not accept claims without evidence.</p>

    <p>To settle the matter, Odin convenes the <strong>Court of Asgard</strong> &mdash; and applies the logic of <span class="hl-blue">Hypothesis Testing</span>.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Think of hypothesis testing as a <strong>trial</strong>. The defendant is the Null Hypothesis \x96 and the defendant starts <em>innocent until proven guilty</em>. The evidence is the data. The jury is us.')}

    ${dialogue('thor', '⚡ Thorment', 'Wait \x96 if the blacksmith says the technique works, why not just believe him? He showed some really nice-looking swords!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Because "nice-looking" is not data, Thorment. I need <strong>systematic evidence</strong>. Are the new swords truly more resistant, or is the observed difference just natural variation in the forging process?')}

    <div class="concept-grid">
      <div class="concept-card">
        <div class="card-title" style="color:var(--odin-blue)">🛡️ Null Hypothesis (H₀)</div>
        <p>The "defendant" &mdash; presumption of innocence. The new technique does <strong>not</strong> improve the swords.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--gold)">⚔️ Alternative Hypothesis (H₁)</div>
        <p>The prosecution. The new technique produces <strong>different</strong> swords (better or worse).</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--success)">📊 Evidence = Data</div>
        <p>We test multiple swords from both techniques and measure resistance.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--corvo-purple)">⚖️ Verdict</div>
        <p>We reject H\u2080 (guilty) or <em>fail to reject</em> H\u2080 (not guilty). We never "prove" H\u2080!</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Pay attention to the language: we <strong>never accept</strong> H\u2080. We say we <em>fail to reject</em> H\u2080. Just as a court that finds no evidence does not declare the defendant "proven innocent" \x96 it simply says "not guilty."')}
  `;
}

// ------ STEP 1: H0 e H1 ------
function step1() {
  return `
    <div class="step-title">Step 1: H\u2080 and H\u2081 \x96 The Hypotheses</div>

    <p>Every scientific investigation begins with formal hypotheses. In the Court of Asgard, we must declare the prosecution and the defense <em>before</em> looking at the evidence.</p>

    ${dialogue('thor', '⚡ Thorment', 'Easy! My hypothesis: "Brokkr\x27s new technique IS better." Done, start the test!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Wrong, Thorment. What you wrote is the research hypothesis, not the formal structure of the test. In NHST, the null hypothesis states there is <strong>no difference</strong>. The alternative is that there <strong>is a difference</strong>.')}

    <div class="formula">
      <div class="formula-label">Null Hypothesis (the "defendant")</div>
      H₀: μ<sub>nova</sub> = μ<sub>tradicional</sub>
    </div>

    <div class="formula">
      <div class="formula-label">Alternative Hypothesis Bilateral (non-directional)</div>
      H₁: μ<sub>nova</sub> ≠ μ<sub>tradicional</sub>
    </div>

    <p class="step-subtitle">Directional vs. Non-Directional</p>

    <div class="concept-grid">
      <div class="concept-card">
        <div class="card-title" style="color:var(--odin-blue)">Two-Tailed (bilateral)</div>
        <p>H₁: μ<sub>nova</sub> ≠ μ<sub>trad</sub><br>
        "The new technique produces a <strong>different</strong> result \x96 for better OR worse."<br>
        <em>More conservative. Generally recommended.</em></p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--gold)">One-Tailed (unilateral)</div>
        <p>H₁: μ<sub>nova</sub> &gt; μ<sub>trad</sub><br>
        "The new technique produces <strong>more resistant</strong> swords."<br>
        <em>More power, but assumes a priori direction.</em></p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The choice between one-tailed and two-tailed must be made <strong>before</strong> collecting data. Switching after seeing the results is a form of <em>p-hacking</em> \x96 Thorment would love it, but it\x27s forbidden in the Court of Asgard.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'We\x27ll use the <strong>two-tailed</strong> test. We are not certain a priori that the new technique is better \x96 it could also be worse. Scientific humility!')}
  `;
}

// ------ STEP 2: ALPHA ------
function step2() {
  return `
    <div class="step-title">Step 2: Significance Level (\u03b1)</div>

    <p>Before collecting data, we need to define the decision criterion: how much evidence is "enough" to convict the defendant?</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The significance level \u03b1 is the <strong>rarity threshold</strong>. If the probability of observing our data (or more extreme) is less than \u03b1, we consider the evidence strong enough to reject H\u2080.')}

    <div class="formula">
      <div class="formula-label">Most common convention</div>
      α = 0,05 (5%)
    </div>

    <p>This means: we accept a <span class="hl-red">5%</span> risk of convicting an innocent (rejecting H\u2080 when it is true).</p>

    ${dialogue('thor', '⚡ Thorment', 'Why 0.05? Seems arbitrary.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Good question, and you\x27re right \x96 <strong>it is arbitrary</strong>. Fisher suggested 0.05 as a practical convention in the 1920s, not as a law of nature. In critical areas like medicine, \u03b1 = 0.01 or even 0.005 is used. In exploratory studies, 0.10 may be acceptable.')}

    <div class="concept-grid">
      <div class="concept-card">
        <div class="card-title" style="color:var(--thor-red)">α = 0,10</div>
        <p>More liberal. Easier to reject H\u2080. Higher false positive risk. Exploratory studies.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--gold)">α = 0,05</div>
        <p>Standard convention. Balance between sensitivity and caution. Most social sciences.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--odin-blue)">α = 0,01</div>
        <p>More rigorous. Harder to reject H\u2080. Lower false positive risk. Clinical research.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--success)">α = 0,005</div>
        <p>Proposed by Benjamin et al. (2018). Very conservative. Particle physics uses 5\u03c3!</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '\u03b1 must be set <strong>before</strong> looking at the data. Choosing \u03b1 after calculating the p-value is like changing the rules of the trial after hearing the testimony \x96 dishonest and unacceptable.')}
  `;
}

// ------ STEP 3: ESTATISTICA DE TESTE ------
function step3() {
  return `
    <div class="step-title">Step 3: Test Statistic</div>

    <p>We collected the data: 15 swords forged with the new technique and 15 with the traditional. Now we need to transform this raw data into a single <strong>number</strong> that summarizes the evidence.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The test statistic is like a scale of Asgard. On one side, we place the <strong>signal</strong> (the observed difference). On the other, the <strong>noise</strong> (the variability expected by chance). The greater the signal-to-noise ratio, the stronger the evidence.')}

    <div class="formula">
      <div class="formula-label">General logic of any test statistic</div>
      Test Statistic = (Observed Effect − Effect under H₀) / Standard Error
    </div>

    <p class="step-subtitle">Examples of test statistics:</p>

    <table class="data-table">
      <tr>
        <th>Test</th><th>Statistic</th><th>When to use</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Teste <em>t</em></td>
        <td><em>t</em> = (X̄₁ − X̄₂) / SE</td>
        <td>Compare 2 means</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Teste <em>z</em></td>
        <td><em>z</em> = (X̄ − μ₀) / (σ/√n)</td>
        <td>Mean with known σ</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">ANOVA</td>
        <td><em>F</em> = MS<sub>entre</sub> / MS<sub>dentro</sub></td>
        <td>Compare 3+ means</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Chi-square</td>
        <td>χ² = Σ(O−E)²/E</td>
        <td>Categorical frequencies</td>
      </tr>
    </table>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'For our case of Brokkr\x27s swords, we\x27ll use the <strong>independent samples <em>t</em>-test</strong>. The <em>t</em> statistic measures how many standard errors the observed difference is from zero.')}

    <div class="visual-container">
      ${buildNormalCurve({
        width: 680, height: 200, mu: 0, sigma: 1,
        fillRight: 1.96, fillLeft: -1.96,
        showAlpha: true,
        critLabelRight: 'z = +1,96',
        critLabelLeft: 'z = −1,96',
        xLabels: ['', '', '−1σ', 'μ=0', '+1σ', '', ''],
        label: 'Distribution under H\u2080 \x96 red areas = rejection regions (\u03b1/2 each)'
      })}
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'The test statistic follows a <strong>known distribution</strong> under H\u2080 (normal, t, F, \u03c7\xb2). This allows us to calculate the probability of obtaining a value as or more extreme than the one observed.')}
  `;
}

// ------ STEP 4: P-VALOR (CRITICAL STEP) ------
function step4() {
  return `
    <div class="step-title">Step 4: P-value \x96 What It Is and What It Is NOT</div>

    <p>This is the most <strong>misunderstood</strong> step in all of statistics. Pay close attention.</p>

    <p>Suppose we computed our <em>t</em>-test and obtained <span class="hl-gold">p = 0.03</span>. What does that mean?</p>

    ${dialogue('thor', '⚡ Thorment', 'Obvious! p = 0.03 means there\x27s only a <strong>3% chance</strong> that H\u2080 is true. So 97% certainty that the new technique works! Case closed!')}

    <div class="warning-box">
      <div class="warning-title">⚠️ INVERSE PROBABILITY FALLACY</div>
      <p>What Thorment said is the <strong>most common error</strong> in interpreting the p-value. It is called the <em>inverse probability fallacy</em> or <em>transposition of the conditional</em>.</p>
      <p style="margin-top:8px">The p-value <strong>is NOT</strong> P(H\u2080 | data).</p>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', '<strong>NOT, Thorment!</strong> The p-value does not tell us the probability that H\u2080 is true. That would be P(H\u2080 | data) \x96 and calculating that requires Bayes, not NHST. The p-value is something completely different.')}

    <div class="correct-box">
      <div class="correct-title">✅ CORRECT DEFINITION</div>
      <p style="font-size:1.15rem"><strong>p-value</strong> = the probability of observing data as or more extreme than what was obtained, <span class="hl-gold">assuming H\u2080 is true</span>.</p>
      <p style="margin-top:8px;font-family:'Permanent Marker';color:var(--odin-blue)">p = P(dados ≥ observado | H\u2080 true)</p>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Think of it this way: p = 0.03 means that, <strong>if H\u2080 were true</strong> (if the technique made no difference at all), there would be only a 3% chance of obtaining a difference as large as the one we observed. That is NOT the same as saying H\u2080 has a 3% chance of being true!')}

    <div class="visual-container">
      ${(() => {
        const w = 680, h = 220;
        const mu = 0, sigma = 1;
        const padL = 40, padR = 20, padT = 25, padB = 45;
        const plotW = w - padL - padR;
        const plotH = h - padT - padB;
        const xMin = -3.8, xMax = 3.8;

        function xToSvg(x) { return padL + ((x - xMin) / (xMax - xMin)) * plotW; }
        function yToSvg(y) {
          const maxY = normalPDF(0, 0, 1) * 1.15;
          return padT + plotH - (y / maxY) * plotH;
        }

        // Curve
        let pathD = '';
        for (let i = 0; i <= 200; i++) {
          const x = xMin + i * ((xMax - xMin) / 200);
          const y = normalPDF(x, mu, sigma);
          pathD += (i === 0 ? 'M' : 'L') + xToSvg(x).toFixed(1) + ',' + yToSvg(y).toFixed(1);
        }

        // Observed t = 2.17 (for illustration)
        const tObs = 2.17;
        // Shade right of tObs
        let shadeR = 'M' + xToSvg(tObs).toFixed(1) + ',' + yToSvg(0).toFixed(1);
        for (let i = 0; i <= 60; i++) {
          const x = tObs + i * ((xMax - tObs) / 60);
          shadeR += 'L' + xToSvg(x).toFixed(1) + ',' + yToSvg(normalPDF(x, 0, 1)).toFixed(1);
        }
        shadeR += 'L' + xToSvg(xMax).toFixed(1) + ',' + yToSvg(0).toFixed(1) + 'Z';

        // Shade left of -tObs
        let shadeL = 'M' + xToSvg(xMin).toFixed(1) + ',' + yToSvg(0).toFixed(1);
        for (let i = 0; i <= 60; i++) {
          const x = xMin + i * ((-tObs - xMin) / 60);
          shadeL += 'L' + xToSvg(x).toFixed(1) + ',' + yToSvg(normalPDF(x, 0, 1)).toFixed(1);
        }
        shadeL += 'L' + xToSvg(-tObs).toFixed(1) + ',' + yToSvg(0).toFixed(1) + 'Z';

        const axis = `<line x1="${padL}" y1="${yToSvg(0)}" x2="${w-padR}" y2="${yToSvg(0)}" stroke="var(--border)" stroke-width="1.5"/>`;

        // t observed arrow
        const tX = xToSvg(tObs);
        const arrow = `<line x1="${tX}" y1="${padT}" x2="${tX}" y2="${yToSvg(0)}" stroke="var(--gold)" stroke-width="2.5" stroke-dasharray="6,3"/>
          <text x="${tX+5}" y="${padT + 15}" fill="var(--gold)" font-size="13" font-family="Permanent Marker">t obs = ${tObs}</text>`;

        const pLabel = `<text x="${xToSvg(2.9)}" y="${yToSvg(0) - 20}" fill="var(--thor-red)" font-size="12" font-family="Permanent Marker">p/2</text>
          <text x="${xToSvg(-2.9)}" y="${yToSvg(0) - 20}" fill="var(--thor-red)" font-size="12" font-family="Permanent Marker">p/2</text>`;

        const caption = `<text x="${w/2}" y="${h - 4}" fill="var(--text-dim)" font-size="12" text-anchor="middle" font-family="Permanent Marker">Two-tailed p-value = shaded area in both tails (assuming H\u2080 is true)</text>`;

        return `<svg viewBox="0 0 ${w} ${h}" width="${w}">
          <path d="${shadeR}" fill="var(--thor-red)" opacity="0.4"/>
          <path d="${shadeL}" fill="var(--thor-red)" opacity="0.4"/>
          <path d="${pathD}" fill="none" stroke="var(--odin-blue)" stroke-width="2.5"/>
          ${axis}${arrow}${pLabel}${caption}
          <text x="${xToSvg(0)}" y="${yToSvg(0)+18}" fill="var(--text-dim)" font-size="11" text-anchor="middle" font-family="Patrick Hand">0</text>
        </svg>`;
      })()}
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>The p-value does NOT tell us:</strong><br>\u2022 The probability that H\u2080 is true<br>\u2022 The probability that H\u2081 is true<br>\u2022 The probability of replicating the result<br>\u2022 The size or importance of the effect<br><br><strong>The p-value tells us ONLY:</strong><br>\u2022 How compatible the data are with H\u2080')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'If p = 0.03 < \u03b1 = 0.05, we <strong>reject H\u2080</strong>. The data are sufficiently incompatible with the hypothesis that the technique makes no difference. But this does NOT tell us how much better the swords are \x96 for that, we need the <em>effect size</em>.')}
  `;
}

// ------ STEP 5: ERRO TIPO I ------
function step5() {
  return `
    <div class="step-title">Step 5: Type I Error (\u03b1) \x96 Convicting an Innocent</div>

    <p>Even in the best court, errors happen. <strong>Type I Error</strong> is the most feared.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Type I Error: we reject H\u2080 when H\u2080 is <strong>true</strong>. In our context \x96 we convict the innocent defendant. We declare the new technique works when, in reality, <em>it does not</em>.')}

    <div class="formula">
      <div class="formula-label">Probability of Type I Error</div>
      P(Reject H\u2080 | H\u2080 true) = \u03b1
    </div>

    <p>By setting \u03b1 = 0.05, we are saying: "I accept that, in 5% of the times H\u2080 is true, I will make the error of rejecting it."</p>

    <div class="visual-container">
      ${buildNormalCurve({
        width: 680, height: 200, mu: 0, sigma: 1,
        fillRight: 1.96, fillLeft: -1.96,
        showAlpha: true,
        critLabelRight: '+1,96',
        critLabelLeft: '−1,96',
        xLabels: ['', '', '', 'H\u2080 true', '', '', ''],
        label: 'Red areas = Type I Error (\u03b1 = 5%)'
      })}
    </div>

    ${dialogue('thor', '⚡ Thorment', 'So just lower \u03b1 to 0.001 and done! We\x27ll never make mistakes again!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'It\x27s not that simple. Reducing \u03b1 decreases Type I Error, but <strong>increases</strong> Type II Error. It\x27s a trade-off \x96 as we\x27ll see in the next step.')}

    <div class="concept-grid">
      <div class="concept-card" style="border-color:var(--thor-red)">
        <div class="card-title" style="color:var(--thor-red)">⚠️ False Positive</div>
        <p>Norse example: Odin declares Brokkr\x27s technique is <strong>superior</strong>, but in reality the swords are identical. Brokkr gains undeserved fame and gold!</p>
      </div>
      <div class="concept-card" style="border-color:var(--thor-red)">
        <div class="card-title" style="color:var(--thor-red)">🎯 In science</div>
        <p>Publishing that a treatment works when it doesn\x27t. Wasting research resources. Informing public policies with false findings.</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Type I Error is also called a <strong>false positive</strong> or <strong>false alarm</strong>. The \u03b1 rate is the significance level we set in Step 2. We directly control this rate by choosing \u03b1.')}
  `;
}

// ------ STEP 6: ERRO TIPO II ------
function step6() {
  return `
    <div class="step-title">Step 6: Type II Error (\u03b2) \x96 Freeing the Guilty</div>

    <p>The second type of error is equally dangerous, but less discussed.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Type II Error: we <strong>fail to reject</strong> H\u2080 when H\u2080 is <strong>false</strong>. In the court \x96 the villain is guilty, but we didn\x27t find enough evidence and we let him go.')}

    <div class="formula">
      <div class="formula-label">Probability of Type II Error</div>
      P(Fail to reject H\u2080 | H\u2080 false) = \u03b2
    </div>

    <p>In our case: Brokkr\x27s technique <em>really</em> produces better swords, but our test failed to detect the difference. The innovation is unjustly discarded.</p>

    ${dialogue('thor', '⚡ Thorment', 'And what is the value of \u03b2? Is it 0.05 too?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'No! \u03b2 is not fixed by convention like \u03b1. It <strong>depends</strong> on three factors: sample size (n), the true effect size (\u03b4), and \u03b1 itself. The larger n and \u03b4, the smaller \u03b2.')}

    <div class="concept-grid">
      <div class="concept-card" style="border-color:var(--success)">
        <div class="card-title" style="color:var(--success)">⬇️ Reduzir β (menos erros Tipo II):</div>
        <p>\u2022 Increase sample size (n)<br>
        \u2022 Increase \u03b1 (but increases Type I Error)<br>
        \u2022 Larger effects are easier to detect</p>
      </div>
      <div class="concept-card" style="border-color:var(--thor-red)">
        <div class="card-title" style="color:var(--thor-red)">⚠️ False Negative</div>
        <p>Brokkr\x27s technique <strong>truly works</strong>, but our test failed to detect it. Brokkr loses the fame he deserves. Asgard\x27s forge doesn\x27t evolve.</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Type II Error is the <strong>false negative</strong> or <strong>missed alarm</strong>. In practice, \u03b2 is frequently ignored \x96 researchers set \u03b1 = 0.05 and forget to check if they have enough sample to detect the effect. This is a very serious problem.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'It\x27s like having a lie detector that only works half the time. If your test\x27s power is low, you\x27re basically flipping a coin. The minimum convention is <strong>1 \u2212 \u03b2 \u2265 0.80</strong> \x96 that is, at least an 80% chance of detecting a real effect.')}
  `;
}

// ------ STEP 7: PODER ESTATISTICO ------
function step7() {
  return `
    <div class="step-title">Step 7: Statistical Power (1 \u2212 \u03b2)</div>

    <p>The <strong>power</strong> of a test is the probability of rejecting H\u2080 when H\u2080 is <strong>truly false</strong>. It is the test\x27s ability to <em>find the effect</em> when it exists.</p>

    <div class="formula">
      <div class="formula-label">Statistical Power</div>
      Poder = 1 − β = P(Reject H₀ | H₀ falsa)
    </div>

    <p class="step-subtitle">2x2 Decision Table</p>

    <table class="decision-table">
      <tr>
        <th></th>
        <th colspan="2" style="color:var(--gold)">🎯 Reality (unknown)</th>
      </tr>
      <tr>
        <th></th>
        <th>H₀ is True</th>
        <th>H₀ is False</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Fail to Reject H₀</td>
        <td class="correct-cell">
          <span style="font-family:'Bangers';font-size:1.2rem;color:var(--success)">✅ Correct Decision</span><br>
          <span style="font-size:0.9rem;color:var(--text-dim)">P = 1 − α</span><br>
          <span style="font-size:0.85rem">Innocent correctly acquitted</span>
        </td>
        <td class="error-cell">
          <span style="font-family:'Bangers';font-size:1.2rem;color:var(--thor-red)">❌ Erro Tipo II (β)</span><br>
          <span style="font-size:0.9rem;color:var(--text-dim)">False Negative</span><br>
          <span style="font-size:0.85rem">Guilty freed!</span>
        </td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Reject H₀</td>
        <td class="error-cell">
          <span style="font-family:'Bangers';font-size:1.2rem;color:var(--thor-red)">❌ Erro Tipo I (α)</span><br>
          <span style="font-size:0.9rem;color:var(--text-dim)">False Positive</span><br>
          <span style="font-size:0.85rem">Innocent convicted!</span>
        </td>
        <td class="correct-cell">
          <span style="font-family:'Bangers';font-size:1.2rem;color:var(--success)">✅ PODER (1−β)</span><br>
          <span style="font-size:0.9rem;color:var(--text-dim)">Correct Detection</span><br>
          <span style="font-size:0.85rem">Guilty convicted!</span>
        </td>
      </tr>
    </table>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Power depends on <strong>three ingredients</strong>: sample size (n), the true effect size (\u03b4), and the \u03b1 level. Increasing any one of them increases power.')}

    <div class="concept-grid">
      <div class="concept-card">
        <div class="card-title" style="color:var(--odin-blue)">📊 n (Sample Size)</div>
        <p>More swords tested = more precision = more power. It\x27s the factor the researcher controls the most.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--gold)">\u03b4 (Effect Size)</div>
        <p>Large effects are easier to detect. If the new technique is MUCH better, n can be smaller.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--thor-red)">\u03b1 (Significance Level)</div>
        <p>Higher \u03b1 = more power, but more false positives. The trade-off is inevitable.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--success)">σ (Variability)</div>
        <p>Less noise in the data = easier to see the signal. Precise measurements help.</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Cohen\x27s (1988) minimum convention is <strong>power \u2265 0.80</strong>. This means accepting at most a 20% chance of missing a real effect. Many published studies have power well below this \x96 it\x27s one of the drivers of the replication crisis.')}
  `;
}

// ------ STEP 8: SIGNIFICANCIA ESTATISTICA VS PRATICA ------
function step8() {
  return `
    <div class="step-title">Step 8: Statistical vs. Practical Significance</div>

    <p>A result can be <strong>statistically significant</strong> without being <strong>practically important</strong>. And vice versa.</p>

    ${dialogue('thor', '⚡ Thorment', 'What do you mean? If p < 0.05, the effect is significant! So it\x27s important!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Careful, Thorment. Imagine we tested 10,000 swords from each technique and found the new technique produces swords 0.1 grams heavier, with p = 0.001. Statistically significant? <strong>Yes.</strong> Relevant to a warrior in battle? <strong>Absolutely not.</strong>')}

    <div class="concept-grid">
      <div class="concept-card" style="border-color:var(--thor-red)">
        <div class="card-title" style="color:var(--thor-red)">⚠️ Large n Trap</div>
        <p>With huge samples, <strong>any</strong> tiny difference becomes statistically "significant." The p-value is sensitive to n!</p>
        <p style="margin-top:8px;font-family:'Permanent Marker';color:var(--thor-red)">n = 10,000 per group: a difference of 0.1 grams gives p < 0.001</p>
      </div>
      <div class="concept-card" style="border-color:var(--success)">
        <div class="card-title" style="color:var(--success)">✅ Small n Trap</div>
        <p>With small samples, <strong>large and real</strong> effects may not reach significance. The test lacks sufficient power.</p>
        <p style="margin-top:8px;font-family:'Permanent Marker';color:var(--success)">n = 5 per group: a difference of 15 points may give p = 0.08</p>
      </div>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'That\x27s why the p-value answers <strong>WHETHER</strong> there is evidence of an effect, but doesn\x27t say <strong>HOW MUCH</strong> the effect is or <strong>WHETHER</strong> it\x27s relevant in practice. For that, we need the <em>effect size</em>.')}

    <div class="formula">
      <div class="formula-label">The question the p-value doesn\x27t answer</div>
      p < 0,05 → "Existe efeito?" &nbsp;✔️&nbsp;&nbsp; "Quanto?" &nbsp;❌&nbsp;&nbsp; "Importante?" &nbsp;❌
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Cumming (2014) emphasizes: reporting only p < 0.05 without effect size and confidence interval is <strong>insufficient</strong>. The "new statistics" demands we say not just <em>whether</em> but <em>how much</em>.')}
  `;
}

// ------ STEP 9: TAMANHO DE EFEITO ------
function step9() {
  return `
    <div class="step-title">Step 9: Effect Size \x96 The "How Much?"</div>

    <p>If the p-value answers <strong>whether</strong> there is evidence of an effect, the effect size answers <strong>how</strong> large it is. It\x27s the missing piece in the trial.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'In our case of Brokkr\x27s swords, let\x27s say the mean resistance of the new swords was 85 and the traditional was 78, with a pooled standard deviation of 10. Let\x27s calculate <strong>Cohen\x27s d</strong>.')}

    <div class="formula">
      <div class="formula-label">Cohen's d</div>
      d = (X̄₁ − X̄₂) / s<sub>pooled</sub> = (85 − 78) / 10 = <span class="hl-gold">0,70</span>
    </div>

    <p class="step-subtitle">Cohen\x27s Benchmarks (1988)</p>

    <table class="es-table">
      <tr>
        <th>Measure</th><th>Small</th><th>Medium</th><th>Large</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Cohen's d</td>
        <td>0,20</td><td>0,50</td><td>0,80</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">r (correlation)</td>
        <td>0,10</td><td>0,30</td><td>0,50</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">η² (eta squared)</td>
        <td>0,01</td><td>0,06</td><td>0,14</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">f² (Cohen's f²)</td>
        <td>0,02</td><td>0,15</td><td>0,35</td>
      </tr>
    </table>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Our d = 0.70 is an effect between medium and large. This means the new swords\x27 mean is 0.70 standard deviations above the traditional. <em>Now</em> we have an idea of the magnitude!')}

    ${dialogue('thor', '⚡ Thorment', 'But wait \x96 doesn\x27t the course prefer Hedges\x27 g?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Good one, Thorment! <strong>Hedges\x27 g</strong> corrects the small-sample bias in Cohen\x27s d. For n < 20, the difference matters. And always report with a <strong>confidence interval</strong>: <em>d</em> = 0.70, 95% CI [0.18; 1.22].')}

    <div class="apa-box">
      <div class="apa-label">APA Format</div>
      <em>d</em> = 0,70, 95% CI [0,18; 1,22]
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Effect size is <strong>independent</strong> of sample size. Unlike the p-value, which decreases as n grows, effect size captures the <em>true magnitude</em> of the difference. That\x27s why Cumming places it at the center of the "new statistics."')}
  `;
}

// ------ STEP 11: ARMADILHAS ------
function step11() {
  return `
    <div class="step-title">Step 11: NHST Traps \x96 Thorment\x27s Arsenal</div>

    <p>NHST is a useful tool, but vulnerable to abuse. Thorment knows all the tricks.</p>

    ${dialogue('thor', '⚡ Thorment', 'Hehehe... if the p-value isn\x27t significant, just test it in different ways until you find one that is! Or collect more data until p drops. Or change the hypothesis after seeing the results. EASY!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'ALL of that is <strong>forbidden</strong> in the Court of Asgard. Each of these practices artificially inflates the false positive rate. Let\x27s unmask each one.')}

    <div class="trap-grid">
      <div class="trap-card">
        <div class="trap-icon">🎣</div>
        <div>
          <div class="trap-title">P-Hacking (Data Dredging)</div>
          <p>Testing multiple analyses, variables, or subgroups until finding p < 0.05 by chance. With 20 independent tests and \u03b1 = 0.05, the chance of at least one false positive is 1 \u2212 (0.95)\xb2\u2070 = <span class="hl-red">64%</span>!</p>
        </div>
      </div>
      <div class="trap-card">
        <div class="trap-icon">🔮</div>
        <div>
          <div class="trap-title">HARKing (Hypothesizing After Results are Known)</div>
          <p>Formulating hypotheses <em>after</em> seeing the data, pretending they were a priori. "I ALWAYS thought it would be one-tailed!" \x96 no, Thorment, you didn\x27t.</p>
        </div>
      </div>
      <div class="trap-card">
        <div class="trap-icon">📈</div>
        <div>
          <div class="trap-title">Optional Stopping</div>
          <p>Collect data, test, if p > 0.05 collect more, test again... repeat until it\x27s "significant." Each peek at the data inflates the real \u03b1 well beyond 0.05.</p>
        </div>
      </div>
      <div class="trap-card">
        <div class="trap-icon">✂️</div>
        <div>
          <div class="trap-title">Selective Reporting</div>
          <p>Publishing only significant results and hiding non-significant ones in the drawer. Creates the <em>file drawer problem</em> \x96 the literature becomes biased toward positive effects.</p>
        </div>
      </div>
      <div class="trap-card">
        <div class="trap-icon">🎯</div>
        <div>
          <div class="trap-title">Multiple Comparisons Without Correction</div>
          <p>Running 10 <em>t</em>-tests without adjusting \u03b1 (Bonferroni, Holm, FDR). Each test has a 5% false positive chance \x96 with 10 tests, the actual rate explodes.</p>
        </div>
      </div>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The defense against these traps: <strong>pre-registration</strong> of the study (hypotheses, analyses, planned n), <strong>correction</strong> for multiple comparisons, and complete <strong>transparency</strong> in reporting. The Court of Asgard demands honesty.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Simmons, Nelson & Simonsohn (2011) showed that questionable research practices (QRPs) can produce p < 0.05 for <em>any</em> hypothesis, even false ones. The paper is called "<em>False-Positive Psychology</em>" \x96 required reading.')}
  `;
}

// ------ STEP 12: LICAO DOS CORVOS ------
function step12() {
  return `
    <div class="step-title">Step 12: Lesson of the Ravens \x96 Final Synthesis</div>

    <p>The trial in the Court of Asgard has come to an end. Let\x27s consolidate what we\x27ve learned.</p>

    <div class="licao-box">
      <div class="licao-title">📜 Lesson of the Ravens</div>

      ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', `<strong>Key points to commit to memory:</strong><br><br>
        \u2022 <strong>H\u2080</strong> = status quo (no effect); <strong>H\u2081</strong> = there is an effect<br>
        \u2022 <strong>\u03b1</strong> = decision criterion, set BEFORE data collection (usually 0.05)<br>
        • <strong>p-valor</strong> = P(dados ≥ observado | H\u2080 true) — e NADA mais<br>
        • <strong>p-value is NOT</strong> P(H\u2080 true | data) \x96 inverse probability fallacy!<br>
        \u2022 <strong>Type I Error (\u03b1)</strong> = false positive = convicting the innocent<br>
        \u2022 <strong>Type II Error (\u03b2)</strong> = false negative = freeing the guilty<br>
        \u2022 <strong>Power (1\u2212\u03b2)</strong> \u2265 0.80 \x96 Cohen\x27s minimum convention<br>
        \u2022 <strong>Statistical significance \u2260 practical significance</strong><br>
        \u2022 <strong>Effect size</strong> (d, r, \u03b7\xb2) says HOW MUCH; p-value says only WHETHER<br>
        \u2022 <strong>Always</strong> report ES + CI, even when p > 0.05`)}

      ${dialogue('corvo', '🐦‍⬛ Huginn challenges:', `<strong>Challenges for reflection:</strong><br><br>
        \u2022 If p = 0.049 and p = 0.051 are so different, why do we treat them as binary?<br>
        \u2022 When should NHST <strong>NOT</strong> be used?<br>
        \u2022 If you could choose between reporting only p OR only CI, which would you choose? Why?<br>
        \u2022 What happens to the real \u03b1 rate when everyone publishes only p < 0.05?<br>
        \u2022 Bayesians don\x27t use p-values. What do they use instead? Is it better?<br>
        \u2022 If 80% of published studies in your field have power < 0.50, what does that mean for the literature?`)}
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Hypothesis Testing is a tool \x96 not an oracle. It helps us make decisions under uncertainty, but has serious limitations. Use it carefully, always accompanied by effect size and confidence interval. And never, <em>never</em>, treat p = 0.05 as the border between truth and falsehood.')}

    ${dialogue('thor', '⚡ Thorment', 'Fine, Odin... I admit I learned something today. But I still think my hammer solves things faster than all this ritual.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'The hammer breaks swords, Thorment. Hypothesis testing <em>forges knowledge</em>. I prefer the forge.')}

    <div style="text-align:center;margin:30px 0">
      <div style="font-family:'Bangers';font-size:2rem;color:var(--gold)">END OF TRIAL!</div>
      <p style="color:var(--text-dim);margin-top:8px">Hypothesis Testing (NHST) — From the Court of Asgard to your data.</p>
    </div>
  `;
}


// ===== STEP REGISTRY =====
const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10, step11, step12];

const stepNames = [
  'The Court of Asgard',
  'H\u2080 and H\u2081',
  'Significance Level (α)',
  'Test Statistic',
  'P-value: What It Is and What It Is NOT',
  'Type I Error (α)',
  'Type II Error (β)',
  'Statistical Power (1−β)',
  'Statistical vs. Practical Significance',
  'Effect Size',
  'The NHST Ritual',
  'Common Traps',
  'Lesson of the Ravens'
];

// ===== NAVIGATION =====
function renderStep() {
  const content = document.getElementById('stepContent');
  content.innerHTML = stepFunctions[currentStep]();
  content.style.animation = 'none';
  content.offsetHeight; // trigger reflow
  content.style.animation = 'fadeIn 0.4s ease';

  document.getElementById('progressLabel').textContent = `Step ${currentStep} of ${totalSteps - 1} — ${stepNames[currentStep]}`;
  document.getElementById('progressFill').style.width = `${(currentStep / (totalSteps - 1)) * 100}%`;

  document.getElementById('btnBack').disabled = currentStep === 0;
  document.getElementById('btnNext').textContent = currentStep === totalSteps - 1 ? 'Start Over ↻' : 'Next ▶';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep >= totalSteps - 1) {
    currentStep = 0;
  } else {
    currentStep++;
  }
  renderStep();
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

// Initialize
renderStep();
</script>
