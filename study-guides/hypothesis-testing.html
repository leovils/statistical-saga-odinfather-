<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypothesis Testing (NHST) — Step by Step | Odinfather</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-panel: #1c2333;
  --odin-blue: #58a6ff;
  --thor-red: #f85149;
  --corvo-purple: #bc8cff;
  --gold: #f0c040;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --success: #3fb950;
  --border: #30363d;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

/* PROGRESS BAR */
.progress-bar-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-dark);
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
}

.progress-label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* STEP CONTENT */
.step-content {
  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.step-subtitle {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.3rem;
  color: var(--odin-blue);
  margin-bottom: 15px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
  border-left: 4px solid;
  position: relative;
}

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {
  background: rgba(188,140,255,0.08);
  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 6px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }

.dialogue-text {
  font-size: 1.05rem;
  line-height: 1.5;
}

/* DATA TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.data-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
}

.data-table td {
  background: var(--bg-card);
  transition: background 0.2s;
}

.data-table tr:hover td {
  background: rgba(88,166,255,0.1);
}

/* FORMULA */
.formula {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 1.15rem;
  text-align: center;
  font-family: 'Patrick Hand', cursive;
  color: var(--gold);
}

.formula-label {
  font-family: 'Permanent Marker', cursive;
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 6px;
}

/* VISUAL CONTAINER */
.visual-container {
  margin: 20px 0;
  text-align: center;
}

.visual-container svg {
  max-width: 100%;
  height: auto;
}

/* DECISION TABLE */
.decision-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 1rem;
}

.decision-table th, .decision-table td {
  padding: 14px 16px;
  text-align: center;
  border: 2px solid var(--border);
}

.decision-table th {
  background: var(--bg-panel);
  font-family: 'Bangers', cursive;
  font-size: 1.1rem;
  color: var(--gold);
}

.decision-table td {
  background: var(--bg-card);
  font-family: 'Patrick Hand', cursive;
}

.decision-table .correct-cell {
  background: rgba(63,185,80,0.12);
  border-color: var(--success);
}

.decision-table .error-cell {
  background: rgba(248,81,73,0.12);
  border-color: var(--thor-red);
}

/* CONCEPT CARDS */
.concept-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 20px 0;
}

.concept-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.concept-card .card-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;
  margin-bottom: 8px;
}

.concept-card .card-value {
  font-family: 'Bangers', cursive;
  font-size: 1.6rem;
}

/* EFFECT SIZE TABLE */
.es-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 1rem;
}

.es-table th, .es-table td {
  padding: 10px 14px;
  text-align: center;
  border: 1px solid var(--border);
}

.es-table th {
  background: var(--bg-panel);
  font-family: 'Permanent Marker', cursive;
  font-size: 0.95rem;
  color: var(--gold);
}

.es-table td {
  background: var(--bg-card);
}

/* WARNING BOX */
.warning-box {
  background: rgba(248,81,73,0.08);
  border: 2px solid var(--thor-red);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
}

.warning-title {
  font-family: 'Bangers', cursive;
  color: var(--thor-red);
  font-size: 1.2rem;
  margin-bottom: 8px;
}

/* CORRECT BOX */
.correct-box {
  background: rgba(63,185,80,0.08);
  border: 2px solid var(--success);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 16px 0;
}

.correct-title {
  font-family: 'Bangers', cursive;
  color: var(--success);
  font-size: 1.2rem;
  margin-bottom: 8px;
}

/* APA BOX */
.apa-box {
  background: var(--bg-panel);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 20px 24px;
  margin: 20px 0;
  font-style: italic;
  line-height: 1.7;
}

.apa-label {
  font-family: 'Bangers', cursive;
  color: var(--gold);
  font-style: normal;
  font-size: 1.1rem;
  margin-bottom: 8px;
}

/* FLOWCHART */
.flowchart-container {
  margin: 20px 0;
  text-align: center;
  overflow-x: auto;
}

.flowchart-container svg {
  max-width: 100%;
  height: auto;
}

/* NAVIGATION */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 40px;
  gap: 12px;
}

.nav-btn {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.1rem;
  padding: 12px 28px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-btn:hover {
  border-color: var(--odin-blue);
  background: rgba(88,166,255,0.1);
}

.nav-btn.primary {
  background: var(--odin-blue);
  color: var(--bg-dark);
  border-color: var(--odin-blue);
}

.nav-btn.primary:hover {
  background: #79bbff;
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* SIGNATURE */
.signature {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* HIGHLIGHT */
.hl-gold { color: var(--gold); font-weight: bold; }
.hl-blue { color: var(--odin-blue); }
.hl-red { color: var(--thor-red); }
.hl-green { color: var(--success); }
.hl-purple { color: var(--corvo-purple); }

/* LICAO DOS CORVOS */
.licao-box {
  background: rgba(188,140,255,0.06);
  border: 2px solid var(--corvo-purple);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 20px 0;
}

.licao-title {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  color: var(--corvo-purple);
  margin-bottom: 12px;
}

/* TRAP CARDS */
.trap-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin: 16px 0;
}

.trap-card {
  background: var(--bg-card);
  border: 1px solid var(--thor-red);
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.trap-icon {
  font-size: 1.4rem;
  flex-shrink: 0;
}

.trap-title {
  font-family: 'Permanent Marker', cursive;
  color: var(--thor-red);
  font-size: 0.95rem;
  margin-bottom: 4px;
}

/* ANIMATE ON APPEAR */
.fade-in {
  animation: fadeIn 0.6s ease both;
}

.fade-in-delay {
  animation: fadeIn 0.6s ease 0.3s both;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .step-title { font-size: 1.6rem; }
  .concept-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 10px 18px; font-size: 0.95rem; }
  body { font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Step 0 of 12</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Back</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Next &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DIALOGUE HELPER =====
function dialogue(character, name, text) {
  return `<div class="dialogue-box ${character}">
    <div class="char-name ${character}">${name}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}

// ===== SVG HELPERS =====
function normalPDF(x, mu, sigma) {
  const z = (x - mu) / sigma;
  return Math.exp(-0.5 * z * z) / (sigma * Math.sqrt(2 * Math.PI));
}

function buildNormalCurve(opts) {
  // opts: { width, height, mu, sigma, fillLeft, fillRight, showAlpha, label, xMin, xMax }
  const w = opts.width || 680;
  const h = opts.height || 220;
  const mu = opts.mu || 0;
  const sigma = opts.sigma || 1;
  const xMin = opts.xMin !== undefined ? opts.xMin : mu - 3.5 * sigma;
  const xMax = opts.xMax !== undefined ? opts.xMax : mu + 3.5 * sigma;
  const padL = 40, padR = 20, padT = 20, padB = 40;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  function xToSvg(x) { return padL + ((x - xMin) / (xMax - xMin)) * plotW; }
  function yToSvg(y) {
    const maxY = normalPDF(mu, mu, sigma) * 1.15;
    return padT + plotH - (y / maxY) * plotH;
  }

  // Build curve path
  const steps = 200;
  const dx = (xMax - xMin) / steps;
  let pathD = '';
  for (let i = 0; i <= steps; i++) {
    const x = xMin + i * dx;
    const y = normalPDF(x, mu, sigma);
    const sx = xToSvg(x);
    const sy = yToSvg(y);
    pathD += (i === 0 ? 'M' : 'L') + sx.toFixed(1) + ',' + sy.toFixed(1);
  }

  // Build shaded region (right tail)
  let shadedRight = '';
  if (opts.fillRight !== undefined) {
    const cr = opts.fillRight;
    let fill = 'M' + xToSvg(cr).toFixed(1) + ',' + yToSvg(0).toFixed(1);
    for (let i = 0; i <= 80; i++) {
      const x = cr + i * ((xMax - cr) / 80);
      fill += 'L' + xToSvg(x).toFixed(1) + ',' + yToSvg(normalPDF(x, mu, sigma)).toFixed(1);
    }
    fill += 'L' + xToSvg(xMax).toFixed(1) + ',' + yToSvg(0).toFixed(1) + 'Z';
    shadedRight = `<path d="${fill}" fill="var(--thor-red)" opacity="0.35"/>`;
  }

  // Build shaded region (left tail)
  let shadedLeft = '';
  if (opts.fillLeft !== undefined) {
    const cl = opts.fillLeft;
    let fill = 'M' + xToSvg(xMin).toFixed(1) + ',' + yToSvg(0).toFixed(1);
    for (let i = 0; i <= 80; i++) {
      const x = xMin + i * ((cl - xMin) / 80);
      fill += 'L' + xToSvg(x).toFixed(1) + ',' + yToSvg(normalPDF(x, mu, sigma)).toFixed(1);
    }
    fill += 'L' + xToSvg(cl).toFixed(1) + ',' + yToSvg(0).toFixed(1) + 'Z';
    shadedLeft = `<path d="${fill}" fill="var(--thor-red)" opacity="0.35"/>`;
  }

  // Axis
  const axisLine = `<line x1="${padL}" y1="${yToSvg(0)}" x2="${w-padR}" y2="${yToSvg(0)}" stroke="var(--border)" stroke-width="1.5"/>`;

  // Ticks
  let ticks = '';
  for (let z = -3; z <= 3; z++) {
    const xv = mu + z * sigma;
    if (xv >= xMin && xv <= xMax) {
      const sx = xToSvg(xv);
      const sy = yToSvg(0);
      ticks += `<line x1="${sx}" y1="${sy}" x2="${sx}" y2="${sy+6}" stroke="var(--text-dim)" stroke-width="1"/>`;
      const label = opts.xLabels ? (opts.xLabels[z+3] || '') : (z === 0 ? (opts.muLabel || 'μ') : '');
      if (label) {
        ticks += `<text x="${sx}" y="${sy+22}" fill="var(--text-dim)" font-size="12" text-anchor="middle" font-family="Patrick Hand">${label}</text>`;
      }
    }
  }

  // Mean line
  const meanLine = `<line x1="${xToSvg(mu)}" y1="${padT}" x2="${xToSvg(mu)}" y2="${yToSvg(0)}" stroke="var(--odin-blue)" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>`;

  // Critical value lines
  let critLines = '';
  if (opts.fillRight !== undefined) {
    const cx = xToSvg(opts.fillRight);
    critLines += `<line x1="${cx}" y1="${padT}" x2="${cx}" y2="${yToSvg(0)}" stroke="var(--thor-red)" stroke-width="2" stroke-dasharray="4,3"/>`;
    critLines += `<text x="${cx}" y="${padT - 4}" fill="var(--thor-red)" font-size="11" text-anchor="middle" font-family="Permanent Marker">${opts.critLabelRight || ''}</text>`;
  }
  if (opts.fillLeft !== undefined) {
    const cx = xToSvg(opts.fillLeft);
    critLines += `<line x1="${cx}" y1="${padT}" x2="${cx}" y2="${yToSvg(0)}" stroke="var(--thor-red)" stroke-width="2" stroke-dasharray="4,3"/>`;
    critLines += `<text x="${cx}" y="${padT - 4}" fill="var(--thor-red)" font-size="11" text-anchor="middle" font-family="Permanent Marker">${opts.critLabelLeft || ''}</text>`;
  }

  // Alpha label
  let alphaLabel = '';
  if (opts.showAlpha && opts.fillRight !== undefined) {
    const midX = xToSvg((opts.fillRight + xMax) / 2);
    const midY = yToSvg(normalPDF((opts.fillRight + xMax) / 2, mu, sigma)) - 8;
    alphaLabel = `<text x="${midX}" y="${midY}" fill="var(--thor-red)" font-size="13" text-anchor="middle" font-family="Permanent Marker">α</text>`;
  }

  // Title
  let titleSvg = '';
  if (opts.label) {
    titleSvg = `<text x="${w/2}" y="${h-2}" fill="var(--text-dim)" font-size="12" text-anchor="middle" font-family="Permanent Marker">${opts.label}</text>`;
  }

  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" xmlns="http://www.w3.org/2000/svg">
    ${shadedLeft}${shadedRight}
    <path d="${pathD}" fill="none" stroke="var(--odin-blue)" stroke-width="2.5"/>
    ${axisLine}${ticks}${meanLine}${critLines}${alphaLabel}${titleSvg}
  </svg>`;
}


// ===== STEP FUNCTIONS =====
const totalSteps = 13; // 0..12
let currentStep = 0;

// ------ STEP 0: INTRO ------
function step0() {
  return `
    <div class="step-title">The Court of Asgard: The Trial of the Swords</div>

    <p>Na Large Forja de Asgard, um ferreiro chamado <span class="hl-gold">Brokkr</span> afirma ter descoberto uma nova t&eacute;cnica de t&ecirc;mpera que produz espadas mais resistentes. Os guerreiros est&atilde;o empolgados &mdash; mas Odinfather n&atilde;o aceita afirma&ccedil;&otilde;es sem evid&ecirc;ncias.</p>

    <p>Para resolver a quest&atilde;o, Odin convoca o <strong>Tribunal de Asgard</strong> &mdash; e aplica a l&oacute;gica do <span class="hl-blue">Teste de Hip&oacute;teses</span>.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Pensem no teste de hipóteses como um <strong>julgamento</strong>. O réu é a Null Hypothesis — e o réu começa <em>inocente até que se prove o contrário</em>. A evidência são os dados. O júri somos nós.')}

    ${dialogue('thor', '⚡ Thorment', 'Espera — se o ferreiro diz que a técnica funciona, por que não simplesmente acreditar nele? Ele mostrou umas espadas bem bonitas!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Porque "bonita" não é dado, Thorment. Preciso de <strong>evidências sistemáticas</strong>. As espadas novas são realmente mais resistentes, ou a diferença observada é apenas variação natural do processo de forja?')}

    <div class="concept-grid">
      <div class="concept-card">
        <div class="card-title" style="color:var(--odin-blue)">🛡️ Null Hypothesis (H₀)</div>
        <p>O "réu" &mdash; presunção de inocência. A técnica nova <strong>não</strong> melhora as espadas.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--gold)">⚔️ Alternative Hypothesis (H₁)</div>
        <p>A acusação. A técnica nova produz espadas <strong>diferentes</strong> (melhores ou piores).</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--success)">📊 Evidence = Data</div>
        <p>Testamos várias espadas das duas técnicas e medimos a resistência.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--corvo-purple)">⚖️ Verdict</div>
        <p>Rejeitamos H₀ (culpado) ou <em>falhamos em rejeitar</em> H₀ (não culpado). Nunca "provamos" H₀!</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Atenção à linguagem: nós <strong>nunca aceitamos</strong> H₀. Dizemos que <em>falhamos em rejeitar</em> H₀. Assim como um tribunal que não encontra provas não declara o réu "comprovadamente inocente" — apenas diz "não culpado".')}
  `;
}

// ------ STEP 1: H0 e H1 ------
function step1() {
  return `
    <div class="step-title">Passo 1: H₀ and H₁ — The Hypotheses</div>

    <p>Toda investigação científica começa com hipóteses formais. No Tribunal de Asgard, precisamos declarar a acusação e a defesa <em>antes</em> de olhar as evidências.</p>

    ${dialogue('thor', '⚡ Thorment', 'Fácil! Minha hipótese: "A técnica nova de Brokkr É melhor." Pronto, começa o teste!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Errado, Thorment. O que você escreveu é a hipótese de pesquisa, não a estrutura formal do teste. No NHST, a hipótese nula afirma que <strong>não há diferença</strong>. A alternativa é que <strong>há diferença</strong>.')}

    <div class="formula">
      <div class="formula-label">Null Hypothesis (o "réu")</div>
      H₀: μ<sub>nova</sub> = μ<sub>tradicional</sub>
    </div>

    <div class="formula">
      <div class="formula-label">Alternative Hypothesis Bilateral (não-direcional)</div>
      H₁: μ<sub>nova</sub> ≠ μ<sub>tradicional</sub>
    </div>

    <p class="step-subtitle">Directional vs. Non-Directional</p>

    <div class="concept-grid">
      <div class="concept-card">
        <div class="card-title" style="color:var(--odin-blue)">Two-Tailed (bilateral)</div>
        <p>H₁: μ<sub>nova</sub> ≠ μ<sub>trad</sub><br>
        "A técnica nova produz resultado <strong>diferente</strong> — para mais OU para menos."<br>
        <em>Mais conservador. Geralmente recomendado.</em></p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--gold)">One-Tailed (unilateral)</div>
        <p>H₁: μ<sub>nova</sub> &gt; μ<sub>trad</sub><br>
        "A técnica nova produz espadas <strong>mais resistentes</strong>."<br>
        <em>Mais poder, mas assume direção a priori.</em></p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'A escolha entre unilateral e bilateral deve ser feita <strong>antes</strong> de coletar dados. Trocar depois de ver os resultados é uma forma de <em>p-hacking</em> — Thorment adoraria, mas é proibido no Tribunal de Asgard.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Vamos usar o teste <strong>bilateral</strong>. Não temos certeza a priori de que a técnica nova é melhor — pode ser pior também. Humildade científica!')}
  `;
}

// ------ STEP 2: ALPHA ------
function step2() {
  return `
    <div class="step-title">Passo 2: Significance Level (α)</div>

    <p>Antes de coletar dados, precisamos definir o critério de decisão: quanta evidência é "suficiente" para condenar o réu?</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'O nível de significância α é o <strong>limiar de raridade</strong>. Se a probabilidade de observar nossos dados (ou mais extremos) for menor que α, consideramos a evidência forte o suficiente para rejeitar H₀.')}

    <div class="formula">
      <div class="formula-label">Most common convention</div>
      α = 0,05 (5%)
    </div>

    <p>Isso significa: aceitamos um risco de <span class="hl-red">5%</span> de condenar um inocente (rejeitar H₀ quando ela é verdadeira).</p>

    ${dialogue('thor', '⚡ Thorment', 'Por que 0,05? Parece arbitrário.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Boa pergunta, e você tem razão — <strong>é arbitrário</strong>. Fisher sugeriu 0,05 como uma convenção prática nos anos 1920, não como lei da natureza. Em áreas críticas como medicina, usa-se α = 0,01 ou até 0,005. Em estudos exploratórios, 0,10 pode ser aceitável.')}

    <div class="concept-grid">
      <div class="concept-card">
        <div class="card-title" style="color:var(--thor-red)">α = 0,10</div>
        <p>Mais liberal. Mais fácil rejeitar H₀. Maior risco de falso positivo. Estudos exploratórios.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--gold)">α = 0,05</div>
        <p>Convenção padrão. Equilíbrio entre sensibilidade e cautela. A maioria das ciências sociais.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--odin-blue)">α = 0,01</div>
        <p>Mais rigoroso. Difícil rejeitar H₀. Menor risco de falso positivo. Pesquisas clínicas.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--success)">α = 0,005</div>
        <p>Proposta de Benjamin et al. (2018). Muito conservador. Física de partículas usa 5σ!</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'O α deve ser definido <strong>antes</strong> de olhar os dados. Escolher α depois de calcular o p-valor é como mudar as regras do julgamento após ouvir o testemunho — desonesto e inaceitável.')}
  `;
}

// ------ STEP 3: ESTATISTICA DE TESTE ------
function step3() {
  return `
    <div class="step-title">Passo 3: Test Statistic</div>

    <p>Coletamos os dados: 15 espadas forjadas com a técnica nova e 15 com a tradicional. Agora precisamos transformar esses dados brutos em um <strong>número único</strong> que resuma a evidência.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'A estatística de teste é como uma balança de Asgard. De um lado, colocamos o <strong>sinal</strong> (a diferença observada). Do outro, o <strong>ruído</strong> (a variabilidade esperada por acaso). Quanto maior a razão sinal/ruído, mais forte a evidência.')}

    <div class="formula">
      <div class="formula-label">General logic de qualquer estatística de teste</div>
      Test Statistic = (Observed Effect − Effect under H₀) / Standard Error
    </div>

    <p class="step-subtitle">Exemplos de estatísticas de teste:</p>

    <table class="data-table">
      <tr>
        <th>Teste</th><th>Estatística</th><th>When to use</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Teste <em>t</em></td>
        <td><em>t</em> = (X̄₁ − X̄₂) / SE</td>
        <td>Compare 2 means</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Teste <em>z</em></td>
        <td><em>z</em> = (X̄ − μ₀) / (σ/√n)</td>
        <td>Mean with known σ</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">ANOVA</td>
        <td><em>F</em> = MS<sub>entre</sub> / MS<sub>dentro</sub></td>
        <td>Compare 3+ means</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Qui-quadrado</td>
        <td>χ² = Σ(O−E)²/E</td>
        <td>Categorical frequencies</td>
      </tr>
    </table>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Para nosso caso das espadas de Brokkr, vamos usar o <strong>teste <em>t</em> de amostras independentes</strong>. A estatística <em>t</em> mede quantos erros-padrão a diferença observada está longe de zero.')}

    <div class="visual-container">
      ${buildNormalCurve({
        width: 680, height: 200, mu: 0, sigma: 1,
        fillRight: 1.96, fillLeft: -1.96,
        showAlpha: true,
        critLabelRight: 'z = +1,96',
        critLabelLeft: 'z = −1,96',
        xLabels: ['', '', '−1σ', 'μ=0', '+1σ', '', ''],
        label: 'Distribuição sob H₀ — áreas vermelhas = rejection regions (α/2 cada)'
      })}
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'A estatística de teste segue uma <strong>distribuição conhecida</strong> sob H₀ (normal, t, F, χ²). Isso permite calcular a probabilidade de obter um valor tão ou mais extremo que o observado.')}
  `;
}

// ------ STEP 4: P-VALOR (CRITICAL STEP) ------
function step4() {
  return `
    <div class="step-title">Passo 4: P-value — What It Is and What It Is NOT</div>

    <p>Este é o passo mais <strong>incompreendido</strong> de toda a estatística. Preste muita atenção.</p>

    <p>Suponha que calculamos nosso teste <em>t</em> e obtivemos <span class="hl-gold">p = 0,03</span>. O que isso significa?</p>

    ${dialogue('thor', '⚡ Thorment', 'Óbvio! p = 0,03 significa que há apenas <strong>3% de chance</strong> de que H₀ seja verdadeira. Ou seja, 97% de certeza de que a técnica nova funciona! Caso encerrado!')}

    <div class="warning-box">
      <div class="warning-title">⚠️ INVERSE PROBABILITY FALLACY</div>
      <p>O que Thorment disse é o <strong>erro mais comum</strong> na interpretação do p-valor. É chamado de <em>inverse probability fallacy</em> ou <em>transposição do condicional</em>.</p>
      <p style="margin-top:8px">O p-valor <strong>NOT</strong> é P(H₀ | dados).</p>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', '<strong>NOT, Thorment!</strong> O p-valor não nos diz a probabilidade de H₀ ser verdadeira. Isso seria P(H₀ | dados) — e calcular isso exige Bayes, não NHST. O p-valor é outra coisa completamente diferente.')}

    <div class="correct-box">
      <div class="correct-title">✅ CORRECT DEFINITION</div>
      <p style="font-size:1.15rem"><strong>p-valor</strong> = a probabilidade de observar dados tão ou mais extremos que os obtidos, <span class="hl-gold">assumindo que H₀ é verdadeira</span>.</p>
      <p style="margin-top:8px;font-family:'Permanent Marker';color:var(--odin-blue)">p = P(dados ≥ observado | H₀ verdadeira)</p>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Pense assim: p = 0,03 significa que, <strong>se H₀ fosse verdadeira</strong> (se a técnica não fizesse diferença nenhuma), haveríamos apenas 3% de chance de obter uma diferença tão grande quanto a que observamos. Isso não é o mesmo que dizer que H₀ tem 3% de chance de ser verdadeira!')}

    <div class="visual-container">
      ${(() => {
        const w = 680, h = 220;
        const mu = 0, sigma = 1;
        const padL = 40, padR = 20, padT = 25, padB = 45;
        const plotW = w - padL - padR;
        const plotH = h - padT - padB;
        const xMin = -3.8, xMax = 3.8;

        function xToSvg(x) { return padL + ((x - xMin) / (xMax - xMin)) * plotW; }
        function yToSvg(y) {
          const maxY = normalPDF(0, 0, 1) * 1.15;
          return padT + plotH - (y / maxY) * plotH;
        }

        // Curve
        let pathD = '';
        for (let i = 0; i <= 200; i++) {
          const x = xMin + i * ((xMax - xMin) / 200);
          const y = normalPDF(x, mu, sigma);
          pathD += (i === 0 ? 'M' : 'L') + xToSvg(x).toFixed(1) + ',' + yToSvg(y).toFixed(1);
        }

        // Observed t = 2.17 (for illustration)
        const tObs = 2.17;
        // Shade right of tObs
        let shadeR = 'M' + xToSvg(tObs).toFixed(1) + ',' + yToSvg(0).toFixed(1);
        for (let i = 0; i <= 60; i++) {
          const x = tObs + i * ((xMax - tObs) / 60);
          shadeR += 'L' + xToSvg(x).toFixed(1) + ',' + yToSvg(normalPDF(x, 0, 1)).toFixed(1);
        }
        shadeR += 'L' + xToSvg(xMax).toFixed(1) + ',' + yToSvg(0).toFixed(1) + 'Z';

        // Shade left of -tObs
        let shadeL = 'M' + xToSvg(xMin).toFixed(1) + ',' + yToSvg(0).toFixed(1);
        for (let i = 0; i <= 60; i++) {
          const x = xMin + i * ((-tObs - xMin) / 60);
          shadeL += 'L' + xToSvg(x).toFixed(1) + ',' + yToSvg(normalPDF(x, 0, 1)).toFixed(1);
        }
        shadeL += 'L' + xToSvg(-tObs).toFixed(1) + ',' + yToSvg(0).toFixed(1) + 'Z';

        const axis = `<line x1="${padL}" y1="${yToSvg(0)}" x2="${w-padR}" y2="${yToSvg(0)}" stroke="var(--border)" stroke-width="1.5"/>`;

        // t observed arrow
        const tX = xToSvg(tObs);
        const arrow = `<line x1="${tX}" y1="${padT}" x2="${tX}" y2="${yToSvg(0)}" stroke="var(--gold)" stroke-width="2.5" stroke-dasharray="6,3"/>
          <text x="${tX+5}" y="${padT + 15}" fill="var(--gold)" font-size="13" font-family="Permanent Marker">t obs = ${tObs}</text>`;

        const pLabel = `<text x="${xToSvg(2.9)}" y="${yToSvg(0) - 20}" fill="var(--thor-red)" font-size="12" font-family="Permanent Marker">p/2</text>
          <text x="${xToSvg(-2.9)}" y="${yToSvg(0) - 20}" fill="var(--thor-red)" font-size="12" font-family="Permanent Marker">p/2</text>`;

        const caption = `<text x="${w/2}" y="${h - 4}" fill="var(--text-dim)" font-size="12" text-anchor="middle" font-family="Permanent Marker">p-valor bilateral = área sombreada em ambas as caudas (assumindo H₀ verdadeira)</text>`;

        return `<svg viewBox="0 0 ${w} ${h}" width="${w}">
          <path d="${shadeR}" fill="var(--thor-red)" opacity="0.4"/>
          <path d="${shadeL}" fill="var(--thor-red)" opacity="0.4"/>
          <path d="${pathD}" fill="none" stroke="var(--odin-blue)" stroke-width="2.5"/>
          ${axis}${arrow}${pLabel}${caption}
          <text x="${xToSvg(0)}" y="${yToSvg(0)+18}" fill="var(--text-dim)" font-size="11" text-anchor="middle" font-family="Patrick Hand">0</text>
        </svg>`;
      })()}
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', '<strong>O p-valor NOT nos diz:</strong><br>• A probabilidade de H₀ ser verdadeira<br>• A probabilidade de H₁ ser verdadeira<br>• A probabilidade de replicar o resultado<br>• O tamanho ou a importância do efeito<br><br><strong>O p-valor nos diz APENAS:</strong><br>• Quão compatíveis os dados são com H₀')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Se p = 0,03 < α = 0,05, <strong>rejeitamos H₀</strong>. Os dados são suficientemente incompatíveis com a hipótese de que a técnica não faz diferença. Mas isso NOT nos diz quanto melhores as espadas são — para isso, precisamos do <em>tamanho de efeito</em>.')}
  `;
}

// ------ STEP 5: ERRO TIPO I ------
function step5() {
  return `
    <div class="step-title">Passo 5: Type I Error (α) — Convicting an Innocent</div>

    <p>Mesmo no melhor tribunal, erros acontecem. O <strong>Erro Tipo I</strong> é o mais temido.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Erro Tipo I: rejeitamos H₀ quando H₀ é <strong>verdadeira</strong>. No nosso contexto — condenamos o réu inocente. Declaramos que a técnica nova funciona quando, na realidade, <em>não funciona</em>.')}

    <div class="formula">
      <div class="formula-label">Probability of Type I Error</div>
      P(Reject H₀ | H₀ verdadeira) = α
    </div>

    <p>Ao definir α = 0,05, estamos dizendo: "Aceito que, em 5% das vezes que H₀ for verdadeira, vou cometer o erro de rejeitá-la."</p>

    <div class="visual-container">
      ${buildNormalCurve({
        width: 680, height: 200, mu: 0, sigma: 1,
        fillRight: 1.96, fillLeft: -1.96,
        showAlpha: true,
        critLabelRight: '+1,96',
        critLabelLeft: '−1,96',
        xLabels: ['', '', '', 'H₀ verdadeira', '', '', ''],
        label: 'Áreas vermelhas = Erro Tipo I (α = 5%)'
      })}
    </div>

    ${dialogue('thor', '⚡ Thorment', 'Então é só baixar o α para 0,001 e pronto! Nunca mais erramos!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Não é tão simples. Reduzir α diminui o Erro Tipo I, mas <strong>aumenta</strong> o Erro Tipo II. É um equilíbrio — como veremos no próximo passo.')}

    <div class="concept-grid">
      <div class="concept-card" style="border-color:var(--thor-red)">
        <div class="card-title" style="color:var(--thor-red)">⚠️ False Positive</div>
        <p>Exemplo nórdico: Odin declara que a técnica de Brokkr <strong>é superior</strong>, mas na verdade as espadas são iguais. Brokkr ganha fama e ouro imerecidos!</p>
      </div>
      <div class="concept-card" style="border-color:var(--thor-red)">
        <div class="card-title" style="color:var(--thor-red)">🎯 Na ciência</div>
        <p>Publicar que um tratamento funciona quando não funciona. Desperdiçar recursos de pesquisa. Informar políticas públicas com achados falsos.</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Erro Tipo I também é chamado de <strong>falso positivo</strong> ou <strong>alarme falso</strong>. A taxa α é o nível de significância que definimos no Passo 2. Controlamos diretamente essa taxa ao escolher α.')}
  `;
}

// ------ STEP 6: ERRO TIPO II ------
function step6() {
  return `
    <div class="step-title">Passo 6: Type II Error (β) — Freeing the Guilty</div>

    <p>O segundo tipo de erro é igualmente perigoso, mas menos falado.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Erro Tipo II: <strong>falhamos em rejeitar</strong> H₀ quando H₀ é <strong>falsa</strong>. No tribunal — o vilão é culpado, mas não encontramos evidências suficientes e o liberamos.')}

    <div class="formula">
      <div class="formula-label">Probability of Type I ErrorI</div>
      P(Não rejeitar H₀ | H₀ falsa) = β
    </div>

    <p>No nosso caso: a técnica de Brokkr <em>realmente</em> produz espadas melhores, mas nosso teste não detectou a diferença. A inovação é descartada injustamente.</p>

    ${dialogue('thor', '⚡ Thorment', 'E qual é o valor de β? É 0,05 também?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Não! O β não é fixado por convenção como o α. Ele <strong>depende</strong> de três fatores: o tamanho da amostra (n), o tamanho real do efeito (δ), e o próprio α. Quanto maior n e δ, menor o β.')}

    <div class="concept-grid">
      <div class="concept-card" style="border-color:var(--success)">
        <div class="card-title" style="color:var(--success)">⬇️ Reduzir β (menos erros Tipo II):</div>
        <p>• Aumentar tamanho da amostra (n)<br>
        • Aumentar α (mas aumenta Erro Tipo I)<br>
        • Efeitos maiores são mais fáceis de detectar</p>
      </div>
      <div class="concept-card" style="border-color:var(--thor-red)">
        <div class="card-title" style="color:var(--thor-red)">⚠️ False Negative</div>
        <p>A técnica de Brokkr <strong>funciona de verdade</strong>, mas nosso teste falhou em detectá-la. Brokkr perde a fama que merece. A forja de Asgard não evolui.</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'O Erro Tipo II é o <strong>falso negativo</strong> ou <strong>alarme perdido</strong>. Na prática, β é frequentemente ignorado — pesquisadores fixam α = 0,05 e esquecem de calcular se têm amostra suficiente para detectar o efeito. Isso é um problema gravíssimo.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'É como ter um detector de mentiras que só funciona metade das vezes. Se o poder do seu teste é baixo, você está basicamente jogando moeda. A convenção mínima é <strong>1 − β ≥ 0,80</strong> — ou seja, pelo menos 80% de chance de detectar um efeito real.')}
  `;
}

// ------ STEP 7: PODER ESTATISTICO ------
function step7() {
  return `
    <div class="step-title">Passo 7: Statistical Power (1 − β)</div>

    <p>O <strong>poder</strong> de um teste é a probabilidade de rejeitar H₀ quando H₀ é <strong>realmente falsa</strong>. É a capacidade do teste de <em>encontrar o efeito</em> quando ele existe.</p>

    <div class="formula">
      <div class="formula-label">Statistical Power</div>
      Poder = 1 − β = P(Reject H₀ | H₀ falsa)
    </div>

    <p class="step-subtitle">2x2 Decision Table</p>

    <table class="decision-table">
      <tr>
        <th></th>
        <th colspan="2" style="color:var(--gold)">🎯 Reality (unknown)</th>
      </tr>
      <tr>
        <th></th>
        <th>H₀ is True</th>
        <th>H₀ is False</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Fail to Reject H₀</td>
        <td class="correct-cell">
          <span style="font-family:'Bangers';font-size:1.2rem;color:var(--success)">✅ Correct Decision</span><br>
          <span style="font-size:0.9rem;color:var(--text-dim)">P = 1 − α</span><br>
          <span style="font-size:0.85rem">Innocent correctly acquitted</span>
        </td>
        <td class="error-cell">
          <span style="font-family:'Bangers';font-size:1.2rem;color:var(--thor-red)">❌ Erro Tipo II (β)</span><br>
          <span style="font-size:0.9rem;color:var(--text-dim)">False Negative</span><br>
          <span style="font-size:0.85rem">Guilty freed!</span>
        </td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Reject H₀</td>
        <td class="error-cell">
          <span style="font-family:'Bangers';font-size:1.2rem;color:var(--thor-red)">❌ Erro Tipo I (α)</span><br>
          <span style="font-size:0.9rem;color:var(--text-dim)">False Positive</span><br>
          <span style="font-size:0.85rem">Innocent convicted!</span>
        </td>
        <td class="correct-cell">
          <span style="font-family:'Bangers';font-size:1.2rem;color:var(--success)">✅ PODER (1−β)</span><br>
          <span style="font-size:0.9rem;color:var(--text-dim)">Correct Detection</span><br>
          <span style="font-size:0.85rem">Guilty convicted!</span>
        </td>
      </tr>
    </table>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'O poder depende de <strong>três ingredientes</strong>: o tamanho da amostra (n), o tamanho real do efeito (δ) e o nível α. Aumentar qualquer um deles aumenta o poder.')}

    <div class="concept-grid">
      <div class="concept-card">
        <div class="card-title" style="color:var(--odin-blue)">📊 n (Sample Size)</div>
        <p>Mais espadas testadas = mais precisão = mais poder. É o fator que o pesquisador mais controla.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--gold)">δ (Tamanho do Efeito)</div>
        <p>Efeitos grandes são mais fáceis de detectar. Se a técnica nova é MUITO melhor, n precisa ser menor.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--thor-red)">α (Nível de Significância)</div>
        <p>α maior = mais poder, mas mais falsos positivos. O trade-off é inevitável.</p>
      </div>
      <div class="concept-card">
        <div class="card-title" style="color:var(--success)">σ (Variability)</div>
        <p>Menos ruído nos dados = mais fácil enxergar o sinal. Medições precisas ajudam.</p>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'A convenção mínima de Cohen (1988) é <strong>poder ≥ 0,80</strong>. Isso significa aceitar no máximo 20% de chance de perder um efeito real. Muitos estudos publicados têm poder muito abaixo disso — é um dos motores da crise de replicação.')}
  `;
}

// ------ STEP 8: SIGNIFICANCIA ESTATISTICA VS PRATICA ------
function step8() {
  return `
    <div class="step-title">Passo 8: Statistical vs. Practical Significance</div>

    <p>Um resultado pode ser <strong>estatisticamente significativo</strong> sem ser <strong>praticamente importante</strong>. E vice-versa.</p>

    ${dialogue('thor', '⚡ Thorment', 'Como assim? Se p < 0,05, o efeito é significativo! Logo é importante!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Cuidado, Thorment. Imagine que testamos 10.000 espadas de cada técnica e encontramos que a nova técnica produz espadas 0,1 grama mais pesadas, com p = 0,001. Estatisticamente significativo? <strong>Sim.</strong> Relevante para um guerreiro em batalha? <strong>Absolutamente não.</strong>')}

    <div class="concept-grid">
      <div class="concept-card" style="border-color:var(--thor-red)">
        <div class="card-title" style="color:var(--thor-red)">⚠️ Large n Trap</div>
        <p>Com amostras enormes, <strong>qualquer</strong> diferença minúscula se torna "significativa" estatisticamente. O p-valor é sensível ao n!</p>
        <p style="margin-top:8px;font-family:'Permanent Marker';color:var(--thor-red)">n = 10.000 por grupo: uma diferença de 0,1 grama dá p < 0,001</p>
      </div>
      <div class="concept-card" style="border-color:var(--success)">
        <div class="card-title" style="color:var(--success)">✅ Small n Trap</div>
        <p>Com amostras pequenas, efeitos <strong>grandes e reais</strong> podem não atingir significância. O teste não tem poder suficiente.</p>
        <p style="margin-top:8px;font-family:'Permanent Marker';color:var(--success)">n = 5 por grupo: uma diferença de 15 pontos pode dar p = 0,08</p>
      </div>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'É por isso que o p-valor responde <strong>SE</strong> existe evidência de efeito, mas não diz <strong>QUANTO</strong> o efeito é grande ou <strong>SE</strong> é relevante na prática. Para isso, precisamos do <em>tamanho de efeito</em>.')}

    <div class="formula">
      <div class="formula-label">A pergunta que o p-valor não responde</div>
      p < 0,05 → "Existe efeito?" &nbsp;✔️&nbsp;&nbsp; "Quanto?" &nbsp;❌&nbsp;&nbsp; "Importante?" &nbsp;❌
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Cumming (2014) enfatiza: relatar apenas p < 0,05 sem tamanho de efeito e intervalo de confiança é <strong>insuficiente</strong>. A "nova estatística" exige que digamos não apenas <em>se</em> mas <em>quanto</em>.')}
  `;
}

// ------ STEP 9: TAMANHO DE EFEITO ------
function step9() {
  return `
    <div class="step-title">Passo 9: Effect Size — The "How Much?"</div>

    <p>Se o p-valor responde <strong>se</strong> há evidência de efeito, o tamanho de efeito responde <strong>quanto</strong> grande ele é. É a peça que faltava no julgamento.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'No nosso caso das espadas de Brokkr, digamos que a resistência média das espadas novas foi 85 e das tradicionais foi 78, com desvio-padrão combinado de 10. Vamos calcular o <strong>Cohen\'s d</strong>.')}

    <div class="formula">
      <div class="formula-label">Cohen's d</div>
      d = (X̄₁ − X̄₂) / s<sub>pooled</sub> = (85 − 78) / 10 = <span class="hl-gold">0,70</span>
    </div>

    <p class="step-subtitle">Benchmarks de Cohen (1988)</p>

    <table class="es-table">
      <tr>
        <th>Medida</th><th>Small</th><th>Medium</th><th>Large</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Cohen's d</td>
        <td>0,20</td><td>0,50</td><td>0,80</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">r (correlação)</td>
        <td>0,10</td><td>0,30</td><td>0,50</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">η² (eta quadrado)</td>
        <td>0,01</td><td>0,06</td><td>0,14</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">f² (Cohen's f²)</td>
        <td>0,02</td><td>0,15</td><td>0,35</td>
      </tr>
    </table>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Nosso d = 0,70 é um efeito entre médio e grande. Isso significa que a média das espadas novas está 0,70 desvios-padrão acima das tradicionais. <em>Agora sim</em> temos uma ideia da magnitude!')}

    ${dialogue('thor', '⚡ Thorment', 'Mas espera — a preferência do curso não é Hedges\' g?')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Boa, Thorment! O <strong>Hedges\' g</strong> corrige o viés de amostras pequenas do Cohen\'s d. Para n < 20, a diferença importa. E sempre reporte com <strong>intervalo de confiança</strong>: <em>d</em> = 0,70, 95% CI [0,18; 1,22].')}

    <div class="apa-box">
      <div class="apa-label">APA Format</div>
      <em>d</em> = 0,70, 95% CI [0,18; 1,22]
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'O tamanho de efeito é <strong>independente</strong> do tamanho da amostra. Diferente do p-valor, que diminui conforme n cresce, o tamanho de efeito captura a <em>magnitude real</em> da diferença. É por isso que Cumming o coloca no centro da "nova estatística".')}
  `;
}

// ------ STEP 10: RITUAL DO NHST ------
function step10() {
  return `
    <div class="step-title">Passo 10: O Ritual do NHST — Step by Step</div>

    <p>Agora que entendemos cada componente, vamos montar o <strong>fluxo completo</strong> do Teste de Hipóteses.</p>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'O NHST é um <em>ritual</em> com passos precisos. Siga a ordem. Não pule etapas. E defina tudo ANTES de olhar os dados.')}

    <div class="flowchart-container">
      <svg viewBox="0 0 700 620" width="700" xmlns="http://www.w3.org/2000/svg">

        <rect x="200" y="220" width="300" height="48" rx="10" fill="var(--bg-card)" stroke="var(--success)" stroke-width="2"/>

        <line x1="350" y1="268" x2="350" y2="290" stroke="var(--text-dim)" stroke-width="1.5" marker-end="url(#arrow)"/>

        <!-- 5: Calcular -->
        <rect x="200" y="290" width="300" height="48" rx="10" fill="var(--bg-card)" stroke="var(--odin-blue)" stroke-width="2"/>
        <text x="350" y="320" fill="var(--odin-blue)" font-size="15" text-anchor="middle" font-family="Permanent Marker">5. Calculate statistic + p-value</text>

        <!-- 6: Decision diamond -->
        <polygon points="350,360 500,410 350,460 200,410" fill="var(--bg-card)" stroke="var(--gold)" stroke-width="2"/>
        <text x="350" y="406" fill="var(--gold)" font-size="14" text-anchor="middle" font-family="Permanent Marker">p ≤ α ?</text>
        <text x="350" y="422" fill="var(--text-dim)" font-size="11" text-anchor="middle" font-family="Patrick Hand">(compare p with α)</text>

        <!-- Yes branch -->
        <line x1="500" y1="410" x2="580" y2="410" stroke="var(--success)" stroke-width="2"/>
        <text x="540" y="400" fill="var(--success)" font-size="12" font-family="Permanent Marker">YES</text>
        <line x1="580" y1="410" x2="580" y2="470" stroke="var(--success)" stroke-width="1.5" marker-end="url(#arrow)"/>
        <rect x="480" y="470" width="200" height="56" rx="10" fill="rgba(63,185,80,0.15)" stroke="var(--success)" stroke-width="2"/>
        <text x="580" y="493" fill="var(--success)" font-size="13" text-anchor="middle" font-family="Permanent Marker">Reject H₀</text>

        <text x="120" y="515" fill="var(--text-dim)" font-size="11" text-anchor="middle" font-family="Patrick Hand">"Non-significant result"</text>

        <!-- Step 7: Effect size (both branches merge) -->

        <line x1="120" y1="526" x2="120" y2="555" stroke="var(--text-dim)" stroke-width="1" stroke-dasharray="4"/>
        <line x1="120" y1="555" x2="580" y2="555" stroke="var(--text-dim)" stroke-width="1" stroke-dasharray="4"/>

        <rect x="175" y="570" width="350" height="44" rx="10" fill="var(--bg-card)" stroke="var(--gold)" stroke-width="2"/>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'Perceba que o último passo — reportar tamanho de efeito e intervalo de confiança — acontece <strong>independentemente</strong> do resultado. Mesmo se p > 0,05, você precisa dizer qual foi a magnitude observada. Um "resultado não-significativo" com d = 0,45 conta uma história muito diferente de um com d = 0,02.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Os passos 1 a 3 devem ser definidos <strong>antes</strong> de coletar dados. Isso é chamado de pré-registro. Mudar hipóteses, α, ou teste depois de ver os dados é a receita de Thorment para p-hacking.')}

// ------ STEP 11: ARMADILHAS ------
function step11() {
  return `
    <div class="step-title">Passo 11: NHST Traps — O Arsenal de Thorment</div>

    <p>O NHST é uma ferramenta útil, mas vulnerável a abusos. Thorment conhece todos os truques.</p>

    ${dialogue('thor', '⚡ Thorment', 'Hehehe... se o p-valor não der significativo, é só testar de várias formas até achar um que dê! Ou então juntar mais dados até o p baixar. Ou mudar a hipótese depois de ver os resultados. FÁCIL!')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'TUDO isso é <strong>proibido</strong> no Tribunal de Asgard. Cada uma dessas práticas infla artificialmente a taxa de falsos positivos. Vamos desmascarar cada uma.')}

    <div class="trap-grid">
      <div class="trap-card">
        <div class="trap-icon">🎣</div>
        <div>
          <div class="trap-title">P-Hacking (Data Dredging)</div>
          <p>Testar múltiplas análises, variáveis ou subgrupos até encontrar p < 0,05 por acaso. Com 20 testes independentes e α = 0,05, a chance de pelo menos um falso positivo é 1 − (0,95)²⁰ = <span class="hl-red">64%</span>!</p>
        </div>
      </div>
      <div class="trap-card">
        <div class="trap-icon">🔮</div>
        <div>
          <div class="trap-title">HARKing (Hypothesizing After Results are Known)</div>
          <p>Formular hipóteses <em>depois</em> de ver os dados, fingindo que eram a priori. "Eu SEMPRE achei que seria unicaudal!" — não, Thorment, você não achava.</p>
        </div>
      </div>
      <div class="trap-card">
        <div class="trap-icon">📈</div>
        <div>
          <div class="trap-title">Optional Stopping</div>
          <p>Coletar dados, testar, se p > 0,05 coletar mais, testar de novo... repetir até dar "significativo". Cada olhada nos dados infla α real muito além de 0,05.</p>
        </div>
      </div>
      <div class="trap-card">
        <div class="trap-icon">✂️</div>
        <div>
          <div class="trap-title">Selective Reporting</div>
          <p>Publicar apenas os resultados significativos e esconder os não-significativos na gaveta. Gera o <em>file drawer problem</em> — a literatura fica enviesada para efeitos positivos.</p>
        </div>
      </div>
      <div class="trap-card">
        <div class="trap-icon">🎯</div>
        <div>
          <div class="trap-title">Multiple Comparisons Without Correction</div>
          <p>Fazer 10 testes <em>t</em> sem ajustar o α (Bonferroni, Holm, FDR). Cada teste tem 5% de chance de falso positivo — com 10 testes, a taxa real explode.</p>
        </div>
      </div>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'A defesa contra essas armadilhas: <strong>pré-registro</strong> do estudo (hipóteses, análises, n planejado), <strong>correção</strong> para múltiplas comparações, e <strong>transparência</strong> total nos relatos. O Tribunal de Asgard exige honestidade.')}

    ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', 'Simmons, Nelson & Simonsohn (2011) mostraram que práticas questionáveis de pesquisa (QRPs) podem produzir p < 0,05 para <em>qualquer</em> hipótese, mesmo as falsas. O paper se chama "<em>False-Positive Psychology</em>" — leitura obrigatória.')}
  `;
}

// ------ STEP 12: LICAO DOS CORVOS ------
function step12() {
  return `
    <div class="step-title">Passo 12: Lesson of the Ravens — Final Synthesis</div>

    <p>O julgamento no Tribunal de Asgard chegou ao fim. Vamos consolidar o que aprendemos.</p>

    <div class="licao-box">
      <div class="licao-title">📜 Lesson of the Ravens</div>

      ${dialogue('corvo', '🐦‍⬛ Muninn whispers:', `<strong>Key points to commit to memory:</strong><br><br>
        • <strong>H₀</strong> = status quo (sem efeito); <strong>H₁</strong> = existe efeito<br>
        • <strong>α</strong> = critério de decisão, definido ANTES da coleta (geralmente 0,05)<br>
        • <strong>p-valor</strong> = P(dados ≥ observado | H₀ verdadeira) — e NADA mais<br>
        • <strong>p-valor NOT é</strong> P(H₀ verdadeira | dados) — falácia da probabilidade inversa!<br>
        • <strong>Erro Tipo I (α)</strong> = falso positivo = condenar inocente<br>
        • <strong>Erro Tipo II (β)</strong> = falso negativo = libertar culpado<br>
        • <strong>Poder (1−β)</strong> ≥ 0,80 — convenção mínima de Cohen<br>
        • <strong>Significância estatística ≠ significância prática</strong><br>
        • <strong>Tamanho de efeito</strong> (d, r, η²) diz QUANTO; p-valor diz apenas SE<br>
        • <strong>Sempre</strong> reporte ES + IC, mesmo quando p > 0,05`)}

      ${dialogue('corvo', '🐦‍⬛ Huginn challenges:', `<strong>Challenges for reflection:</strong><br><br>
        • Se p = 0,049 e p = 0,051 são tão diferentes assim, por que tratamos como binário?<br>
        • Quando o NHST <strong>NOT</strong> deveria ser usado?<br>
        • Se você pudesse escolher entre reportar só p OU só IC, qual escolheria? Por quê?<br>
        • O que acontece com a taxa real de α quando todo mundo publica apenas p < 0,05?<br>
        • Bayesianos não usam p-valores. O que eles usam no lugar? Será melhor?<br>
        • Se 80% dos estudos publicados na sua área têm poder < 0,50, o que isso significa para a literatura?`)}
    </div>

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'O Teste de Hipóteses é uma ferramenta — não um oráculo. Ele nos ajuda a tomar decisões sob incerteza, mas tem limitações sérias. Use-o com cuidado, sempre acompanhado de tamanho de efeito e intervalo de confiança. E nunca, <em>nunca</em>, trate p = 0,05 como a fronteira entre verdade e mentira.')}

    ${dialogue('thor', '⚡ Thorment', 'Tá bom, Odin... admito que aprendi algo hoje. Mas ainda acho que meu martelo resolve mais rápido do que esse ritual todo.')}

    ${dialogue('odin', '🧙‍♂️ Odinfather', 'O martelo quebra espadas, Thorment. O teste de hipóteses <em>forja conhecimento</em>. Prefiro a forja.')}

    <div style="text-align:center;margin:30px 0">
      <div style="font-family:'Bangers';font-size:2rem;color:var(--gold)">END OF TRIAL!</div>
      <p style="color:var(--text-dim);margin-top:8px">Hypothesis Testing (NHST) — From the Court of Asgard to your data.</p>
    </div>
  `;
}


// ===== STEP REGISTRY =====
const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10, step11, step12];

const stepNames = [
  'The Court of Asgard',
  'H₀ e H₁',
  'Significance Level (α)',
  'Test Statistic',
  'P-value: What It Is and What It Is NOT',
  'Type I Error (α)',
  'Type II Error (β)',
  'Statistical Power (1−β)',
  'Statistical vs. Practical Significance',
  'Effect Size',
  'The NHST Ritual',
  'Common Traps',
  'Lesson of the Ravens'
];

// ===== NAVIGATION =====
function renderStep() {
  const content = document.getElementById('stepContent');
  content.innerHTML = stepFunctions[currentStep]();
  content.style.animation = 'none';
  content.offsetHeight; // trigger reflow
  content.style.animation = 'fadeIn 0.4s ease';

  document.getElementById('progressLabel').textContent = `Step ${currentStep} of ${totalSteps - 1} — ${stepNames[currentStep]}`;
  document.getElementById('progressFill').style.width = `${(currentStep / (totalSteps - 1)) * 100}%`;

  document.getElementById('btnBack').disabled = currentStep === 0;
  document.getElementById('btnNext').textContent = currentStep === totalSteps - 1 ? 'Start Over ↻' : 'Next ▶';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep >= totalSteps - 1) {
    currentStep = 0;
  } else {
    currentStep++;
  }
  renderStep();
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

// Initialize
renderStep();
</script>
