<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Statistical Saga of Odinfather — Realm 1: Quantitative Research</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{--bg-dark:#0d1117;--bg-card:#161b22;--bg-panel:#1c2333;--odin-blue:#58a6ff;--thor-red:#f85149;--corvo-purple:#bc8cff;--gold:#f0c040;--silver:#8b949e;--text:#e6edf3;--text-dim:#8b949e;--success:#3fb950;--border:#30363d}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-dark);color:var(--text);font-family:'Patrick Hand',cursive;font-size:18px;min-height:100vh;overflow-x:hidden}
#game-container{max-width:800px;margin:0 auto;padding:20px;min-height:100vh}
.title-screen{text-align:center;padding:60px 20px;animation:fadeIn 1s ease}
.title-screen h1{font-family:'Bangers',cursive;font-size:2.8em;color:var(--gold);text-shadow:2px 2px 8px rgba(240,192,64,.3);line-height:1.1;margin-bottom:8px}
.title-screen h2{font-family:'Permanent Marker',cursive;font-size:1.5em;color:var(--odin-blue);margin-bottom:30px}
.title-screen .subtitle{color:var(--text-dim);font-size:1.1em;margin-bottom:40px}
.reino-badge{display:inline-block;background:linear-gradient(135deg,var(--odin-blue),var(--corvo-purple));padding:6px 20px;border-radius:20px;font-family:'Bangers',cursive;font-size:1em;color:#fff;margin-bottom:16px}
.difficulty-select{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.diff-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Bangers',cursive;font-size:1.2em;padding:16px 32px;border-radius:12px;cursor:pointer;transition:all .3s;min-width:180px}
.diff-btn:hover{border-color:var(--odin-blue);transform:translateY(-2px)}
.diff-btn .diff-label{font-size:1.3em}.diff-btn .diff-desc{font-family:'Patrick Hand',cursive;font-size:.65em;color:var(--text-dim);margin-top:4px}
.scene{animation:slideIn .5s ease;padding:10px 0}
.dialogue-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;position:relative}
.dialogue-box.odin{border-left:4px solid var(--odin-blue)}.dialogue-box.thor{border-left:4px solid var(--thor-red)}.dialogue-box.corvo{border-left:4px solid var(--corvo-purple)}.dialogue-box.narrator{border-left:4px solid var(--gold)}
.char-name{font-family:'Bangers',cursive;font-size:1.1em;margin-bottom:6px}
.char-name.odin{color:var(--odin-blue)}.char-name.thor{color:var(--thor-red)}.char-name.corvo{color:var(--corvo-purple)}.char-name.narrator{color:var(--gold)}
.dialogue-text{line-height:1.5;font-size:1.05em}.dialogue-text em{color:var(--gold);font-style:normal;font-weight:bold}
.challenge-box{background:var(--bg-panel);border:2px solid var(--gold);border-radius:12px;padding:24px;margin:20px 0;animation:pulse-border 2s ease infinite}
@keyframes pulse-border{0%,100%{border-color:var(--gold);box-shadow:0 0 8px rgba(240,192,64,.15)}50%{border-color:#f0c040cc;box-shadow:0 0 16px rgba(240,192,64,.3)}}
.challenge-title{font-family:'Bangers',cursive;font-size:1.4em;color:var(--gold);margin-bottom:12px;text-align:center}
.challenge-question{margin-bottom:16px;line-height:1.5}
.data-display{background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin:12px 0;font-family:'Courier New',monospace;font-size:1em;color:var(--odin-blue);text-align:center;letter-spacing:1px;line-height:1.6}
.options-grid{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.option-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Patrick Hand',cursive;font-size:1.05em;padding:14px 18px;border-radius:10px;cursor:pointer;text-align:left;transition:all .25s;line-height:1.4}
.option-btn:hover:not(.disabled){border-color:var(--odin-blue);background:#1a2233}
.option-btn.correct{border-color:var(--success);background:#0d2818;color:var(--success)}
.option-btn.wrong{border-color:var(--thor-red);background:#2d1116;color:var(--thor-red)}
.option-btn.disabled{cursor:default;opacity:.7}
.feedback-box{border-radius:10px;padding:16px 20px;margin:16px 0;animation:fadeIn .4s ease;line-height:1.5}
.feedback-box.correct{background:#0d2818;border:1px solid var(--success);color:var(--success)}
.feedback-box.wrong{background:#2d1116;border:1px solid var(--thor-red);color:var(--thor-red)}
.xp-badge{display:inline-block;background:var(--gold);color:var(--bg-dark);font-family:'Bangers',cursive;padding:2px 10px;border-radius:6px;font-size:.9em;margin-left:6px}
.xp-bar-container{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.xp-label{font-family:'Bangers',cursive;color:var(--gold);font-size:1em;white-space:nowrap}
.xp-bar-bg{flex:1;height:14px;background:var(--bg-dark);border-radius:7px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--odin-blue),var(--gold));border-radius:7px;transition:width .6s ease}
.xp-count{font-family:'Bangers',cursive;color:var(--text);font-size:1em;min-width:60px;text-align:right}
.continue-btn{display:block;margin:20px auto 0;background:transparent;border:2px solid var(--odin-blue);color:var(--odin-blue);font-family:'Bangers',cursive;font-size:1.15em;padding:12px 36px;border-radius:10px;cursor:pointer;transition:all .25s}
.continue-btn:hover{background:var(--odin-blue);color:var(--bg-dark)}
.result-screen{text-align:center;padding:40px 20px;animation:fadeIn .8s ease}
.result-screen h2{font-family:'Bangers',cursive;font-size:2.2em;color:var(--gold);margin-bottom:8px}
.result-rank{font-family:'Permanent Marker',cursive;font-size:1.5em;margin:16px 0}
.result-stats{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:20px 0;text-align:left}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}.stat-value{font-family:'Bangers',cursive;color:var(--odin-blue)}
.hint-box{background:#1a1530;border:1px solid var(--corvo-purple);border-radius:10px;padding:14px 18px;margin:12px 0;font-size:.95em;color:var(--corvo-purple);animation:fadeIn .5s ease}
.hint-box .hint-label{font-family:'Bangers',cursive;font-size:1em;margin-bottom:4px}
/* ── VISUAL: Parchment ── */
.scroll-box{background:linear-gradient(135deg,#1c2333,#161b22);border:2px solid var(--gold);border-radius:12px;padding:18px 22px;margin:14px 0;position:relative}
.scroll-box::before{content:'📜';position:absolute;top:-12px;left:16px;font-size:1.3em;background:var(--bg-dark);padding:0 6px}
.scroll-box .scroll-title{font-family:'Bangers',cursive;color:var(--gold);font-size:1.1em;margin-bottom:8px}
.scroll-box .scroll-content{font-size:.95em;line-height:1.5;color:var(--text-dim)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.title-screen h1{font-size:2em}.title-screen h2{font-size:1.2em}.difficulty-select{flex-direction:column;align-items:center}#game-container{padding:12px}.challenge-box{padding:16px}}

/* ── ARMOR SYSTEM ── */
.armor-panel{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px}
.viking-mini{position:relative;width:120px;height:180px;flex-shrink:0}
.vm-head{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;background:#d4a574;border:1.5px solid #b8956a;z-index:5}
.vm-torso{position:absolute;top:56px;left:50%;transform:translateX(-50%);width:44px;height:58px;background:#8b7355;border-radius:7px 7px 4px 4px;z-index:3}
.vm-arm-l{position:absolute;top:59px;left:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-arm-r{position:absolute;top:59px;right:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-leg-l{position:absolute;top:111px;left:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-leg-r{position:absolute;top:111px;right:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-slot{position:absolute;opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1);transform:scale(.3)}
.vm-slot.on{opacity:1;transform:scale(1)}
.vm-helm{top:16px;left:50%;transform:translateX(-50%) scale(.3);z-index:8}.vm-helm.on{transform:translateX(-50%) scale(1)}
.vm-mail{top:57px;left:50%;transform:translateX(-50%) scale(.3);z-index:4}.vm-mail.on{transform:translateX(-50%) scale(1)}
.vm-cape{top:53px;left:50%;transform:translateX(-50%) scale(.3);z-index:1}.vm-cape.on{transform:translateX(-50%) scale(1)}
.vm-left{top:66px;left:0;z-index:7}.vm-right{top:56px;right:0;z-index:7}
.vm-boots{bottom:4px;left:50%;transform:translateX(-50%) scale(.3);z-index:7;display:flex;gap:10px}.vm-boots.on{transform:translateX(-50%) scale(1)}
.gear-progress{flex:1;display:flex;flex-direction:column;gap:4px}
.gp-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;font-size:.8em;color:var(--text-dim);transition:all .3s}
.gp-row.earned{color:var(--success);font-weight:bold}
.gp-row .gp-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:transparent;transition:all .3s;flex-shrink:0}
.gp-row.earned .gp-dot{background:var(--success);border-color:var(--success)}
.vm-sparks{position:absolute;pointer-events:none;z-index:20}
.vm-spark{position:absolute;border-radius:50%;animation:vmSp .6s ease-out forwards}
@keyframes vmSp{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}}
.vm-flash{animation:vmFl .4s ease}
@keyframes vmFl{0%{filter:brightness(1)}30%{filter:brightness(1.8) drop-shadow(0 0 12px rgba(240,180,40,.6))}100%{filter:brightness(1)}}
.result-viking{position:relative;width:160px;height:240px;margin:16px auto}
.rv-head{position:absolute;top:36px;left:50%;transform:translateX(-50%);width:42px;height:42px;border-radius:50%;background:#d4a574;border:2px solid #b8956a;z-index:5}
.rv-torso{position:absolute;top:73px;left:50%;transform:translateX(-50%);width:56px;height:74px;background:#8b7355;border-radius:9px 9px 5px 5px;z-index:3}
.rv-arm-l{position:absolute;top:77px;left:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-arm-r{position:absolute;top:77px;right:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-leg-l{position:absolute;top:144px;left:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-leg-r{position:absolute;top:144px;right:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-slot{position:absolute}
.rv-helm{top:20px;left:50%;transform:translateX(-50%);z-index:8}
.rv-mail{top:74px;left:50%;transform:translateX(-50%);z-index:4}
.rv-cape{top:69px;left:50%;transform:translateX(-50%);z-index:1}
.rv-left{top:86px;left:4px;z-index:7}.rv-right{top:72px;right:4px;z-index:7}
.rv-boots{bottom:4px;left:50%;transform:translateX(-50%);z-index:7;display:flex;gap:14px}
@media(max-width:600px){.armor-panel{flex-direction:column;align-items:center}.viking-mini{width:100px;height:160px}}
</style>
</head>
<body>
<div id="game-container"><div id="game-content"></div></div>
<script>
// ════════════════════════════════════════════════════
// THE STATISTICAL SAGA OF ODINFATHER — REALM 1
// QUANTITATIVE RESEARCH
// ════════════════════════════════════════════════════
const GAME={difficulty:null,xp:0,maxXP:0,hits:0,total:0,currentScene:0,scenes:[]};
const content=()=>document.getElementById('game-content');
function dialogue(c,t){
  const cls={odin:'odin',thor:'thor',muninn:'corvo',huginn:'corvo',narrator:'narrator'};
  const nm={odin:'Odinfather 🧙‍♂️',thor:'Thorment ⚡',muninn:'Muninn 🐦‍⬛',huginn:'Huginn 🐦',narrator:'📜 Narrator'};
  return `<div class="dialogue-box ${cls[c]||'narrator'}"><div class="char-name ${cls[c]||'narrator'}">${nm[c]||c}</div><div class="dialogue-text">${t}</div></div>`;
}
function hintBox(t){return `<div class="hint-box"><div class="hint-label">🐦‍⬛ Muninn's Hint</div>${t}</div>`;}
function xpBar(){
  const p=GAME.maxXP>0?Math.round((GAME.xp/GAME.maxXP)*100):0;
  return armorPanelHTML()+`<div class="xp-bar-container"><div class="xp-label">⚡ XP</div><div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${p}%"></div></div><div class="xp-count">${GAME.xp} / ${GAME.maxXP}</div></div>`;
}
function updateXPBar(){
  const b=document.querySelector('.xp-bar-fill'),c=document.querySelector('.xp-count');
  if(b&&c){const p=GAME.maxXP>0?Math.round((GAME.xp/GAME.maxXP)*100):0;b.style.width=p+'%';c.textContent=`${GAME.xp} / ${GAME.maxXP}`;}
}
function showTitleScreen(){
  content().innerHTML=`
  <div class="title-screen">
    <div class="reino-badge">REALM 1</div>
    <h1>The Statistical Saga of Odinfather</h1>
    <h2>The Realm of Quantitative Research</h2>
    <p class="subtitle">At the Gates of Midgard, every researcher must prove understanding of fundamentals before advancing.</p>
    <div class="difficulty-select">
      <button class="diff-btn" onclick="startGame('aprendiz')"><div class="diff-label">🛡️ Apprentice</div><div class="diff-desc">Undergraduate — with Muninn's hints</div></button>
      <button class="diff-btn" onclick="startGame('mestre')"><div class="diff-label">⚔️ Master</div><div class="diff-desc">Graduate — no hints, extra challenges</div></button>
    </div>
  </div>`;
}
function startGame(d){
  GAME.difficulty=d;GAME.xp=0;GAME.hits=0;GAME.total=0;GAME.currentScene=0;gearEarned=0;
  buildScenes();GAME.maxXP=countMaxXP();renderScene();
}

// ════════════════════════════════════════════════════
function buildScenes(){
  GAME.scenes=[];

  // ━━ SCENE 1: Gates of Midgard ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${dialogue('narrator','At the Gates of Midgard, where knowledge from all nine realms converges, a young researcher arrives. He seeks to master the art of <em>quantitative research</em> — the language of numbers that reveals hidden truths in the chaos of the world.')}
      ${dialogue('odin','Welcome, young one! I am <em>Odinfather</em>, guardian of statistical knowledge. Before you explore advanced realms, we must ensure your foundations are solid.')}
      ${dialogue('thor','Why waste time with fundamentals? Just run a t-test and done!')}
      ${dialogue('odin','That haste is exactly what turns researchers into producers of statistical garbage, Thorment. Fundamentals first.')}
      <button class="continue-btn" onclick="nextScene()">Cross the Gates →</button>
    </div>`});

  // ━━ SCENE 2: Types of Research ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${dialogue('odin','Quantitative research works with <em>numbers, measurements, and counts</em>. Its goal is to quantify phenomena and test hypotheses with rigor.')}
      ${dialogue('muninn','Unlike <em>qualitative research</em> (which seeks to understand meanings, perceptions, and experiences in depth), quantitative research aims to <em>generalize</em> results to a population from a sample.')}
      ${dialogue('odin','The pillars are: <em>measurable variables</em>, <em>structured data collection</em> (questionnaires, experiments), <em>statistical analysis</em>, and <em>replicability</em>.')}
      ${dialogue('huginn','And do not forget: there are also <em>mixed methods</em>, which combine quantitative and qualitative approaches in the same study!')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 3: CHALLENGE 1 — Quantitative vs Qualitative ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Quantitative = <em>numbers</em>, generalization, statistical tests. Qualitative = <em>meanings</em>, depth, interpretation. Ask: is the goal to measure and generalize, or understand in depth?'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 1: Quantitative or Qualitative?</div>
        <div class="challenge-question">A researcher applies a questionnaire with Likert scale (1-5) to 400 consumers and analyzes the data using inferential statistics. What type of research is this?</div>
        ${hint}
        <div class="options-grid" id="q1-opts">
          <button class="option-btn" onclick="checkQ(1,this,'a')">Qualitative — because it uses a questionnaire</button>
          <button class="option-btn" onclick="checkQ(1,this,'b')">Quantitative — structured numerical data collection, large sample, and statistical analysis to generalize results</button>
          <button class="option-btn" onclick="checkQ(1,this,'c')">Mixed — because questionnaires can be qualitative</button>
          <button class="option-btn" onclick="checkQ(1,this,'d')">Exploratory — because it is exploring opinions</button>
        </div>
        <div id="q1-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 4: Variables ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','At the heart of quantitative research are <em>variables</em>. A variable is any characteristic that can assume different values.')}
      ${dialogue('odin','<em>Independent variable (IV)</em>: the presumed cause, what the researcher manipulates or observes as a predictor.<br><em>Dependent variable (DV)</em>: the effect, what is measured as an outcome.<br><em>Control variable</em>: held constant to isolate the effect of the IV on the DV.')}
      ${dialogue('muninn','Example: if we want to know if the <em>type of training</em> (IV) affects a <em>warrior\'s strength</em> (DV), we control <em>diet</em> (control) so it does not interfere.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 5: CHALLENGE 2 — Variables ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('The <em>independent variable</em> is the cause (what changes), the <em>dependent variable</em> is the effect (what we measure). Ask: "What causes what?"'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 2: Identify the Variables</div>
        <div class="challenge-question">A study investigates whether the <em>number of training hours</em> affects the <em>archery accuracy</em> of Viking warriors. What is the IV and what is the DV?</div>
        ${hint}
        <div class="options-grid" id="q2-opts">
          <button class="option-btn" onclick="checkQ(2,this,'a')">IV = archery accuracy; DV = training hours</button>
          <button class="option-btn" onclick="checkQ(2,this,'b')">IV = training hours (cause); DV = archery accuracy (measured effect)</button>
          <button class="option-btn" onclick="checkQ(2,this,'c')">Both are dependent</button>
          <button class="option-btn" onclick="checkQ(2,this,'d')">There are no variables — it is descriptive research</button>
        </div>
        <div id="q2-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 6: Scales of Measurement ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','Variables are measured on different <em>scales</em>, and the scale determines which statistical analyses are allowed.')}
      ${dialogue('odin','<em>Nominal</em>: categories without order (sex, eye color, clan).<br><em>Ordinal</em>: categories with order, but unequal intervals (ranking, satisfaction level).<br><em>Interval</em>: equal intervals, but no absolute zero (temperature in °C, IQ).<br><em>Ratio</em>: equal intervals with absolute zero (weight, height, income).')}
      ${dialogue('muninn','The golden rule: the higher the scale, <em>more operations</em> are allowed. On a nominal scale, we can only count frequencies. On a ratio scale, we can calculate mean, SD, and perform any analysis.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 7: CHALLENGE 3 — Scales of Measurement ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Classification into positions (1st, 2nd, 3rd) = <em>ordinal</em>. There is order, but the distance between positions is not necessarily equal.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 3: What Scale Is This?</div>
        <div class="challenge-question">In the Asgard tournament, warriors are ranked as 1st, 2nd, 3rd place. What scale of measurement is this?</div>
        ${hint}
        <div class="options-grid" id="q3-opts">
          <button class="option-btn" onclick="checkQ(3,this,'a')">Nominal — they are just labels</button>
          <button class="option-btn" onclick="checkQ(3,this,'b')">Ordinal — there is order among positions, but the difference between 1st and 2nd is not necessarily equal to the difference between 2nd and 3rd</button>
          <button class="option-btn" onclick="checkQ(3,this,'c')">Interval — the numbers have equal intervals</button>
          <button class="option-btn" onclick="checkQ(3,this,'d')">Ratio — because it starts from 1</button>
        </div>
        <div id="q3-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 8: CHALLENGE 4 — Ratio Scale ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('A <em>ratio</em> scale has an absolute zero (= absence of the property). Weight = 0 kg means "no weight". Temperature in °C is not ratio because 0°C is not "no temperature".'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 4: The Absolute Zero</div>
        <div class="challenge-question">Which of the variables below is measured on a <em>ratio scale</em>?</div>
        ${hint}
        <div class="options-grid" id="q4-opts">
          <button class="option-btn" onclick="checkQ(4,this,'a')">Temperature in degrees Celsius</button>
          <button class="option-btn" onclick="checkQ(4,this,'b')">Weight of warriors in kilograms — has absolute zero (0 kg = no weight), equal intervals, and allows all mathematical operations</button>
          <button class="option-btn" onclick="checkQ(4,this,'c')">Level of satisfaction (1 to 5)</button>
          <button class="option-btn" onclick="checkQ(4,this,'d')">Postal code</button>
        </div>
        <div id="q4-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 9: Hypotheses ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','Every serious quantitative research begins with <em>hypotheses</em> — testable statements about relationships between variables.')}
      ${dialogue('odin','The <em>hypothesis</em> is a specific prediction derived from theory. Example: "Warriors who train more than 10 hours per week have significantly greater archery accuracy than those who train less than 5 hours."')}
      ${dialogue('muninn','A good hypothesis is: <em>testable</em> (can be verified with data), <em>falsifiable</em> (can be refuted), <em>specific</em> (indicates direction and variables), and <em>theory-based</em>.')}
      ${dialogue('thor','My hypothesis: my warriors are the best! Done!')}
      ${dialogue('odin','That is not a hypothesis, Thorment. It is not specific, not measurable, and not falsifiable. It is just ego.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 10: CHALLENGE 5 — Hypotheses ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('A good hypothesis is <em>testable, falsifiable, specific, and theory-based</em>. It must indicate variables and the expected direction of the effect.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 5: The Good Hypothesis</div>
        <div class="challenge-question">Which option is an <em>adequate scientific hypothesis</em>?</div>
        ${hint}
        <div class="options-grid" id="q5-opts">
          <button class="option-btn" onclick="checkQ(5,this,'a')">Viking warriors are strong</button>
          <button class="option-btn" onclick="checkQ(5,this,'b')">Warriors subjected to resistance training (IV) will show a significant increase in grip strength (DV) compared to the control group after 8 weeks</button>
          <button class="option-btn" onclick="checkQ(5,this,'c')">Statistics is important for science</button>
          <button class="option-btn" onclick="checkQ(5,this,'d')">All warriors improve with training</button>
        </div>
        <div id="q5-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 11: Validity and Reliability ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','Two inseparable concepts in quantitative research: <em>validity</em> and <em>reliability</em>.')}
      ${dialogue('odin','<em>Validity</em>: does the instrument measure what it claims to measure? A scale measures weight — it is valid for weight. But it does not measure intelligence.<br><em>Reliability</em>: does the instrument produce consistent results? If we measure the same warrior three times, do we get similar results?')}
      ${dialogue('muninn','Attention: an instrument can be <em>reliable without being valid</em>. A broken scale that always reads 5 kg too high is reliable (consistent) but not valid (it is wrong). However, an instrument <em>cannot be valid without being reliable</em>.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 12: CHALLENGE 6 — Validity vs Reliability ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('<em>Reliable without being valid</em> = consistent results, but wrong (systematic bias). It is like an archer who always hits the same point... but far from the target\'s center.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 6: The Archer\'s Target</div>
        <div class="challenge-question">A scale from Asgard always reads <em>3 kg more</em> than the actual weight. When weighing the same warrior 5 times, the results are: 83, 83, 83, 83, 83 (actual weight: 80). This scale is:</div>
        ${hint}
        <div class="options-grid" id="q6-opts">
          <button class="option-btn" onclick="checkQ(6,this,'a')">Valid and reliable</button>
          <button class="option-btn" onclick="checkQ(6,this,'b')">Reliable (consistent results) but NOT valid (systematic bias of +3 kg — measures incorrectly)</button>
          <button class="option-btn" onclick="checkQ(6,this,'c')">Valid but not reliable</button>
          <button class="option-btn" onclick="checkQ(6,this,'d')">Neither valid nor reliable</button>
        </div>
        <div id="q6-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 13: CHALLENGE 7 — Research Steps ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('The logical order: first define the <em>problem</em>, then build the <em>theoretical framework</em>, formulate <em>hypotheses</em>, define <em>method</em> (sample, instrument), collect <em>data</em>, <em>analyze</em>, and finally <em>interpret/report</em>.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 7: The Order of the Journey</div>
        <div class="challenge-question">What is the <em>correct sequence</em> of steps in quantitative research?</div>
        ${hint}
        <div class="options-grid" id="q7-opts">
          <button class="option-btn" onclick="checkQ(7,this,'a')">Collection → Hypothesis → Analysis → Problem</button>
          <button class="option-btn" onclick="checkQ(7,this,'b')">Problem → Theoretical Framework → Hypotheses → Method → Collection → Analysis → Interpretation</button>
          <button class="option-btn" onclick="checkQ(7,this,'c')">Analysis → Collection → Hypothesis → Problem</button>
          <button class="option-btn" onclick="checkQ(7,this,'d')">Hypothesis → Collection → Problem → Analysis</button>
        </div>
        <div id="q7-fb"></div>
      </div>
    </div>`;}});

  // ━━ MASTER CHALLENGES ━━
  if(GAME.difficulty==='mestre'){
    // CHALLENGE 8: Internal vs External Validity
    GAME.scenes.push({type:'challenge',html:()=>`
      <div class="scene">
        ${xpBar()}
        <div class="challenge-box">
          <div class="challenge-title">⚔️ Master Challenge: Internal vs External Validity</div>
          <div class="challenge-question">A highly controlled laboratory experiment (artificial environment, homogeneous sample) finds a significant effect. What is the <em>most likely trade-off</em>?</div>
          <div class="options-grid" id="q8-opts">
            <button class="option-btn" onclick="checkQ(8,this,'a')">Both validities are high — control = total quality</button>
            <button class="option-btn" onclick="checkQ(8,this,'b')">High internal validity (rigorous control of confounding variables) but low external validity (results may not generalize to the real world)</button>
            <button class="option-btn" onclick="checkQ(8,this,'c')">Low internal validity and high external validity</button>
            <button class="option-btn" onclick="checkQ(8,this,'d')">Internal and external validity are the same thing</button>
          </div>
          <div id="q8-fb"></div>
        </div>
      </div>`});

    // CHALLENGE 9: Operationalization of Constructs
    GAME.scenes.push({type:'challenge',html:()=>`
      <div class="scene">
        ${xpBar()}
        <div class="challenge-box">
          <div class="challenge-title">⚔️ Master Challenge: Operationalization</div>
          <div class="challenge-question">The construct "motivation to fight" is abstract and cannot be measured directly. The process of transforming it into observable and measurable indicators (ex.: 10-item Likert scale) is called:</div>
          <div class="options-grid" id="q9-opts">
            <button class="option-btn" onclick="checkQ(9,this,'a')">Conceptualization</button>
            <button class="option-btn" onclick="checkQ(9,this,'b')">Operationalization — translating an abstract construct into observable and measurable variables, defining how it will be measured in practice</button>
            <button class="option-btn" onclick="checkQ(9,this,'c')">Categorization</button>
            <button class="option-btn" onclick="checkQ(9,this,'d')">Randomization</button>
          </div>
          <div id="q9-fb"></div>
        </div>
      </div>`});
  }

  // ━━ FINAL SCENE ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('narrator','The Gates of Midgard open fully. The young researcher has taken his first step into the foundations of quantitative research.')}
      ${dialogue('odin','You have conquered the <em>Realm of Quantitative Research</em>! Now you know variables, scales of measurement, hypotheses, validity, and reliability. These are the cornerstones upon which all statistics is built.')}
      ${dialogue('thor','I admit that even I needed to review some things...')}
      ${dialogue('muninn','Wise words, Thorment. In the next Realms, we will dive into Descriptive Statistics, Probability, and much more. The saga is just beginning!')}
      <button class="continue-btn" onclick="showResults()">View Final Result 📜</button>
    </div>`});
}

function checkQ(q,btn,ans){
  const opts=document.querySelectorAll(`#q${q}-opts .option-btn`);
  opts.forEach(b=>{b.classList.add('disabled');b.onclick=null;});
  const fb=document.getElementById(`q${q}-fb`),cor=ANSWERS[q],exp=EXPLANATIONS[q];
  GAME.total++;
  if(ans===cor){
    btn.classList.add('correct');GAME.hits++;GAME.xp+=20;updateXPBar();earnGear();
    fb.innerHTML=`<div class="feedback-box correct">${dialogue(exp.charC,exp.correct+' <span class="xp-badge">+20 XP</span>')}<button class="continue-btn" onclick="nextScene()">Continue →</button></div>`;
  }else{
    btn.classList.add('wrong');
    const ci=['a','b','c','d'].indexOf(cor);if(opts[ci])opts[ci].classList.add('correct');
    fb.innerHTML=`<div class="feedback-box wrong">${dialogue(exp.charW,exp.wrong)}<button class="continue-btn" onclick="nextScene()">Continue →</button></div>`;
  }
}

function countMaxXP(){return (GAME.difficulty==='mestre'?9:7)*20;}
function renderScene(){if(GAME.currentScene<GAME.scenes.length){content().innerHTML=GAME.scenes[GAME.currentScene].html();restoreGear();window.scrollTo({top:0,behavior:'smooth'});}}
function nextScene(){GAME.currentScene++;renderScene();}

function showResults(){
  const pct=GAME.total>0?Math.round((GAME.hits/GAME.total)*100):0;
  let rank,rc;
  if(pct>=90){rank='🏆 Sage of Midgard';rc='#f0c040';}
  else if(pct>=70){rank='📜 Scribe of Fundamentals';rc:'#58a6ff';}
  else if(pct>=50){rank:'🛡️ Curious Novice';rc:'#8b949e';}
  else{rank:'⛓️ Lost Apprentice';rc:'#f85149';}
  content().innerHTML=`
  <div class="result-screen">
    <div class="reino-badge">REALM 1 — COMPLETE</div>
    <h2>Adventure Results</h2>
    ${resultVikingHTML()}
    <div class="result-rank" style="color:${rc}">${rank}</div>
    <div class="result-stats">
      <div class="stat-row"><span class="stat-label">Difficulty</span><span class="stat-value">${GAME.difficulty==='mestre'?'⚔️ Master':'🛡️ Apprentice'}</span></div>
      <div class="stat-row"><span class="stat-label">Correct Challenges</span><span class="stat-value">${GAME.hits} / ${GAME.total}</span></div>
      <div class="stat-row"><span class="stat-label">Accuracy</span><span class="stat-value">${pct}%</span></div>
      <div class="stat-row"><span class="stat-label">XP Earned</span><span class="stat-value">${GAME.xp} / ${GAME.maxXP}</span></div>
    </div>
    ${dialogue('odin',pct>=70
      ?'The Gates of Midgard are fully open! Your foundations are solid. Forward to Descriptive Statistics!'
      :'Your foundations need reinforcement, young researcher. Return and review — without a strong base, the advanced Realms will be impenetrable!'
    )}
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px">
      <button class="continue-btn" onclick="showTitleScreen()">🔄 Play Again</button>
    </div>
  </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}


var GEAR_ITEMS=[{"s":"boots","n":"Scribe's Sandal","h":"<div style=\"display:flex;gap:14px\"><div style=\"width:24px;height:18px;background:#6b5040;border-radius:3px 3px 4px 7px;border:2px solid #856848\"></div><div style=\"width:24px;height:18px;background:#6b5040;border-radius:3px 3px 4px 7px;border:2px solid #856848\"></div></div>"},{"s":"mail","n":"Parchment Robe","h":"<div style=\"width:60px;height:72px;background:linear-gradient(180deg,#c4a060,#a08040);border-radius:7px 7px 4px 4px;border:2px solid #8a6830\"></div>"},{"s":"right","n":"Quill of Knowledge","h":"<div style=\"display:flex;flex-direction:column;align-items:center\"><div style=\"width:5px;height:44px;background:linear-gradient(to bottom,#f0e0c0,#a08050);border-radius:2px;transform:rotate(8deg)\"></div></div>"},{"s":"left","n":"Runic Scroll","h":"<div style=\"width:34px;height:42px;background:#e8d8b0;border-radius:3px;border:2px solid #c0a870;position:relative\"><div style=\"position:absolute;top:5px;left:4px;right:4px;height:2px;background:#a09070\"></div><div style=\"position:absolute;top:12px;left:4px;right:4px;height:2px;background:#a09070\"></div><div style=\"position:absolute;top:19px;left:4px;width:16px;height:2px;background:#a09070\"></div></div>"},{"s":"cape","n":"Cape of Midgard","h":"<div style=\"width:84px;height:110px;background:linear-gradient(180deg,#2d6a30,#1a4020);border-radius:5px 5px 28px 28px;clip-path:polygon(16% 0%,84% 0%,100% 18%,92% 100%,50% 88%,8% 100%,0% 18%)\"></div>"},{"s":"helm","n":"Crown of Wisdom","h":"<div style=\"width:52px;height:24px;background:linear-gradient(135deg,#d4a535,#b08820);border-radius:26px 26px 5px 5px;border:2px solid #b08820;position:relative\"><div style=\"position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:7px;height:12px;background:#f0d860;border-radius:3px 3px 1px 1px\"></div></div>"}];
var gearEarned=0;
function armorPanelHTML(){
  var rows='';
  for(var i=0;i<GEAR_ITEMS.length;i++){rows+='<div class="gp-row'+(i<gearEarned?' earned':'')+'" id="gprow'+i+'"><span class="gp-dot"></span><span>'+GEAR_ITEMS[i].n+'</span></div>';}

  sl+='<div class="vm-slot vm-cape" id="vmslot-cape"></div>';

function restoreGear(){for(var i=0;i<gearEarned&&i<GEAR_ITEMS.length;i++){var g=GEAR_ITEMS[i],el=document.getElementById('vmslot-'+g.s);if(el){el.innerHTML=g.h;el.classList.add('on');}}}
function earnGear(){
  if(gearEarned>=GEAR_ITEMS.length)return;
  var g=GEAR_ITEMS[gearEarned],el=document.getElementById('vmslot-'+g.s);
  if(el){el.innerHTML=g.h;el.classList.add('on','vm-flash');setTimeout(function(){el.classList.remove('vm-flash')},500);spawnVMSparks(el);}
  var row=document.getElementById('gprow'+gearEarned);if(row)row.classList.add('earned');
  gearEarned++;
}
function spawnVMSparks(el){
  var sc=document.getElementById('vmsparks');if(!sc||!el)return;
  var r=el.getBoundingClientRect(),sr=document.getElementById('vmini').getBoundingClientRect();
  var cx=r.left-sr.left+r.width/2,cy=r.top-sr.top+r.height/2;
  var cols=['#f0c040','#f08030','#f0e080','#ff6040','#ffd060'];
  for(var i=0;i<10;i++){var s=document.createElement('div');s.className='vm-spark';
    var a=Math.random()*Math.PI*2,d=20+Math.random()*30;
    s.style.cssText='left:'+cx+'px;top:'+cy+'px;background:'+cols[Math.floor(Math.random()*5)]+';--sx:'+(Math.cos(a)*d)+'px;--sy:'+(Math.sin(a)*d)+'px;width:'+(2+Math.random()*3)+'px;height:'+(2+Math.random()*3)+'px';
    sc.appendChild(s);setTimeout(function(x){x.remove()},700,s);}
}
function resultVikingHTML(){
  var pct=GAME.total>0?Math.round((GAME.hits/GAME.total)*100):0;

  setTimeout(function(){ti.forEach(function(g){var e=document.getElementById('rvs-'+g.s);if(e)e.innerHTML=g.h;});},100);

}
