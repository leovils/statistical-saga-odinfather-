<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Statistical Saga of Odinfather — Realm 8: One-Way ANOVA</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{--bg-dark:#0d1117;--bg-card:#161b22;--bg-panel:#1c2333;--odin-blue:#58a6ff;--thor-red:#f85149;--corvo-purple:#bc8cff;--gold:#f0c040;--silver:#8b949e;--text:#e6edf3;--text-dim:#8b949e;--success:#3fb950;--border:#30363d}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-dark);color:var(--text);font-family:'Patrick Hand',cursive;font-size:18px;min-height:100vh;overflow-x:hidden}
#game-container{max-width:800px;margin:0 auto;padding:20px;min-height:100vh}
.title-screen{text-align:center;padding:60px 20px;animation:fadeIn 1s ease}
.title-screen h1{font-family:'Bangers',cursive;font-size:2.8em;color:var(--gold);text-shadow:2px 2px 8px rgba(240,192,64,.3);line-height:1.1;margin-bottom:8px}
.title-screen h2{font-family:'Permanent Marker',cursive;font-size:1.5em;color:var(--odin-blue);margin-bottom:30px}
.title-screen .subtitle{color:var(--text-dim);font-size:1.1em;margin-bottom:40px}
.reino-badge{display:inline-block;background:linear-gradient(135deg,var(--odin-blue),var(--corvo-purple));padding:6px 20px;border-radius:20px;font-family:'Bangers',cursive;font-size:1em;color:#fff;margin-bottom:16px}
.difficulty-select{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.diff-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Bangers',cursive;font-size:1.2em;padding:16px 32px;border-radius:12px;cursor:pointer;transition:all .3s;min-width:180px}
.diff-btn:hover{border-color:var(--odin-blue);transform:translateY(-2px)}
.diff-btn .diff-label{font-size:1.3em}.diff-btn .diff-desc{font-family:'Patrick Hand',cursive;font-size:.65em;color:var(--text-dim);margin-top:4px}
.scene{animation:slideIn .5s ease;padding:10px 0}
.dialogue-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;position:relative}
.dialogue-box.odin{border-left:4px solid var(--odin-blue)}.dialogue-box.thor{border-left:4px solid var(--thor-red)}.dialogue-box.corvo{border-left:4px solid var(--corvo-purple)}.dialogue-box.narrator{border-left:4px solid var(--gold)}
.char-name{font-family:'Bangers',cursive;font-size:1.1em;margin-bottom:6px}
.char-name.odin{color:var(--odin-blue)}.char-name.thor{color:var(--thor-red)}.char-name.corvo{color:var(--corvo-purple)}.char-name.narrator{color:var(--gold)}
.dialogue-text{line-height:1.5;font-size:1.05em}.dialogue-text em{color:var(--gold);font-style:normal;font-weight:bold}
.challenge-box{background:var(--bg-panel);border:2px solid var(--gold);border-radius:12px;padding:24px;margin:20px 0;animation:pulse-border 2s ease infinite}
@keyframes pulse-border{0%,100%{border-color:var(--gold);box-shadow:0 0 8px rgba(240,192,64,.15)}50%{border-color:#f0c040cc;box-shadow:0 0 16px rgba(240,192,64,.3)}}
.challenge-title{font-family:'Bangers',cursive;font-size:1.4em;color:var(--gold);margin-bottom:12px;text-align:center}
.challenge-question{margin-bottom:16px;line-height:1.5}
.data-display{background:var(--bg-dark);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin:12px 0;font-family:'Courier New',monospace;font-size:1em;color:var(--odin-blue);text-align:center;letter-spacing:1px;line-height:1.6}
.options-grid{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.option-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Patrick Hand',cursive;font-size:1.05em;padding:14px 18px;border-radius:10px;cursor:pointer;text-align:left;transition:all .25s;line-height:1.4}
.option-btn:hover:not(.disabled){border-color:var(--odin-blue);background:#1a2233}
.option-btn.correct{border-color:var(--success);background:#0d2818;color:var(--success)}
.option-btn.wrong{border-color:var(--thor-red);background:#2d1116;color:var(--thor-red)}
.option-btn.disabled{cursor:default;opacity:.7}
.feedback-box{border-radius:10px;padding:16px 20px;margin:16px 0;animation:fadeIn .4s ease;line-height:1.5}
.feedback-box.correct{background:#0d2818;border:1px solid var(--success);color:var(--success)}
.feedback-box.wrong{background:#2d1116;border:1px solid var(--thor-red);color:var(--thor-red)}
.xp-badge{display:inline-block;background:var(--gold);color:var(--bg-dark);font-family:'Bangers',cursive;padding:2px 10px;border-radius:6px;font-size:.9em;margin-left:6px}
.xp-bar-container{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.xp-label{font-family:'Bangers',cursive;color:var(--gold);font-size:1em;white-space:nowrap}
.xp-bar-bg{flex:1;height:14px;background:var(--bg-dark);border-radius:7px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--odin-blue),var(--gold));border-radius:7px;transition:width .6s ease}
.xp-count{font-family:'Bangers',cursive;color:var(--text);font-size:1em;min-width:60px;text-align:right}
.continue-btn{display:block;margin:20px auto 0;background:transparent;border:2px solid var(--odin-blue);color:var(--odin-blue);font-family:'Bangers',cursive;font-size:1.15em;padding:12px 36px;border-radius:10px;cursor:pointer;transition:all .25s}
.continue-btn:hover{background:var(--odin-blue);color:var(--bg-dark)}
.result-screen{text-align:center;padding:40px 20px;animation:fadeIn .8s ease}
.result-screen h2{font-family:'Bangers',cursive;font-size:2.2em;color:var(--gold);margin-bottom:8px}
.result-rank{font-family:'Permanent Marker',cursive;font-size:1.5em;margin:16px 0}
.result-stats{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:20px 0;text-align:left}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}.stat-value{font-family:'Bangers',cursive;color:var(--odin-blue)}
.hint-box{background:#1a1530;border:1px solid var(--corvo-purple);border-radius:10px;padding:14px 18px;margin:12px 0;font-size:.95em;color:var(--corvo-purple);animation:fadeIn .5s ease}
.hint-box .hint-label{font-family:'Bangers',cursive;font-size:1em;margin-bottom:4px}
/* ── VISUAL: Variance Partition ── */
.variance-visual{display:flex;align-items:center;justify-content:center;gap:4px;margin:16px 0;flex-wrap:wrap}
.var-segment{padding:12px 10px;text-align:center;font-family:'Courier New',monospace;font-size:.85em;min-width:80px;border-radius:6px}
.var-total{background:#1a2040;color:var(--gold);border:2px solid var(--gold)}
.var-model{background:#0d2818;color:var(--success);border:2px solid var(--success)}
.var-resid{background:#2d1116;color:var(--thor-red);border:2px solid var(--thor-red)}
.var-eq{font-family:'Bangers',cursive;color:var(--text);font-size:1.2em;padding:0 4px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.title-screen h1{font-size:2em}.title-screen h2{font-size:1.2em}.difficulty-select{flex-direction:column;align-items:center}#game-container{padding:12px}.challenge-box{padding:16px}.variance-visual{flex-wrap:wrap}.var-segment{min-width:60px;font-size:.75em}}

/* ── ARMOR SYSTEM ── */
.armor-panel{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px}
.viking-mini{position:relative;width:120px;height:180px;flex-shrink:0}
.vm-head{position:absolute;top:28px;left:50%;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;background:#d4a574;border:1.5px solid #b8956a;z-index:5}
.vm-torso{position:absolute;top:56px;left:50%;transform:translateX(-50%);width:44px;height:58px;background:#8b7355;border-radius:7px 7px 4px 4px;z-index:3}
.vm-arm-l{position:absolute;top:59px;left:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-arm-r{position:absolute;top:59px;right:18px;width:14px;height:34px;background:#8b7355;border-radius:5px;z-index:2}
.vm-leg-l{position:absolute;top:111px;left:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-leg-r{position:absolute;top:111px;right:40px;width:16px;height:42px;background:#6b5b43;border-radius:0 0 4px 4px;z-index:2}
.vm-slot{position:absolute;opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1);transform:scale(.3)}
.vm-slot.on{opacity:1;transform:scale(1)}
.vm-helm{top:16px;left:50%;transform:translateX(-50%) scale(.3);z-index:8}.vm-helm.on{transform:translateX(-50%) scale(1)}
.vm-mail{top:57px;left:50%;transform:translateX(-50%) scale(.3);z-index:4}.vm-mail.on{transform:translateX(-50%) scale(1)}
.vm-cape{top:53px;left:50%;transform:translateX(-50%) scale(.3);z-index:1}.vm-cape.on{transform:translateX(-50%) scale(1)}
.vm-left{top:66px;left:0;z-index:7}.vm-right{top:56px;right:0;z-index:7}
.vm-boots{bottom:4px;left:50%;transform:translateX(-50%) scale(.3);z-index:7;display:flex;gap:10px}.vm-boots.on{transform:translateX(-50%) scale(1)}
.gear-progress{flex:1;display:flex;flex-direction:column;gap:4px}
.gp-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;font-size:.8em;color:var(--text-dim);transition:all .3s}
.gp-row.earned{color:var(--success);font-weight:bold}
.gp-row .gp-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:transparent;transition:all .3s;flex-shrink:0}
.gp-row.earned .gp-dot{background:var(--success);border-color:var(--success)}
.vm-sparks{position:absolute;pointer-events:none;z-index:20}
.vm-spark{position:absolute;border-radius:50%;animation:vmSp .6s ease-out forwards}
@keyframes vmSp{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}}
.vm-flash{animation:vmFl .4s ease}
@keyframes vmFl{0%{filter:brightness(1)}30%{filter:brightness(1.8) drop-shadow(0 0 12px rgba(240,180,40,.6))}100%{filter:brightness(1)}}
.result-viking{position:relative;width:160px;height:240px;margin:16px auto}
.rv-head{position:absolute;top:36px;left:50%;transform:translateX(-50%);width:42px;height:42px;border-radius:50%;background:#d4a574;border:2px solid #b8956a;z-index:5}
.rv-torso{position:absolute;top:73px;left:50%;transform:translateX(-50%);width:56px;height:74px;background:#8b7355;border-radius:9px 9px 5px 5px;z-index:3}
.rv-arm-l{position:absolute;top:77px;left:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-arm-r{position:absolute;top:77px;right:22px;width:18px;height:44px;background:#8b7355;border-radius:6px;z-index:2}
.rv-leg-l{position:absolute;top:144px;left:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-leg-r{position:absolute;top:144px;right:52px;width:20px;height:54px;background:#6b5b43;border-radius:0 0 5px 5px;z-index:2}
.rv-slot{position:absolute}
.rv-helm{top:20px;left:50%;transform:translateX(-50%);z-index:8}
.rv-mail{top:74px;left:50%;transform:translateX(-50%);z-index:4}
.rv-cape{top:69px;left:50%;transform:translateX(-50%);z-index:1}
.rv-left{top:86px;left:4px;z-index:7}.rv-right{top:72px;right:4px;z-index:7}
.rv-boots{bottom:4px;left:50%;transform:translateX(-50%);z-index:7;display:flex;gap:14px}
@media(max-width:600px){.armor-panel{flex-direction:column;align-items:center}.viking-mini{width:100px;height:160px}}
</style>
</head>
<body>
<div id="game-container"><div id="game-content"></div></div>
<script>
// ════════════════════════════════════════════════════
// THE STATISTICAL SAGA OF ODINFATHER — REALM 8
// ONE-WAY ANOVA & DEGREES OF FREEDOM
// ════════════════════════════════════════════════════
const GAME={difficulty:null,xp:0,maxXP:0,hits:0,total:0,currentScene:0,scenes:[]};
const content=()=>document.getElementById('game-content');
function dialogue(c,t){
  const cls={odin:'odin',thor:'thor',muninn:'corvo',huginn:'corvo',narrator:'narrator'};
  const nm={odin:'Odinfather 🧙‍♂️',thor:'Thorment ⚡',muninn:'Muninn 🐦‍⬛',huginn:'Huginn 🐦',narrator:'📜 Narrator'};
  return `<div class="dialogue-box ${cls[c]||'narrator'}"><div class="char-name ${cls[c]||'narrator'}">${nm[c]||c}</div><div class="dialogue-text">${t}</div></div>`;
}
function hintBox(t){return `<div class="hint-box"><div class="hint-label">🐦‍⬛ Muninn's Hint</div>${t}</div>`;}
function xpBar(){
  const p=GAME.maxXP>0?Math.round((GAME.xp/GAME.maxXP)*100):0;
  return armorPanelHTML()+`<div class="xp-bar-container"><div class="xp-label">⚡ XP</div><div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${p}%"></div></div><div class="xp-count">${GAME.xp} / ${GAME.maxXP}</div></div>`;
}
function updateXPBar(){
  const b=document.querySelector('.xp-bar-fill'),c=document.querySelector('.xp-count');
  if(b&&c){const p=GAME.maxXP>0?Math.round((GAME.xp/GAME.maxXP)*100):0;b.style.width=p+'%';c.textContent=`${GAME.xp} / ${GAME.maxXP}`;}
}
function showTitleScreen(){
  content().innerHTML=`
  <div class="title-screen">
    <div class="reino-badge">REALM 8</div>
    <h1>The Statistical Saga of Odinfather</h1>
    <h2>Realm of One-Way ANOVA</h2>
    <p class="subtitle">In the great Banquet Hall of Valhalla, where chefs test recipes for the feast of the gods, Odinfather teaches the art of comparing multiple groups without inflating error.</p>
    <div class="difficulty-select">
      <button class="diff-btn" onclick="startGame('aprendiz')"><div class="diff-label">🛡️ Apprentice</div><div class="diff-desc">Undergraduate — with Muninn's hints</div></button>
      <button class="diff-btn" onclick="startGame('mestre')"><div class="diff-label">⚔️ Master</div><div class="diff-desc">Graduate — no hints, extra challenges</div></button>
    </div>
  </div>`;
}
function startGame(d){
  GAME.difficulty=d;GAME.xp=0;GAME.hits=0;GAME.total=0;GAME.currentScene=0;gearEarned=0;
  buildScenes();GAME.maxXP=countMaxXP();renderScene();
}

// ════════════════════════════════════════════════════
function buildScenes(){
  GAME.scenes=[];

  // ━━ SCENE 1: The Banquet Hall ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${dialogue('narrator','The golden doors of the <em>Banquet Hall of Valhalla</em> burst open with a thunderous crash. The aroma of mead, roasted meat, and spices fills the air. Dozens of chefs compete to serve the finest dish to the gods — and each recipe must be compared with rigor.')}
      ${dialogue('odin','Welcome to the <em>Realm of ANOVA</em>! When we have only two groups, we use the t-test. But when we have three or more recipes to compare? If we run multiple t-tests, we inflate the Type I Error!')}
      ${dialogue('thor','Multiple t-tests? What\'s the problem? Just smash everything and see what sticks!')}
      ${dialogue('odin','With 3 groups and pairwise t-tests, the nominal 5% error climbs to nearly 14%! With 5 groups, it exceeds 40%. <em>ANOVA</em> controls this with a single F-test — an elegant ratio of explained variance to residual variance.')}
      <button class="continue-btn" onclick="nextScene()">Enter the Hall →</button>
    </div>`});

  // ━━ SCENE 2: Variance Partition ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${dialogue('odin','ANOVA decomposes the <em>total variance (SST)</em> into two parts: the variance explained by the model (<em>SSM</em> — differences between groups) and the residual variance (<em>SSR</em> — variation within groups).')}
      <div class="variance-visual">
        <div class="var-segment var-total">SST<br><small>Total</small></div>
        <div class="var-eq">=</div>
        <div class="var-segment var-model">SSM<br><small>Model</small></div>
        <div class="var-eq">+</div>
        <div class="var-segment var-resid">SSR<br><small>Residual</small></div>
      </div>
      ${dialogue('odin','The <em>F Ratio</em> is: F = MSM / MSR, where MSM = SSM/(k−1) and MSR = SSR/(N−k). k is the number of groups and N is the total number of observations.')}
      ${dialogue('muninn','The <em>degrees of freedom</em> (df) for the numerator are k−1 and for the denominator N−k. These df shape the F distribution used to calculate the p-value.')}
      ${dialogue('huginn','Think of it this way: SSM is the <em>signal</em> — the variation our model explains. SSR is the <em>noise</em>. The F Ratio compares signal vs noise. Large F = the model explains more than chance.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 3: CHALLENGE 1 — Variance Partition ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('SST = SSM + SSR. If SST = 120 and SSM = 40, just subtract: SSR = SST − SSM.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 1: The Variance Recipe</div>
        <div class="challenge-question">A master brewer of Midgard tested 3 mead recipes (k=3) with 10 tasters per recipe (N=30). SST = 120, SSM = 40. What is the SSR?</div>
        <div class="data-display">
          k = 3 recipes &nbsp;|&nbsp; N = 30 tasters<br>
          SST = 120 &nbsp;|&nbsp; SSM = 40 &nbsp;|&nbsp; SSR = ?
        </div>
        ${hint}
        <div class="options-grid" id="q1-opts">
          <button class="option-btn" onclick="checkQ(1,this,'a')">SSR = 160 — we add SST + SSM</button>
          <button class="option-btn" onclick="checkQ(1,this,'b')">SSR = 40 — it always equals SSM</button>
          <button class="option-btn" onclick="checkQ(1,this,'c')">SSR = SST − SSM = 120 − 40 = 80. The total variance splits into variance explained by the model (40) and residual (80)</button>
          <button class="option-btn" onclick="checkQ(1,this,'d')">SSR = 30 — it equals N</button>
        </div>
        <div id="q1-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 4: Degrees of Freedom ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','<em>Degrees of Freedom</em> are the cost of estimation. Each parameter we estimate costs 1 df.')}
      ${dialogue('odin','In ANOVA: <em>df between groups = k − 1</em> (number of groups minus 1). <em>df within groups = N − k</em> (total observations minus groups). These df shape the F distribution.')}
      ${dialogue('muninn','If we have 3 recipes (k=3) and 30 tasters (N=30): df_between = 3−1 = 2, df_within = 30−3 = 27.')}
      ${dialogue('huginn','Thorment would tell you to round everything to N. But ignoring df is like cooking without a thermometer — the precision of your tests depends on them!')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 5: CHALLENGE 2 — Degrees of Freedom ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('df between = k − 1, df within = N − k. Always subtract. Here: k=4 and N=48.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 2: The Cost of Estimation</div>
        <div class="challenge-question">4 villages (k=4) sent 12 warriors each (N=48) to a tournament. What are the df between groups and within groups?</div>
        <div class="data-display">
          k = 4 villages &nbsp;|&nbsp; n = 12 per village &nbsp;|&nbsp; N = 48 total
        </div>
        ${hint}
        <div class="options-grid" id="q2-opts">
          <button class="option-btn" onclick="checkQ(2,this,'a')">df_between = 4; df_within = 48 — we use the raw values</button>
          <button class="option-btn" onclick="checkQ(2,this,'b')">df_between = 3; df_within = 45 — we subtracted incorrectly</button>
          <button class="option-btn" onclick="checkQ(2,this,'c')">df_between = 4; df_within = 44</button>
          <button class="option-btn" onclick="checkQ(2,this,'d')">df_between = k−1 = 3; df_within = N−k = 44. We always subtract: the numerator loses 1 df for the grand mean, and the denominator loses k df for the group means</button>
        </div>
        <div id="q2-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 6: F Ratio and Levene's Test ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','The <em>F Ratio = MSM/MSR</em>. If F is large (and p < .05), the group means are not all equal. But BEWARE: F is an <em>omnibus</em> test — it tells you a difference exists, but not where!')}
      ${dialogue('odin','Before running the ANOVA, check the <em>assumptions</em>: 1) Normality per group (Shapiro-Wilk), 2) Homogeneity of variances (Levene\'s Test), 3) Independence of observations.')}
      ${dialogue('muninn','In <em>Levene\'s Test</em>, we want Sig. > .05 (equal variances). If Sig. < .05, variances are heterogeneous — use the <em>Welch correction</em> to protect the test.')}
      ${dialogue('thor','Levene\'s Test? Another hurdle before we can cook?')}
      ${dialogue('odin','Without checking assumptions, Thorment, the dish could be poisoned and you wouldn\'t even notice. Levene\'s is quick and saves your analysis.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 7: CHALLENGE 3 — Levene's Test ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('In Levene\'s, we want p > .05 (homogeneous variances). If p < .05, the assumption was violated. In that case, use the <em>Welch correction</em>.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 3: The Uneven Oven</div>
        <div class="challenge-question">Levene's Test returned Sig. = .02 for your ANOVA data. What should you do?</div>
        <div class="data-display">
          Levene's Test: F(2, 42) = 4.31, Sig. = .02
        </div>
        ${hint}
        <div class="options-grid" id="q3-opts">
          <button class="option-btn" onclick="checkQ(3,this,'a')">All good, Sig. > .01, proceed with the standard ANOVA</button>
          <button class="option-btn" onclick="checkQ(3,this,'b')">Redo the data collection — heterogeneous variances invalidate any analysis</button>
          <button class="option-btn" onclick="checkQ(3,this,'c')">Ignore the result and run the standard ANOVA anyway</button>
          <button class="option-btn" onclick="checkQ(3,this,'d')">Homogeneity was violated (Sig. = .02 < .05). Use the Welch correction to protect against Type I Error inflation when comparing groups</button>
        </div>
        <div id="q3-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 8: Post-Hoc Tests ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','When F is significant, we need <em>Post Hoc</em> tests to discover WHICH groups differ from each other.')}
      ${dialogue('odin','<em>Tukey HSD</em>: when variances are homogeneous (Levene ok). <em>Games-Howell</em>: when variances are heterogeneous. <em>Planned contrasts</em>: when you have specific hypotheses before collecting data.')}
      ${dialogue('thor','The ANOVA was significant! Done, published!')}
      ${dialogue('odin','Without Post Hoc or contrasts, you\'re serving a dish in the dark! The F only says that <em>some</em> recipe differs — not which one is best. Publishing without Post Hoc is like serving a banquet without announcing which dish won.')}
      ${dialogue('muninn','Tukey compares all pairs. Games-Howell does not assume equal variances. Planned contrasts are more powerful when you have a priori hypotheses.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 9: CHALLENGE 4 — Post-Hoc ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Levene p > .05 = homogeneous variances. For exploratory comparison (all against all) with equal variances, use <em>Tukey HSD</em>.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 4: Which Recipe Won?</div>
        <div class="challenge-question">The ANOVA F(2, 57) = 8.34, p < .001 compared 3 warrior training methods. Levene's yielded Sig. = .32. Which Post Hoc to use?</div>
        <div class="data-display">
          ANOVA: F(2, 57) = 8.34, p < .001<br>
          Levene's: Sig. = .32 (homogeneous variances)
        </div>
        ${hint}
        <div class="options-grid" id="q4-opts">
          <button class="option-btn" onclick="checkQ(4,this,'a')">Tukey HSD — variances are homogeneous (Levene p = .32 > .05) and the comparison is exploratory (all against all). It is the most widely used Post Hoc when assumptions are met</button>
          <button class="option-btn" onclick="checkQ(4,this,'b')">Games-Howell — always safer regardless of Levene's result</button>
          <button class="option-btn" onclick="checkQ(4,this,'c')">None — a significant F is sufficient for conclusions</button>
          <button class="option-btn" onclick="checkQ(4,this,'d')">t-test for each pair without alpha correction</button>
        </div>
        <div id="q4-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 10: Effect Size (ω² vs η²) ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','Statistical significance is NOT enough. <em>Always report the Effect Size.</em>')}
      ${dialogue('odin','<em>η² (eta squared)</em> = SSM/SST. It\'s simple but <em>biased</em> — it overestimates the population effect. Prefer <em>ω² (omega squared)</em>, which corrects this bias using the degrees of freedom.')}
      ${dialogue('muninn','Benchmarks for ω²: <em>small ≈ 0.01</em>; <em>medium ≈ 0.06</em>; <em>large ≈ 0.14</em>.')}
      ${dialogue('huginn','A huge sample can make any tiny effect "significant." Without effect size, you don\'t know whether the difference <em>matters in the real world</em>. It\'s like saying a recipe is "significantly" better... by 0.001 grains of salt.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 11: CHALLENGE 5 — Effect Size ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('η² = SSM/SST is simple but inflated — it <em>overestimates</em> the population effect. ω² corrects this bias using the degrees of freedom. Always prefer ω².'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 5: The True Flavor</div>
        <div class="challenge-question">SSM = 200, SST = 1000. The η² is 0.20. The researcher concluded the effect is large. What is the problem?</div>
        <div class="data-display">
          SSM = 200 &nbsp;|&nbsp; SST = 1000<br>
          η² = SSM/SST = 200/1000 = 0.20
        </div>
        ${hint}
        <div class="options-grid" id="q5-opts">
          <button class="option-btn" onclick="checkQ(5,this,'a')">No problem — η² = 0.20 is indeed large and reliable</button>
          <button class="option-btn" onclick="checkQ(5,this,'b')">The effect is small, 0.20 is below the threshold</button>
          <button class="option-btn" onclick="checkQ(5,this,'c')">η² is biased and overestimates the population effect. One should calculate ω² for a more precise estimate — ω² discounts the degrees of freedom and will always be smaller than η²</button>
          <button class="option-btn" onclick="checkQ(5,this,'d')">Should use Cohen's d instead of η²</button>
        </div>
        <div id="q5-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 12: APA Reporting and GLM ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('odin','Report in <em>APA format</em>: F(df_between, df_within) = value, p < .05, ω² = value. Example: <em>F(2, 42) = 20.06, p < .001, ω² = 0.14</em>.')}
      ${dialogue('odin','Final secret: <em>ANOVA is a special case of Regression</em> (GLM — General Linear Model). Both partition variance. The categorical IV is coded as dummy variables.')}
      ${dialogue('muninn','Understanding this connection changes everything: ANOVA, ANCOVA, MANOVA — they are all recipes from the same <em>Linear Grimoire</em>. The only difference is the type of predictor: categorical in ANOVA, continuous in regression.')}
      ${dialogue('odin','Think of the GLM as Valhalla\'s universal oven: any linear statistical recipe can be baked in it.')}
      <button class="continue-btn" onclick="nextScene()">Continue →</button>
    </div>`});

  // ━━ SCENE 13: CHALLENGE 6 — APA Reporting ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('df between = k−1 = 3−1 = 2, df within = N−k = 60−3 = 57. APA format: F(df_between, df_within) = value, p, ω². <em>Always</em> include effect size.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 6: The APA Scroll</div>
        <div class="challenge-question">With 3 groups (k=3), N=60, F = 7.45, p = .001, ω² = 0.12. Which is the correct APA report?</div>
        <div class="data-display">
          k = 3 &nbsp;|&nbsp; N = 60 &nbsp;|&nbsp; F = 7.45<br>
          p = .001 &nbsp;|&nbsp; ω² = 0.12
        </div>
        ${hint}
        <div class="options-grid" id="q6-opts">
          <button class="option-btn" onclick="checkQ(6,this,'a')">F(3, 60) = 7.45, p = .001, ω² = .12</button>
          <button class="option-btn" onclick="checkQ(6,this,'b')">F(2, 57) = 7.45, p = .001, ω² = .12 — df_between = k−1 = 2, df_within = N−k = 57, with effect size reported</button>
          <button class="option-btn" onclick="checkQ(6,this,'c')">F(2, 57) = 7.45, p = .001 — effect size is optional</button>
          <button class="option-btn" onclick="checkQ(6,this,'d')">t(57) = 7.45, p = .001 — ANOVA uses the t statistic</button>
        </div>
        <div id="q6-fb"></div>
      </div>
    </div>`;}});

  // ━━ SCENE 14: CHALLENGE 7 — ANOVA = Regression ━━
  GAME.scenes.push({type:'challenge',html:()=>{
    const hint=GAME.difficulty==='aprendiz'?hintBox('Think about the partition SST = SSM + SSR. Both (ANOVA and regression) do this — the difference is the type of predictor: categorical vs continuous.'):'';
    return `
    <div class="scene">
      ${xpBar()}
      <div class="challenge-box">
        <div class="challenge-title">⚔️ Challenge 7: The Linear Grimoire</div>
        <div class="challenge-question">Why do we say that ANOVA is a special case of Regression (GLM)?</div>
        ${hint}
        <div class="options-grid" id="q7-opts">
          <button class="option-btn" onclick="checkQ(7,this,'a')">They are not — they are completely different techniques with distinct logics</button>
          <button class="option-btn" onclick="checkQ(7,this,'b')">Because both use the t-test internally</button>
          <button class="option-btn" onclick="checkQ(7,this,'c')">Both partition the total variance (SST) into explained (SSM) and residual (SSR). ANOVA uses categorical variables coded as dummies; regression uses continuous ones. They share the same general linear model logic</button>
          <button class="option-btn" onclick="checkQ(7,this,'d')">Because regression always replaces ANOVA in any situation</button>
        </div>
        <div id="q7-fb"></div>
      </div>
    </div>`;}});

  // ━━ MASTER CHALLENGES ━━
  if(GAME.difficulty==='mestre'){
    // CHALLENGE 8: Planned Contrasts
    GAME.scenes.push({type:'challenge',html:()=>`
      <div class="scene">
        ${xpBar()}
        <div class="challenge-box">
          <div class="challenge-title">⚔️ Master Challenge: Planned Contrasts</div>
          <div class="challenge-question">Before collecting data, you hypothesized that the "Intensive Training" group would be superior to the other two groups combined. Which approach is most appropriate?</div>
          <div class="options-grid" id="q8-opts">
            <button class="option-btn" onclick="checkQ(8,this,'a')">Tukey HSD — it is the most robust Post Hoc</button>
            <button class="option-btn" onclick="checkQ(8,this,'b')">Multiple t-tests with Bonferroni correction</button>
            <button class="option-btn" onclick="checkQ(8,this,'c')">Planned (a priori) contrasts — they allow testing specific hypotheses with more statistical power than exploratory Post Hoc tests, and the 1-vs-rest comparison is coded in the contrast weights</button>
            <button class="option-btn" onclick="checkQ(8,this,'d')">Ignore the hypothesis and run Post Hoc Games-Howell</button>
          </div>
          <div id="q8-fb"></div>
        </div>
      </div>`});

    // CHALLENGE 9: Complete Scenario
    GAME.scenes.push({type:'challenge',html:()=>`
      <div class="scene">
        ${xpBar()}
        <div class="challenge-box">
          <div class="challenge-title">⚔️ Master Challenge: The Final Feast</div>
          <div class="challenge-question">A Jarl compared the productivity of 4 clans (N=80, n=20 per clan). Levene Sig.=.04. Welch F(3, 41.2) = 5.67, p = .003. What should be reported and which Post Hoc?</div>
          <div class="data-display">
            k = 4 clans &nbsp;|&nbsp; N = 80 (n=20/clan)<br>
            Levene's: Sig. = .04 (heterogeneous variances)<br>
            Welch F(3, 41.2) = 5.67, p = .003
          </div>
          <div class="options-grid" id="q9-opts">
            <button class="option-btn" onclick="checkQ(9,this,'a')">Tukey HSD — ignore Levene's and use standard ANOVA</button>
            <button class="option-btn" onclick="checkQ(9,this,'b')">Report F(3, 76) without Welch correction</button>
            <button class="option-btn" onclick="checkQ(9,this,'c')">Redo the study with only 2 clans so you can use a t-test</button>
            <button class="option-btn" onclick="checkQ(9,this,'d')">Use Games-Howell (heterogeneous variances per Levene's), report Welch F(3, 41.2) = 5.67, p = .003, calculate ω² and identify which clans differ from each other</button>
          </div>
          <div id="q9-fb"></div>
        </div>
      </div>`});
  }

  // ━━ FINAL SCENE ━━
  GAME.scenes.push({type:'narrative',html:()=>`
    <div class="scene">
      ${xpBar()}
      ${dialogue('narrator','The feast is served. The dishes have been compared with rigor, the assumptions verified, the effects measured. The young statistician has proven they can judge recipes without inflating error.')}
      ${dialogue('odin','You have conquered the <em>Realm of One-Way ANOVA</em>! You mastered the variance partition, degrees of freedom, Levene\'s Test, Post Hoc tests, effect size with ω², and the connection with the GLM. Few skills are as fundamental.')}
      ${dialogue('thor','Alright, I admit it... the Post Hoc was worth it. Without it, I\'d serve a banquet without knowing which dish won.')}
      ${dialogue('muninn','In the next Realms, the recipes grow more complex: Factorial ANOVA, Repeated Measures, ANCOVA... Each one adds ingredients to the same Linear Grimoire. Prepare yourself!')}
      <button class="continue-btn" onclick="showResults()">View Final Result 🍽️</button>
    </div>`});
}

function checkQ(q,btn,ans){
  const opts=document.querySelectorAll(`#q${q}-opts .option-btn`);
  opts.forEach(b=>{b.classList.add('disabled');b.onclick=null;});
  const fb=document.getElementById(`q${q}-fb`),cor=ANSWERS[q],exp=EXPLANATIONS[q];
  GAME.total++;
  if(ans===cor){
    btn.classList.add('correct');GAME.hits++;GAME.xp+=20;updateXPBar();earnGear();
    fb.innerHTML=`<div class="feedback-box correct">${dialogue(exp.charC,exp.correct+' <span class="xp-badge">+20 XP</span>')}<button class="continue-btn" onclick="nextScene()">Continue →</button></div>`;
  }else{
    btn.classList.add('wrong');
    const ci=['a','b','c','d'].indexOf(cor);if(opts[ci])opts[ci].classList.add('correct');
    fb.innerHTML=`<div class="feedback-box wrong">${dialogue(exp.charW,exp.wrong)}<button class="continue-btn" onclick="nextScene()">Continue →</button></div>`;
  }
}

  {"s":"helm","n":"Supreme Chef's Hat","h":"<div style=\"width:52px;height:30px;background:linear-gradient(180deg,#f8f0e0,#e0d4c0);border-radius:6px 6px 0 0;border:2px solid #c0b090;position:relative\"><div style=\"position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:36px;height:18px;background:#f8f0e0;border-radius:18px 18px 0 0;border:2px solid #c0b090;border-bottom:none\"></div></div>"}
];
var gearEarned=0;
function armorPanelHTML(){
  var rows='';
  for(var i=0;i<GEAR_ITEMS.length;i++){rows+='<div class="gp-row'+(i<gearEarned?' earned':'')+'" id="gprow'+i+'"><span class="gp-dot"></span><span>'+GEAR_ITEMS[i].n+'</span></div>';}
  var sl='<div class="vm-sparks" id="vmsparks"></div>';
  sl+='<div class="vm-slot vm-cape" id="vmslot-cape"></div>';
  sl+='<div class="vm-head"></div><div class="vm-arm-l"></div><div class="vm-arm-r"></div><div class="vm-torso"></div><div class="vm-leg-l"></div><div class="vm-leg-r"></div>';
  sl+='<div class="vm-slot vm-boots" id="vmslot-boots"></div><div class="vm-slot vm-mail" id="vmslot-mail"></div>';
  sl+='<div class="vm-slot vm-left" id="vmslot-left"></div><div class="vm-slot vm-right" id="vmslot-right"></div>';
  sl+='<div class="vm-slot vm-helm" id="vmslot-helm"></div>';
  return '<div class="armor-panel"><div class="viking-mini" id="vmini">'+sl+'</div><div class="gear-progress">'+rows+'</div></div>';
}
function restoreGear(){for(var i=0;i<gearEarned&&i<GEAR_ITEMS.length;i++){var g=GEAR_ITEMS[i],el=document.getElementById('vmslot-'+g.s);if(el){el.innerHTML=g.h;el.classList.add('on');}}}
function earnGear(){
  if(gearEarned>=GEAR_ITEMS.length)return;
  var g=GEAR_ITEMS[gearEarned],el=document.getElementById('vmslot-'+g.s);
  if(el){el.innerHTML=g.h;el.classList.add('on','vm-flash');setTimeout(function(){el.classList.remove('vm-flash')},500);spawnVMSparks(el);}
  var row=document.getElementById('gprow'+gearEarned);if(row)row.classList.add('earned');
  gearEarned++;
}
function spawnVMSparks(el){
  var sc=document.getElementById('vmsparks');if(!sc||!el)return;
  var r=el.getBoundingClientRect(),sr=document.getElementById('vmini').getBoundingClientRect();
  var cx=r.left-sr.left+r.width/2,cy=r.top-sr.top+r.height/2;
  var cols=['#f0c040','#f08030','#f0e080','#ff6040','#ffd060'];
  for(var i=0;i<10;i++){var s=document.createElement('div');s.className='vm-spark';
    var a=Math.random()*Math.PI*2,d=20+Math.random()*30;
    s.style.cssText='left:'+cx+'px;top:'+cy+'px;background:'+cols[Math.floor(Math.random()*5)]+';--sx:'+(Math.cos(a)*d)+'px;--sy:'+(Math.sin(a)*d)+'px;width:'+(2+Math.random()*3)+'px;height:'+(2+Math.random()*3)+'px';
    sc.appendChild(s);setTimeout(function(x){x.remove()},700,s);}
}
function resultVikingHTML(){
  var pct=GAME.total>0?Math.round((GAME.hits/GAME.total)*100):0;
  var ti=[];if(pct>=90)ti=GEAR_ITEMS;else if(pct>=70)ti=GEAR_ITEMS.slice(0,5);else if(pct>=50)ti=GEAR_ITEMS.slice(0,2);
  var sm={boots:'rv-boots',mail:'rv-mail',right:'rv-right',left:'rv-left',cape:'rv-cape',helm:'rv-helm'};
  var html='<div class="result-viking">';
  html+='<div class="rv-slot rv-cape" id="rvs-cape"></div>';
  html+='<div class="rv-head"></div><div class="rv-arm-l"></div><div class="rv-arm-r"></div><div class="rv-torso"></div><div class="rv-leg-l"></div><div class="rv-leg-r"></div>';
  html+='<div class="rv-slot rv-boots" id="rvs-boots"></div><div class="rv-slot rv-mail" id="rvs-mail"></div>';
  html+='<div class="rv-slot rv-left" id="rvs-left"></div><div class="rv-slot rv-right" id="rvs-right"></div>';
  html+='<div class="rv-slot rv-helm" id="rvs-helm"></div></div>';
  setTimeout(function(){ti.forEach(function(g){var e=document.getElementById('rvs-'+g.s);if(e)e.innerHTML=g.h;});},100);
  return html;
}

showTitleScreen();
</script>
